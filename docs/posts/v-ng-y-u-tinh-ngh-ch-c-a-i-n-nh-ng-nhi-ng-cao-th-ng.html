                            <h2 data-role="sapo">
                                Bộ đôi Đông Nhi - Ông Cao Thắng khiến fan thích thú khi trình làng MV <i>Si mê</i>, đánh dấu 14 năm yêu nhau. Cả hai ghi lại những khoảnh khắc đáng nhớ bên con gái Winnie tại các danh thắng ở Nhật Bản. 
                            </h2>
                            <div>
                                <div data-role="content" itemprop="articleBody" data-io-article-url="https://thanhnien.vn/ve-dang-yeu-tinh-nghich-cua-ai-nu-nha-dong-nhi-ong-cao-thang-185230214221934118.htm">
                                                                                                                
                                    <figure type="Photo"><p><img src="https://images2.thanhnien.vn/528068263637045248/2023/2/14/dong-nhi-ong-cao-thang-6-1676385364068120252315.jpg" id="img_549962923899301888" w="2000" h="1333" alt="Đông Nhi - Ông Cao Thắng khoe khoảnh khắc hạnh phúc bên con gái  - Ảnh 1." title="Đông Nhi - Ông Cao Thắng khoe khoảnh khắc hạnh phúc bên con gái  - Ảnh 1." rel="lightbox" photoid="549962923899301888" data-original="https://images2.thanhnien.vn/528068263637045248/2023/2/14/dong-nhi-ong-cao-thang-6-1676385364068120252315.jpg" type="photo" width="" height=""/></p><figcaption><p data-placeholder="Nhập chú thích ảnh">Nhân dịp Valentine, Đông Nhi trình làng MV <i>Si mê</i> với sự tham gia của <a href="https://thanhnien.vn/dong-nhi-ong-cao-thang-ky-niem-14-nam-yeu-nhau-185230212083805994.htm" title="Ông Cao Thắng" data-rel="follow">Ông Cao Thắng</a> và con gái Winnie. Nữ ca sĩ nói đây là sản phẩm kỷ niệm 14 năm cả hai quen nhau cũng như đánh dấu lần đầu con gái cô xuất ngoại</p></figcaption><p data-placeholder="Nhập tác giả">NVCC</p></figure><figure type="Photo"><p><img src="https://images2.thanhnien.vn/528068263637045248/2023/2/14/dong-nhi-ong-cao-thang-1-1676385364609842064931.jpg" id="img_549962912491343872" w="2000" h="1333" alt="Đông Nhi - Ông Cao Thắng khoe khoảnh khắc hạnh phúc bên con gái  - Ảnh 2." title="Đông Nhi - Ông Cao Thắng khoe khoảnh khắc hạnh phúc bên con gái  - Ảnh 2." rel="lightbox" photoid="549962912491343872" data-original="https://images2.thanhnien.vn/528068263637045248/2023/2/14/dong-nhi-ong-cao-thang-1-1676385364609842064931.jpg" type="photo" width="" height=""/></p><figcaption><p data-placeholder="Nhập chú thích ảnh">Trong MV, Đông Nhi gây ấn tượng khi cùng ông xã và con gái xuất hiện tại nhiều thắng cảnh ở Nhật Bản. Được biết, toàn bộ thước phim trong <i>Si mê </i>đều được ghi hình tại xứ sở mặt trời mọc. Vừa qua, gia đình nữ ca sĩ còn được Cơ quan Xúc tiến du lịch Nhật Bản (JNTO) chọn làm Đại sứ du lịch Nhật Bản tại Việt Nam</p></figcaption><p data-placeholder="Nhập tác giả">NVCC</p></figure><figure type="Photo"><p><img src="https://images2.thanhnien.vn/528068263637045248/2023/2/14/dong-nhi-ong-cao-thang-5-16763853658021424407403.jpg" id="img_549962928758226944" w="2000" h="1333" alt="Đông Nhi - Ông Cao Thắng khoe khoảnh khắc hạnh phúc bên con gái  - Ảnh 3." title="Đông Nhi - Ông Cao Thắng khoe khoảnh khắc hạnh phúc bên con gái  - Ảnh 3." rel="lightbox" photoid="549962928758226944" data-original="https://images2.thanhnien.vn/528068263637045248/2023/2/14/dong-nhi-ong-cao-thang-5-16763853658021424407403.jpg" type="photo" width="" height=""/></p><figcaption><p data-placeholder="Nhập chú thích ảnh">Thông qua MV, bộ đôi mong muốn giới thiệu nét đẹp Nhật Bản đến với công chúng Việt Nam qua nhiều điểm đến như: Osaka, rừng trúc Arashiyama, vùng Kansai... Không chỉ tận thưởng các cảnh đẹp tại đây, cả hai cùng con gái còn thử mặc trang phục truyền thống của người dân địa phương</p></figcaption><p data-placeholder="Nhập tác giả">NVCC</p></figure><figure type="Photo"><p><img src="https://images2.thanhnien.vn/528068263637045248/2023/2/14/dong-nhi-ong-cao-thang-8-16763853649862036763917.jpg" id="img_549962943597248512" w="2000" h="3000" alt="Đông Nhi - Ông Cao Thắng khoe khoảnh khắc hạnh phúc bên con gái  - Ảnh 4." title="Đông Nhi - Ông Cao Thắng khoe khoảnh khắc hạnh phúc bên con gái  - Ảnh 4." rel="lightbox" photoid="549962943597248512" data-original="https://images2.thanhnien.vn/528068263637045248/2023/2/14/dong-nhi-ong-cao-thang-8-16763853649862036763917.jpg" type="photo" width="" height=""/></p><figcaption><p data-placeholder="Nhập chú thích ảnh">Dù chỉ hơn 2 tuổi nhưng bé <a href="https://thanhnien.vn/dong-nhi-ong-cao-thang-ky-niem-14-nam-yeu-nhau-185230212083805994.htm" title="Winnie" data-rel="follow">Winnie</a> vô cùng hoạt bát và nhanh nhẹn. Trong MV, ái nữ nhà Ông Cao Thắng dí dỏm tạo dáng, thi thoảng pha trò tạo nên nhiều khoảnh khắc đáng yêu</p></figcaption><p data-placeholder="Nhập tác giả">NVCC</p></figure><figure type="Photo"><p><img src="https://images2.thanhnien.vn/528068263637045248/2023/2/14/dong-nhi-ong-cao-thang-3-16763853651741179846249.jpg" id="img_549962917603905536" w="2000" h="1333" alt="Đông Nhi - Ông Cao Thắng khoe khoảnh khắc hạnh phúc bên con gái  - Ảnh 5." title="Đông Nhi - Ông Cao Thắng khoe khoảnh khắc hạnh phúc bên con gái  - Ảnh 5." rel="lightbox" photoid="549962917603905536" data-original="https://images2.thanhnien.vn/528068263637045248/2023/2/14/dong-nhi-ong-cao-thang-3-16763853651741179846249.jpg" type="photo" width="" height=""/></p><figcaption><p data-placeholder="Nhập chú thích ảnh">Với giai điệu vui tươi và sôi động, Đông Nhi hy vọng ca khúc mang đến làn gió mới cho khán giả. Giọng ca <i>Bad boy</i> cũng mong người hâm mộ có trải nghiệm thú vị khi thưởng thức màn trình diễn kết hợp giữa âm nhạc và du lịch</p></figcaption><p data-placeholder="Nhập tác giả">NVCC</p></figure><figure type="Photo"><p><img src="https://images2.thanhnien.vn/528068263637045248/2023/2/14/dong-nhi-ong-cao-thang-4-1676385365347191258275.jpg" id="img_549962938878685184" w="2000" h="1333" alt="Đông Nhi - Ông Cao Thắng khoe khoảnh khắc hạnh phúc bên con gái  - Ảnh 6." title="Đông Nhi - Ông Cao Thắng khoe khoảnh khắc hạnh phúc bên con gái  - Ảnh 6." rel="lightbox" photoid="549962938878685184" data-original="https://images2.thanhnien.vn/528068263637045248/2023/2/14/dong-nhi-ong-cao-thang-4-1676385365347191258275.jpg" type="photo" width="" height=""/></p><figcaption><p data-placeholder="Nhập chú thích ảnh">Sau thời gian ngắn đăng tải, MV <i>Si mê</i> đã vượt mốc  250.000 lượt xem cùng hàng trăm bình luận. Đa số ý kiến bày tỏ ngưỡng mộ trước cuộc sống viên mãn của <a href="https://thanhnien.vn/dong-nhi-ong-cao-thang-ky-niem-14-nam-yeu-nhau-185230212083805994.htm" title="Đông Nhi" data-rel="follow">Đông Nhi</a>. Ngoài ra, nhiều fan cũng dành lời khen ngợi sự kháu khỉnh, đáng yêu của nhóc tì Winnie</p></figcaption><p data-placeholder="Nhập tác giả">NVCC</p></figure><figure type="Photo"><p><img src="https://images2.thanhnien.vn/528068263637045248/2023/2/14/dong-nhi-ong-cao-thang-7-16763853655192137208707.jpg" id="img_549962933106941952" w="2000" h="1333" alt="Đông Nhi - Ông Cao Thắng khoe khoảnh khắc hạnh phúc bên con gái  - Ảnh 7." title="Đông Nhi - Ông Cao Thắng khoe khoảnh khắc hạnh phúc bên con gái  - Ảnh 7." rel="lightbox" photoid="549962933106941952" data-original="https://images2.thanhnien.vn/528068263637045248/2023/2/14/dong-nhi-ong-cao-thang-7-16763853655192137208707.jpg" type="photo" width="" height=""/></p><figcaption><p data-placeholder="Nhập chú thích ảnh">Sau khi kết thúc chuyến du lịch kết hợp làm việc tại Nhật, Đông Nhi cho biết gia đình cô ấn tượng nhất là sự hiếu khách và ấm áp của người Nhật. Đồng thời, ẩm thực tại đây vô cùng đặc sắc với nhiều món ăn tinh tế, mang đậm dấu ấn văn hóa Nhật</p></figcaption><p data-placeholder="Nhập tác giả">NVCC</p></figure><!--Wed Feb 15 2023 07:55:40 GMT+0700 (Giờ Đông Dương) -- Wed Feb 15 2023 07:55:40 GMT+0700 (Giờ Đông Dương) -- Wed Feb 15 2023 07:56:02 GMT+0700 (Giờ Đông Dương)-->
