    <h1>Thế giới chào đón năm mới 2024</h1>
    
    <div id="readability-page-1" class="page"><div id="root"><div id="main-wrapper"><header role="banner"><nav role="navigation" dir="ltr"></nav></header><div><div><section aria-label="Quảng cáo" aria-hidden="true" role="region" data-e2e="advertisement"></section><div><div><main role="main"><p><time datetime="2024-01-01">6 giờ trước</time></p><p dir="ltr"><b>Chia tay năm cũ 2023, thế giới chào đón năm mới 2024 trong những bầu không khí, khung cảnh tưng bừng rộn rã.</b></p><figure><div><picture><img src="https://ichef.bbci.co.uk/news/640/cpsprodpb/bd01/live/fe577070-a899-11ee-bc2f-cb5579b90709.jpg" srcset="https://ichef.bbci.co.uk/news/240/cpsprodpb/bd01/live/fe577070-a899-11ee-bc2f-cb5579b90709.jpg 240w, https://ichef.bbci.co.uk/news/320/cpsprodpb/bd01/live/fe577070-a899-11ee-bc2f-cb5579b90709.jpg 320w, https://ichef.bbci.co.uk/news/480/cpsprodpb/bd01/live/fe577070-a899-11ee-bc2f-cb5579b90709.jpg 480w, https://ichef.bbci.co.uk/news/624/cpsprodpb/bd01/live/fe577070-a899-11ee-bc2f-cb5579b90709.jpg 624w, https://ichef.bbci.co.uk/news/800/cpsprodpb/bd01/live/fe577070-a899-11ee-bc2f-cb5579b90709.jpg 800w" sizes="(min-width: 1008px) 760px, 100vw" alt="Reuters" width="976" height="549"/></picture><p role="text"><span>Nguồn hình ảnh, </span><span lang="en-GB">Reuters</span></p></div><figcaption dir="ltr"><span role="text"><span>Chụp lại hình ảnh, </span><p>Tại Ấn Độ, một số người chọn cách đón năm mới 2024 trong yên tĩnh bằng cách thiền định tại một ngôi đền thờ Mặt Trời gần Ahmedabad </p></span></figcaption></figure><figure><div><picture><img src="https://ichef.bbci.co.uk/news/640/cpsprodpb/c8fa/live/5818e300-a89a-11ee-8f07-bbfdfa890097.jpg" srcset="https://ichef.bbci.co.uk/news/240/cpsprodpb/c8fa/live/5818e300-a89a-11ee-8f07-bbfdfa890097.jpg 240w, https://ichef.bbci.co.uk/news/320/cpsprodpb/c8fa/live/5818e300-a89a-11ee-8f07-bbfdfa890097.jpg 320w, https://ichef.bbci.co.uk/news/480/cpsprodpb/c8fa/live/5818e300-a89a-11ee-8f07-bbfdfa890097.jpg 480w, https://ichef.bbci.co.uk/news/624/cpsprodpb/c8fa/live/5818e300-a89a-11ee-8f07-bbfdfa890097.jpg 624w, https://ichef.bbci.co.uk/news/800/cpsprodpb/c8fa/live/5818e300-a89a-11ee-8f07-bbfdfa890097.jpg 800w" sizes="(min-width: 1008px) 760px, 100vw" alt="Reuters" loading="lazy" width="976" height="549"/></picture><p role="text"><span>Nguồn hình ảnh, </span><span lang="en-GB">Reuters</span></p></div><figcaption dir="ltr"><span role="text"><span>Chụp lại hình ảnh, </span><p>Đèn chiếu sáng Khải Hoàn Môn ở Paris, nơi đang chuẩn bị cho năm đăng cai Olympics</p></span></figcaption></figure><figure><div><picture><img src="https://ichef.bbci.co.uk/news/640/cpsprodpb/3850/live/94e32c50-a89a-11ee-8f07-bbfdfa890097.jpg" srcset="https://ichef.bbci.co.uk/news/240/cpsprodpb/3850/live/94e32c50-a89a-11ee-8f07-bbfdfa890097.jpg 240w, https://ichef.bbci.co.uk/news/320/cpsprodpb/3850/live/94e32c50-a89a-11ee-8f07-bbfdfa890097.jpg 320w, https://ichef.bbci.co.uk/news/480/cpsprodpb/3850/live/94e32c50-a89a-11ee-8f07-bbfdfa890097.jpg 480w, https://ichef.bbci.co.uk/news/624/cpsprodpb/3850/live/94e32c50-a89a-11ee-8f07-bbfdfa890097.jpg 624w, https://ichef.bbci.co.uk/news/800/cpsprodpb/3850/live/94e32c50-a89a-11ee-8f07-bbfdfa890097.jpg 800w" sizes="(min-width: 1008px) 760px, 100vw" alt="Getty Images" loading="lazy" width="976" height="549"/></picture><p role="text"><span>Nguồn hình ảnh, </span><span lang="en-GB">Getty Images</span></p></div><figcaption dir="ltr"><span role="text"><span>Chụp lại hình ảnh, </span><p>Pháo hoa bùng nổ trên Cổng thành Brandenburg của Berlin vào lúc nửa đêm, tuy nhiên trong thành phố đêm giao thừa đã nổ ra một số vụ bạo lực</p></span></figcaption></figure><figure><div><picture><img src="https://ichef.bbci.co.uk/news/640/cpsprodpb/ab08/live/eefa6000-a89a-11ee-beb5-e1400df560f2.jpg" srcset="https://ichef.bbci.co.uk/news/240/cpsprodpb/ab08/live/eefa6000-a89a-11ee-beb5-e1400df560f2.jpg 240w, https://ichef.bbci.co.uk/news/320/cpsprodpb/ab08/live/eefa6000-a89a-11ee-beb5-e1400df560f2.jpg 320w, https://ichef.bbci.co.uk/news/480/cpsprodpb/ab08/live/eefa6000-a89a-11ee-beb5-e1400df560f2.jpg 480w, https://ichef.bbci.co.uk/news/624/cpsprodpb/ab08/live/eefa6000-a89a-11ee-beb5-e1400df560f2.jpg 624w, https://ichef.bbci.co.uk/news/800/cpsprodpb/ab08/live/eefa6000-a89a-11ee-beb5-e1400df560f2.jpg 800w" sizes="(min-width: 1008px) 760px, 100vw" alt="BBC" loading="lazy" width="976" height="549"/></picture></div><figcaption dir="ltr"><span role="text"><span>Chụp lại hình ảnh, </span><p>Pháo hoa tưng bừng trên bầu trời London, nơi 100 ngàn người tới xem màn trình diễn</p></span></figcaption></figure><figure><div><picture><img src="https://ichef.bbci.co.uk/news/640/cpsprodpb/f8e0/live/2df14d50-a89b-11ee-bc2f-cb5579b90709.jpg" srcset="https://ichef.bbci.co.uk/news/240/cpsprodpb/f8e0/live/2df14d50-a89b-11ee-bc2f-cb5579b90709.jpg 240w, https://ichef.bbci.co.uk/news/320/cpsprodpb/f8e0/live/2df14d50-a89b-11ee-bc2f-cb5579b90709.jpg 320w, https://ichef.bbci.co.uk/news/480/cpsprodpb/f8e0/live/2df14d50-a89b-11ee-bc2f-cb5579b90709.jpg 480w, https://ichef.bbci.co.uk/news/624/cpsprodpb/f8e0/live/2df14d50-a89b-11ee-bc2f-cb5579b90709.jpg 624w, https://ichef.bbci.co.uk/news/800/cpsprodpb/f8e0/live/2df14d50-a89b-11ee-bc2f-cb5579b90709.jpg 800w" sizes="(min-width: 1008px) 760px, 100vw" alt="Getty Images" loading="lazy" width="976" height="549"/></picture><p role="text"><span>Nguồn hình ảnh, </span><span lang="en-GB">Getty Images</span></p></div><figcaption dir="ltr"><span role="text"><span>Chụp lại hình ảnh, </span><p>Rapper người Mỹ LL Cool J là một trong những nghệ sĩ trình diễn tại quảng trường Times Square, New York trong đêm Giao thừa</p></span></figcaption></figure><p dir="ltr">Và nếu bạn muốn xem một chút hình ảnh video:</p><div dir="ltr"><figure><div data-e2e="media-player"><div data-e2e="media-player__placeholder"><p><strong aria-hidden="true">Contains flashing images.</strong></p><p><img src="https://ichef.bbci.co.uk/images/ic/512xn/p0h2dhkh.jpg" alt=""/></p></div></div><figcaption dir="ltr
