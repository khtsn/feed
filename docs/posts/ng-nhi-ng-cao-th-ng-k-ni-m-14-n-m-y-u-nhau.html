                            <h2 data-role="sapo">
                                Nhân dịp Valentine 2023, bộ đôi Đông Nhi - Ông Cao Thắng bất ngờ hé lộ poster MV mang tên <i>Si mê</i>. Sản phẩm được ghi hình tại Nhật, có sự góp mặt của con gái họ là bé Winnie.
                            </h2>
                            <div>
                                <div data-role="content" itemprop="articleBody" data-io-article-url="https://thanhnien.vn/dong-nhi-ong-cao-thang-ky-niem-14-nam-yeu-nhau-185230212083805994.htm">
                                                                                                                
                                    <figure type="Photo"><p><img src="https://images2.thanhnien.vn/thumb_w/640/528068263637045248/2023/2/12/dong-nhi-ong-cao-thang-1-16761650841511798698906.jpg" id="img_549038977859653632" w="2000" h="1333" alt="Đông Nhi - Ông Cao Thắng kỷ niệm 14 năm yêu nhau - Ảnh 1." title="Đông Nhi - Ông Cao Thắng kỷ niệm 14 năm yêu nhau - Ảnh 1." rel="lightbox" photoid="549038977859653632" data-original="https://images2.thanhnien.vn/528068263637045248/2023/2/12/dong-nhi-ong-cao-thang-1-16761650841511798698906.jpg" type="photo" width="" height=""/></p><figcaption><p data-placeholder="Nhập chú thích ảnh"><i>Si mê </i>không chỉ là MV dành tặng fan nhân ngày Valentine mà còn là cột mốc đánh dấu 14 năm yêu nhau của Đông Nhi và Ông Cao Thắng. Sau thời gian dài tìm hiểu, họ đã về chung nhà được 3 năm và có với nhau bé <a href="https://www.24h.com.vn/nguoi-mau-bach-bien-winnie-harlow-dien-do-xuyen-thau-tren-tham-do-british-fashion-awards-2022-1851530449.htm" title="Winnie" data-rel="follow">Winnie</a></p></figcaption><p data-placeholder="Nhập tác giả">NVCC</p></figure><figure type="Photo"><p><img src="https://images2.thanhnien.vn/thumb_w/640/528068263637045248/2023/2/12/anh-chup-man-hinh-2023-02-12-luc-082520-16761651592261018834414.png" id="img_549039300096929792" w="1333" h="882" alt="Đông Nhi - Ông Cao Thắng kỷ niệm 14 năm yêu nhau - Ảnh 2." title="Đông Nhi - Ông Cao Thắng kỷ niệm 14 năm yêu nhau - Ảnh 2." rel="lightbox" photoid="549039300096929792" data-original="https://images2.thanhnien.vn/528068263637045248/2023/2/12/anh-chup-man-hinh-2023-02-12-luc-082520-16761651592261018834414.png" type="photo" width="" height=""/></p><figcaption><p data-placeholder="Nhập chú thích ảnh">Dù chưa hé lộ teaser MV, nhưng gia đình Đông Nhi - Ông Cao Thắng khiến fan thích thú bởi loạt ảnh tràn đầy năng lượng. Bộ đôi ghi lại khoảnh khắc hạnh phúc, vui chơi cùng con gái tại Nhật</p></figcaption><p data-placeholder="Nhập tác giả">NVCC</p></figure><figure type="Photo"><p><img src="https://images2.thanhnien.vn/thumb_w/640/528068263637045248/2023/2/12/dong-nhi-ong-cao-thang-3-1676165084374212002067.jpg" id="img_549038993627525120" w="2000" h="1333" alt="Đông Nhi - Ông Cao Thắng kỷ niệm 14 năm yêu nhau - Ảnh 3." title="Đông Nhi - Ông Cao Thắng kỷ niệm 14 năm yêu nhau - Ảnh 3." rel="lightbox" photoid="549038993627525120" data-original="https://images2.thanhnien.vn/528068263637045248/2023/2/12/dong-nhi-ong-cao-thang-3-1676165084374212002067.jpg" type="photo" width="" height=""/></p><figcaption><p data-placeholder="Nhập chú thích ảnh">Được biết, toàn bộ MV đều được gia đình nữ nghệ sĩ ghi hình tại Nhật. Thông qua loạt ảnh hé lộ, cặp đôi “đốn tim” fan bởi khung cảnh ngọt ngào, lãng mạn và gần gũi với thiên nhiên</p></figcaption><p data-placeholder="Nhập tác giả">NVCC</p></figure><figure type="Photo"><p><img src="https://images2.thanhnien.vn/thumb_w/640/528068263637045248/2023/2/12/dong-nhi-ong-cao-thang-4-1676165084386303274943.jpg" id="img_549038974080778240" w="2000" h="1333" alt="Đông Nhi - Ông Cao Thắng kỷ niệm 14 năm yêu nhau - Ảnh 4." title="Đông Nhi - Ông Cao Thắng kỷ niệm 14 năm yêu nhau - Ảnh 4." rel="lightbox" photoid="549038974080778240" data-original="https://images2.thanhnien.vn/528068263637045248/2023/2/12/dong-nhi-ong-cao-thang-4-1676165084386303274943.jpg" type="photo" width="" height=""/></p><figcaption><p data-placeholder="Nhập chú thích ảnh">Đông Nhi - <a href="https://www.24h.com.vn/gia-dinh-dong-nhi-ong-cao-thang-thanh-dai-su-du-lich-nhat-ban-tai-viet-nam-1851521785.htm" title="Ông Cao Thắng" data-rel="follow">Ông Cao Thắng</a> cùng con gái tạo dáng nhí nhảnh. Bộ đôi mong muốn MV có thể lưu giữ ký ức của con gái thời bé, đánh dấu từng cột mốc ý nghĩa trong cuộc đời của Winnie</p></figcaption><p data-placeholder="Nhập tác giả">NVCC</p></figure><figure type="Photo"><p><img src="https://images2.thanhnien.vn/thumb_w/640/528068263637045248/2023/2/12/dong-nhi-ong-cao-thang-6-16761650844151225618896.jpg" id="img_549038989631725568" w="2000" h="1333" alt="Đông Nhi - Ông Cao Thắng kỷ niệm 14 năm yêu nhau - Ảnh 5." title="Đông Nhi - Ông Cao Thắng kỷ niệm 14 năm yêu nhau - Ảnh 5." rel="lightbox" photoid="549038989631725568" data-original="https://images2.thanhnien.vn/528068263637045248/2023/2/12/dong-nhi-ong-cao-thang-6-16761650844151225618896.jpg" type="photo" width="" height=""/></p><figcaption><p data-placeholder="Nhập chú thích ảnh">Chia sẻ về dự án này, Đông Nhi cho biết: “14.2.2009 - 14.2.2023, còn vài ngày nữa là tròn 14 năm chúng tôi bên nhau rồi. Valentine năm nay còn dính thêm một &#34;siêu quậy mini&#34; theo cùng chân trời góc bể. Đi đến đâu không quan trọng, miễn là được đi cùng nhau thì bao nhọc nhằn cũng chẳng sao cả. Thêm một món quà nhỏ kỷ niệm cho ngày đặc biệt…”</p></figcaption><p data-placeholder="Nhập tác giả">NVCC</p></figure><figure type="Photo"><p><img src="https://images2.thanhnien.vn/thumb_w/640/528068263637045248/2023/2/12/dong-nhi-ong-cao-thang-7-1676165084447826450404.jpg" id="img_549039001006428160" w="2000" h="1333" alt="Đông Nhi - Ông Cao Thắng kỷ niệm 14 năm yêu nhau - Ảnh 6." title="Đông Nhi - Ông Cao Thắng kỷ niệm 14 năm yêu nhau - Ảnh 6." rel="lightbox" photoid="549039001006428160" data-original="https://images2.thanhnien.vn/528068263637045248/2023/2/12/dong-nhi-ong-cao-thang-7-1676165084447826450404.jpg" type="photo" width="" height=""/></p><figcaption><p data-placeholder="Nhập chú thích ảnh">Trong loạt ảnh, Winnie khiến fan thích thú bởi ngoại hình vô cùng đáng yêu. Cô bé cho thấy sự lém lỉnh khi liên tục tạo dáng nhí nhảnh cùng bố mẹ</p></figcaption><p data-placeholder="Nhập tác giả">NVCC</p></figure><figure type="Photo"><p><img src="https://images2.thanhnien.vn/thumb_w/640/528068263637045248/2023/2/12/dong-nhi-ong-cao-thang-8-16761650844731620048386.jpg" id="img_549038997250113536" w="2000" h="1333" alt="Đông Nhi - Ông Cao Thắng kỷ niệm 14 năm yêu nhau - Ảnh 7." title="Đông Nhi - Ông Cao Thắng kỷ niệm 14 năm yêu nhau - Ảnh 7." rel="lightbox" photoid="549038997250113536" data-original="https://images2.thanhnien.vn/528068263637045248/2023/2/12/dong-nhi-ong-cao-thang-8-16761650844731620048386.jpg" type="photo" width="" height=""/></p><figcaption><p data-placeholder="Nhập chú thích ảnh">MV <i>Si mê </i>do bộ đôi <a href="https://www.24h.com.vn/bo-anh-ba-hoi-dong-nhi-du-xuan-de-thuong-vo-cung-1851540866.htm" title="Đông Nhi" data-rel="follow">Đông Nhi</a> - Ông Cao Thắng thể hiện. Ca khúc được sáng tác bởi Gold MK, dự kiến trình làng vào lúc 20 giờ ngày 13.2</p></figcaption><p data-placeholder="Nhập tác giả">NVCC</p></figure><!--Sun Feb 12 2023 09:27:41 GMT+0700 (Indochina Time) -- Sun Feb 12 2023 09:27:41 GMT+0700 (Indochina Time) -- Sun Feb 12 2023 09:27:47 GMT+0700 (Indochina Time)-->
