<img itemprop="contentUrl" loading="lazy" intrinsicsize="680x0" alt="Daniel Radcliffe (vai Harry Potter)Vai chính trong loạt phim Harry Potter giúp Daniel Radcliffe gây chú ý toàn cầu. Diễn viên được khán giả nhận xét như bước ra từ truyện với mái tóc lởm chởm, cặp mắt kính tròn, ánh mắt kiên định.Theo Celebrity Net Worth, tài tử hiện sở hữu khối tài sản khoảng 110 triệu USD, là một trong những nghệ sĩ thành công nhất nước Anh 20 năm qua. Tuy nhiên, tiền tài và danh vọng khiến Radcliffe gặp nhiều trục trặc trong suốt giai đoạn trưởng thành.  Sau khi series kết thúc năm 2011, tài tử cố thử sức ở nhiều dạng vai để thoát khỏi cái bóng của thành công cũ.Hồi tháng 3, người đại diện của Radcliffe xác nhận với PageSix diễn viên và bạn gái Erin Darke đang chờ đón con đầu lòng sau 10 năm yêu. Ảnh: Warner Bros/WireImage" src="data:image/gif;base64,R0lGODlhAQABAAAAACH5BAEKAAEALAAAAAABAAEAAAICTAEAOw==" data-src="https://i1-giaitri.vnecdn.net/2023/09/29/Untitled-design-2034-1695997421.jpg?w=680&amp;h=0&amp;q=100&amp;dpr=1&amp;fit=crop&amp;s=EiTN9XKIHA8jC8GUDeA_hw"/>

<img itemprop="contentUrl" loading="lazy" intrinsicsize="680x0" alt="Emma Watson (vai Hermione Granger)Emma Watson lần đầu đóng vai Hermione lúc 11 tuổi. Cô tạo thiện cảm với khán giả ở vẻ lanh lợi, thông minh giống miêu tả của J. K. Rowling trong tiểu thuyết.Sau hơn 10 năm cùng thương hiệu, minh tinh tiếp tục ghi dấu ấn trong một số phim điện ảnh như The Perks of Being a Wallflower (2012) và Beauty and the Beast (2017). Diễn viên 33 tuổi, ngừng diễn xuất 5 năm qua vì thấy bị gò bó, không được thỏa sức sáng tạo. Theo thống kê của tạp chí Heat, hiện cô sở hữu khối tài sản khoảng 80 triệu USD.Diễn viên dành nhiều thời gian cho các hoạt động xã hội với tư cách đại sứ thiện chí của tổ chức Phụ nữ Liên hiệp quốc, tích cực tham gia các hoạt động bảo vệ môi trường, khí hậu, ủng hộ phát triển bền vững.  Watson hẹn hò doanh nhân người Mỹ Leo Robinson từ tháng 10/2019. Suốt thời gian yêu, họ kín tiếng về mối quan hệ, hiếm khi xuất hiện bên nhau. Ảnh: TV Guide/EW" src="data:image/gif;base64,R0lGODlhAQABAAAAACH5BAEKAAEALAAAAAABAAEAAAICTAEAOw==" data-src="https://i1-giaitri.vnecdn.net/2023/09/29/Untitled-design-1-4106-1695997422.jpg?w=680&amp;h=0&amp;q=100&amp;dpr=1&amp;fit=crop&amp;s=VpVUW3P-RRpS2D3XQfTM0Q"/>

<img itemprop="contentUrl" loading="lazy" intrinsicsize="680x0" alt="Michael Gambon (vai Albus Dumbledore)Dumbledore có vai trò quan trọng xuyên suốt loạt phim, là người dẫn dắt giới phù thủy chống lại Chúa tể Hắc ám Voldermort. Với Harry Potter, cụ luôn ở bên, động viên cậu bé mỗi khi cô đơn, dạy cậu nhiều bài học cuộc sống.  Diễn viên thể hiện sinh động nhân vật thông thái, nhân từ nhưng quyết đoán. Gambon tham gia phim từ phần ba đến hết phần bảy, sau khi Richard Harris - người đóng Dumbledore hai phần đầu - qua đời năm 2002.Phim gần nhất ông tham gia là series Fortitude, vai một nhiếp ảnh gia thiên nhiên mắc bệnh ung thư, chiếu từ năm 2015 đến 2018. Sau đó, Gambon định tham gia phim hài Breeders nhưng rút khỏi dự án vì vấn đề sức khỏe. Năm 2014, ông từng cho biết buồn vì không thể diễn các vai lớn do không thể nhớ lời thoại.Hôm 28/9, Gambon qua đời ở tuổi 82 sau khi mắc viêm phổi. Cuối đời, ông sống cùng người vợ thứ hai - nhà thiết kế Philippa Hart. Nghệ sĩ kín tiếng về đời tư. Ảnh: Warner Bros/WireImage" src="data:image/gif;base64,R0lGODlhAQABAAAAACH5BAEKAAEALAAAAAABAAEAAAICTAEAOw==" data-src="https://i1-giaitri.vnecdn.net/2023/09/29/Untitled-design-6-1950-1695997422.jpg?w=680&amp;h=0&amp;q=100&amp;dpr=1&amp;fit=crop&amp;s=if_t_nQNF6GOoOH2yUbC2w"/>
