    <h1>Nữ thần tượng Kpop gốc Việt đang &#39;nổi đình nổi đám&#39; là ai?</h1>
    
    <div id="readability-page-1" class="page"><div>
                                <div data-role="content" itemprop="articleBody">
                                                                                                                
                                    <figure type="Photo"><p><img src="https://images2.thanhnien.vn/528068263637045248/2023/2/6/nuthantuongkpopgocviethanni15-16756530157281112577512.jpeg" id="img_546891269669011456" w="1333" h="2000" alt="Nữ thần tượng Kpop gốc Việt Hanni (NewJeans) là ai? - Ảnh 1." title="Nữ thần tượng Kpop gốc Việt Hanni (NewJeans) là ai? - Ảnh 1." rel="lightbox" photoid="546891269669011456" data-original="https://images2.thanhnien.vn/528068263637045248/2023/2/6/nuthantuongkpopgocviethanni15-16756530157281112577512.jpeg" type="photo" width="" height=""/></p><figcaption><p data-placeholder="Nhập chú thích ảnh">Theo thông tin trên trang <i>Namu Wiki</i> của Hàn Quốc, <a href="https://thanhnien.vn/dien-nguyen-cay-do-hieu-hanni-newjeans-bi-che-chin-ep-1851530337.htm" target="_blank" title="Diện nguyên cây đồ hiệu: Hanni NewJeans bị chê “chín ép”">Hanni</a> (tên đầy đủ <a href="https://thanhnien.vn/dien-nguyen-cay-do-hieu-hanni-newjeans-bi-che-chin-ep-1851530337.htm" target="_blank" title="Diện nguyên cây đồ hiệu: Hanni NewJeans bị chê “chín ép”">Hanni</a> Phạm, Phạm Ngọc Hân) sinh năm 2004. Bố người đẹp 10X này đến từ Hà Nội và mẹ từ TP.HCM</p></figcaption></figure><figure type="Photo"><p><img src="https://images2.thanhnien.vn/528068263637045248/2023/2/6/nuthantuongkpopgocviethanni19-1675653015262969447463.png" id="img_546891290869272576" w="1150" h="1506" alt="Nữ thần tượng Kpop gốc Việt Hanni (NewJeans) là ai? - Ảnh 2." title="Nữ thần tượng Kpop gốc Việt Hanni (NewJeans) là ai? - Ảnh 2." rel="lightbox" photoid="546891290869272576" data-original="https://images2.thanhnien.vn/528068263637045248/2023/2/6/nuthantuongkpopgocviethanni19-1675653015262969447463.png" type="photo" width="" height=""/></p><figcaption><p data-placeholder="Nhập chú thích ảnh"><a href="https://thanhnien.vn/dien-nguyen-cay-do-hieu-hanni-newjeans-bi-che-chin-ep-1851530337.htm" target="_blank" title="Diện nguyên cây đồ hiệu: Hanni NewJeans bị chê “chín ép”">Hanni</a> sống ở Úc trước khi sang Hàn Quốc, từng vài lần về Việt Nam du lịch. Trước đó, có nhiều nguồn tin tiết lộ cô sinh tại Việt Nam và cùng gia đình sang Úc nhập cư khoảng những năm tiểu học<br/></p></figcaption><p data-placeholder="Nhập tác giả">Twitter NewJeans</p></figure><figure type="Photo"><p><img src="https://images2.thanhnien.vn/528068263637045248/2023/2/6/nuthantuongkpopgocviethanni11-1675653015558930932152.jpg" id="img_546891216551858176" w="1366" h="2048" alt="Nữ thần tượng Kpop gốc Việt Hanni (NewJeans) là ai? - Ảnh 3." title="Nữ thần tượng Kpop gốc Việt Hanni (NewJeans) là ai? - Ảnh 3." rel="lightbox" photoid="546891216551858176" data-original="https://images2.thanhnien.vn/528068263637045248/2023/2/6/nuthantuongkpopgocviethanni11-1675653015558930932152.jpg" type="photo" width="" height=""/></p><figcaption><p data-placeholder="Nhập chú thích ảnh">Khi còn nhỏ, Hanni là fan của nhóm nhạc One Direction. Năm 2014, lúc lớp 4 tiểu học, nữ thần tượng thử giọng cho show <i><a href="https://thanhnien.vn/the-voice-kids-do-le-hong-nhung-cung-redt-tung-ca-khuc-moi-chua-lanh-tam-hon-1851481583.htm" target="_blank" title="&#39;The Voice Kids&#39; Đỗ Lê Hồng Nhung cùng RedT tung ca khúc mới ‘chữa lành tâm hồn’">The Voice Kids</a></i> của Úc. Năm 2019, Hanni từng tham gia một nhóm nhảy <a href="https://thanhnien.vn/korea-vietnam-kpop-friendship-concert-2017.html" target="_blank" title=" Korea - Vietnam Kpop Friendship Concert 2017">Kpop</a> cover với những người bạn Việt Nam ở Melbourne</p></figcaption><p data-placeholder="Nhập tác giả">Twitter NewJeans</p></figure><figure type="Photo"><p><img src="https://images2.thanhnien.vn/528068263637045248/2023/2/6/nuthantuongkpopgocviethanni111-16756530144481869877315.png" id="img_546891257676259328" w="1192" h="1484" alt="Nữ thần tượng Kpop gốc Việt Hanni (NewJeans) là ai? - Ảnh 4." title="Nữ thần tượng Kpop gốc Việt Hanni (NewJeans) là ai? - Ảnh 4." rel="lightbox" photoid="546891257676259328" data-original="https://images2.thanhnien.vn/528068263637045248/2023/2/6/nuthantuongkpopgocviethanni111-16756530144481869877315.png" type="photo" width="" height=""/></p><figcaption><p data-placeholder="Nhập chú thích ảnh">Tháng 10.2019, ở tuổi 15, Hanni đã vượt qua vòng thi tuyển và trở thành thực tập sinh của công ty giải trí Ador trong vòng 2 năm rưỡi. Đến giữa năm 2022, Hanni &#34;lên sàn&#34; với vai trò thành viên <a href="https://thanhnien.vn/nhom-nhac-nu-newjeans-gay-sot-voi-ca-khuc-moi-ditto-1851533815.htm" target="_blank" title="Nhóm nhạc nữ NewJeans gây sốt với ca khúc mới &#39;Ditto&#39;">NewJeans</a>, nhóm nhạc nữ trực thuộc công ty Ador và Hybe Labels (công ty quản lý của BTS)</p></figcaption></figure><figure type="Photo"><p><img src="https://images2.thanhnien.vn/528068263637045248/2023/2/6/nuthantuongkpopgocviethanni18-167565301509785304172.png" id="img_546891311180038144" w="1458" h="1494" alt="Nữ thần tượng Kpop gốc Việt Hanni (NewJeans) là ai? - Ảnh 5." title="Nữ thần tượng Kpop gốc Việt Hanni (NewJeans) là ai? - Ảnh 5." rel="lightbox" photoid="546891311180038144" data-original="https://images2.thanhnien.vn/528068263637045248/2023/2/6/nuthantuongkpopgocviethanni18-167565301509785304172.png" type="photo" width="" height=""/></p><figcaption><p data-placeholder="Nhập chú thích ảnh">Sau 6 tháng ra mắt, NewJeans trở thành một trong những <a href="https://thanhnien.vn/nhom-nhac-nu-kpop-2ne1-bat-ngo-tai-hop-o-my-fan-phan-khich-1851449513.htm" target="_blank" title="Nhóm nhạc nữ Kpop 2NE1 bất ngờ tái hợp ở Mỹ, fan phấn khích">nhóm nhạc nữ Kpop</a> hot nhất hiện giờ cùng loạt hit <i>Attention, Hype boy, Cookie, <a href="https://thanhnien.vn/nhom-nhac-nu-newjeans-gay-sot-voi-ca-khuc-moi-ditto-1851533815.htm" target="_blank" title="Nhóm nhạc nữ NewJeans gây sốt với ca khúc mới &#39;Ditto&#39;">Ditto</a>, O.M.G...</i></p></figcaption><p data-placeholder="Nhập tác giả">Twitter NewJeans</p></figure><figure type="Photo"><p><img src="https://images2.thanhnien.vn/528068263637045248/2023/2/6/nuthantuongkpopgocviethanni13-16756530159051751553789.jpg" id="img_546891232230809600" w="2000" h="1334" alt="Nữ thần tượng Kpop gốc Việt Hanni (NewJeans) là ai? - Ảnh 6." title="Nữ thần tượng Kpop gốc Việt Hanni (NewJeans) là ai? - Ảnh 6." rel="lightbox" photoid="546891232230809600" data-original="https://images2.thanhnien.vn/528068263637045248/2023/2/6/nuthantuongkpopgocviethanni13-16756530159051751553789.jpg" type="photo" width="" height=""/></p><figcaption><p data-placeholder="Nhập chú thích ảnh">Trong NewJeans, Hanni đảm nhận vai trò nhảy chính và hát. Ngoài ra, cô gái trẻ còn được yêu thích vì ngoại hình rạng rỡ, vẻ đẹp trong trẻo, nhẹ nhàng, đậm chất Á đông. Hanni cũng từng góp mặt trong MV <i>Permission to Dance</i> của <a href="https://thanhnien.vn/tranh-cai-du-doi-truoc-tin-newjeans-the-cho-bts-trong-kpop-1851545094.htm" target="_blank" title="Tranh cãi dữ dội trước tin NewJeans &#39;thế chỗ&#39; BTS trong Kpop">BTS</a></p></figcaption><p data-placeholder="Nhập tác giả">Twitter NewJeans</p></figure><figure type="Photo"><p><img src="https://images2.thanhnien.vn/528068263637045248/2023/2/6/nuthantuongkpopgocviethanni110-1675653014620727753125.png" id="img_546891301723181056" w="1310" h="1464" alt="Nữ thần tượng Kpop gốc Việt Hanni (NewJeans) là ai? - Ảnh 7." title="Nữ thần tượng Kpop gốc Việt Hanni (NewJeans) là ai? - Ảnh 7." rel="lightbox" photoid="546891301723181056" data-original="https://images2.thanhnien.vn/528068263637045248/2023/2/6/nuthantuongkpopgocviethanni110-1675653014620727753125.png" type="photo" width="" height=""/></p><figcaption><p data-placeholder="Nhập chú thích ảnh">Hanni nói được 3 thứ tiếng: Anh, Việt và Hàn. Cô cũng là <a href="https://thanhnien.vn/than-tuong-goc-viet-bi-che-bai-khi-lam-dai-su-gucci-1851530240.htm" target="_blank" title="Nữ thần tượng gốc Việt bị chê khi làm đại sứ Gucci">nữ thần tượng gốc Việt</a> đầu tiên của Hybe Labels</p></figcaption><p data-placeholder="Nhập tác giả">Instagram</p></figure><figure type="Photo"><p><img src="https://images2.thanhnien.vn/528068263637045248/2023/2/6/nuthantuongkpopgocviethanni17-1675653015412767819658.png" id="img_546891278189821952" w="1000" h="1268" alt="Nữ thần tượng Kpop gốc Việt Hanni (NewJeans) là ai? - Ảnh 8." title="Nữ thần tượng Kpop gốc Việt Hanni (NewJeans) là ai? - Ảnh 8." rel="lightbox" photoid="546891278189821952" data-original="https://images2.thanhnien.vn/528068263637045248/2023/2/6/nuthantuongkpopgocviethanni17-1675653015412767819658.png" type="photo" width="" height=""/></p><figcaption><p data-placeholder="Nhập chú thích ảnh">Kể từ khi ra mắt đến nay, Hanni chiếm spotlight nhờ vẻ ngoài thu hút và tươi tắn. Mỹ nhân 10X được khen ngợi có chất giọng ngọt ngào nên thường được giao cho những phần hát nổi bật hoặc điệp khúc trong các ca khúc của nhóm <a href="https://thanhnien.vn/newjeans-noi-bat-giua-loat-tan-binh-kpop-1851491687.htm" target="_blank" title="NewJeans nổi bật giữa loạt tân binh Kpop">NewJeans</a></p></figcaption></figure><figure type="Photo"><p><img src="https://images2.thanhnien.vn/528068263637045248/2023/2/6/nuthantuongkpopgocviethanni14-1675653014018627686264.jpg" id="img_546891190991769600" w="1366" h="2048" alt="Nữ thần tượng Kpop gốc Việt Hanni (NewJeans) là ai? - Ảnh 9." title="Nữ thần tượng Kpop gốc Việt Hanni (NewJeans) là ai? - Ảnh 9." rel="lightbox" photoid="546891190991769600" data-original="https://images2.thanhnien.vn/528068263637045248/2023/2/6/nuthantuongkpopgocviethanni14-1675653014018627686264.jpg" type="photo" width="" height=""/></p><figcaption><p data-placeholder="Nhập chú thích ảnh">Ngoài ra, Hanni cũng sở hữu khả năng nhảy tốt. Cô được cho là người học thuộc vũ đạo nhanh nhất trong số các thành viên <a href="https://thanhnien.vn/newjeans-gap-ban-tan-khi-dien-phong-cach-y2k-toc-nhuom-phu-kien-ruom-ra-qua-muc-1851512602.htm" target="_blank" title="NewJeans gặp bàn tán khi diện phong cách Y2K: tóc nhuộm, phụ kiện rườm rà quá mức">NewJeans</a>. Lúc biểu diễn, Hanni gây ấn tượng với khả năng tự tin làm chủ sân khấu tự. Hầu hết fancam của giọng ca 19 tuổi tại những show âm nhạc Kpop hoặc sự kiện, lễ trao giải đều đạt lượt view &#34;khủng&#34;</p></figcaption></figure><figure type="Photo"><p><img src="https://images2.thanhnien.vn/528068263637045248/2023/2/6/nuthantuongkpopgocviethanni12-16756530147731329979242.jpg" id="img_546891201715077120" w="1366" h="2048" alt="Nữ thần tượng Kpop gốc Việt Hanni (NewJeans) là ai? - Ảnh 10." title="Nữ thần tượng Kpop gốc Việt Hanni (NewJeans) là ai? - Ảnh 10." rel="lightbox" photoid="546891201715077120" data-original="https://images2.thanhnien.vn/528068263637045248/2023/2/6/nuthantuongkpopgocviethanni12-16756530147731329979242.jpg" type="photo" width="" height=""/></p><figcaption><p data-placeholder="Nhập chú thích ảnh">Ở mảng thời trang, Hanni bất ngờ được chọn làm đại sứ thương hiệu mới của <a href="https://thanhnien.vn/le-quyen-dien-nguyen-cay-gucci-nhung-doi-boots-lai-bi-so-sanh-voi-ngoi-sao-khac-1851470749.htm" target="_blank" title="Lệ Quyên diện nguyên cây Gucci, nhưng đôi boots lại bị so sánh với ngôi sao khác">Gucci</a> vào tháng 10 năm ngoái. Điều này dấy lên nhiều tranh cãi bởi nhiều dân mạng cho rằng cô gái trẻ không phù hợp với phong cách trang phục <a href="https://thanhnien.vn/dang-cap-voi-vay-trong-suot-lo-lo-mac-nhu-khong-mac-cua-nha-mot-gucci-1851459853.htm" target="_blank" title="Đẳng cấp với váy trong suốt “lồ lộ” mặc như không mặc của nhà mốt Gucci">Gucci</a>. Số khác mỉa mai sao Kpop gốc Việt này đang được công ty &#34;o bế&#34; quá mức</p></figcaption><p data-placeholder="Nhập tác giả">Twitter NewJeans</p></figure><figure type="Photo"><p><img src="https://images2.thanhnien.vn/528068263637045248/2023/2/6/nuthantuongkpopgocviethanni16-1675653014937437832515.jpeg" id="img_546891241846956032" w="1334" h="2000" alt="Nữ thần tượng Kpop gốc Việt Hanni (NewJeans) là ai? - Ảnh 11." title="Nữ thần tượng Kpop gốc Việt Hanni (NewJeans) là ai? - Ảnh 11." rel="lightbox" photoid="546891241846956032" data-original="https://images2.thanhnien.vn/528068263637045248/2023/2/6/nuthantuongkpopgocviethanni16-1675653014937437832515.jpeg" type="photo" width="" height=""/></p><figcaption><p data-placeholder="Nhập chú thích ảnh">Hiện, Hanni là một trong những <a href="https://thanhnien.vn/sao-kpop-goc-viet-hanbin-gui-loi-dong-vien-dong-bao-mien-trung-1851504649.htm" target="_blank" title="Sao Kpop gốc Việt Hanbin gửi lời động viên đồng bào miền Trung">sao Kpop gốc Việt</a> có độ phổ biến rộng rãi và lượng fan vững chắc dù hoạt động nghệ thuật chưa đến 1 năm. Hanni cũng như <a href="https://thanhnien.vn/nhom-nhac-kpop-cua-hanbin-thang-giai-nghe-si-moi-xuat-sac-1851519584.htm" target="_blank" title="Nhóm nhạc Kpop của Hanbin thắng giải Nghệ sĩ mới xuất sắc">nhóm nhạc</a> NewJeans được kỳ vọng sẽ tỏa sáng hơn nữa thời gian tới</p></figcaption><p data-placeholder="Nhập tác giả">Twitter NewJeans</p></figure><!--Mon Feb 06 2023 10:39:49 GMT+0700 (Giờ Đông Dương) -- Mon Feb 06 2023 10:39:49 GMT+0700 (Giờ Đông Dương) -- Mon Feb 06 2023 10:46:42 GMT+0700 (Giờ Đông Dương)-->
