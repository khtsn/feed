    <h1>Kim Soo Hyun và loạt nam diễn viên truyền hình giàu nhất Hàn Quốc</h1>

                            <h2 data-role="sapo">
                                <a href="https://thanhnien.vn/kim-soo-hyun-nhan-cat-se-10-ti-dong-tap-phim-one-ordinary-day-co-xung-dang-1851407564.htm" target="_blank" title="Kim Soo Hyun nhận cát sê 10 tỉ đồng/tập phim &#39;One ordinary day&#39; có xứng đáng?">Kim Soo Hyun</a> đứng đầu bảng xếp hạng các <a href="https://thanhnien.vn/nam-dien-vien-goc-viet-vuot-mat-brad-pitt-gianh-giai-qua-cau-vang-1851541013.htm" target="_blank" title="Nam diễn viên gốc Việt &#39;vượt mặt&#39; Brad Pitt giành giải Quả cầu vàng">nam diễn viên</a> <a href="https://thanhnien.vn/phim-our-blues-lap-ky-luc-luot-xem-tren-truyen-hinh-han-quoc-1851447858.htm" target="_blank" title="Phim &#39;Our Blues&#39; lập kỷ lục lượt xem trên truyền hình Hàn Quốc">truyền hình Hàn Quốc</a> có khối tài sản khủng nhất hiện nay. Xếp sau <a href="https://thanhnien.vn/kim-soo-hyun-van-dep-ngay-ngat-khi-dien-trang-phuc-gian-di-ngoai-doi-thuong-1851385598.htm" target="_blank" title="Kim Soo Hyun vẫn đẹp ngây ngất khi diện trang phục giản dị ngoài đời thường">Kim Soo Hyun</a> là So Ji Sub, Lee Min Ho, Lee Jong Suk, Song Joong Ki...
                            </h2>
                            <div>
                                <div data-role="content" itemprop="articleBody">
                                                                                                                
                                    <figure type="Photo"><p><img src="https://images2.thanhnien.vn/528068263637045248/2023/2/4/topnamdienvientruyenhinhhanquocgiaunhat112-16755095234221438094424.png" id="img_546289399730216960" w="1394" h="1354" alt="Những nam diễn viên truyền hình Hàn giàu nhất hiện nay - Ảnh 1." title="Những nam diễn viên truyền hình Hàn giàu nhất hiện nay - Ảnh 1." rel="lightbox" photoid="546289399730216960" data-original="https://images2.thanhnien.vn/528068263637045248/2023/2/4/topnamdienvientruyenhinhhanquocgiaunhat112-16755095234221438094424.png" type="photo" width="" height=""/></p><figcaption><p data-placeholder="Nhập chú thích ảnh">Trang <i>Kdrama Stars</i> tổng hợp danh sách Những <a href="https://thanhnien.vn/ngoc-son-nhac-nho-nam-dien-vien-duyen-kiep-khi-hat-tra-no-tinh-xa-1851518211.htm" target="_blank" title="Ngọc Sơn nhắc nhở nam diễn viên ‘Duyên kiếp’ khi hát ‘Trả nợ tình xa’">nam diễn viên</a> <a href="https://thanhnien.vn/bom-tan-truyen-hinh-han-quoc-bulgasal-gay-chu-y-voi-dan-sao-dinh-dam-1851415766.htm" target="_blank" title="Bom tấn truyền hình Hàn Quốc ‘Bulgasal’ gây chú ý với dàn sao đình đám">truyền hình Hàn Quốc</a> giàu nhất hiện nay. Theo đó, <a href="https://thanhnien.vn/canh-hon-nong-bong-cua-seo-ye-ji-va-kim-soo-hyun-gay-sot-185978026.htm" target="_blank" title="Cảnh hôn nóng bỏng của Seo Ye Ji và Kim Soo Hyun gây sốt">Kim Soo Hyun</a> hạng nhất với tổng giá trị tài sản ròng là 117 triệu USD (khoảng 2.744 tỉ đồng). Sao phim <i><a href="https://thanhnien.vn/my-nam-vi-sao-dua-anh-toi-roi-co-quan-chu-quan-ra-lap-cong-ty-rieng-185908304.htm" target="_blank" title="Mỹ nam ‘Vì sao đưa anh tới’ rời cơ quan chủ quản ra lập công ty riêng">Vì sao đưa anh tới</a></i> cũng đang là diễn viên Hàn Quốc được trả cát sê cao nhất hiện nay với 423.000 USD/tập phim (gần 10 tỉ đồng). Cuối năm 2021, anh &#34;cá kiếm&#34; được 80 tỉ đồng cùng 8 tập phim <i>Một ngày nọ</i></p></figcaption><p data-placeholder="Nhập tác giả">Chụp màn hình Naver</p></figure><figure type="Photo"><p><img src="https://images2.thanhnien.vn/528068263637045248/2023/2/4/topnamdienvientruyenhinhhanquocgiaunhat13-16755095251461330699831.png" id="img_546289403856990208" w="1200" h="750" alt="Những nam diễn viên truyền hình Hàn giàu nhất hiện nay - Ảnh 2." title="Những nam diễn viên truyền hình Hàn giàu nhất hiện nay - Ảnh 2." rel="lightbox" photoid="546289403856990208" data-original="https://images2.thanhnien.vn/528068263637045248/2023/2/4/topnamdienvientruyenhinhhanquocgiaunhat13-16755095251461330699831.png" type="photo" width="" height=""/></p><figcaption><p data-placeholder="Nhập chú thích ảnh">Năm 2022, Kim Soo Hyun không có dự án phim ảnh nào. Năm 2023, anh kỳ vọng sẽ có màn trở lại hoành tráng với tác phẩm truyền hình <i><a href="https://thanhnien.vn/yoona-va-nhung-my-nhan-han-dinh-dam-tai-xuat-man-anh-nho-nam-2023-1851539593.htm" title="Queen Of Tears" data-rel="follow">Queen Of Tears</a> </i>của Park Ji Eun, nữ biên kịch đứng sau loạt bom tấn màn ảnh nhỏ như <i>Vì sao đưa anh tới, Chuyện tình biển xanh, <a href="https://thanhnien.vn/my-nhan-ha-canh-noi-anh-dep-u-buon-trong-phim-moi-1851537246.htm" target="_blank" title="Mỹ nhân ‘Hạ cánh nơi anh’ đẹp u buồn trong phim mới">Hạ cánh nơi anh</a>…</i></p></figcaption><p data-placeholder="Nhập tác giả">Chụp màn hình Naver, Instagram NV</p></figure><figure type="Photo"><p><img src="https://images2.thanhnien.vn/528068263637045248/2023/2/4/topnamdienvientruyenhinhhanquocgiaunhat18-167550952385226504916.jpg" id="img_546289349677035520" w="1500" h="999" alt="Những nam diễn viên truyền hình Hàn giàu nhất hiện nay - Ảnh 3." title="Những nam diễn viên truyền hình Hàn giàu nhất hiện nay - Ảnh 3." rel="lightbox" photoid="546289349677035520" data-original="https://images2.thanhnien.vn/528068263637045248/2023/2/4/topnamdienvientruyenhinhhanquocgiaunhat18-167550952385226504916.jpg" type="photo" width="" height=""/></p><figcaption><p data-placeholder="Nhập chú thích ảnh">Hạng nhì thuộc về <a href="https://thanhnien.vn/nghet-tho-voi-su-ket-hop-cua-so-ji-sub-kim-yun-jin-nana-trong-hung-thu-vo-hinh-1851529824.htm" target="_blank" title="Nghẹt thở với sự kết hợp của So Ji Sub, Kim Yun Jin, Nana trong ‘Hung thủ vô hình’">So Ji Sub</a> cùng khối tài sản ròng 41 triệu USD (khoản 961,5 tỉ đồng). Ngôi <a href="https://thanhnien.vn/song-joong-ki-va-loat-sao-han-lay-vo-ngoai-quoc-185230203225650181.htm" target="_blank" title="Song Joong Ki và loạt sao Hàn lấy vợ ngoại quốc">sao Hàn</a> sinh năm 1977 đã hoạt động nghệ thuật gần 3 thập niên, từ vai trò người mẫu, diễn viên đến rapper. Tại Việt Nam, <a href="https://thanhnien.vn/sau-so-ji-sub-han-quoc-con-nhung-nam-than-nao-mai-chua-chiu-lay-vo-185943871.htm" target="_blank" title="Sau So Ji Sub, Hàn Quốc còn những nam thần nào mãi chưa chịu lấy vợ?">So Ji Sub</a> được biết đến qua các phim <i>Chuyện xảy ra ở Bali, <a href="https://thanhnien.vn/tai-tu-phim-giay-thuy-tinh-lan-dau-ra-mat-khan-gia-tai-viet-nam-1851458144.htm" target="_blank" title="Tài tử phim Giày thủy tinh lần đầu ra mắt khán giả tại Việt Nam">Giày thủy tinh</a>, Xin lỗi anh yêu em, Mặt trời của chàng Joo, Và em sẽ đến</i>… Năm ngoái, anh có ba phim ra mắt là <i>Bác sĩ luật sư, Hung thủ vô hình, <a href="https://thanhnien.vn/con-gai-kim-woo-bin-trong-alienoid-dien-xuat-an-tuong-1851486175.htm" target="_blank" title="&#39;Con gái&#39; Kim Woo Bin trong &#39;Alienoid&#39; diễn xuất ấn tượng">Alienoid</a>: Cuộc chiến xuyên không</i></p></figcaption><p data-placeholder="Nhập tác giả">Poster Phim</p></figure><figure type="Photo"><p><img src="https://images2.thanhnien.vn/528068263637045248/2023/2/4/topnamdienvientruyenhinhhanquocgiaunhat111-16755095231171172462567.png" id="img_546289414597050368" w="1134" h="1410" alt="Những nam diễn viên truyền hình Hàn giàu nhất hiện nay - Ảnh 4." title="Những nam diễn viên truyền hình Hàn giàu nhất hiện nay - Ảnh 4." rel="lightbox" photoid="546289414597050368" data-original="https://images2.thanhnien.vn/528068263637045248/2023/2/4/topnamdienvientruyenhinhhanquocgiaunhat111-16755095231171172462567.png" type="photo" width="" height=""/></p><figcaption><p data-placeholder="Nhập chú thích ảnh">Tương tự <a href="https://thanhnien.vn/sau-so-ji-sub-han-quoc-con-nhung-nam-than-nao-mai-chua-chiu-lay-vo-185943871.htm" target="_blank" title="Sau So Ji Sub, Hàn Quốc còn những nam thần nào mãi chưa chịu lấy vợ?">So Ji Sub</a>, <a href="https://thanhnien.vn/lee-jong-suk-iu-la-co-gai-ma-toi-luon-muon-bao-ve-1851537948.htm" target="_blank" title="Lee Jong Suk: IU là cô gái mà tôi luôn muốn bảo vệ">Lee Jong Suk</a> cũng khởi nghiệp từ sàn diễn rồi lấn sân sang diễn xuất. Trải qua gần 20 năm làm việc chăm chỉ, giá trị tài sản ròng của nam diễn viên 34 tuổi lên tới 32 triệu USD (750 tỉ đồng). Bạn trai của <a href="https://thanhnien.vn/iu-jungkook-bts-vao-top-200-ca-si-vi-dai-nhat-moi-thoi-dai-1851538859.htm" target="_blank" title="IU, Jungkook (BTS) vào top 200 ca sĩ vĩ đại nhất mọi thời đại">IU</a> có lượng phim ảnh truyền hình đồ sộ, như <i>School 2013, Đôi tai ngoại cảm, Cặp đôi trái ngược, <a href="https://thanhnien.vn/cap-doi-w-hai-the-gioi-bat-ngo-tai-hop-tren-tap-chi-185601821.htm" target="_blank" title="Cặp đôi ‘W-Hai thế giới’ bất ngờ tái hợp trên tạp chí">W: Hai thế giới</a>, Khi nàng say giấc, <a href="https://thanhnien.vn/big-mouth-lee-jong-suk-va-iu-bi-dispatch-khui-anh-hen-ho-1851537688.htm" target="_blank" title="&#39;Big mouth&#39; Lee Jong Suk và IU bị Dispatch khui ảnh hẹn hò">Big Mouth</a>…</i></p></figcaption><p data-placeholder="Nhập tác giả">Instagram NV</p></figure><figure type="Photo"><p><img src="https://images2.thanhnien.vn/528068263637045248/2023/2/4/topnamdienvientruyenhinhhanquocgiaunhat110-16755095244591457422655.png" id="img_546289393608753152" w="1200" h="1542" alt="Những nam diễn viên truyền hình Hàn giàu nhất hiện nay - Ảnh 5." title="Những nam diễn viên truyền hình Hàn giàu nhất hiện nay - Ảnh 5." rel="lightbox" photoid="546289393608753152" data-original="https://images2.thanhnien.vn/528068263637045248/2023/2/4/topnamdienvientruyenhinhhanquocgiaunhat110-16755095244591457422655.png" type="photo" width="" height=""/></p><figcaption><p data-placeholder="Nhập chú thích ảnh"><a href="https://thanhnien.vn/lee-min-ho-dien-trai-trong-ask-the-stars-1851524587.htm" target="_blank" title="Lee Min Ho điển trai trong ‘Ask the Stars’">Lee Min Ho</a> là một trong những nam diễn viên xứ kim chi có độ phổ biến lớn ở thị trường quốc tế, nên khối tài sản ròng của anh cũng không hề khiêm tốn khi lên tới 26 triệu USD (610 tỉ đồng). Tên tuổi của <a href="https://thanhnien.vn/my-nam-han-dinh-dam-lee-joon-gi-bat-ngo-co-mat-tai-viet-nam-1851468061.htm" target="_blank" title="Mỹ nam Hàn đình đám Lee Joon Gi bất ngờ có mặt tại Việt Nam">mỹ nam Hàn</a> tuổi Mão này gắn liền với loạt phim <i>Vườn sao băng</i> bản Hàn, <i>Thợ săn thành phố, Những người thừa kế, Quân vương bất diệt, Pachinko…</i> Phim <a href="https://thanhnien.vn/lee-min-ho-dien-trai-trong-ask-the-stars-1851524587.htm" target="_blank" title="Lee Min Ho điển trai trong ‘Ask the Stars’"><i>Ask the Stars</i></a> có <a href="https://thanhnien.vn/lee-min-ho-minha-kim-va-youn-yuh-jung-dua-lich-su-vao-phim-pachinko-1851447480.htm" target="_blank" title="Lee Min Ho, Minha Kim và Youn Yuh Jung đưa lịch sử vào phim ‘Pachinko’">Lee Min Ho</a> và <a href="https://thanhnien.vn/gong-hyo-jin-bi-chi-trich-vi-lam-qua-trong-phim-moi-185587947.htm" target="_blank" title="Gong Hyo Jin bị chỉ trích vì &#39;làm quá&#39; trong phim mới">Gong Hyo Jin</a> là một trong những dự án truyền hình được mong đợi nhất năm nay</p></figcaption><p data-placeholder="Nhập tác giả">Instagram NV</p></figure><figure type="Photo"><p><img src="https://images2.thanhnien.vn/528068263637045248/2023/2/4/topnamdienvientruyenhinhhanquocgiaunhat17-1675509523265983586053.jpg" id="img_546289355956789248" w="1200" h="1800" alt="Những nam diễn viên truyền hình Hàn giàu nhất hiện nay - Ảnh 6." title="Những nam diễn viên truyền hình Hàn giàu nhất hiện nay - Ảnh 6." rel="lightbox" photoid="546289355956789248" data-original="https://images2.thanhnien.vn/528068263637045248/2023/2/4/topnamdienvientruyenhinhhanquocgiaunhat17-1675509523265983586053.jpg" type="photo" width="" height=""/></p><figcaption><p data-placeholder="Nhập chú thích ảnh"><a href="https://thanhnien.vn/he-lo-co-ngoi-gan-300-ti-cua-song-joong-ki-va-vo-tay-185230201150119823.htm" target="_blank" title="Hé lộ cơ ngơi gần 300 tỉ của Song Joong Ki và vợ tây">Song Joong Ki</a> cũng có độ nổi tiếng không thua gì <a href="https://thanhnien.vn/lee-min-ho-bi-don-tung-sang-trung-quoc-tiep-khach-1851436408.htm" target="_blank" title="Lee Min Ho bị đồn từng sang Trung Quốc &#39;tiếp khách&#39;">Lee Min Ho</a> ở nước ngoài. Nam diễn viên họ Song có tài sản ròng 24 triệu USD (563 tỉ đồng). Nhiều bộ phim truyền hình mà <a href="https://thanhnien.vn/song-joong-ki-duoc-loi-gi-khi-cuoi-vo-tay-185230131114144807.htm" target="_blank" title="Song Joong Ki được lợi gì khi cưới vợ tây?">Song Joong Ki</a> góp mặt nhận được sự ủng hộ nồng nhiệt từ khán giả như <i>Chuyện tình ở Sungkyunkwan, <a href="https://thanhnien.vn/bong-hong-lai-jeon-somi-moi-bo-ruot-tung-dong-hau-due-mat-troi-tham-gia-mv-1851396256.htm" target="_blank" title="‘Bông hồng lai’ Jeon Somi mời bố ruột từng đóng ‘Hậu duệ mặt trời’ tham gia MV">Hậu duệ mặt trời</a>, Vincenzo, <a href="https://thanhnien.vn/song-joong-ki-xac-nhan-hen-ho-ngay-sau-khi-cau-ut-nha-tai-phiet-ket-thuc-1851535674.htm" target="_blank" title="Song Joong Ki xác nhận hẹn hò ngay sau khi ‘Cậu út nhà tài phiệt’ kết thúc">Cậu út nhà tài phiệt</a>… </i>Hiện hôn lễ sắp tới của <a href="https://thanhnien.vn/cong-ty-quan-ly-len-tieng-chuyen-ket-hon-cua-song-joong-ki-185230130221158045.htm" target="_blank" title="Công ty quản lý lên tiếng chuyện kết hôn của Song Joong Ki">Song Joong Ki</a> và vợ ngoại quốc <a href="https://thanhnien.vn/song-joong-ki-duoc-loi-gi-khi-cuoi-vo-tay-185230131114144807.htm" title="Katy Louise Saunders" data-rel="follow">Katy Louise Saunders</a> được sự chú ý của giới truyền thông</p></figcaption><p data-placeholder="Nhập tác giả">Chụp màn hình Sports Hankooki</p></figure><figure type="Photo"><p><img src="https://images2.thanhnien.vn/528068263637045248/2023/2/4/topnamdienvientruyenhinhhanquocgiaunhat19-1675509524001893049056.png" id="img_546289409822261248" w="1200" h="1212" alt="Những nam diễn viên truyền hình Hàn giàu nhất hiện nay - Ảnh 7." title="Những nam diễn viên truyền hình Hàn giàu nhất hiện nay - Ảnh 7." rel="lightbox" photoid="546289409822261248" data-original="https://images2.thanhnien.vn/528068263637045248/2023/2/4/topnamdienvientruyenhinhhanquocgiaunhat19-1675509524001893049056.png" type="photo" width="" height=""/></p><figcaption><p data-placeholder="Nhập chú thích ảnh">Về hạng 6 trong bảng xếp hạng Những nam diễn viên truyền hình Hàn Quốc giàu nhất hiện nay là <a href="https://thanhnien.vn/hyun-bin-ra-mat-phim-moi-chia-se-ve-viec-sap-len-chuc-bo-1851488796.htm" target="_blank" title="Hyun Bin ra mắt phim mới, chia sẻ về việc sắp lên chức bố">Hyun Bin</a> cùng khối tài sản ròng 21 triệu USD (482 tỉ đồng). Hơn 20 năm đóng phim, ông xã của người đẹp <a href="https://thanhnien.vn/hyun-bin-son-ye-jin-don-con-trai-dau-long-1851526159.htm" target="_blank" title="Hyun Bin - Son Ye Jin đón con trai đầu lòng">Son Ye Jin</a> ghi dấu ấn với các tác phẩm màn ảnh nhỏ <i>Nàng Kim Sam Soon, Khu vườn bí mật, Ký ức Alhambra, <a href="https://thanhnien.vn/fan-ha-canh-noi-anh-xon-xao-khi-nghe-tin-phim-duoc-netflix-remake-1851398621.htm" target="_blank" title="Fan &#39;Hạ cánh nơi anh&#39; xôn xao khi nghe tin phim được Netflix &#39;remake&#39;">Hạ cánh nơi anh</a>…</i> Phim điện ảnh <i>The Point Men</i> có <a href="https://thanhnien.vn/hyun-bin-yoona-bung-no-phan-ung-hoa-hoc-trong-dac-vu-xuyen-quoc-gia-1851513156.htm" target="_blank" title="Hyun Bin - Yoona bùng nổ &#39;phản ứng hóa học&#39; trong &#39;Đặc vụ xuyên quốc gia&#39;">Hyun Bin</a> tham gia cũng đạt thành tích tốt khi ra
