    <h1>A poem</h1>
    
    Silent Sunday morn, Code looming like a shadow, Scaries in my heart.  Salary on screen, Blind users with piercing dreams, The engineer shamed, By lack of equal means.  In the code abyss, Software engineers ponder, Blind users their guide, On love's elusive wonder.
