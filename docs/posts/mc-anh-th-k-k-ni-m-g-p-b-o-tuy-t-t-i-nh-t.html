    <h1>MC Anh Thơ kể kỷ niệm gặp bão tuyết tại Nhật</h1>

                            <h2 data-role="sapo">
                                Nhân dịp đầu xuân, MC Anh Thơ cùng con gái du lịch Nhật Bản. Không may đó là thời điểm Nhật Bản gặp bão tuyết khiến hoạt động giao thông bị gián đoạn trên diện rộng.
                            </h2>
                            <div>
                                <div data-role="content" itemprop="articleBody">
                                                                                                                
                                    <figure type="Photo"><p><img src="https://images2.thanhnien.vn/thumb_w/640/528068263637045248/2023/2/5/z408295404237362b9bc1721c300bd9a4ee6fe508281de-16755708689881598670831.jpg" id="img_546546750847033344" w="1920" h="2560" alt="MC Anh Thơ gặp bão tuyết kinh hoàng ở Nhật - Ảnh 1." title="MC Anh Thơ gặp bão tuyết kinh hoàng ở Nhật - Ảnh 1." rel="lightbox" photoid="546546750847033344" data-original="https://images2.thanhnien.vn/528068263637045248/2023/2/5/z408295404237362b9bc1721c300bd9a4ee6fe508281de-16755708689881598670831.jpg" type="photo" width="" height=""/></p><figcaption><p data-placeholder="Nhập chú thích ảnh">Trong kỳ nghỉ <a href="https://thanhnien.vn/doan-minh-tai-sunny-dan-ngoc-dien-ao-dai-dao-duong-hoa-nguyen-hue-1851543871.htm" title="tết" data-rel="follow">tết</a> vừa qua, MC <a href="https://thanhnien.vn/mc-anh-tho-chap-nhan-khong-thang-tien-su-nghiep-danh-thoi-gian-cho-con-1851464655.htm" target="_blank" title="MC Anh Thơ: Chấp nhận không thăng tiến sự nghiệp, dành thời gian cho con">Anh Thơ</a> và con gái của mình là bé Thỏ bay sang <a href="https://thanhnien.vn/sao-kpop-goc-nhat-cua-nhom-twice-gay-sot-voi-voc-dang-nong-bong-1851544099.htm" title="Nhật" data-rel="follow">Nhật</a> Bản để du lịch. &#34;Săn tuyết&#34; tại Nhật là kế hoạch được hai mẹ con ấp ủ 3 năm trước, nhưng vì dịch <a href="https://thanhnien.vn/thu-trang-bat-khoc-ke-chuyen-nhan-nuoi-10-tre-mo-coi-vi-covid-19-1851528950.htm" title="Covid-19" data-rel="follow">Covid-19</a> bùng phát nên đến nay mới thực hiện được<br/></p></figcaption><p data-placeholder="Nhập tác giả">NVCC</p></figure><figure type="Photo"><p><img src="https://images2.thanhnien.vn/thumb_w/640/528068263637045248/2023/2/5/z4082954266245c13c492b352c25a1a91e891cf3cb9070-1675570869416134355159.jpg" id="img_546546780375293952" w="2000" h="1500" alt="MC Anh Thơ gặp bão tuyết kinh hoàng ở Nhật - Ảnh 2." title="MC Anh Thơ gặp bão tuyết kinh hoàng ở Nhật - Ảnh 2." rel="lightbox" photoid="546546780375293952" data-original="https://images2.thanhnien.vn/528068263637045248/2023/2/5/z4082954266245c13c492b352c25a1a91e891cf3cb9070-1675570869416134355159.jpg" type="photo" width="" height=""/></p><figcaption><p data-placeholder="Nhập chú thích ảnh">Lần đầu đến Nhật Bản, thay vì chọn đi tour, MC Anh Thơ lại &#34;chơi lớn&#34; khi quyết định &#34;phượt&#34; cùng con gái. Cô muốn chủ động trong lịch trình khám phá cũng như tham quan nhiều địa điểm nổi tiếng mà hai mẹ con yêu thích và vạch sẵn trong kế hoạch như: làng cổ Shirakawa-go, rừng trúc ở Kyoto, chùa Tōdai - chùa gỗ lớn nhất thế giới ở thành phố Nara…</p></figcaption><p data-placeholder="Nhập tác giả">NVCC</p></figure><figure type="Photo"><p><img src="https://images2.thanhnien.vn/thumb_w/640/528068263637045248/2023/2/5/z4082953987882d4b4013db28c4d2da9a3676c125fce06-16755711215531465892092.jpg" id="img_546547738020642816" w="1728" h="2592" alt="MC Anh Thơ gặp bão tuyết kinh hoàng ở Nhật - Ảnh 3." title="MC Anh Thơ gặp bão tuyết kinh hoàng ở Nhật - Ảnh 3." rel="lightbox" photoid="546547738020642816" data-original="https://images2.thanhnien.vn/528068263637045248/2023/2/5/z4082953987882d4b4013db28c4d2da9a3676c125fce06-16755711215531465892092.jpg" type="photo" width="" height=""/></p><figcaption><p data-placeholder="Nhập chú thích ảnh">Để tự do khám phá Nhật Bản, khách du lịch phải chi một số tiền lớn hơn gấp nhiều lần so với việc đi chung đoàn đông người. &#34;Nữ MC nổi tiếng <a href="https://thanhnien.vn/nghe-si-cai-luong-linh-tam-toi-co-toi-voi-khan-gia-viet-nam-1851543286.htm" title="miền Tây" data-rel="follow">miền Tây</a>&#34; nói: &#34;Xứng đáng mà. Vì đi chơi dịp tết nên tôi cũng thong thả thời gian. Tự đi thì sẽ có nhiều thời gian vui chơi ở từng điểm hơn&#34;. Cô cũng chia sẻ may mắn tìm được hướng dẫn viên người Việt chăm sóc cho hai mẹ con chu đáo, giúp cô ghi lại được những khoảnh khắc đẹp nhất ở xứ sở mặt trời mọc</p></figcaption><p data-placeholder="Nhập tác giả">NVCC</p></figure><figure type="Photo"><p><img src="https://images2.thanhnien.vn/thumb_w/640/528068263637045248/2023/2/5/z4082954002907ea64bd6e19ca766b07b56dde9dd6a086-16755708685181491599073.jpg" id="img_546546723910393856" w="1920" h="2560" alt="MC Anh Thơ gặp bão tuyết kinh hoàng ở Nhật - Ảnh 4." title="MC Anh Thơ gặp bão tuyết kinh hoàng ở Nhật - Ảnh 4." rel="lightbox" photoid="546546723910393856" data-original="https://images2.thanhnien.vn/528068263637045248/2023/2/5/z4082954002907ea64bd6e19ca766b07b56dde9dd6a086-16755708685181491599073.jpg" type="photo" width="" height=""/></p><figcaption><p data-placeholder="Nhập chú thích ảnh">MC kỳ cựu của Đài truyền hình Vĩnh Long nhận được nhiều lời khen vì hình ảnh chuyến đi đẹp như tranh</p></figcaption><p data-placeholder="Nhập tác giả">NVCC</p></figure><figure type="Photo"><p><img src="https://images2.thanhnien.vn/thumb_w/640/528068263637045248/2023/2/5/z40829540101471e10ee9b9defb813bae243165c418094-1675571121455434915765.jpg" id="img_546547724833751040" w="1728" h="2592" alt="MC Anh Thơ gặp bão tuyết kinh hoàng ở Nhật - Ảnh 5." title="MC Anh Thơ gặp bão tuyết kinh hoàng ở Nhật - Ảnh 5." rel="lightbox" photoid="546547724833751040" data-original="https://images2.thanhnien.vn/528068263637045248/2023/2/5/z40829540101471e10ee9b9defb813bae243165c418094-1675571121455434915765.jpg" type="photo" width="" height=""/></p><figcaption><p data-placeholder="Nhập chú thích ảnh">Anh Thơ thỏa lòng trải nghiệm một lần được khoác lên mình bộ trang phục truyền thống và hóa thân thành cô gái Nhật Bản trải nghiệm ẩm thực đường phố</p></figcaption><p data-placeholder="Nhập tác giả">NVCC</p></figure><figure type="Photo"><p><img src="https://images2.thanhnien.vn/thumb_w/640/528068263637045248/2023/2/5/z40829540356721fdb043bc2256836ae0adf8159192ea7-167557086881086024356.jpg" id="img_546546820616335360" w="1728" h="2592" alt="MC Anh Thơ gặp bão tuyết kinh hoàng ở Nhật - Ảnh 6." title="MC Anh Thơ gặp bão tuyết kinh hoàng ở Nhật - Ảnh 6." rel="lightbox" photoid="546546820616335360" data-original="https://images2.thanhnien.vn/528068263637045248/2023/2/5/z40829540356721fdb043bc2256836ae0adf8159192ea7-167557086881086024356.jpg" type="photo" width="" height=""/></p><figcaption><p data-placeholder="Nhập chú thích ảnh">Thế nhưng, cũng vì đi tự túc mà ngay khi bay sang đến Nhật, hai mẹ con MC Anh Thơ phải đối mặt với sự cố hi hữu. Đó là cơn bão tuyết lớn lịch sử kéo đến khiến tất cả các hệ thống tàu xe ở đất nước mặt trời mọc bị đình trệ</p></figcaption><p data-placeholder="Nhập tác giả">NVCC</p></figure><figure type="Photo"><p><img src="https://images2.thanhnien.vn/528068263637045248/2023/2/5/32709186113828334958044794076294883231192982n-16755738847601446336029.jpeg" id="img_546559304200892416" w="1536" h="2048" alt="MC Anh Thơ kể kỷ niệm gặp bão tuyết kinh hoàng tại Nhật - Ảnh 7." title="MC Anh Thơ kể kỷ niệm gặp bão tuyết kinh hoàng tại Nhật - Ảnh 7." rel="lightbox" photoid="546559304200892416" data-original="https://images2.thanhnien.vn/528068263637045248/2023/2/5/32709186113828334958044794076294883231192982n-16755738847601446336029.jpeg" type="photo" width="" height=""/></p><figcaption><p data-placeholder="Nhập chú thích ảnh">Qua báo chí cô được biết thời điểm Tết Nguyên đán là lúc nhiệt độ lạnh kỷ lục được ghi nhận ở một số vùng của Nhật Bản. Cơ quan khí tượng Nhật Bản cũng kêu gọi người dân cảnh giác với bão tuyết, đường đóng băng trong khi các hãng hàng không đã hủy hàng trăm chuyến bay, đường cao tốc bị phong tỏa, tuyến đường sắt cao tốc cũng ngừng hoạt động vì bão tuyết</p></figcaption><p data-placeholder="Nhập tác giả">NVCC</p></figure><figure type="Photo"><p><img src="https://images2.thanhnien.vn/528068263637045248/2023/2/5/3269695325032970485932081914420893911094076n-1675573884696211834815.jpeg" id="img_546559297227005952" w="1536" h="2048" alt="MC Anh Thơ kể kỷ niệm gặp bão tuyết kinh hoàng tại Nhật - Ảnh 8." title="MC Anh Thơ kể kỷ niệm gặp bão tuyết kinh hoàng tại Nhật - Ảnh 8." rel="lightbox" photoid="546559297227005952" data-original="https://images2.thanhnien.vn/528068263637045248/2023/2/5/3269695325032970485932081914420893911094076n-1675573884696211834815.jpeg" type="photo" width="" height=""/></p><figcaption><p data-placeholder="Nhập chú thích ảnh">Lúc này, nữ MC nghĩ mọi lịch trình của mình vạch ra sẽ không thực hiện được. Nhưng may mắn đã mỉm cười với hai mẹ con cô khi đến đúng ngày cô khởi hành thì mọi tuyến đường hoạt động trở lại, tàu xe cũng vận hành trơn tru như bình thường</p></figcaption><p data-placeholder="Nhập tác giả">NVCC</p></figure><figure type="Photo"><p><img src="https://images2.thanhnien.vn/thumb_w/640/528068263637045248/2023/2/5/z40829540292154acfe9543ae5aba072fc73582d67f6f1-1675570868588869824103.jpg" id="img_546546738801356800" w="1728" h="2592" alt="MC Anh Thơ gặp bão tuyết kinh hoàng ở Nhật - Ảnh 8." title="MC Anh Thơ gặp bão tuyết kinh hoàng ở Nhật - Ảnh 8." rel="lightbox" photoid="546546738801356800" data-original="https://images2.thanhnien.vn/528068263637045248/2023/2/5/z40829540292154acfe9543ae5aba072fc73582d67f6f1-1675570868588869824103.jpg" type="photo" width="" height=""/></p><figcaption><p data-placeholder="Nhập chú thích ảnh">Anh Thơ hài hước chia sẻ: &#34;Tôi tưởng chuyến này qua Nhật là chỉ nằm phòng khách sạn ăn uống ngủ nghỉ tới đúng ngày thì vác vali ra sân bay về lại Việt Nam. Nhưng không ngờ là cứ đến đúng ngày mình định đi đâu, là các tuyến đường đến đó lại hoạt động trở lại, mọi thứ suôn sẻ đến ngỡ ngàng. Tôi còn không tin được là mình có thể đi hết những nơi mình định đi khi mà cơn bão tuyết quá lớn vừa mới kéo qua&#34;</p></figcaption><p data-placeholder="Nhập tác giả">NVCC</p></figure><figure type="Photo"><p><img src="https://images2.thanhnien.vn/thumb_w/640/528068263637045248/2023/2/5/z408295427269282fbb1ec31d7c1cd2b9cff4d3b8fcf44-16755708694231311208532.jpg" id="img_546546706967474176" w="1920" h="2560" alt="MC Anh Thơ gặp bão tuyết kinh hoàng ở Nhật - Ảnh 9." title="MC Anh Thơ gặp bão tuyết kinh hoàng ở Nhật - Ảnh 9." rel="lightbox" photoid="546546706967474176" data-original="https://images2.thanhnien.vn/528068263637045248/2023/2/5/z408295427269282fbb1ec31d7c1cd2b9cff4d3b8fcf44-16755708694231311208532.jpg" type="photo" width="" height=""/></p><figcaption><p data-placeholder="Nhập chú thích ảnh">Không chỉ được thăm thú và tự khám phá những nơi hai mẹ con lên sẵn lịch trình, điều thú vị nhất với hai mẹ con cô là được ngắm tuyết rơi đẹp như trên phim ảnh mà Anh Thơ thường mơ mộng trước đó</p></figcaption><p data-placeholder="Nhập tác giả">NVCC</p></figure><figure type="Photo"><p><img src="https://images2.thanhnien.vn/thumb_w/640/528068263637045248/2023/2/5/z4082954260170e5f954ee70a91a507898ceccff1bd69d-167557086886998574881.jpg" id="img_546546840680636416" w="2000" h="2440" alt="MC Anh Thơ gặp bão tuyết kinh hoàng ở Nhật - Ảnh 10." title="MC Anh Thơ gặp bão tuyết kinh hoàng ở Nhật - Ảnh 10." rel="lightbox" photoid="546546840680636416" data-original="https://images2.thanhnien.vn/528068263637045248/2023/2/5/z4082954260170e5f954ee70a91a507898ceccff1bd69d-167557086886998574881.jpg" type="photo" width="" height=""/></p><figcaption><p data-placeholder="Nhập chú thích ảnh">Trở về Việt Nam, hai mẹ con Anh Thơ được nạp thêm nhiều năng lượng tích cực hơn sẵn sàng cho những dự án mới</p></figcaption><p data-placeholder="Nhập tác giả">NVCC</p></figure><!--Sun Feb 05 2023 11:34:00 GMT+0700 (Indochina Time) -- Sun Feb 05 2023 11:34:00 GMT+0700 (Indochina Time) -- Sun Feb 05 2023 12:40:08 GMT+0700 (Indochina Time)-->
