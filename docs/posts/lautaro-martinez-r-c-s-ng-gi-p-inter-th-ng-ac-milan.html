    <h1>Lautaro Martinez rực sáng giúp Inter thắng AC Milan</h1>

                    <div>
                        

                        




                        <div>

                                <h2 data-role="sapo">
                                    Lautaro Martinez là người đã ghi bàn duy nhất giúp Inter giành chiến thắng trước AC Milan trong trận đấu thuộc khuôn khổ vòng 21 Serie A diễn ra vào rạng sáng 6.2.
                                </h2>
                                <zone id="k911czvz"></zone>
    

                                <div>
                                    <div data-role="content" itemprop="articleBody">
                                                                                <figure type="Photo"><p><img src="https://images2.thanhnien.vn/thumb_w/640/528068263637045248/2023/2/5/2023-02-05t195435z1850085423up1ej251jawptrtrmadp3soccer-italy-int-mil-report-16756375881051920387179.jpg" id="img_546826509870759936" w="2000" h="1304" alt="Lautaro Martinez rực sáng giúp Inter thắng AC Milan - Ảnh 1." title="Lautaro Martinez rực sáng giúp Inter thắng AC Milan - Ảnh 1." rel="lightbox" photoid="546826509870759936" data-original="https://images2.thanhnien.vn/528068263637045248/2023/2/5/2023-02-05t195435z1850085423up1ej251jawptrtrmadp3soccer-italy-int-mil-report-16756375881051920387179.jpg" type="photo" width="" height=""/></p><figcaption><p data-placeholder="Nhập chú thích ảnh">Trước trận derby Milan, Inter là đội được đánh giá cao hơn. Đội bóng áo sọc xanh đen đang đứng nhì bảng và thể hiện rõ quyết tâm bám đuổi đội nhất bảng Napoli trong cuộc đua vô địch</p></figcaption><p data-placeholder="Nhập tác giả">REUTERS</p></figure><figure type="Photo"><p><img src="https://images2.thanhnien.vn/thumb_w/640/528068263637045248/2023/2/5/2023-02-05t200507z660841294up1ej251jshqartrmadp3soccer-italy-int-mil-report-1675637486196322645390.jpg" id="img_546826140752957440" w="2000" h="1412" alt="Lautaro Martinez rực sáng giúp Inter thắng AC Milan - Ảnh 2." title="Lautaro Martinez rực sáng giúp Inter thắng AC Milan - Ảnh 2." rel="lightbox" photoid="546826140752957440" data-original="https://images2.thanhnien.vn/528068263637045248/2023/2/5/2023-02-05t200507z660841294up1ej251jshqartrmadp3soccer-italy-int-mil-report-1675637486196322645390.jpg" type="photo" width="" height=""/></p><figcaption><p data-placeholder="Nhập chú thích ảnh">Với lợi thế sân nhà, đội bóng của HLV Simone Inzaghi tràn lên tấn công ồ ạt ngay sau khi trọng tài nổi hồi còi bắt đầu trận đấu</p></figcaption><p data-placeholder="Nhập tác giả">REUTERS</p></figure><figure type="Photo"><p><img src="https://images2.thanhnien.vn/thumb_w/640/528068263637045248/2023/2/5/2023-02-05t201407z1162619786up1ej251k7gqkrtrmadp3soccer-italy-int-mil-report-16756374865291300129752.jpg" id="img_546826154928451584" w="2000" h="1323" alt="Lautaro Martinez rực sáng giúp Inter thắng AC Milan - Ảnh 3." title="Lautaro Martinez rực sáng giúp Inter thắng AC Milan - Ảnh 3." rel="lightbox" photoid="546826154928451584" data-original="https://images2.thanhnien.vn/528068263637045248/2023/2/5/2023-02-05t201407z1162619786up1ej251k7gqkrtrmadp3soccer-italy-int-mil-report-16756374865291300129752.jpg" type="photo" width="" height=""/></p><figcaption><p data-placeholder="Nhập chú thích ảnh">Inter tạo ra sức ép lớn khiến cho AC Milan phải lùi sâu đội hình để phòng ngự. Trong hơn 2/3 thời gian đầu hiệp 1, cơ hội lần lượt được trao cho Lautaro Martinez rồi Skriniar... Tuy nhiên, những cú dứt điểm của các chân sút áo sọc xanh đen vẫn chưa thể tạo nên khác biệt</p></figcaption><p data-placeholder="Nhập tác giả">REUTERS</p></figure><figure type="Photo"><p><img src="https://images2.thanhnien.vn/thumb_w/640/528068263637045248/2023/2/5/2023-02-05t202637z1592058790up1ej251ksbqyrtrmadp3soccer-italy-int-mil-report-16756374871471689399453.jpg" id="img_546826134050181120" w="2000" h="1341" alt="Lautaro Martinez rực sáng giúp Inter thắng AC Milan - Ảnh 4." title="Lautaro Martinez rực sáng giúp Inter thắng AC Milan - Ảnh 4." rel="lightbox" photoid="546826134050181120" data-original="https://images2.thanhnien.vn/528068263637045248/2023/2/5/2023-02-05t202637z1592058790up1ej251ksbqyrtrmadp3soccer-italy-int-mil-report-16756374871471689399453.jpg" type="photo" width="" height=""/></p><figcaption><p data-placeholder="Nhập chú thích ảnh">Khi Inter Milan tấn công nhiều nhưng chưa thể tìm được bàn thắng thì Lautaro Martinez đã lên tiếng đúng lúc. Dù không có chiều cao nổi bật nhưng tiền đạo sinh năm 1997 đã thể hiện khả năng chọn vị trí thông minh trong tình huống lập công</p></figcaption><p data-placeholder="Nhập tác giả">REUTERS</p></figure><figure type="Photo"><p><img src="https://images2.thanhnien.vn/thumb_w/640/528068263637045248/2023/2/5/2023-02-05t200047z107910774up1ej251jl9q5rtrmadp3soccer-italy-int-mil-report-16756374869841265877675.jpg" id="img_546826119548313600" w="2000" h="1346" alt="Lautaro Martinez rực sáng giúp Inter thắng AC Milan - Ảnh 5." title="Lautaro Martinez rực sáng giúp Inter thắng AC Milan - Ảnh 5." rel="lightbox" photoid="546826119548313600" data-original="https://images2.thanhnien.vn/528068263637045248/2023/2/5/2023-02-05t200047z107910774up1ej251jl9q5rtrmadp3soccer-italy-int-mil-report-16756374869841265877675.jpg" type="photo" width="" height=""/></p><figcaption><p data-placeholder="Nhập chú thích ảnh">Phút 34, sau đường treo bóng của đồng đội từ chấm phạt góc, chân sút người Argentina chọn điểm rơi chính xác để đánh đầu lái bóng đi hiểm hóc khiến thủ môn AC Milan bó tay, khai thông thế bế tắc</p></figcaption><p data-placeholder="Nhập tác giả">REUTERS</p></figure><figure type="Photo"><p><img src="https://images2.thanhnien.vn/thumb_w/640/528068263637045248/2023/2/5/2023-02-05t202715z855507010up1ej251ktdr0rtrmadp3soccer-italy-int-mil-report-1675637486363389334943.jpg" id="img_546826085691514880" w="2000" h="1308" alt="Lautaro Martinez rực sáng giúp Inter thắng AC Milan - Ảnh 6." title="Lautaro Martinez rực sáng giúp Inter thắng AC Milan - Ảnh 6." rel="lightbox" photoid="546826085691514880" data-original="https://images2.thanhnien.vn/528068263637045248/2023/2/5/2023-02-05t202715z855507010up1ej251ktdr0rtrmadp3soccer-italy-int-mil-report-1675637486363389334943.jpg" type="photo" width="" height=""/></p><figcaption><p data-placeholder="Nhập chú thích ảnh">Lautaro Martinez được chọn làm đội trưởng trong trận derby Milan. Anh đã cho thấy vai trò đầu tàu của mình với lối chơi xông xáo và tạo ra không ít sóng gió lên khung thành đối phương</p></figcaption><p data-placeholder="Nhập tác giả">REUTERS</p></figure><figure type="Photo"><p><img src="https://images2.thanhnien.vn/thumb_w/640/528068263637045248/2023/2/5/2023-02-05t202549z30741775up1ej251kqzqvrtrmadp3soccer-italy-int-mil-report-1675637487831259225128.jpg" id="img_546826108240408576" w="2000" h="1346" alt="Lautaro Martinez rực sáng giúp Inter thắng AC Milan - Ảnh 7." title="Lautaro Martinez rực sáng giúp Inter thắng AC Milan - Ảnh 7." rel="lightbox" photoid="546826108240408576" data-original="https://images2.thanhnien.vn/528068263637045248/2023/2/5/2023-02-05t202549z30741775up1ej251kqzqvrtrmadp3soccer-italy-int-mil-report-1675637487831259225128.jpg" type="photo" width="" height=""/></p><figcaption><p data-placeholder="Nhập chú thích ảnh">Ở World Cup 2022, Lautaro bị chỉ trích nhiều với những pha dứt điểm hỏng ăn khó hiểu. Tuy nhiên, anh lại đạt phong độ cao khi trở về với CLB. Bàn thắng duy nhất giúp Inter giành chiến thắng trước AC Milan mới đây chính là pha lập công thứ 12 của tiền đạo người Argentina ở Serie A mùa này</p></figcaption><p data-placeholder="Nhập tác giả">REUTERS</p></figure><figure type="Photo"><p><img src="https://images2.thanhnien.vn/thumb_w/640/528068263637045248/2023/2/5/2023-02-05t215051z268016055up1ej251ooot2rtrmadp3soccer-italy-int-mil-report-16756374880011450198148.jpg" id="img_546826101485604864" w="2000" h="1367" alt="Lautaro Martinez rực sáng giúp Inter thắng AC Milan - Ảnh 8." title="Lautaro Martinez rực sáng giúp Inter thắng AC Milan - Ảnh 8." rel="lightbox" photoid="546826101485604864" data-original="https://images2.thanhnien.vn/528068263637045248/2023/2/5/2023-02-05t215051z268016055up1ej251ooot2rtrmadp3soccer-italy-int-mil-report-16756374880011450198148.jpg" type="photo" width="" height=""/></p><figcaption><p data-placeholder="Nhập chú thích ảnh">Chiến thắng trước AC Milan giúp Inter giữ được vị trí thứ 2 trên bảng xếp hạng Serie A với 43 điểm và duy trì việc bám đuổi Napoli (56 điểm). Ở vòng 22, AC Milan sẽ tiếp đón Torino, còn Inter chạm trán Sampdoria</p></figcaption><p data-placeholder="Nhập tác giả">REUTERS</p></figure><!--Mon Feb 06 2023 06:22:00 GMT+0700 (+08) --
