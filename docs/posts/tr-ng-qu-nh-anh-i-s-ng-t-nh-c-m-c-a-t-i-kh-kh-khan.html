    <h1>Trương Quỳnh Anh: Đời sống tình cảm của tôi khá &#39;khô khan&#39;</h1>

                            <h2 data-role="sapo">
                                Sau khi &#39;đường ai nấy đi&#39; với ca sĩ Tim, Trương Quỳnh Anh hiện sống độc thân và dành tâm huyết cho sự nghiệp. Tuy nhiên, nữ diễn viên nói nhiều năm qua đời sống của cô khá &#39;khô khan&#39;.
                            </h2>
                            <div>
                                <div data-role="content" itemprop="articleBody" data-io-article-url="https://thanhnien.vn/truong-quynh-anh-doi-song-tinh-cam-cua-toi-kha-kho-khan-185230217110042223.htm">
                                                                                                                
                                    <figure data-uid="F8D4h5eML" type="Photo"><p><img src="https://images2.thanhnien.vn/528068263637045248/2023/2/17/truong-quynh-anh-2-1676604507100471949455.jpg" id="img_550882052417892352" w="2000" h="3000" alt="Cuộc sống của Trương Quỳnh Anh sau ly hôn - Ảnh 1." title="Cuộc sống của Trương Quỳnh Anh sau ly hôn - Ảnh 1." rel="lightbox" photoid="550882052417892352" data-original="https://images2.thanhnien.vn/528068263637045248/2023/2/17/truong-quynh-anh-2-1676604507100471949455.jpg" type="photo" width="" height=""/></p><figcaption><p data-placeholder="Nhập chú thích ảnh">Gần đây, Trương Quỳnh Anh gây bất ngờ khi rục rịch trở lại nghệ thuật. Bên cạnh tham qua các show truyền hình thực tế, nữ ca sĩ còn &#34;chiêu đãi&#34; fan khi ra mắt phim chiếu mạng <i>Siêu trợ lý</i> do cô tự sản xuất. Trong phim, cô vào vai nữ chính, sánh đôi cùng hai &#34;soái ca&#34; là <a href="https://vnexpress.net/gi-a-nguyen-noi-ve-nhan-xet-duoc-chon-dong-phim-vi-ngoai-hinh-18523021510082054.htm" title="Gi A Nguyễn" data-rel="follow">Gi A Nguyễn</a> và <a href="https://vnexpress.net/khuong-le-trong-gai-gia-lam-chieu-bi-ban-be-choc-vi-canh-loa-lo-tren-phim-1851254363.htm" title="Khương Lê" data-rel="follow">Khương Lê</a>. Nữ diễn viên nói cô tái xuất để làm mới bản thân và mong muốn tạo ra nhiều dấu ấn trong sự nghiệp <br/></p></figcaption><p data-placeholder="Nhập tác giả">FBNV</p></figure><figure data-uid="TJWdzC6L5" type="Photo"><p><img src="https://images2.thanhnien.vn/528068263637045248/2023/2/17/2964369645918139123138472842978777349460671n-16766046623172127799027.jpg" id="img_550882690208137216" w="1364" h="2048" alt="Cuộc sống của Trương Quỳnh Anh sau ly hôn - Ảnh 2." title="Cuộc sống của Trương Quỳnh Anh sau ly hôn - Ảnh 2." rel="lightbox" photoid="550882690208137216" data-original="https://images2.thanhnien.vn/528068263637045248/2023/2/17/2964369645918139123138472842978777349460671n-16766046623172127799027.jpg" type="photo" width="" height=""/></p><figcaption><p data-placeholder="Nhập chú thích ảnh">Sau biến cố hôn nhân, Trương Quỳnh Anh dần lấy lại niềm vui trong cuộc sống. Nữ diễn viên hiện dành toàn tâm toàn ý cho công việc. Không chỉ mang đến tác phẩm nghệ thuật mới, giọng ca <i>Đơn côi </i>còn muốn thử sức với nhiều vai trò mới như nhà sản xuất phim</p></figcaption><p data-placeholder="Nhập tác giả">FBNV</p></figure><figure data-uid="VHDFONoiM" type="Photo"><p><img src="https://images2.thanhnien.vn/528068263637045248/2023/2/17/truong-quynh-anh-6-1676604504612534520690.jpg" id="img_550882028224008192" w="1366" h="2048" alt="Cuộc sống của Trương Quỳnh Anh sau ly hôn - Ảnh 3." title="Cuộc sống của Trương Quỳnh Anh sau ly hôn - Ảnh 3." rel="lightbox" photoid="550882028224008192" data-original="https://images2.thanhnien.vn/528068263637045248/2023/2/17/truong-quynh-anh-6-1676604504612534520690.jpg" type="photo" width="" height=""/></p><figcaption><p data-placeholder="Nhập chú thích ảnh">Trước đó, Trương Quỳnh Anh từng có mối tình lãng mạn với <a href="https://vnexpress.net/ca-si-tim-hau-ly-hon-toi-mat-het-nhung-nguoi-yeu-thuong-1851478698.htm" title="Tim" data-rel="follow">Tim</a>, chàng ca sĩ được đông đảo công chúng yêu mến với nhiều bài hit như: <i>Một vòng trái đất, Chong chóng tình yêu</i>... Tuy nhiên, cả hai gây tiếc nuối khi quyết định ly hôn vào năm 2017. Sau thời gian chung sống, bộ đôi có một con trai tên Sushi</p></figcaption><p data-placeholder="Nhập tác giả">FBNV</p></figure><figure data-uid="Nq5qHswHx" type="Photo"><p><img src="https://images2.thanhnien.vn/528068263637045248/2023/2/17/truong-quynh-anh-1-16766045059122025594485.jpg" id="img_550882046095683584" w="2000" h="3000" alt="Cuộc sống của Trương Quỳnh Anh sau ly hôn - Ảnh 4." title="Cuộc sống của Trương Quỳnh Anh sau ly hôn - Ảnh 4." rel="lightbox" photoid="550882046095683584" data-original="https://images2.thanhnien.vn/528068263637045248/2023/2/17/truong-quynh-anh-1-16766045059122025594485.jpg" type="photo" width="" height=""/></p><figcaption><p data-placeholder="Nhập chú thích ảnh">Chia sẻ về cuộc sống hiện tại, Trương Quỳnh Anh nói cô cảm thấy hài lòng khi được làm việc và tận hưởng thời gian bên con trai. Tuy nhiên, nữ ca sĩ thừa nhận đời sống tình cảm của cô khá &#34;khô khan&#34;, thậm chí phải &#34;luyện&#34; phim ngôn tình để nuôi dưỡng cảm xúc</p></figcaption><p data-placeholder="Nhập tác giả">FBNV</p></figure><figure data-uid="Mwr6UISaw" type="Photo"><p><img src="https://images2.thanhnien.vn/528068263637045248/2023/2/17/truong-quynh-anh-16766045042661625334546.jpg" id="img_550882023920308224" w="1364" h="2048" alt="Cuộc sống của Trương Quỳnh Anh sau ly hôn - Ảnh 5." title="Cuộc sống của Trương Quỳnh Anh sau ly hôn - Ảnh 5." rel="lightbox" photoid="550882023920308224" data-original="https://images2.thanhnien.vn/528068263637045248/2023/2/17/truong-quynh-anh-16766045042661625334546.jpg" type="photo" width="" height=""/></p><figcaption><p data-placeholder="Nhập chú thích ảnh">Trương Quỳnh Anh bộc bạch: &#34;Trong khoảng 4-5 năm gần đây, ngày nào đi làm về tôi cũng mở phim ngôn tình để xem vì cuộc sống bình thường quá khô khan. Buổi tối tôi cần xem phim lãng mạn, làm cho tôi thoải mái đầu óc và yêu cuộc đời. Hơn hết là duy trì mong muốn được yêu, được hạnh phúc. Vì thế khi làm phim, tôi cũng hướng đến việc mang đến một câu chuyện ngọt ngào, dễ thương khiến người xem yêu đời&#34;</p></figcaption><p data-placeholder="Nhập tác giả">FBNV</p></figure><figure data-uid="H2mpA7G7j" type="Photo"><p><img src="https://images2.thanhnien.vn/528068263637045248/2023/2/17/truong-quynh-anh-5-1676604505562303739662.jpg" id="img_550882032442462208" w="1364" h="2048" alt="Cuộc sống của Trương Quỳnh Anh sau ly hôn - Ảnh 6." title="Cuộc sống của Trương Quỳnh Anh sau ly hôn - Ảnh 6." rel="lightbox" photoid="550882032442462208" data-original="https://images2.thanhnien.vn/528068263637045248/2023/2/17/truong-quynh-anh-5-1676604505562303739662.jpg" type="photo" width="" height=""/></p><figcaption><p data-placeholder="Nhập chú thích ảnh">Nhìn lại khoảng thời gian căng thẳng trước đây. <a href="https://vnexpress.net/truong-quynh-anh-avin-lu-hoang-ha-den-co-vu-giai-dien-anh-ngoi-sao-xanh-2022-1851529448.htm" title="Trương Quỳnh Anh" data-rel="follow">Trương Quỳnh Anh</a> nói hiện tại cô đã thay đổi nhiều khi chịu mở lòng và thay đổi bản thân. Nữ diễn viên nhớ có thời điểm cô gặp vấn đề tâm lý, chỉ lựa chọn trang phục tối màu khi ra đường, hoàn toàn đánh mất sự tươi trẻ vốn có</p></figcaption><p data-placeholder="Nhập tác giả">FBNV</p></figure><figure data-uid="yZsDjcRjy" type="Photo"><p><img src="https://images2.thanhnien.vn/528068263637045248/2023/2/17/truong-quynh-anh-4-16766045039201056349675.jpg" id="img_550882020056932352" w="1364" h="2048" alt="Cuộc sống của Trương Quỳnh Anh sau ly hôn - Ảnh 7." title="Cuộc sống của Trương Quỳnh Anh sau ly hôn - Ảnh 7." rel="lightbox" photoid="550882020056932352" data-original="https://images2.thanhnien.vn/528068263637045248/2023/2/17/truong-quynh-anh-4-16766045039201056349675.jpg" type="photo" width="" height=""/></p><figcaption><p data-placeholder="Nhập chú thích ảnh">Dù trải qua đổ vỡ hôn nhân nhưng Trương Quỳnh Anh tâm sự rằng cô không đánh mất niềm tin vào tình yêu. Tại buổi ra mắt phim <a href="https://vnexpress.net/truong-quynh-anh-he-lo-canh-khoa-moi-ban-dien-kem-9-tuoi-185230214204411303.htm" title="Siêu trợ lý" data-rel="follow"><i>Siêu trợ lý</i></a><i>,</i> nữ ca sĩ nghẹn ngào chia sẻ: &#34;Tôi luôn có niềm tin vào tương lai, mình sẽ có được hạnh phúc. Tôi không mất niềm tin vào tình yêu. Tôi luôn đối xử chân thành với mọi người chứ không riêng gì chuyện tình cảm. Sau này, tôi chắc chắn nhận được những điều tương tự và sống hạnh phúc...&#34;</p></figcaption><p data-placeholder="Nhập tác giả">FBNV</p></figure><!--Fri Feb 17 2023 11:37:45 GMT+0700 (Giờ Đông Dương) --  -- Fri Feb 17 2023 11:37:45 GMT+0700 (Giờ Đông Dương)-->
