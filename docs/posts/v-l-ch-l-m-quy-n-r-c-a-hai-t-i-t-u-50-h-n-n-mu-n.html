    <h1>Vẻ lịch lãm, quyến rũ của hai tài tử U.50 Hàn ‘nở muộn’</h1>
    
    <div id="readability-page-1" class="page"><div>
                                <div data-role="content" itemprop="articleBody" data-io-article-url="https://thanhnien.vn/ve-lich-lam-quyen-ru-cua-hai-tai-tu-u50-han-no-muon-185230215194135656.htm">
                                                                                                                
                                    <figure data-uid="ET0bsLT7j" type="Photo"><p><img src="https://images2.thanhnien.vn/528068263637045248/2023/2/15/taituhanquocu50nomuonjungsungilparkhaesoo113-1676463559255501459410.png" id="img_550290875145859072" w="1024" h="700" alt="Vẻ lịch lãm quyến rũ của hai tài tử U.50 Hàn Quốc ‘nở muộn’ đang hot - Ảnh 1." title="Vẻ lịch lãm quyến rũ của hai tài tử U.50 Hàn Quốc ‘nở muộn’ đang hot - Ảnh 1." rel="lightbox" photoid="550290875145859072" data-original="https://images2.thanhnien.vn/528068263637045248/2023/2/15/taituhanquocu50nomuonjungsungilparkhaesoo113-1676463559255501459410.png" type="photo" width="" height=""/></p><figcaption><p data-placeholder="Nhập chú thích ảnh"><b>Jung Song Il. </b>Trước mùa 1 <i>Vinh quang trong thù hận (<a href="https://vnexpress.net/bien-kich-the-glory-nhan-thu-lao-ngang-ngua-sao-hang-a-1851541864.htm" target="_blank" title="Biên kịch &#39;The Glory&#39; nhận thù lao ngang ngửa sao hạng A">The Glory</a>)</i>, Jung Sung Il là cái tên còn xa lạ với khán giả. Anh bắt đầu đóng phim vào năm 2002, nhưng không có nhiều cơ hội tỏa sáng trên màn ảnh. Trải qua gần 20 năm theo đuổi diễn xuất, Jung Sung Il thường đảm nhận vai phụ hoặc khách mời trong các phim <i>Người phụ nữ 9,9 tỉ won khốn khổ, Khu rừng bí mật 2, Hoa nở nhớ trăng, Nơi đảo xanh, Tập tành làm mẹ…</i></p></figcaption><p data-placeholder="Nhập tác giả">ESQUIRE</p></figure><figure data-uid="3DwWMNSGp" type="Photo"><p><img src="https://images2.thanhnien.vn/528068263637045248/2023/2/15/taituhanquocu50nomuonjungsungilparkhaesoo16-1676463559860582423409.png" id="img_550290905526149120" w="1436" h="1630" alt="Vẻ lịch lãm quyến rũ của hai tài tử U.50 Hàn Quốc ‘nở muộn’ đang hot - Ảnh 2." title="Vẻ lịch lãm quyến rũ của hai tài tử U.50 Hàn Quốc ‘nở muộn’ đang hot - Ảnh 2." rel="lightbox" photoid="550290905526149120" data-original="https://images2.thanhnien.vn/528068263637045248/2023/2/15/taituhanquocu50nomuonjungsungilparkhaesoo16-1676463559860582423409.png" type="photo" width="" height=""/></p><figcaption><p data-placeholder="Nhập chú thích ảnh">Cuối năm 2022 - đầu năm 2023, <i>The Glory 1</i> lên sóng và là bước ngoặt lớn trong sự nghiệp diễn xuất của Jung Sung Il. Nhân vật Ha Do Young của tài tử 43 tuổi nhận về nhiều phản hồi tích cực</p></figcaption><p data-placeholder="Nhập tác giả">POSTER PHIM</p></figure><figure data-uid="DupIPxN3V" type="Photo"><p><img src="https://images2.thanhnien.vn/528068263637045248/2023/2/15/taituhanquocu50nomuonjungsungilparkhaesoo15-16764635606691146082956.png" id="img_550290918662709248" w="1426" h="1616" alt="Vẻ lịch lãm quyến rũ của hai tài tử U.50 Hàn Quốc ‘nở muộn’ đang hot - Ảnh 3." title="Vẻ lịch lãm quyến rũ của hai tài tử U.50 Hàn Quốc ‘nở muộn’ đang hot - Ảnh 3." rel="lightbox" photoid="550290918662709248" data-original="https://images2.thanhnien.vn/528068263637045248/2023/2/15/taituhanquocu50nomuonjungsungilparkhaesoo15-16764635606691146082956.png" type="photo" width="" height=""/></p><figcaption><p data-placeholder="Nhập chú thích ảnh">Khán giả ấn tượng trước vẻ ngoài phong độ, ánh mắt sắc bén cùng cử chỉ điềm đạm của anh trong phim. Jung Sung Il cũng tạo &#34;phản ứng hóa học&#34; tốt cùng lúc với cả hai bạn diễn nữ <a href="https://vnexpress.net/song-hye-kyo-mau-me-ac-nu-lim-ji-yeon-tan-nhan-trong-teaser-the-glory-2-185230209105719572.htm" target="_blank" title="Song Hye Kyo máu me, ác nữ Lim Ji Yeon tàn nhẫn trong teaser ‘The Glory’ 2">Song Hye Kyo</a> (vai Moon Dong Eun) và <a href="https://vnexpress.net/lim-ji-yeon-dong-canh-nong-hoa-ac-nu-an-tuong-trong-the-glory-1851539274.htm" target="_blank" title="Lim Ji Yeon đóng cảnh nóng, hóa ác nữ ấn tượng trong ‘The Glory’">Lim Ji Yeon</a> (vai Park Yeon Jin)</p></figcaption><p data-placeholder="Nhập tác giả">POSTER PHIM</p></figure><figure data-uid="DoaN0UZ2m" type="Photo"><p><img src="https://images2.thanhnien.vn/528068263637045248/2023/2/15/taituhanquocu50nomuonjungsungilparkhaesoo112-1676463560207983000271.jpg" id="img_550290870788726784" w="1000" h="1250" alt="Vẻ lịch lãm quyến rũ của hai tài tử U.50 Hàn Quốc ‘nở muộn’ đang hot - Ảnh 4." title="Vẻ lịch lãm quyến rũ của hai tài tử U.50 Hàn Quốc ‘nở muộn’ đang hot - Ảnh 4." rel="lightbox" photoid="550290870788726784" data-original="https://images2.thanhnien.vn/528068263637045248/2023/2/15/taituhanquocu50nomuonjungsungilparkhaesoo112-1676463560207983000271.jpg" type="photo" width="" height=""/></p><figcaption><p data-placeholder="Nhập chú thích ảnh">Sau <i>The Glory 1</i>, ngôi <a href="https://vnexpress.net/sao-han-tre-hoa-bang-kieu-toc-moi-jennie-that-toc-no-haerin-buoc-toc-hai-ben-185230203111445448.htm" target="_blank" title="Sao Hàn trẻ hóa bằng kiểu tóc mới: Jennie thắt tóc nơ, Haerin buộc tóc hai bên">sao Hàn</a> sinh năm 1970 được truyền thông săn đón, trở thành nghệ sĩ &#34;nở muộn&#34; đầy triển vọng của làng phim ảnh xứ kim chi. Trong các bộ ảnh gần đây trên tạp chí, Jung Sung Il ghi dấu ấn với vẻ ngoài bảnh bao quyến rũ</p></figcaption><p data-placeholder="Nhập tác giả">ESQUIRE</p></figure><figure data-uid="ZH1T8O0ac" type="Photo"><p><img src="https://images2.thanhnien.vn/528068263637045248/2023/2/15/taituhanquocu50nomuonjungsungilparkhaesoo12-1676463559561971192009.png" id="img_550290880085258240" w="1024" h="700" alt="Vẻ lịch lãm quyến rũ của hai tài tử U.50 Hàn Quốc ‘nở muộn’ đang hot - Ảnh 5." title="Vẻ lịch lãm quyến rũ của hai tài tử U.50 Hàn Quốc ‘nở muộn’ đang hot - Ảnh 5." rel="lightbox" photoid="550290880085258240" data-original="https://images2.thanhnien.vn/528068263637045248/2023/2/15/taituhanquocu50nomuonjungsungilparkhaesoo12-1676463559561971192009.png" type="photo" width="" height=""/></p><figcaption><p data-placeholder="Nhập chú thích ảnh">Tại một chương trình truyền hình, Jung Sung Il bình thản chia sẻ về quá khứ cơ cực và hành trình vươn lên từ nghèo khó, khiến người xem đồng cảm và càng ủng hộ anh. Ngoài ra, câu chuyện tình ngọt ngào giữa nam diễn viên và bà xã kết hôn 8 năm cũng làm công chúng ngưỡng mộ</p></figcaption><p data-placeholder="Nhập tác giả">ESQUIRE</p></figure><figure data-uid="VTJJYPC6K" type="Photo"><p><img src="https://images2.thanhnien.vn/528068263637045248/2023/2/15/taituhanquocu50nomuonjungsungilparkhaesoo13-1676463560522549988449.jpg" id="img_550290867055652864" w="1000" h="698" alt="Vẻ lịch lãm quyến rũ của hai tài tử U.50 Hàn Quốc ‘nở muộn’ đang hot - Ảnh 6." title="Vẻ lịch lãm quyến rũ của hai tài tử U.50 Hàn Quốc ‘nở muộn’ đang hot - Ảnh 6." rel="lightbox" photoid="550290867055652864" data-original="https://images2.thanhnien.vn/528068263637045248/2023/2/15/taituhanquocu50nomuonjungsungilparkhaesoo13-1676463560522549988449.jpg" type="photo" width="" height=""/></p><figcaption><p data-placeholder="Nhập chú thích ảnh">Theo teaser phim <i>The Glory</i> mùa 2, Ha Do Young của Jung Sung Il là ẩn số khiến khán giả tò mò. Đồng thời, người xem kỳ vọng <a href="https://vnexpress.net/nhung-tai-tu-han-trien-vong-nam-2022-1851419166.htm" target="_blank" title="Những tài tử Hàn triển vọng năm 2022">tài tử Hàn</a> U.50 này sẽ có đột phá hơn nữa cùng tác phẩm lên sóng vào tháng 3 năm nay</p></figcaption><p data-placeholder="Nhập tác giả">POSTER PHIM</p></figure><figure data-uid="xRGjBaRHT" type="Photo"><p><img src="https://images2.thanhnien.vn/528068263637045248/2023/2/15/taituhanquocu50nomuonjungsungilparkhaesoo17-16764635603691003950500.png" id="img_550290884880519168" w="1200" h="830" alt="Vẻ lịch lãm quyến rũ của hai tài tử U.50 Hàn Quốc ‘nở muộn’ đang hot - Ảnh 7." title="Vẻ lịch lãm quyến rũ của hai tài tử U.50 Hàn Quốc ‘nở muộn’ đang hot - Ảnh 7." rel="lightbox" photoid="550290884880519168" data-original="https://images2.thanhnien.vn/528068263637045248/2023/2/15/taituhanquocu50nomuonjungsungilparkhaesoo17-16764635603691003950500.png" type="photo" width="" height=""/></p><figcaption><p data-placeholder="Nhập chú thích ảnh"><b>Park Hae Soo. </b>Park Hae Soo cũng là một <a href="https://vnexpress.net/nghe-si-han-quoc-kim-young-nam-day-tre-lang-sos-noi-xin-chao-185780168.htm" target="_blank" title="Nghệ sĩ Hàn Quốc Kim Young Nam dạy trẻ làng SOS nói… “Xin chào”">nghệ sĩ Hàn Quốc</a> thành danh khi đã bước sang tuổi gần 40. Anh khởi nghiệp với vai trò diễn viên nhạc kịch từ năm 2007, sau đó, chuyển sang đóng phim và được biết đến qua các tác phẩm <i><a href="https://vnexpress.net/yeu-tinh-danh-bai-huyen-thoai-bien-xanh-185613724.htm" target="_blank" title="&#39;Yêu tinh&#39; đánh bại &#39;Huyền thoại biển xanh&#39;">Huyền thoại biển xanh</a>, Giờ săn đã điểm…</i></p></figcaption><p data-placeholder="Nhập tác giả">NAVER</p></figure><figure data-uid="tcXYeuogF" type="Photo"><p><img src="https://images2.thanhnien.vn/528068263637045248/2023/2/15/taituhanquocu50nomuonjungsungilparkhaesoo110-167646355941529344868.png" id="img_550290909103030272" w="1200" h="1543" alt="Vẻ lịch lãm quyến rũ của hai tài tử U.50 Hàn Quốc ‘nở muộn’ đang hot - Ảnh 8." title="Vẻ lịch lãm quyến rũ của hai tài tử U.50 Hàn Quốc ‘nở muộn’ đang hot - Ảnh 8." rel="lightbox" photoid="550290909103030272" data-original="https://images2.thanhnien.vn/528068263637045248/2023/2/15/taituhanquocu50nomuonjungsungilparkhaesoo110-167646355941529344868.png" type="photo" width="" height=""/></p><figcaption><p data-placeholder="Nhập chú thích ảnh">10 năm sau, tên tuổi của Park Hae Soo bất ngờ bùng nổ sau <i>Đời sống ngục tù (Prison Playbook)</i> ra mắt vào năm 2017 - 2018. Tuy nhiên, danh tiếng nam diễn viên thật sự vang xa khắp thế giới nhờ cơn sốt của tác phẩm màn ảnh nhỏ đình đám<i> <a href="https://vnexpress.net/dan-han-tu-hao-voi-con-sot-tro-choi-con-muc-ban-show-truyen-hinh-185230210133159801.htm" target="_blank" title="Dân Hàn tự hào với cơn sốt ‘Trò chơi con mực’ bản show truyền hình">Trò chơi con mực</a> (<a href="https://vnexpress.net/squid-game-lap-ky-tich-doat-4-giai-emmy-1851496807.htm" target="_blank" title="&#39;Squid Game&#39; lập kỳ tích đoạt 4 giải Emmy">Squid Game</a>) </i>cách đây 2 năm, khi anh tròn 40 tuổi</p></figcaption><p data-placeholder="Nhập tác giả">INSTAGRAM NV</p></figure><figure data-uid="BLT9iLRzj" type="Photo"><p><img src="https://images2.thanhnien.vn/528068263637045248/2023/2/15/taituhanquocu50nomuonjungsungilparkhaesoo19-1676463560821929362819.png" id="img_550290913657384960" w="1200" h="1534" alt="Vẻ lịch lãm quyến rũ của hai tài tử U.50 Hàn Quốc ‘nở muộn’ đang hot - Ảnh 9." title="Vẻ lịch lãm quyến rũ của hai tài tử U.50 Hàn Quốc ‘nở muộn’ đang hot - Ảnh 9." rel="lightbox" photoid="550290913657384960" data-original="https://images2.thanhnien.vn/528068263637045248/2023/2/15/taituhanquocu50nomuonjungsungilparkhaesoo19-1676463560821929362819.png" type="photo" width="" height=""/></p><figcaption><p data-placeholder="Nhập chú thích ảnh">Năm ngoái, Park Hae Soo tiếp tục được tán thưởng qua 2 mùa phim truyền hình<i> <a href="https://vnexpress.net/phi-vu-trieu-do-han-quoc-that-bai-vuot-qua-cai-bong-cua-ban-goc-1851473528.htm" target="_blank" title="‘Phi vụ triệu đô’ Hàn Quốc thất bại vượt qua cái bóng của bản gốc">Phi vụ triệu đô</a></i> bản Hàn (<i><a href="https://vnexpress.net/man-hop-tac-hoanh-trang-tu-free-fire-va-series-phim-money-heist-phi-vu-trieu-do-1851148160.htm" target="_blank" title="Màn hợp tác hoành tráng từ Free Fire và series phim Money Heist: Phi vụ triệu đô">Money Heist</a></i>) và sêri <i>Thánh ma túy (Narco-Saints)</i>. Anh trở thành gương mặt quen thuộc với các dạng vai có tâm lý &#34;nặng đô&#34; trên màn ảnh xứ kim chi. Bên cạnh đó, khán giả cũng khen ngợi nam diễn viên ngày càng lịch lãm, phong độ ở tuổi U.50</p></figcaption><p data-placeholder="Nhập tác giả">INSTAGRAM NV</p></figure><figure data-uid="MMnVJtQqm" type="Photo"><p><img src="https://images2.thanhnien.vn/528068263637045248/2023/2/15/taituhanquocu50nomuonjungsungilparkhaesoo111-1676463559091871446325.jpg" id="img_550290863359201280" w="1500" h="1000" alt="Vẻ lịch lãm quyến rũ của hai tài tử U.50 Hàn Quốc ‘nở muộn’ đang hot - Ảnh 10." title="Vẻ lịch lãm quyến rũ của hai tài tử U.50 Hàn Quốc ‘nở muộn’ đang hot - Ảnh 10." rel="lightbox" photoid="550290863359201280" data-original="https://images2.thanhnien.vn/528068263637045248/2023/2/15/taituhanquocu50nomuonjungsungilparkhaesoo111-1676463559091871446325.jpg" type="photo" width="" height=""/></p><figcaption><p data-placeholder="Nhập chú thích ảnh">Đầu năm 2023, với phim điện ảnh<i> Phantom</i>, Park Hae Soo tiếp tục chứng minh bản thân không phải bỗng nhiên trở nên nổi tiếng dù đã trong độ tuổi trung niên. Giữa dàn sao đình đám trong tác phẩm, anh nổi bật khi hóa thân thành Takahara Kaito nham hiểm, tàn ác</p></figcaption><p data-placeholder="Nhập tác giả">POSTER PHIM</p></figure><figure data-uid="ZLzaVjJxR" type="Photo"><p><img src="https://images2.thanhnien.vn/528068263637045248/2023/2/15/taituhanquocu50nomuonjungsungilparkhaesoo2-1676464147790245133633.jpg" id="img_550293315550224384" w="1500" h="1000" alt="Vẻ lịch lãm quyến rũ của hai tài tử U.50 Hàn Quốc ‘nở muộn’ đang hot - Ảnh 11." title="Vẻ lịch lãm quyến rũ của hai tài tử U.50 Hàn Quốc ‘nở muộn’ đang hot - Ảnh 11." rel="lightbox" photoid="550293315550224384" data-original="https://images2.thanhnien.vn/528068263637045248/2023/2/15/taituhanquocu50nomuonjungsungilparkhaesoo2-1676464147790245133633.jpg" type="photo" width="" height=""/></p><figcaption><p data-placeholder="Nhập chú thích ảnh">Tạo hình quân nhân Nhật Bản của Park Hae Soo trong <i>Phantom</i> gây sốt mạng xã hội. Đặc biệt, theo đạo diễn Lee Hae Young, nam diễn viên nhập vai một cách hoàn hảo và thậm chí ghi nhớ lời thoại tiếng Nhật của anh và cả lời thoại tiếng Nhật - Hàn của bạn diễn chỉ trong hai tuần</p></figcaption><p data-placeholder="Nhập tác giả">POSTER PHIM</p></figure><figure data-uid="LP0d5nI0H" type="Photo"><p><img src="https://images2.thanhnien.vn/528068263637045248/2023/2/15/taituhanquocu50nomuonjungsungilparkhaesoo-1676463558906651508261.png" id="img_550290899648409600" w="1200" h="1525" alt="Vẻ lịch lãm quyến rũ của hai tài tử U.50 Hàn Quốc ‘nở muộn’ đang hot - Ảnh 12." title="Vẻ lịch lãm quyến rũ của hai tài tử U.50 Hàn Quốc ‘nở muộn’ đang hot - Ảnh 12." rel="lightbox" photoid="550290899648409600" data-original="https://images2.thanhnien.vn/528068263637045248/2023/2/15/taituhanquocu50nomuonjungsungilparkhaesoo-1676463558906651508261.png" type="photo" width="" height=""/></p><figcaption><p data-placeholder="Nhập chú thích ảnh">Sau <i>Phantom,</i> Park Hae Soo nhận tham gia phim điện ảnh <i>The Great Flood</i> của đạo diễn Kim Byung Woo. Tài tử 42 tuổi được kỳ vọng sẽ đạt thêm nhiều thành tựu cùng các dự án mới</p></figcaption><p data-placeholder="Nhập tác giả">INSTAGRAM NV</p></figure><!--Wed Feb 15 2023 20:52:01 GMT+0700 (Giờ Đông Dương) --  -- Wed Feb 15 2023 20:52:01 GMT+0700 (Giờ Đông Dương)-->
