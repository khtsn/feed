                            <h2 data-role="sapo">
                                Tổng thống Mỹ Joe Biden có chuyến thăm bất ngờ đến Kyiv trong lúc chiến sự tại Ukraine sắp tròn một năm.
                            </h2>
                            <div>
                                <div data-role="content" itemprop="articleBody" data-io-article-url="https://thanhnien.vn/nhung-hinh-anh-trong-chuyen-tham-ukraine-bat-ngo-cua-tong-thong-my-joe-biden-185230220180100174.htm">
                                    

                                                                                                                
                                    <figure data-uid="dKSXV8vpx" type="Photo"><p><img src="https://images2.thanhnien.vn/thumb_w/640/528068263637045248/2023/2/20/1-16768898049991756203766.jpg" id="img_552079419129241600" w="1024" h="682" alt="Chùm ảnh: Tổng thống Mỹ Joe Biden đến Kyiv giữa chiến sự Ukraine - Ảnh 1." title="Chùm ảnh: Tổng thống Mỹ Joe Biden đến Kyiv giữa chiến sự Ukraine - Ảnh 1." rel="lightbox" photoid="552079419129241600" data-original="https://images2.thanhnien.vn/528068263637045248/2023/2/20/1-16768898049991756203766.jpg" type="photo" width="" height=""/></p><figcaption><p data-placeholder="Nhập chú thích ảnh">Tổng thống Mỹ Joe Biden ngày 20.2 đã bất ngờ đến thăm Kyiv trong lúc chiến sự đang diễn ra tại Ukraine</p></figcaption><p data-placeholder="Nhập tác giả">REUTERS</p></figure><figure data-uid="1sFgWHGnY" type="Photo"><p><img src="https://images2.thanhnien.vn/thumb_w/640/528068263637045248/2023/2/20/000339n23p-1676889777700759176400.jpg" id="img_552079231849201664" w="1024" h="682" alt="Chùm ảnh: Tổng thống Mỹ Joe Biden đến Kyiv giữa chiến sự Ukraine - Ảnh 2." title="Chùm ảnh: Tổng thống Mỹ Joe Biden đến Kyiv giữa chiến sự Ukraine - Ảnh 2." rel="lightbox" photoid="552079231849201664" data-original="https://images2.thanhnien.vn/528068263637045248/2023/2/20/000339n23p-1676889777700759176400.jpg" type="photo" width="" height=""/></p><figcaption><p data-placeholder="Nhập chú thích ảnh">Tổng thống Mỹ Joe Biden chụp ảnh với Tổng thống Ukraine Volodymyr Zelensky (phải) và đệ nhất phu nhân Ukraine Olena Zelenska</p></figcaption><p data-placeholder="Nhập tác giả">AFP</p></figure><figure data-uid="tdy4Eh7zP" type="Photo"><p><img src="https://images2.thanhnien.vn/thumb_w/640/528068263637045248/2023/2/20/2-16768898025481596056802.jpg" id="img_552079403874557952" w="1024" h="682" alt="Chùm ảnh: Tổng thống Mỹ Joe Biden đến Kyiv giữa chiến sự Ukraine - Ảnh 3." title="Chùm ảnh: Tổng thống Mỹ Joe Biden đến Kyiv giữa chiến sự Ukraine - Ảnh 3." rel="lightbox" photoid="552079403874557952" data-original="https://images2.thanhnien.vn/528068263637045248/2023/2/20/2-16768898025481596056802.jpg" type="photo" width="" height=""/></p><figcaption><p data-placeholder="Nhập chú thích ảnh">Hai nhà lãnh đạo ôm nhau tại cuộc gặp</p></figcaption><p data-placeholder="Nhập tác giả">AFP</p></figure><figure data-uid="MbfLXzY8q" type="Photo"><p><img src="https://images2.thanhnien.vn/thumb_w/640/528068263637045248/2023/2/20/3-16768898037861176644293.jpg" id="img_552079400020246528" w="682" h="1024" alt="Chùm ảnh: Tổng thống Mỹ Joe Biden đến Kyiv giữa chiến sự Ukraine - Ảnh 4." title="Chùm ảnh: Tổng thống Mỹ Joe Biden đến Kyiv giữa chiến sự Ukraine - Ảnh 4." rel="lightbox" photoid="552079400020246528" data-original="https://images2.thanhnien.vn/528068263637045248/2023/2/20/3-16768898037861176644293.jpg" type="photo" width="" height=""/></p><figcaption><p data-placeholder="Nhập chú thích ảnh">Đây là lần đầu tiên ông Biden đến Ukraine từ khi Nga phát động chiến dịch quân sự đặc biệt vào ngày 24.2.2022.</p></figcaption><p data-placeholder="Nhập tác giả">AFP</p></figure><figure data-uid="sp3oRxvWq" type="Photo"><p><img src="https://images2.thanhnien.vn/thumb_w/640/528068263637045248/2023/2/20/4-16768898049741740086973.jpg" id="img_552079411822592000" w="1024" h="682" alt="Chùm ảnh: Tổng thống Mỹ Joe Biden đến Kyiv giữa chiến sự Ukraine - Ảnh 5." title="Chùm ảnh: Tổng thống Mỹ Joe Biden đến Kyiv giữa chiến sự Ukraine - Ảnh 5." rel="lightbox" photoid="552079411822592000" data-original="https://images2.thanhnien.vn/528068263637045248/2023/2/20/4-16768898049741740086973.jpg" type="photo" width="" height=""/></p><figcaption><p data-placeholder="Nhập chú thích ảnh">Tổng thống Biden có chuyến thăm bất ngờ và  trước đó chỉ thông báo sẽ đến thăm thủ đô Warsaw của Ba Lan, nước láng giềng của Ukraine, từ ngày 20-22.2.</p></figcaption><p data-placeholder="Nhập tác giả">REUTERS</p></figure><figure data-uid="qlzx2nl4C" type="Photo" data-style="align-center-overflow"><p><img src="https://images2.thanhnien.vn/thumb_w/640/528068263637045248/2023/2/20/5-16768898201131235666468.jpg" id="img_552079450450063360" w="1024" h="682" alt="Chùm ảnh: Tổng thống Mỹ Joe Biden đến Kyiv giữa chiến sự Ukraine - Ảnh 6." title="Chùm ảnh: Tổng thống Mỹ Joe Biden đến Kyiv giữa chiến sự Ukraine - Ảnh 6." rel="lightbox" photoid="552079450450063360" data-original="https://images2.thanhnien.vn/528068263637045248/2023/2/20/5-16768898201131235666468.jpg" type="photo" width="" height=""/></p><figcaption><p data-placeholder="Nhập chú thích ảnh">Hai nhà lãnh đạo bước đi trên đường phố Kyiv</p></figcaption><p data-placeholder="Nhập tác giả">AFP</p></figure><figure data-uid="lUj6LqnAQ" type="Photo"><p><img src="https://images2.thanhnien.vn/thumb_w/640/528068263637045248/2023/2/20/6-16768898073692115607983.jpg" id="img_552079415383064576" w="1024" h="682" alt="Chùm ảnh: Tổng thống Mỹ Joe Biden đến Kyiv giữa chiến sự Ukraine - Ảnh 7." title="Chùm ảnh: Tổng thống Mỹ Joe Biden đến Kyiv giữa chiến sự Ukraine - Ảnh 7." rel="lightbox" photoid="552079415383064576" data-original="https://images2.thanhnien.vn/528068263637045248/2023/2/20/6-16768898073692115607983.jpg" type="photo" width="" height=""/></p><figcaption><p data-placeholder="Nhập chú thích ảnh">Theo Nhà Trắng, Tổng thống Biden nói rằng ông đến Kyiv để gặp Tổng thống Zelensky và tái khẳng định cam kết vững chắc và kiên trì &#34;đối với nền dân chủ, chủ quyền và toàn vẹn lãnh thổ của Ukraine&#34;.</p></figcaption><p data-placeholder="Nhập tác giả">AFP</p></figure><figure data-uid="IYF6jSj7Q" type="Photo"><p><img src="https://images2.thanhnien.vn/thumb_w/640/528068263637045248/2023/2/20/7-1676889808578216127291.jpg" id="img_552079423105269760" w="1024" h="682" alt="Chùm ảnh: Tổng thống Mỹ Joe Biden đến Kyiv giữa chiến sự Ukraine - Ảnh 8." title="Chùm ảnh: Tổng thống Mỹ Joe Biden đến Kyiv giữa chiến sự Ukraine - Ảnh 8." rel="lightbox" photoid="552079423105269760" data-original="https://images2.thanhnien.vn/528068263637045248/2023/2/20/7-1676889808578216127291.jpg" type="photo" width="" height=""/></p><figcaption><p data-placeholder="Nhập chú thích ảnh">Hai tổng thống đến thăm tu viện St. Michael ở Kyiv</p></figcaption><p data-placeholder="Nhập tác giả">AFP</p></figure><figure data-uid="0OVZ0C6Xk" type="Photo"><p><img src="https://images2.thanhnien.vn/thumb_w/640/528068263637045248/2023/2/20/8-1676889809759936819670.jpg" id="img_552079407802535936" w="1024" h="682" alt="Chùm ảnh: Tổng thống Mỹ Joe Biden đến Kyiv giữa chiến sự Ukraine - Ảnh 9." title="Chùm ảnh: Tổng thống Mỹ Joe Biden đến Kyiv giữa chiến sự Ukraine - Ảnh 9." rel="lightbox" photoid="552079407802535936" data-original="https://images2.thanhnien.vn/528068263637045248/2023/2/20/8-1676889809759936819670.jpg" type="photo" width="" height=""/></p><figcaption><p data-placeholder="Nhập chú thích ảnh">Chuyến thăm được thực hiện một cách âm thầm vì lo ngại an ninh.</p></figcaption><p data-placeholder="Nhập tác giả">REUTERS</p></figure><figure data-uid="NjFChTvgh" type="Photo"><p><img src="https://images2.thanhnien.vn/thumb_w/640/528068263637045248/2023/2/20/9-16768898109501624553986.jpg" id="img_552079434764779520" w="1024" h="682" alt="Chùm ảnh: Tổng thống Mỹ Joe Biden đến Kyiv giữa chiến sự Ukraine - Ảnh 10." title="Chùm ảnh: Tổng thống Mỹ Joe Biden đến Kyiv giữa chiến sự Ukraine - Ảnh 10." rel="lightbox" photoid="552079434764779520" data-original="https://images2.thanhnien.vn/528068263637045248/2023/2/20/9-16768898109501624553986.jpg" type="photo" width="" height=""/></p><figcaption><p data-placeholder="Nhập chú thích ảnh">Hai nhà lãnh đạo tại cuộc họp báo chung ở Kyiv</p></figcaption><p data-placeholder="Nhập tác giả">AFP</p></figure><figure data-uid="I0ifaXZme" type="Photo"><p><img src="https://images2.thanhnien.vn/thumb_w/640/528068263637045248/2023/2/20/91-16768898177692084995594.jpg" id="img_552079431644295168" w="1024" h="682" alt="Chùm ảnh: Tổng thống Mỹ Joe Biden đến Kyiv giữa chiến sự Ukraine - Ảnh 11." title="Chùm ảnh: Tổng thống Mỹ Joe Biden đến Kyiv giữa chiến sự Ukraine - Ảnh 11." rel="lightbox" photoid="552079431644295168" data-original="https://images2.thanhnien.vn/528068263637045248/2023/2/20/91-16768898177692084995594.jpg" type="photo" width="" height=""/></p><figcaption><p data-placeholder="Nhập chú thích ảnh">Tổng thống Biden tái khẳng định cam kết của Mỹ về việc hỗ trợ Ukraine</p></figcaption><p data-placeholder="Nhập tác giả">AFP</p></figure><figure data-uid="AjbG0w6b6" type="Photo"><p><img src="https://images2.thanhnien.vn/thumb_w/640/528068263637045248/2023/2/20/z-16768898169011183464224.jpg" id="img_552079426871783424" w="1024" h="729" alt="Chùm ảnh: Tổng thống Mỹ Joe Biden đến Kyiv giữa chiến sự Ukraine - Ảnh 12." title="Chùm ảnh: Tổng thống Mỹ Joe Biden đến Kyiv giữa chiến sự Ukraine - Ảnh 12." rel="lightbox" photoid="552079426871783424" data-original="https://images2.thanhnien.vn/528068263637045248/2023/2/20/z-16768898169011183464224.jpg" type="photo" width="" height=""/></p><figcaption><p data-placeholder="Nhập chú thích ảnh">Trước đó, Tổng thống Biden đã xuất phát từ Washington D.C mà không thông báo gì sau một buổi ăn tối hiếm hoi tại nhà hàng vào tối 18.2 (giờ Mỹ).</p></figcaption><p data-placeholder="Nhập tác giả">REUTERS</p></figure><!--Mon Feb 20 2023 18:06:38 GMT+0700 (Giờ Đông Dương) --  -- Mon Feb 20 2023 18:06:38 GMT+0700 (Giờ Đông Dương)-->
