    <h1>Choáng ngợp với cuộc sống sang chảnh của nữ đại gia gốc Việt Mimi Morris</h1>
    
    <div id="readability-page-1" class="page"><div>
                                <div data-role="content" itemprop="articleBody" data-io-article-url="https://thanhnien.vn/choang-ngop-voi-cuoc-song-sang-chanh-cua-nu-dai-gia-goc-viet-mimi-morris-185230217222401168.htm">
                                                                                                                
                                    <figure data-uid="9XN5CX5qx" type="Photo"><p><img src="https://images2.thanhnien.vn/528068263637045248/2023/2/17/15-16766447449441733323133.jpg" id="img_551050885908770816" w="2000" h="2999" alt="Choáng ngợp với cuộc sống sang chảnh của nữ đại gia gốc Việt Mimi Morris - Ảnh 1." title="Choáng ngợp với cuộc sống sang chảnh của nữ đại gia gốc Việt Mimi Morris - Ảnh 1." rel="lightbox" photoid="551050885908770816" data-original="https://images2.thanhnien.vn/528068263637045248/2023/2/17/15-16766447449441733323133.jpg" type="photo" width="" height=""/></p><figcaption><p data-placeholder="Nhập chú thích ảnh"><a href="https://blogtienao.com/nu-ti-phu-mimi-morris-dien-vay-1-ti-dong-lam-giam-khao-miss-charm-185230217122917733.htm" target="_blank" title="Nữ tỉ phú Mimi Morris diện váy 1 tỉ đồng làm giám khảo Miss Charm">Mimi Morris</a> là một trong nữ đại gia gốc Việt nổi tiếng tại Mỹ và từng gây choáng ngợp khi xuất hiện trong <i>Bling Empire</i> (tựa Việt: <i>Đế chế phô trương)</i> - show thực tế đình đám trên <a href="https://blogtienao.com/netflix-go-phim-pine-gap-co-ban-do-duong-luoi-bo-phi-phap.html" target="_blank" title=" Netflix gỡ phim Pine Gap có bản đồ đường lưỡi bò phi pháp ">Netflix</a> xoay quanh cuộc sống hào nhoáng của giới nhà giàu gốc Á ở xứ cờ hoa. Thời gian qua, cô gây chú ý khi trở lại Việt Nam và liên tục xuất hiện trước truyền thông với vai trò là một trong những giám khảo của cuộc thi <a href="https://blogtienao.com/sac-voc-xinh-dep-nong-bong-cua-nguoi-dep-vua-dang-quang-miss-charm-2023-185230217084518726.htm" target="_blank" title="Sắc vóc xinh đẹp, nóng bỏng của người đẹp vừa đăng quang Miss Charm 2023">Miss Charm 2023</a></p></figcaption><p data-placeholder="Nhập tác giả">NVCC</p></figure><figure data-uid="LjQqhI6wI" type="Photo"><p><img src="https://images2.thanhnien.vn/528068263637045248/2023/2/17/1-16766447432111288832412.jpeg" id="img_551050807879979008" w="1080" h="1350" alt="Choáng ngợp với cuộc sống sang chảnh của nữ đại gia gốc Việt Mimi Morris - Ảnh 2." title="Choáng ngợp với cuộc sống sang chảnh của nữ đại gia gốc Việt Mimi Morris - Ảnh 2." rel="lightbox" photoid="551050807879979008" data-original="https://images2.thanhnien.vn/528068263637045248/2023/2/17/1-16766447432111288832412.jpeg" type="photo" width="" height=""/></p><figcaption><p data-placeholder="Nhập chú thích ảnh">Mimi Morris trở lại Việt Nam đảm nhận vai trò giám khảo Miss Charm 2023 qua lời mời của siêu mẫu <a href="https://blogtienao.com/lan-khue-len-tieng-ve-viec-bgk-miss-charm-bam-dien-thoai-tai-vong-thi-ao-tam-185230211131153739.htm" target="_blank" title="Lan Khuê lên tiếng về việc BGK Miss Charm bấm điện thoại tại vòng thi áo tắm">Lan Khuê</a>. Người đẹp cùng với các giám khảo từ trong nước đến quốc tế tham gia đánh giá các thí sinh trong đêm bán kết và chung kết. Lần này, ông xã và con trai út cũng đồng hành cùng nữ đại gia</p></figcaption><p data-placeholder="Nhập tác giả">Instagram NV</p></figure><figure data-uid="WpPw0URu9" type="Photo"><p><img src="https://images2.thanhnien.vn/528068263637045248/2023/2/17/18-167664474513610434741.jpg" id="img_551050908436135936" w="2000" h="1333" alt="Choáng ngợp với cuộc sống sang chảnh của nữ đại gia gốc Việt Mimi Morris - Ảnh 3." title="Choáng ngợp với cuộc sống sang chảnh của nữ đại gia gốc Việt Mimi Morris - Ảnh 3." rel="lightbox" photoid="551050908436135936" data-original="https://images2.thanhnien.vn/528068263637045248/2023/2/17/18-167664474513610434741.jpg" type="photo" width="" height=""/></p><figcaption><p data-placeholder="Nhập chú thích ảnh">Đây cũng là lần đầu tiên Mimi Morris ra mắt giới truyền thông và người hâm mộ Việt Nam. Ngôi sao chương trình <i>Bling Empire</i> liên tục xuất hiện với hình ảnh sang trọng, quyến rũ. Trong đêm chung kết Miss Charm 2023 diễn ra tối 16.2, nữ doanh nhân đầy quyền lực và thần thái trong chiếc váy dạ hội được đính đá Swarovski, pha lê, kim sa cao cấp từ Joli Poli</p></figcaption><p data-placeholder="Nhập tác giả">NVCC</p></figure><figure data-uid="QuF2o0hqt" type="Photo"><p><img src="https://images2.thanhnien.vn/528068263637045248/2023/2/17/16-16766447449711900707687.jpg" id="img_551050894274097152" w="2000" h="3000" alt="Choáng ngợp với cuộc sống sang chảnh của nữ đại gia gốc Việt Mimi Morris - Ảnh 4." title="Choáng ngợp với cuộc sống sang chảnh của nữ đại gia gốc Việt Mimi Morris - Ảnh 4." rel="lightbox" photoid="551050894274097152" data-original="https://images2.thanhnien.vn/528068263637045248/2023/2/17/16-16766447449711900707687.jpg" type="photo" width="" height=""/></p><figcaption><p data-placeholder="Nhập chú thích ảnh">Cũng tại sự kiện nhan sắc này, Mimi Morris còn diện thêm một chiếc váy đen sang trọng được nhà thiết kế Nguyễn Tiến Truyển may đo riêng. Theo tiết lộ từ ê kíp, hai trang phục mà nữ đại gia diện trong đêm chung kết Miss Charm 2023 có giá trị lên đến gần 1 tỉ đồng</p></figcaption><p data-placeholder="Nhập tác giả">NVCC</p></figure><figure data-uid="lAXS1yBcZ" type="Photo"><p><img src="https://images2.thanhnien.vn/528068263637045248/2023/2/17/17-16766447451101032798383.jpg" id="img_551050912406990848" w="2000" h="1333" alt="Choáng ngợp với cuộc sống sang chảnh của nữ đại gia gốc Việt Mimi Morris - Ảnh 5." title="Choáng ngợp với cuộc sống sang chảnh của nữ đại gia gốc Việt Mimi Morris - Ảnh 5." rel="lightbox" photoid="551050912406990848" data-original="https://images2.thanhnien.vn/528068263637045248/2023/2/17/17-16766447451101032798383.jpg" type="photo" width="" height=""/></p><figcaption><p data-placeholder="Nhập chú thích ảnh">Nữ doanh nhân gốc Việt cùng chồng và con trai tại chung kết Miss Charm tối 16.2</p></figcaption><p data-placeholder="Nhập tác giả">NVCC</p></figure><figure data-uid="kDxQHobxt" type="Photo" data-label="650" data-warning="Ảnh có thể chứa nội dung 16+"><p><img src="https://images2.thanhnien.vn/528068263637045248/2023/2/17/4-16766447438531072966142.jpeg" id="img_551050837761622016" w="1366" h="2048" alt="Choáng ngợp với cuộc sống sang chảnh của nữ đại gia gốc Việt Mimi Morris - Ảnh 6." title="Choáng ngợp với cuộc sống sang chảnh của nữ đại gia gốc Việt Mimi Morris - Ảnh 6." rel="lightbox" photoid="551050837761622016" data-original="https://images2.thanhnien.vn/528068263637045248/2023/2/17/4-16766447438531072966142.jpeg" type="photo" data-label="650" width="" height=""/></p><figcaption><p data-placeholder="Nhập chú thích ảnh">Theo <i>Tatler</i>, Mimi Morris đã ngoài 50 tuổi, hiện là doanh nhân đồng thời là một nhà từ thiện tích cực. Khác với những thành viên ngậm thìa vàng trong <i>Bling Empire</i>, nữ đại gia này có xuất thân khiêm tốn. Người đẹp sinh ra trong một gia đình nghèo và cùng 7 anh chị em khác trải qua thời thơ ấu đầy thiếu thốn trước khi sang Mỹ và từng bước thay đổi cuộc đời</p></figcaption><p data-placeholder="Nhập tác giả">Instagram NV</p></figure><figure data-uid="p9Dxy5QOY" type="Photo"><p><img src="https://images2.thanhnien.vn/528068263637045248/2023/2/17/14-16766447449261058105121.jpg" id="img_551050846431084544" w="1080" h="1257" alt="Choáng ngợp với cuộc sống sang chảnh của nữ đại gia gốc Việt Mimi Morris - Ảnh 7." title="Choáng ngợp với cuộc sống sang chảnh của nữ đại gia gốc Việt Mimi Morris - Ảnh 7." rel="lightbox" photoid="551050846431084544" data-original="https://images2.thanhnien.vn/528068263637045248/2023/2/17/14-16766447449261058105121.jpg" type="photo" width="" height=""/></p><figcaption><p data-placeholder="Nhập chú thích ảnh">Mimi Morris có cuộc sống đáng mơ ước bên chồng - Don Morris, người hơn cô 22 tuổi. Ông Morris được biết đến là một doanh nhân thành đạt, giàu có, vị này là nhà sáng lập kiêm giám đốc điều hành của Morris Group International - một tập đoàn quốc tế chuyên sản xuất các sản phẩm kỹ thuật cho thị trường xây dựng</p></figcaption><p data-placeholder="Nhập tác giả">Instagram NV</p></figure><figure data-uid="UPKGS2fc1" type="Photo" data-label="650" data-warning="Ảnh có thể chứa nội dung 16+"><p><img src="https://images2.thanhnien.vn/528068263637045248/2023/2/17/5-16766447441741516691428.jpeg" id="img_551050878805909504" w="1366" h="2048" alt="Choáng ngợp với cuộc sống sang chảnh của nữ đại gia gốc Việt Mimi Morris - Ảnh 8." title="Choáng ngợp với cuộc sống sang chảnh của nữ đại gia gốc Việt Mimi Morris - Ảnh 8." rel="lightbox" photoid="551050878805909504" data-original="https://images2.thanhnien.vn/528068263637045248/2023/2/17/5-16766447441741516691428.jpeg" type="photo" data-label="650" width="" height=""/></p><figcaption><p data-placeholder="Nhập chú thích ảnh">Hiện giá trị tài sản của Mimi Morris vẫn chưa được thống kê chính xác. Tuy nhiên, theo <i>The</i> <i>Cinemaholic</i>, chồng của cô ước tính sở hữu khối tài sản khoảng 800 triệu USD và với các hợp đồng của Mimi trên sóng truyền hình thực tế cũng như kinh doanh, làm người mẫu quảng cáo, giá trị tài sản chung của họ có thể chạm ngưỡng 1 tỉ USD</p></figcaption><p data-placeholder="Nhập tác giả">Instagram NV</p></figure><figure data-uid="ubBzvWUuk" type="Photo"><p><img src="https://images2.thanhnien.vn/528068263637045248/2023/2/17/22-1676645291195518935395.jpeg" id="img_551053099696160768" w="1440" h="1800" alt="Choáng ngợp với cuộc sống sang chảnh của nữ đại gia gốc Việt Mimi Morris - Ảnh 9." title="Choáng ngợp với cuộc sống sang chảnh của nữ đại gia gốc Việt Mimi Morris - Ảnh 9." rel="lightbox" photoid="551053099696160768" data-original="https://images2.thanhnien.vn/528068263637045248/2023/2/17/22-1676645291195518935395.jpeg" type="photo" width="" height=""/></p><figcaption><p data-placeholder="Nhập chú thích ảnh">Truyền thông quốc tế tiết lộ Mimi Morris và chồng đã kết hôn được hơn chục năm. Nữ đại gia gốc Việt từng tâm sự ban đầu cô do dự việc kết hôn với Don Morris vì bản thân từng trải qua một lần đổ vỡ nhưng đối phương thực sự muốn lấy cô. Người đẹp chia sẻ trong một chương trình: “Tôi nghĩ hầu hết mọi người cho rằng tôi thúc ép Don lấy mình nhưng không, tôi từng không muốn kết hôn với anh ấy. Thế rồi, anh ấy hỏi ‘Em sẽ lấy anh chứ?’ mỗi ngày và rồi cuối cùng anh ấy đã thuyết phục tôi nói đồng ý”<br/></p></figcaption><p data-placeholder="Nhập tác giả">Instagram NV</p></figure><figure data-uid="aCMNltyGm" type="Photo"><p><img src="https://images2.thanhnien.vn/528068263637045248/2023/2/17/23-1676645355461405651708.jpeg" id="img_551053355443068928" w="819" h="1024" alt="Choáng ngợp với cuộc sống sang chảnh của nữ đại gia gốc Việt Mimi Morris - Ảnh 10." title="Choáng ngợp với cuộc sống sang chảnh của nữ đại gia gốc Việt Mimi Morris - Ảnh 10." rel="lightbox" photoid="551053355443068928" data-original="https://images2.thanhnien.vn/528068263637045248/2023/2/17/23-1676645355461405651708.jpeg" type="photo" width="" height=""/></p><figcaption><p data-placeholder="Nhập chú thích ảnh">Mimi Morris có hai người con từ cuộc hôn nhân trước và một con trai tên Skyler (9 tuổi) với người chồng hiện tại. Trên trang cá nhân, nữ đại gia này thường xuyên chia sẻ hình ảnh vui vẻ, hạnh phúc bên ông xã và các con</p></figcaption><p data-placeholder="Nhập tác giả">Instagram NV</p></figure><figure data-uid="Nzfp6YN5Y" type="Photo"><p><img src="https://images2.thanhnien.vn/528068263637045248/2023/2/17/9-1676644744518880912307.jpg" id="img_551050863959080960" w="2000" h="2000" alt="Choáng ngợp với cuộc sống sang chảnh của nữ đại gia gốc Việt Mimi Morris - Ảnh 11." title="Choáng ngợp với cuộc sống sang chảnh của nữ đại gia gốc Việt Mimi Morris - Ảnh 11." rel="lightbox" photoid="551050863959080960" data-original="https://images2.thanhnien.vn/528068263637045248/2023/2/17/9-1676644744518880912307.jpg" type="photo" width="" height=""/></p><figcaption><p data-placeholder="Nhập chú thích ảnh">Người đẹp hiện sống cùng chồng con trong một biệt thự xa hoa như tòa lâu đài ở California (Mỹ). Theo <i>Screen Rant</i>, đôi vợ chồng nổi tiếng đã mua căn nhà hoành tráng này với giá 8,8 triệu USD vào năm 2018. Biệt thự rộng khoảng 650 mét vuông với sân vườn cực lớn và khu nhà sang trọng được trang bị nhiều tiện nghi</p></figcaption><p data-placeholder="Nhập tác giả">Instagram NV</p></figure><figure data-uid="Ia2q3W3AR" type="Photo"><p><img src="https://images2.thanhnien.vn/528068263637045248/2023/2/17/12-167664474472861834577.jpg" id="img_551050875066253312" w="1080" h="736" alt="Choáng ngợp với cuộc sống sang chảnh của nữ đại gia gốc Việt Mimi Morris - Ảnh 12." title="Choáng ngợp với cuộc sống sang chảnh của nữ đại gia gốc Việt Mimi Morris - Ảnh 12." rel="lightbox" photoid="551050875066253312" data-original="https://images2.thanhnien.vn/528068263637045248/2023/2/17/12-167664474472861834577.jpg" type="photo" width="" height=""/></p><figcaption><p data-placeholder="Nhập chú thích ảnh">Vốn là người yêu cái đẹp và thích sự cầu kỳ, lộng lẫy, bà mẹ ba con thường trang trí biệt thự bằng hoa tươi rực rỡ, biến nơi này như một cung điện. Đây là nơi diễn ra những bữa tiệc xa hoa của Mimi với gia đình và hội bạn giàu có, cũng là địa điểm quen thuộc mà người đẹp này chụp hình mỗi dịp đặc biệt</p></figcaption><p data-placeholder="Nhập tác giả">Instagram NV</p></figure><figure data-uid="IUvt5tiEy" type="Photo" data-label="650" data-warning="Ảnh có thể chứa nội dung 16+"><p><img src="https://images2.thanhnien.vn/528068263637045248/2023/2/17/20-1676644757960431915172.jpg" id="img_551050898692415488" w="1273" h="796" alt="Choáng ngợp với cuộc sống sang chảnh của nữ đại gia gốc Việt Mimi Morris - Ảnh 13." title="Choáng ngợp với cuộc sống sang chảnh của nữ đại gia gốc Việt Mimi Morris - Ảnh 13." rel="lightbox" photoid="551050898692415488" data-original="https://images2.thanhnien.vn/528068263637045248/2023/2/17/20-1676644757960431915172.jpg" type="photo" data-label="650" width="" height=""/></p><figcaption><p data-placeholder="Nhập chú thích ảnh">Từ năm 2022, Mimi Morris được nhiều khán giả quốc tế biết đến khi xuất hiện trong <i>Bling Empire</i>. Tham gia show thực tế về giới nhà giàu gốc Á ở Mỹ, nữ đại gia này khiến những người bạn của mình cũng như đông đảo khán giả choáng ngợp với cuộc sống hào nhoáng. Nữ doanh nhân gây sửng sốt khi sở hữu phòng chứa đồ “khủng” với hàng loạt quần áo hiệu, trang sức, phụ kiện đắt tiền và bộ sưu tập túi Hermès triệu USD</p></figcaption><p data-placeholder="Nhập tác giả">Instagram NV</p></figure><figure data-uid="dBOwjH3DK" type="Photo"><p><img src="https://images2.thanhnien.vn/528068263637045248/2023/2/17/21-16766447586411431028246.jpg" id="img_551050890567823360" w="2000" h="1250" alt="Choáng ngợp với cuộc sống sang chảnh của nữ đại gia gốc Việt Mimi Morris - Ảnh 14." title="Choáng ngợp với cuộc sống sang chảnh của nữ đại gia gốc Việt Mimi Morris - Ảnh 14." rel="lightbox" photoid="551050890567823360" data-original="https://images2.thanhnien.vn/528068263637045248/2023/2/17/21-16766447586411431028246.jpg" type="photo" width="" height=""/></p><figcaption><p data-placeholder="Nhập chú thích ảnh">Đại gia này cũng gây ấn tượng với tính cách nhẹ nhàng, phóng khoáng và vui vẻ cùng phong cách thời trang sang chảnh, thời thượng. Cô còn được đánh giá là thành viên giàu có nhất trong <i>Bling Empire</i></p></figcaption><p data-placeholder="Nhập tác giả">Instagram NV</p></figure><figure data-uid="likoRyasn" type="Photo"><p><img src="https://images2.thanhnien.vn/528068263637045248/2023/2/17/11-16766447445652068590398.jpg" id="img_551050836217712640" w="1080" h="1349" alt="Choáng ngợp với cuộc sống sang chảnh của nữ đại gia gốc Việt Mimi Morris - Ảnh 15." title="Choáng ngợp với cuộc sống sang chảnh của nữ đại gia gốc Việt Mimi Morris - Ảnh 15." rel="lightbox" photoid="551050836217712640" data-original="https://images2.thanhnien.vn/528068263637045248/2023/2/17/11-16766447445652068590398.jpg" type="photo" width="" height=""/></p><figcaption><p data-placeholder="Nhập chú thích ảnh">Dù đã ngoài 50, Mimi Morris vẫn sở hữu nhan sắc xinh đẹp, cuốn hút cùng thân hình quyến rũ. Nữ triệu phú liên tục xuất hiện với những cây đồ hiệu xa xỉ, hàng loạt món trang sức, phụ kiện tiền tỉ và thường xuyên khoe cuộc sống xa hoa của mình trên mạng xã hội</p></figcaption><p data-placeholder="Nhập tác giả">Instagram NV</p></figure><figure data-uid="f5a4ZBiIb" type="Photo"><p><img src="https://images2.thanhnien.vn/528068263637045248/2023/2/17/6-16766447442191389847445.jpeg" id="img_551050846137647104" w="1366" h="2048" alt="Choáng ngợp với cuộc sống sang chảnh của nữ đại gia gốc Việt Mimi Morris - Ảnh 16." title="Choáng ngợp với cuộc sống sang chảnh của nữ đại gia gốc Việt Mimi Morris - Ảnh 16." rel="lightbox" photoid="551050846137647104" data-original="https://images2.thanhnien.vn/528068263637045248/2023/2/17/6-16766447442191389847445.jpeg" type="photo" width="" height=""/></p><figcaption><p data-placeholder="Nhập chú thích ảnh">Theo <i>SCMP</i>, Mimi Morris sở hữu nhiều dòng xe sang của Rolls-Royces, Ferrari đồng thời có máy bay riêng. Người đẹp thường sử dụng chuyên cơ để cùng gia đình du lịch nhiều nơi trên thế giới</p></figcaption><p data-placeholder="Nhập tác giả">Instagram NV</p></figure><figure data-uid="X52gcwHMt" type="Photo"><p><img src="https://images2.thanhnien.vn/528068263637045248/2023/2/17/10-1676644744539499556004.jpg" id="img_551050834010492928" w="2000" h="2000" alt="Choáng ngợp với cuộc sống sang chảnh của nữ đại gia gốc Việt Mimi Morris - Ảnh 17." title="Choáng ngợp với cuộc sống sang chảnh của nữ đại gia gốc Việt Mimi Morris - Ảnh 17." rel="lightbox" photoid="551050834010492928" data-original="https://images2.thanhnien.vn/528068263637045248/2023/2/17/10-1676644744539499556004.jpg" type="photo" width="" height=""/></p><figcaption><p data-placeholder="Nhập chú thích ảnh">Trang tin kể trên cũng tiết lộ thu nhập chính của Mimi Morris đến từ việc cô là một người có ảnh hưởng trên mạng xã hội. Nữ đại gia này làm người mẫu, quảng cáo cho các thương hiệu cao cấp như Dior, Louis Vuitton, Chanel, Mae Paris, Versace, Fendi… Cùng với đó, việc xuất hiện trong show thực tế ăn khách <i>Bling Empire</i> của Netflix cũng giúp bà mẹ 3 con kiếm được một khoản tiền béo bở. Ngoài ra, cô có công việc kinh doanh riêng và dành phần lớn thời gian chăm sóc gia đình</p></figcaption><p data-placeholder="Nhập tác giả">Instagram NV</p></figure><figure data-uid="FUdRwRK7M" type="Photo"><p><img src="https://images2.thanhnien.vn/528068263637045248/2023/2/17/13-16766447449082092066406.jpeg" id="img_551050869964738560" w="1536" h="1920" alt="Choáng ngợp với cuộc sống sang chảnh của nữ đại gia gốc Việt Mimi Morris - Ảnh 18." title="Choáng ngợp với cuộc sống sang chảnh của nữ đại gia gốc Việt Mimi Morris - Ảnh 18." rel="lightbox" photoid="551050869964738560" data-original="https://images2.thanhnien.vn/528068263637045248/2023/2/17/13-16766447449082092066406.jpeg" type="photo" width="" height=""/></p><figcaption><p data-placeholder="Nhập chú thích ảnh">Mimi Morris có mối quan hệ thân thiết với nhiều sao Việt: ca sĩ Hồ Ngọc Hà, nhà thiết kế Đỗ Mạnh Cường, nhà thiết kế Đỗ Long, diễn viên Diễm My… Cô cũng thường xuyên cùng gia đình về quê nhà nghỉ dưỡng, du lịch</p></figcaption><p data-placeholder="Nhập tác giả">Instagram NV</p></figure><!--Sat Feb 18 2023 06:00:00 GMT+0700 (Giờ Đông Dương) -- Sat Feb 18 2023 06:00:00 GMT+0700 (Giờ Đông Dương) -- Fri Feb 17 2023 23:01:48 GMT+0700 (Giờ Đông Dương)-->
