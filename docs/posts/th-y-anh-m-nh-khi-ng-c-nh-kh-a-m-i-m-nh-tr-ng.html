    <h1>Thùy Anh ám ảnh khi đóng cảnh &#39;khóa môi&#39; Mạnh Trường</h1>

                            <h2 data-role="sapo">
                                Thùy Anh thừa nhận khi đóng cảnh tình tứ cùng Mạnh Trường trong <i>Đừng nói khi yêu </i>đã gặp không ít trở ngại tâm lý.
                            </h2>
                            <div>
                                <div data-role="content" itemprop="articleBody">
                                                                                                                
                                    <figure type="Photo"><p><img src="https://images2.thanhnien.vn/thumb_w/640/528068263637045248/2023/1/31/thuy-anh-dung-noi-khi-yeu-4-16751401170541859874558.jpeg" id="img_544739973652971520" w="2000" h="3000" alt=" - Ảnh 1." title=" - Ảnh 1." rel="lightbox" photoid="544739973652971520" data-original="https://images2.thanhnien.vn/528068263637045248/2023/1/31/thuy-anh-dung-noi-khi-yeu-4-16751401170541859874558.jpeg" type="photo" width="" height=""/></p><figcaption><p data-placeholder="Nhập chú thích ảnh">Trong <i>Đừng nói khi yêu</i>, Thùy Anh thủ vai cô thợ làm bánh Phương Ly, có mối tình lãng mạng với Quy (<a href="https://thanhnien.vn/thuy-anh-tai-ngo-manh-truong-dinh-tu-trong-phim-moi-1851541418.htm" title="Mạnh Trường" data-rel="follow">Mạnh Trường</a>), một doanh nhân thành đạt. Chuyện tình của họ nhuốm màu lãng mạn cùng nhiều tình tiết bi hài khó đoán. Tập 1 của phim chính thức lên sóng vào lúc 20 giờ, từ ngày 30.1 trên VTV1</p></figcaption></figure><figure type="Photo"><p><img src="https://images2.thanhnien.vn/thumb_w/640/528068263637045248/2023/1/31/thuy-anh-manh-truong-1-167514011684032231349.jpg" id="img_544739944554803200" w="1180" h="1691" alt=" - Ảnh 2." title=" - Ảnh 2." rel="lightbox" photoid="544739944554803200" data-original="https://images2.thanhnien.vn/528068263637045248/2023/1/31/thuy-anh-manh-truong-1-167514011684032231349.jpg" type="photo" width="" height=""/></p><figcaption><p data-placeholder="Nhập chú thích ảnh">Lần đầu đóng cặp với “ông bố ba con”, <a href="https://thanhnien.vn/dinh-tu-va-thuy-anh-vao-vai-cap-doi-tren-tinh-ban-duoi-tinh-yeu-1851545294.htm" title="Thùy Anh" data-rel="follow">Thùy Anh</a> thú nhận: “Tôi ngại, ngại khủng khiếp. Nhưng nếu cứ ngại như vậy rồi đóng không tốt thì thiệt mình thôi. Nghĩ lại, tôi cũng thấy mình hơi làm quá. Trước đó, anh Trường cũng chỉ đóng “bố hờ” của tôi thôi, hai anh em cũng ít cảnh diễn chung. Để làm tốt vai diễn, tôi  phải sống với cảm xúc của Phương Ly, bỏ ngại ngùng sang một bên”</p></figcaption><p data-placeholder="Nhập tác giả">NVCC</p></figure><figure type="Photo"><p><img src="https://images2.thanhnien.vn/thumb_w/640/528068263637045248/2023/1/31/thuy-anh-dung-noi-khi-yeu-6-1675140115942188706479.jpg" id="img_544739963976126464" w="2000" h="2667" alt=" - Ảnh 3." title=" - Ảnh 3." rel="lightbox" photoid="544739963976126464" data-original="https://images2.thanhnien.vn/528068263637045248/2023/1/31/thuy-anh-dung-noi-khi-yeu-6-1675140115942188706479.jpg" type="photo" width="" height=""/></p><figcaption><p data-placeholder="Nhập chú thích ảnh">Đặc biệt, Thùy Anh trong lần hiếm hoi tiết lộ về phân cảnh “khóa môi” Mạnh Trường. Nữ diễn viên nói đây là cảnh khiến cô ám ảnh bởi phải quay đi quay lại nhiều lần. Cô cho biết cả hai phải hôn đi hôn lại trong 2-3 tiếng giữa trời rét vì bối cảnh quay phim nằm ở bờ sông Hồng lộng gió</p></figcaption><p data-placeholder="Nhập tác giả">NVCC</p></figure><figure type="Photo"><p><img src="https://images2.thanhnien.vn/thumb_w/640/528068263637045248/2023/1/31/thuy-anh-manh-truong-2-16751401166061585173127.jpg" id="img_544739978415419392" w="2000" h="3000" alt=" - Ảnh 4." title=" - Ảnh 4." rel="lightbox" photoid="544739978415419392" data-original="https://images2.thanhnien.vn/528068263637045248/2023/1/31/thuy-anh-manh-truong-2-16751401166061585173127.jpg" type="photo" width="" height=""/></p><figcaption><p data-placeholder="Nhập chú thích ảnh">Khi được hỏi có sợ bà xã Mạnh Trường ghen khi xem <i>Đừng nói khi yêu </i>không, Thùy Anh thẳng thắn: “Tôi nghĩ chắc chị ấy không ghen đâu vì anh Trường là một trong những diễn viên nghiêm túc nhất trong dàn nam VFC rồi. Đến trường quay, anh Trường rất tập trung vào công việc, xong việc là về. Chắc chị nhà yên tâm về anh ấy lắm”</p></figcaption><p data-placeholder="Nhập tác giả">NVCC</p></figure><figure type="Photo"><p><img src="https://images2.thanhnien.vn/thumb_w/640/528068263637045248/2023/1/31/thuy-anh-dung-noi-khi-yeu-1-1675140116197455147531.jpg" id="img_544739959374163968" w="2000" h="2667" alt=" - Ảnh 5." title=" - Ảnh 5." rel="lightbox" photoid="544739959374163968" data-original="https://images2.thanhnien.vn/528068263637045248/2023/1/31/thuy-anh-dung-noi-khi-yeu-1-1675140116197455147531.jpg" type="photo" width="" height=""/></p><figcaption><p data-placeholder="Nhập chú thích ảnh">Chia sẻ về mẫu bạn trai lý tưởng, Thùy Anh nói cô thích một mối quan hệ kiểu “mưa dầm thấm lâu”, mọi thứ diễn biến từ từ. Người đẹp bộc bạch về lý do vẫn chọn cuộc sống độc thân: “Tôi khó tính quá nên đến giờ vẫn ế”</p></figcaption><p data-placeholder="Nhập tác giả">NVCC</p></figure><figure type="Photo"><p><img src="https://images2.thanhnien.vn/thumb_w/640/528068263637045248/2023/1/31/thuy-anh-dung-noi-khi-yeu-2-1675140116402247135022.jpg" id="img_544739968777822208" w="2000" h="2667" alt=" - Ảnh 6." title=" - Ảnh 6." rel="lightbox" photoid="544739968777822208" data-original="https://images2.thanhnien.vn/528068263637045248/2023/1/31/thuy-anh-dung-noi-khi-yeu-2-1675140116402247135022.jpg" type="photo" width="" height=""/></p><figcaption><p data-placeholder="Nhập chú thích ảnh">Vốn quen mặt với các vai phản diện, Thùy Anh cho biết vai Phương Ly là trải nghiệm mới mẻ với cô. Bởi lẽ <a href="https://thanhnien.vn/hanh-trinh-cong-ly-tap-9-phuong-ly-hon-va-tro-lai-lam-luat-su-1851514536.htm" title="Phương Ly" data-rel="follow">Phương Ly</a> dù là một cô gái nhẹ nhàng nhưng có ý chí mạnh mẽ. Dù được thừa kế tiệm bánh nhưng cô không chấp nhận cuộc sống chật hẹp và quyết định bôn ba trải nghiệm. Gặp nhiều sóng gió nơi công sở nhưng cô vẫn mạnh dạn theo đuổi đến cùng</p></figcaption><p data-placeholder="Nhập tác giả">NVCC</p></figure><figure type="Photo"><p><img src="https://images2.thanhnien.vn/thumb_w/640/528068263637045248/2023/1/31/thuy-anh-manh-truong-4-1675140114503275064417.jpeg" id="img_544739939250364416" w="2000" h="3000" alt=" - Ảnh 7." title=" - Ảnh 7." rel="lightbox" photoid="544739939250364416" data-original="https://images2.thanhnien.vn/528068263637045248/2023/1/31/thuy-anh-manh-truong-4-1675140114503275064417.jpeg" type="photo" width="" height=""/></p><figcaption><p data-placeholder="Nhập chú thích ảnh">Thùy Anh tâm sự: “Tôi của hiện tại có thể đâu đó vẫn còn sự non nớt nhưng mình tự thấy bản thân đằm thắm hơn, có tính phụ nữ hơn. Có thể mọi người không nhìn thấy tôi đã trưởng thành hơn, nhưng người tin tưởng chọn tôi cho vai diễn này chắc chắn đã nhìn thấy sự thay đổi, sự phát triển trong diễn xuất và con người của tôi. Tôi rất mong mọi thứ mình cố gắng và tâm huyết có thể truyền tải được đến khán giả khi mọi người xem bộ phim này”</p></figcaption><p data-placeholder="Nhập tác giả">NVCC</p></figure><!--Tue Jan 31 2023 12:54:00 GMT+0700 (Giờ Đông Dương) -- Tue Jan 31 2023 12:54:00 GMT+0700 (Giờ Đông Dương) -- Tue Jan 31 2023 13:28:24 GMT+0700 (Giờ Đông Dương)-->
