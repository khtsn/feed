    <h1>Mỹ nhân 9X đóng con gái Ant-Man là ai?</h1>
    
    <div id="readability-page-1" class="page"><div>
                                <div data-role="content" itemprop="articleBody" data-io-article-url="https://thanhnien.vn/my-nhan-9x-dong-con-gai-ant-man-la-ai-185230214135737624.htm">
                                                                                                                
                                    <figure type="Photo"><img src="https://images2.thanhnien.vn/528068263637045248/2023/2/14/dby-08940r-1676356619834301098917.jpg" id="img_549842367538188288" w="2000" h="1333" alt="Mỹ nhân 9X đóng con gái Ant-Man là ai?  - Ảnh 1." title="Mỹ nhân 9X đóng con gái Ant-Man là ai?  - Ảnh 1." rel="lightbox" photoid="549842367538188288" data-original="https://images2.thanhnien.vn/528068263637045248/2023/2/14/dby-08940r-1676356619834301098917.jpg" type="photo" width="" height=""/><figcaption><p data-placeholder="Nhập chú thích ảnh">17.2 tới đây, bom tấn <i>Ant-Man and the Wasp: Quantumania </i>sẽ là &#34;phát pháo khai màn&#34; cho loạt phim điện ảnh được Marvel ra mắt trong năm 2023. Bước sang giai đoạn 5 (phase 5), vũ trụ điện ảnh này tiếp tục giới thiệu đến người hâm mộ hàng loạt các nhân vật mới, đi kèm với những diễn viên mới sẽ còn gắn bó lâu dài với thương hiệu. Trong số đó, cái tên Kathryn Newton đang được rất nhiều người quan tâm khi cô sẽ đảm nhận vai diễn Cassia Lang - con gái người kiến Scott Lang (Paul Rudd) trong phần phim <i>Ant-Man</i> mới.</p></figcaption>MARVEL </figure><figure type="Photo"><img src="https://images2.thanhnien.vn/528068263637045248/2023/2/14/kat-cosmo-2-167635667748035768592.jpg" id="img_549842573914722304" w="1360" h="2040" alt="Mỹ nhân 9X đóng con gái Ant-Man là ai?  - Ảnh 2." title="Mỹ nhân 9X đóng con gái Ant-Man là ai?  - Ảnh 2." rel="lightbox" photoid="549842573914722304" data-original="https://images2.thanhnien.vn/528068263637045248/2023/2/14/kat-cosmo-2-167635667748035768592.jpg" type="photo" width="" height=""/><figcaption><p data-placeholder="Nhập chú thích ảnh">Kathryn Newton sinh năm 1997 và không phải là “lính mới” của Hollywood. Trước khi được biết đến với các vai diễn lớn, Kathryn Newton đã có tới gần 20 năm kinh nghiệm diễn xuất với lần đầu lên sóng truyền hình khi mới chỉ 4 tuổi. Tài năng của Kathryn sớm được công nhận khi năm 13 tuổi, nữ diễn viên nhí đã được nhận 2 giải thưởng Young Artsit nhờ vai diễn của mình trong loạt phim <i>Gary unmarried</i></p></figcaption>COSMOPOLITANT </figure><figure type="Photo"><img src="https://images2.thanhnien.vn/528068263637045248/2023/2/14/kat-cosmo-1676356677490657099318.jpg" id="img_549842606243483648" w="2000" h="3000" alt="Mỹ nhân 9X đóng con gái Ant-Man là ai?  - Ảnh 3." title="Mỹ nhân 9X đóng con gái Ant-Man là ai?  - Ảnh 3." rel="lightbox" photoid="549842606243483648" data-original="https://images2.thanhnien.vn/528068263637045248/2023/2/14/kat-cosmo-1676356677490657099318.jpg" type="photo" width="" height=""/><figcaption><p data-placeholder="Nhập chú thích ảnh">Ít ai nhớ rằng Kathryn Newton đã từng đóng cùng Cameron Diaz và Justin Timberlake trong phim hài ăn khách <i>Bad teacher.</i> Cô cũng từng có vai chính trong phim <i>Paranormal activity 4.</i> Khởi đầu suôn sẻ là vậy nhưng cũng như bao nghệ sĩ nổi tiếng từ khi còn quá nhỏ, Kathryn Newton cũng phải tốn nhiều năm để thoát mác “sao nhí”</p></figcaption>COSMOPOLILANT </figure><figure type="Photo"><img src="https://images2.thanhnien.vn/528068263637045248/2023/2/14/kat-2-1676356677369917680115.jpg" id="img_549842594377179136" w="1200" h="800" alt="Mỹ nhân 9X đóng con gái Ant-Man là ai?  - Ảnh 4." title="Mỹ nhân 9X đóng con gái Ant-Man là ai?  - Ảnh 4." rel="lightbox" photoid="549842594377179136" data-original="https://images2.thanhnien.vn/528068263637045248/2023/2/14/kat-2-1676356677369917680115.jpg" type="photo" width="" height=""/><figcaption><p data-placeholder="Nhập chú thích ảnh">Thay vì lựa chọn an toàn là tham gia các phim truyền hình gia đình ăn khách, khi bước sang độ tuổi đôi mươi, Kathryn Newton mong muốn thử sức ở đa dạng các thể loại phim, đi tìm cho mình những vai diễn phức tạp hơn. Năm 2017 có thể nói là cột mốc đáng nhớ trong sự nghiệp của Kathryn Newton khi cô xuất hiện trong hàng loạt dự án khủng</p></figcaption>GETTY </figure><figure type="Photo"><img src="https://images2.thanhnien.vn/528068263637045248/2023/2/14/kathryn-newton-scroller-16763566775131123027317.jpg" id="img_549842599574351872" w="1200" h="1499" alt="Mỹ nhân 9X đóng con gái Ant-Man là ai?  - Ảnh 5." title="Mỹ nhân 9X đóng con gái Ant-Man là ai?  - Ảnh 5." rel="lightbox" photoid="549842599574351872" data-original="https://images2.thanhnien.vn/528068263637045248/2023/2/14/kathryn-newton-scroller-16763566775131123027317.jpg" type="photo" width="" height=""/><figcaption><p data-placeholder="Nhập chú thích ảnh">Trong năm 2017, “con gái Ant-Man” góp mặt trong hai tác phẩm được đề cử giải Phim hay nhất tại <a href="https://thanhnien.vn/nu-dien-vien-bi-phan-doi-kich-liet-khi-nhan-de-cu-oscar-2023-la-ai-185230202144718501.htm" title="Oscar" data-rel="follow">Oscar</a> là <i>Lady bird </i>và <i>Three billboards outside Ebbing, Missouri.</i> Ngoài ra, cô còn có dịp đồng hành cùng các đàn chị tên tuổi như Nicole Kidman, Reese Witherspoon trong loạt phim truyền hình đình đám <i>Big little lies.</i> Tại đó, Kathryn chứng tỏ khả năng diễn xuất thực lực và bác bỏ định kiến về việc cô chẳng có gì ngoài ngoại hình xinh xắn</p></figcaption>SCROLLER </figure><figure type="Photo" data-label="650" data-warning="Ảnh có thể chứa nội dung 16+"><img src="https://images2.thanhnien.vn/528068263637045248/2023/2/14/173flauntkathrynnewton-5-16763566771021476576686.jpg" id="img_549842556822765568" w="1000" h="1500" alt="Mỹ nhân 9X đóng con gái Ant-Man là ai?  - Ảnh 6." title="Mỹ nhân 9X đóng con gái Ant-Man là ai?  - Ảnh 6." rel="lightbox" photoid="549842556822765568" data-original="https://images2.thanhnien.vn/528068263637045248/2023/2/14/173flauntkathrynnewton-5-16763566771021476576686.jpg" type="photo" data-label="650" width="" height=""/><figcaption><p data-placeholder="Nhập chú thích ảnh">Những năm gần đây, Kathryn Newton cũng hoạt động rất năng nổ, cô liên tục cho thấy sự “lột xác” vì vai diễn. Khi thì hóa thân nhí nhảnh, trẻ trung trong phim live-action <i>Detective Pikachu </i>(đóng cùng Ryan Reynolds), khi lại khiến người xem nổi da gà khi hóa thân thành sát nhân hàng loạt trong<i> Freak</i>. Tuy nhiên, nữ diễn viên sinh năm 1997 vẫn luôn khao khát một vai diễn có thể đưa tên tuổi của cô đi xa hơn ngoài phạm vi nước Mỹ, được khán giả trên khắp thế giới biết đến</p></figcaption>FLAUNT MAGAZINE </figure><figure type="Photo"><img src="https://images2.thanhnien.vn/528068263637045248/2023/2/14/kkat-empire-16763566774961269145711.jpg" id="img_549842564779778048" w="778" h="540" alt="Mỹ nhân 9X đóng con gái Ant-Man là ai?  - Ảnh 7." title="Mỹ nhân 9X đóng con gái Ant-Man là ai?  - Ảnh 7." rel="lightbox" photoid="549842564779778048" data-original="https://images2.thanhnien.vn/528068263637045248/2023/2/14/kkat-empire-16763566774961269145711.jpg" type="photo" width="" height=""/><figcaption><p data-placeholder="Nhập chú thích ảnh">Vì vậy, vai diễn Cassie Lang trong <i>Ant-Man and the Wasp: Quantumania</i> là một cơ hội hết sức quý giá đối với Kathryn Newton. Theo những gì được “nhá hàng” qua trailer <i>Ant-Man 3</i>, có thể thấy Cassie Lang ở độ tuổi 19 là một cô gái vô cùng xinh đẹp, thông minh và cá tính. Đây cũng được xem là nhân vật quan trọng trong giai đoạn tiếp theo của MCU. Bởi rất có thể Cassie Lang sẽ tiếp bước cha mình trở thành Stature, thành lập nên nhóm Young Avengers và hứa hẹn có màn báo thù hấp dẫn trong <i>Avengers: The Kang Dynasty </i>(2025).</p></figcaption>EMPIRE </figure><figure type="Photo"><img src="https://images2.thanhnien.vn/528068263637045248/2023/2/14/kat-golf-digest-1676356677500782108459.jpeg" id="img_549842587556880384" w="1280" h="853" alt="Mỹ nhân 9X đóng con gái Ant-Man là ai?  - Ảnh 8." title="Mỹ nhân 9X đóng con gái Ant-Man là ai?  - Ảnh 8." rel="lightbox" photoid="549842587556880384" data-original="https://images2.thanhnien.vn/528068263637045248/2023/2/14/kat-golf-digest-1676356677500782108459.jpeg" type="photo" width="" height=""/><figcaption><p data-placeholder="Nhập chú thích ảnh">Kathryn Newton sở hữu vẻ đẹp hài hòa giữa ngọt ngào và quyến rũ. Với tài năng được rèn luyện theo thời gian, kết hợp với nhan sắc đầy cuốn hút, “con gái Ant-Man” được kỳ vọng sẽ còn tiến xa trong tương lai. Bên cạnh niềm đam mê dành cho việc diễn xuất, Kathryn Newton còn là một tay golf chuyên nghiệp</p></figcaption>GOLF DIGEST </figure><!--Tue Feb 14 2023 14:34:49 GMT+0700 (Giờ Đông Dương) -- Tue Feb 14 2023 14:34:49 GMT+0700 (Giờ Đông Dương) -- Tue Feb 14 2023 14:34:54 GMT+0700 (Giờ Đông Dương)-->
