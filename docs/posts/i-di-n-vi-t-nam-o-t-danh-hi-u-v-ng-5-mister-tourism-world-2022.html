    <h1>Đại diện Việt Nam đoạt danh hiệu Á vương 5 Mister Tourism World 2022</h1>

                            <h2 data-role="sapo">
                                Tối 4.2, người mẫu Phùng Phước Thịnh đoạt danh hiệu Á vương 5 cuộc thi <i>Mister Tourism World 2022</i> (<i>Nam vương Du lịch Thế giới 2022</i>) cùng hai giải thưởng phụ. Ngôi Nam vương thuộc về đại diện đến từ Uruguay.
                            </h2>
                            <div>
                                <div data-role="content" itemprop="articleBody">
                                                                                                                
                                    <figure type="Photo"><p><img src="https://images2.thanhnien.vn/528068263637045248/2023/2/5/th11-1675558938502187364898.jpg" id="img_546496606915305472" w="1706" h="2560" alt="Đại diện Việt Nam đoạt danh hiệu Á vương 5 Mister Tourism World 2022 - Ảnh 1." title="Đại diện Việt Nam đoạt danh hiệu Á vương 5 Mister Tourism World 2022 - Ảnh 1." rel="lightbox" photoid="546496606915305472" data-original="https://images2.thanhnien.vn/528068263637045248/2023/2/5/th11-1675558938502187364898.jpg" type="photo" width="" height=""/></p><figcaption><p data-placeholder="Nhập chú thích ảnh">Tối 4.2 (giờ địa phương), chung kết cuộc thi <a href="https://thanhnien.vn/phung-phuoc-thinh-mang-gan-90kg-hanh-ly-thi-mister-tourism-world-1851544943.htm" title="Mister Tourism World 2022" data-rel="follow"><i>Mister Tourism World 2022</i></a> diễn ra tại thành phố Cabanatuan, Philippines. Gần 30 thí sinh từ khắp thế giới cùng góp mặt tranh tài tại đêm thi với nhiều phần thi như: trang phục dạ hội, trang phục đi biển…</p></figcaption><p data-placeholder="Nhập tác giả">NVCC</p></figure><figure type="Photo"><p><img src="https://images2.thanhnien.vn/528068263637045248/2023/2/5/th9-top-6-1675559031774178708493.jpg" id="img_546496990209056768" w="1280" h="960" alt="Đại diện Việt Nam đoạt danh hiệu Á vương 5 Mister Tourism World 2022 - Ảnh 2." title="Đại diện Việt Nam đoạt danh hiệu Á vương 5 Mister Tourism World 2022 - Ảnh 2." rel="lightbox" photoid="546496990209056768" data-original="https://images2.thanhnien.vn/528068263637045248/2023/2/5/th9-top-6-1675559031774178708493.jpg" type="photo" width="" height=""/></p><figcaption><p data-placeholder="Nhập chú thích ảnh">Đại diện Việt Nam <a href="https://thanhnien.vn/phung-phuoc-thinh-mang-gan-90kg-hanh-ly-thi-mister-tourism-world-1851544943.htm" title="Phùng Phước Thịnh" data-rel="follow">Phùng Phước Thịnh</a> liên tiếp được xướng tên trong các phần thi, từ top 17 đến top 6 chung cuộc. Tuy nhiên, nam người mẫu gây tiếc nuối khi chỉ dừng chân ở vị trí Á vương 5 Mister Tourism World 2022. Ngoài Việt Nam, top 6 còn có các đại diện đến từ Brazil, Uruguay, Thái Lan, Cộng hòa Dominica và Hy Lạp</p></figcaption><p data-placeholder="Nhập tác giả">NVCC</p></figure><figure type="Photo"><p><img src="https://images2.thanhnien.vn/528068263637045248/2023/2/5/th1-16755589394161004193708.jpg" id="img_546496643342999552" w="1054" h="1280" alt="Đại diện Việt Nam đoạt danh hiệu Á vương 5 Mister Tourism World 2022 - Ảnh 3." title="Đại diện Việt Nam đoạt danh hiệu Á vương 5 Mister Tourism World 2022 - Ảnh 3." rel="lightbox" photoid="546496643342999552" data-original="https://images2.thanhnien.vn/528068263637045248/2023/2/5/th1-16755589394161004193708.jpg" type="photo" width="" height=""/></p><figcaption><p data-placeholder="Nhập chú thích ảnh">Phùng Phước Thịnh bày tỏ xúc động: “Việc tham gia cuộc thi không chỉ để tôi quảng bá văn hóa du lịch Việt Nam mà còn góp phần vào sự phát triển chung của du lịch thế giới. Dịch Covid-19 đã khiến ngành chững lại và đây là thời điểm để chúng ta vực dậy, phát triển với nhiều tiềm năng”</p></figcaption><p data-placeholder="Nhập tác giả">NVCC</p></figure><figure type="Photo"><p><img src="https://images2.thanhnien.vn/528068263637045248/2023/2/5/th4-16755595214792002223358.jpg" id="img_546499055931019264" w="1280" h="960" alt="Đại diện Việt Nam đoạt danh hiệu Á vương 5 Mister Tourism World 2022 - Ảnh 4." title="Đại diện Việt Nam đoạt danh hiệu Á vương 5 Mister Tourism World 2022 - Ảnh 4." rel="lightbox" photoid="546499055931019264" data-original="https://images2.thanhnien.vn/528068263637045248/2023/2/5/th4-16755595214792002223358.jpg" type="photo" width="" height=""/></p><figcaption><p data-placeholder="Nhập chú thích ảnh">Sau phần thi ứng xử, ngôi Nam vương Mister Tourism World 2022 thuộc về đại diện đến từ Uruguay (cầm cờ). Đại diện Brazil giành ngôi Á vương 1, <a href="https://thanhnien.vn/nhan-sac-hoa-hau-chuyen-gioi-dep-nhat-thai-lan-sap-ket-hon-185230204185249849.htm" title="Thái Lan" data-rel="follow">Thái Lan</a> đoạt Á vương 2, Cộng hòa Dominica, Hy Lạp lần lượt được xướng tên Á vương 3, 4<br/></p></figcaption></figure><figure type="Photo"><p><img src="https://images2.thanhnien.vn/528068263637045248/2023/2/5/th8-phung-phuoc-thinh-nhan-giai-best-talent-1675558939243392199425.jpg" id="img_546496657579778048" w="1280" h="1072" alt="Đại diện Việt Nam đoạt danh hiệu Á vương 5 Mister Tourism World 2022 - Ảnh 5." title="Đại diện Việt Nam đoạt danh hiệu Á vương 5 Mister Tourism World 2022 - Ảnh 5." rel="lightbox" photoid="546496657579778048" data-original="https://images2.thanhnien.vn/528068263637045248/2023/2/5/th8-phung-phuoc-thinh-nhan-giai-best-talent-1675558939243392199425.jpg" type="photo" width="" height=""/></p><figcaption><p data-placeholder="Nhập chú thích ảnh">Ngoài danh hiệu Á vương 5, đại diện <a href="https://thanhnien.vn/dan-hoa-hau-quoc-te-do-bo-den-viet-nam-tranh-vuong-mien-miss-charm-185230203162947959.htm" title="Việt Nam" data-rel="follow">Việt Nam</a> giành 2 giải thưởng phụ quan trọng: Mister Friendship (Nam vương Hữu nghị) và Best Talent (Nam vương Tài năng)</p></figcaption><p data-placeholder="Nhập tác giả">NVCC</p></figure><figure type="Photo"><p><img src="https://images2.thanhnien.vn/528068263637045248/2023/2/5/th7-viet-nam-nhan-giai-thuong-phu-mister-frendship-16755589390421392927273.jpg" id="img_546496622286352384" w="1280" h="1206" alt="Đại diện Việt Nam đoạt danh hiệu Á vương 5 Mister Tourism World 2022 - Ảnh 6." title="Đại diện Việt Nam đoạt danh hiệu Á vương 5 Mister Tourism World 2022 - Ảnh 6." rel="lightbox" photoid="546496622286352384" data-original="https://images2.thanhnien.vn/528068263637045248/2023/2/5/th7-viet-nam-nhan-giai-thuong-phu-mister-frendship-16755589390421392927273.jpg" type="photo" width="" height=""/></p><figcaption><p data-placeholder="Nhập chú thích ảnh">Dù không đoạt ngôi vị cao nhất nhưng Phùng Phước Thịnh nói anh tự hào về thành tích bản thân</p></figcaption><p data-placeholder="Nhập tác giả">NVCC</p></figure><figure type="Photo"><p><img src="https://images2.thanhnien.vn/528068263637045248/2023/2/5/th5-a-vuong-phung-phuoc-thinh-cung-dai-dien-thai-lan-1675558939912950933811.jpg" id="img_546496664828084224" w="969" h="1292" alt="Đại diện Việt Nam đoạt danh hiệu Á vương 5 Mister Tourism World 2022 - Ảnh 7." title="Đại diện Việt Nam đoạt danh hiệu Á vương 5 Mister Tourism World 2022 - Ảnh 7." rel="lightbox" photoid="546496664828084224" data-original="https://images2.thanhnien.vn/528068263637045248/2023/2/5/th5-a-vuong-phung-phuoc-thinh-cung-dai-dien-thai-lan-1675558939912950933811.jpg" type="photo" width="" height=""/></p><figcaption><p data-placeholder="Nhập chú thích ảnh">Phùng Phước Thịnh cùng đại diện Thái Lan, người giành ngôi Á vương 2 tại Mister Tourism World 2022</p></figcaption><p data-placeholder="Nhập tác giả">NVCC</p></figure><figure type="Photo"><p><img src="https://images2.thanhnien.vn/528068263637045248/2023/2/5/th2-1675558939762491877356.jpg" id="img_546496634001477632" w="1003" h="1338" alt="Đại diện Việt Nam đoạt danh hiệu Á vương 5 Mister Tourism World 2022 - Ảnh 8." title="Đại diện Việt Nam đoạt danh hiệu Á vương 5 Mister Tourism World 2022 - Ảnh 8." rel="lightbox" photoid="546496634001477632" data-original="https://images2.thanhnien.vn/528068263637045248/2023/2/5/th2-1675558939762491877356.jpg" type="photo" width="" height=""/></p><figcaption><p data-placeholder="Nhập chú thích ảnh">Phùng Phước Thịnh sinh năm 1996, nặng 72kg, số đo ba vòng 105-77-102cm. Anh hiện là người mẫu tự do, chủ một công ty về du lịch - sự kiện tại TP.HCM. Nam người mẫu từng làm giám khảo Hoa hậu Du lịch đồng bằng sông Cửu Long 2022, Hoa khôi HUFLIT 2022...</p></figcaption><p data-placeholder="Nhập tác giả">NVCC</p></figure><!--Sun Feb 05 2023 08:38:40 GMT+0700 (Indochina Time) -- Sun Feb 05 2023 08:38:40 GMT+0700 (Indochina Time) -- Sun Feb 05 2023 08:38:45 GMT+0700 (Indochina Time)-->
