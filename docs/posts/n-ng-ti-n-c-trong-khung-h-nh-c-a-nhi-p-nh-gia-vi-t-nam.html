    <h1>&#39;Nàng tiên cá&#39; trong khung hình của nhiếp ảnh gia Việt Nam</h1>
    
    <div id="readability-page-1" class="page"><div>
                                <div data-role="content" itemprop="articleBody" data-io-article-url="https://thanhnien.vn/nang-tien-ca-trong-khung-hinh-cua-nhiep-anh-gia-viet-nam-185230216142640686.htm">
                                    

                                                                                                                
                                    <figure data-uid="CcVLpC6Ey" type="Photo"><p><img src="https://images2.thanhnien.vn/528068263637045248/2023/2/22/base64-16770258343771420632594.png" id="img_550576439275368448" w="1500" h="1071" alt="&#39;Kỳ thú&#39;: Nhiếp ảnh gia Việt mê săn ảnh dưới đại dương - Ảnh 1." title="&#39;Kỳ thú&#39;: Nhiếp ảnh gia Việt mê săn ảnh dưới đại dương - Ảnh 1." rel="lightbox" photoid="550576439275368448" data-original="https://images2.thanhnien.vn/528068263637045248/2023/2/22/base64-16770258343771420632594.png" type="photo" width="" height=""/></p><figcaption><p data-placeholder="Nhập chú thích ảnh">Ảnh được chụp tại Vườn quốc gia Côn Đảo, nơi đang triển khai các chương trình bảo tồn rùa biển trọng điểm quốc gia do Tổ chức Bảo tồn Thiên nhiên quốc tế (IUCN) thực hiện</p></figcaption><p data-placeholder="Nhập tác giả">NGUYỄN NGỌC THIỆN</p></figure><figure data-uid="f28ZS6RQu" type="Photo"><p><img src="https://images2.thanhnien.vn/528068263637045248/2023/2/22/base64-16770258346461599417039.png" id="img_550576672058920960" w="1500" h="938" alt="&#39;Kỳ thú&#39;: Nhiếp ảnh gia Việt mê săn ảnh dưới đại dương - Ảnh 2." title="&#39;Kỳ thú&#39;: Nhiếp ảnh gia Việt mê săn ảnh dưới đại dương - Ảnh 2." rel="lightbox" photoid="550576672058920960" data-original="https://images2.thanhnien.vn/528068263637045248/2023/2/22/base64-16770258346461599417039.png" type="photo" width="" height=""/></p><figcaption><p data-placeholder="Nhập chú thích ảnh">Thế giới đầy màu sắc, sinh động của các loài cá, rạn san hô dưới vùng biển Hòn Cau ở Côn Đảo. Hòn Cau cách Phú Hải, đảo lớn nhất quần đảo Côn Đảo khoảng 8 km về phía đông bắc. Để lặn được an toàn và chụp ảnh hiệu quả, nhiếp ảnh gia Nguyễn Ngọc Thiện phải tham gia các khóa học về lặn biển; tham gia các diễn đàn underwater photography, bài giảng hướng dẫn về cách chụp dưới nước, đặc biệt là đầu tư thiết bị và kỹ năng lặn - hai trong nhiều yếu tố quan trọng khi chụp ảnh dưới biển</p></figcaption><p data-placeholder="Nhập tác giả">NGUYỄN NGỌC THIỆN</p></figure><figure data-uid="X1UkRhC4g" type="Photo"><p><img src="https://images2.thanhnien.vn/528068263637045248/2023/2/22/base64-1677025834984543409294.png" id="img_550577474577399808" w="1001" h="1500" alt="&#39;Kỳ thú&#39;: Nhiếp ảnh gia Việt mê săn ảnh dưới đại dương - Ảnh 3." title="&#39;Kỳ thú&#39;: Nhiếp ảnh gia Việt mê săn ảnh dưới đại dương - Ảnh 3." rel="lightbox" photoid="550577474577399808" data-original="https://images2.thanhnien.vn/528068263637045248/2023/2/22/base64-1677025834984543409294.png" type="photo" width="" height=""/></p><figcaption><p data-placeholder="Nhập chú thích ảnh">Tại Việt Nam, các rạn san hô phân bố rộng khắp từ bắc vào nam với diện tích khoảng hơn 1.100 km2, trong đó vùng biển miền Trung là có diện tích rạn san hô nước nông ven bờ (shallow coral reefs) lớn nhất và tính đa dạng sinh học cao nhất. Trên ảnh, &#34;nàng tiên cá&#34; đang bơi lên mặt biển ở Cù Lao Xanh, một điểm lặn gần bờ nổi tiếng của Bình Định</p></figcaption><p data-placeholder="Nhập tác giả">NGUYỄN NGỌC THIỆN</p></figure><figure data-uid="kb29aFYOs" type="Photo"><p><img src="https://images2.thanhnien.vn/528068263637045248/2023/2/22/base64-16770258351312124441841.png" id="img_550577713545375744" w="1500" h="938" alt="&#39;Kỳ thú&#39;: Nhiếp ảnh gia Việt mê săn ảnh dưới đại dương - Ảnh 4." title="&#39;Kỳ thú&#39;: Nhiếp ảnh gia Việt mê săn ảnh dưới đại dương - Ảnh 4." rel="lightbox" photoid="550577713545375744" data-original="https://images2.thanhnien.vn/528068263637045248/2023/2/22/base64-16770258351312124441841.png" type="photo" width="" height=""/></p><figcaption><p data-placeholder="Nhập chú thích ảnh">Thảm cỏ biển bên dưới vùng biển Hòn Yến, Phú Yên. Để chụp bức ảnh trên, tác giả dùng kỹ thuật chụp ảnh nửa trên - nửa dưới (underwater split-shots), tức dùng sóng biển phân tách góc nhìn độc đáo giữa hai thế giới, trên mặt nước và dưới mặt nước cùng lúc trong cùng một khung hình</p></figcaption><p data-placeholder="Nhập tác giả">NGUYỄN NGỌC THIỆN</p></figure><figure data-uid="ARrST4kOy" type="Photo"><p><img src="https://images2.thanhnien.vn/528068263637045248/2023/2/22/base64-16770258352582004122902.png" id="img_550577934334709760" w="1500" h="1001" alt="&#39;Kỳ thú&#39;: Nhiếp ảnh gia Việt mê săn ảnh dưới đại dương - Ảnh 5." title="&#39;Kỳ thú&#39;: Nhiếp ảnh gia Việt mê săn ảnh dưới đại dương - Ảnh 5." rel="lightbox" photoid="550577934334709760" data-original="https://images2.thanhnien.vn/528068263637045248/2023/2/22/base64-16770258352582004122902.png" type="photo" width="" height=""/></p><figcaption><p data-placeholder="Nhập chú thích ảnh">Cổng Tò Vò cổ đại, còn được gọi là cây cầu thiên nhiên ở đảo Lý Sơn, Quảng Ngãi, kỳ quan dưới đáy biển. Vòm đá cổ đại này ở độ sâu khoảng 15 -17m được hình thành trong quá trình phun trào của núi lửa cách đây hàng triệu năm. Tác giả đã lặn tự do (không bình khí) tại độ sâu nêu trên để tìm vị trí cổng Tò Vò, nơi có các dòng nước lạnh di chuyển liên tục bên dưới. Đây là điểm lặn khá nguy hiểm, không dành cho những người chưa có nhiều kinh nghiệm</p></figcaption><p data-placeholder="Nhập tác giả">NGUYỄN NGỌC THIỆN</p></figure><figure data-uid="FlziN0gc7" type="Photo"><p><img src="https://images2.thanhnien.vn/528068263637045248/2023/2/22/base64-16770258354261366097521.png" id="img_550577880776626176" w="1001" h="1500" alt="&#39;Kỳ thú&#39;: Nhiếp ảnh gia Việt mê săn ảnh dưới đại dương - Ảnh 6." title="&#39;Kỳ thú&#39;: Nhiếp ảnh gia Việt mê săn ảnh dưới đại dương - Ảnh 6." rel="lightbox" photoid="550577880776626176" data-original="https://images2.thanhnien.vn/528068263637045248/2023/2/22/base64-16770258354261366097521.png" type="photo" width="" height=""/></p><figcaption><p data-placeholder="Nhập chú thích ảnh">Quang cảnh bên dưới đáy biển Lý Sơn. Với địa chất kỳ thú như những bãi cát trắng mịn được tạo bởi xương san hô, hay những rãnh nứt gãy do quá trình vận động của núi lửa ngàn năm xưa tạo nên những con đường cát tự nhiên trải dài vô tận dưới đáy biển</p></figcaption><p data-placeholder="Nhập tác giả">NGUYỄN NGỌC THIỆN</p></figure><figure data-uid="x62fogXfy" type="Photo"><p><img src="https://images2.thanhnien.vn/528068263637045248/2023/2/22/base64-16770258356442020988634.png" id="img_550578311905189888" w="1125" h="1500" alt="&#39;Kỳ thú&#39;: Nhiếp ảnh gia Việt mê săn ảnh dưới đại dương - Ảnh 7." title="&#39;Kỳ thú&#39;: Nhiếp ảnh gia Việt mê săn ảnh dưới đại dương - Ảnh 7." rel="lightbox" photoid="550578311905189888" data-original="https://images2.thanhnien.vn/528068263637045248/2023/2/22/base64-16770258356442020988634.png" type="photo" width="" height=""/></p><figcaption><p data-placeholder="Nhập chú thích ảnh">Ngoài các vùng biển Việt Nam, những điểm lặn đẹp quốc tế nhiếp ảnh gia Nguyễn Ngọc Thiện cũng có cơ hội khám phá. Từ tháng 1 - 4 hàng năm là mùa biển đẹp để trải nghiệm các vùng biển phía nam Maldives vì trời quang, biển lặng và tầm nhìn tốt. Trong ảnh, cá đuối dạn người bơi sát bờ, nơi cô gái đang ngồi thư giãn tại vùng biển Maamigili, South Ari Atoll, Maldives</p></figcaption><p data-placeholder="Nhập tác giả">NGUYỄN NGỌC THIỆN</p></figure><figure data-uid="uUKQbttgL" type="Photo"><p><img src="https://images2.thanhnien.vn/528068263637045248/2023/2/22/base64-1677025835786691536512.png" id="img_550578508284407808" w="1500" h="1001" alt="&#39;Kỳ thú&#39;: Nhiếp ảnh gia Việt mê săn ảnh dưới đại dương - Ảnh 8." title="&#39;Kỳ thú&#39;: Nhiếp ảnh gia Việt mê săn ảnh dưới đại dương - Ảnh 8." rel="lightbox" photoid="550578508284407808" data-original="https://images2.thanhnien.vn/528068263637045248/2023/2/22/base64-1677025835786691536512.png" type="photo" width="" height=""/></p><figcaption><p data-placeholder="Nhập chú thích ảnh">Tại điểm lặn gần Maamigili, nơi sinh sống của loài cá mập voi khổng lồ, vốn dành phần lớn thời gian ở vùng nước sâu sẽ bơi lên vùng biển nông ngâm mình trong vùng nước ấm. Những gã khổng lồ hiền lành này tìm kiếm thức ăn là các đàn sinh vật phù du gần  mặt nước, là cơ hội để săn được những bức ảnh đáng nhớ</p></figcaption><p data-placeholder="Nhập tác giả">NGUYỄN NGỌC THIỆN</p></figure><figure data-uid="RwgoWDtXa" type="Photo"><p><img src="https://images2.thanhnien.vn/528068263637045248/2023/2/22/base64-16770258359261856492175.png" id="img_550578725102854144" w="1200" h="1500" alt="&#39;Kỳ thú&#39;: Nhiếp ảnh gia Việt mê săn ảnh dưới đại dương - Ảnh 9." title="&#39;Kỳ thú&#39;: Nhiếp ảnh gia Việt mê săn ảnh dưới đại dương - Ảnh 9." rel="lightbox" photoid="550578725102854144" data-original="https://images2.thanhnien.vn/528068263637045248/2023/2/22/base64-16770258359261856492175.png" type="photo" width="" height=""/></p><figcaption><p data-placeholder="Nhập chú thích ảnh">Cuộc gặp gỡ kỳ thú với cá mập vây đen bơi sát bờ tại vùng biển North Ari Atoll, Maldives. Loài cá mập này không gây nguy hiểm cho con người</p></figcaption><p data-placeholder="Nhập tác giả">NGUYỄN NGỌC THIỆN</p></figure><figure data-uid="7RYtLMwF0" type="Photo"><p><img src="https://images2.thanhnien.vn/528068263637045248/2023/2/22/base64-1677025836125929013570.png" id="img_550578925544198144" w="1000" h="1500" alt="&#39;Kỳ thú&#39;: Nhiếp ảnh gia Việt mê săn ảnh dưới đại dương - Ảnh 10." title="&#39;Kỳ thú&#39;: Nhiếp ảnh gia Việt mê săn ảnh dưới đại dương - Ảnh 10." rel="lightbox" photoid="550578925544198144" data-original="https://images2.thanhnien.vn/528068263637045248/2023/2/22/base64-1677025836125929013570.png" type="photo" width="" height=""/></p><figcaption><p data-placeholder="Nhập chú thích ảnh">Vùng biển Perhentian, Malaysia được ví như &#34;thiên đường đảo&#34;, bao quanh bởi những rạn san hô rực rỡ sắc màu. Hệ sinh thái biển ở đây phong phú và đa dạng là nhờ được bảo tồn, cấm đánh bắt</p></figcaption><p data-placeholder="Nhập tác giả">NGUYỄN NGỌC THIỆN</p></figure><figure data-uid="GMZ0dISKY" type="Photo"><p><img src="https://images2.thanhnien.vn/528068263637045248/2023/2/22/base64-1677025836392440968747.png" id="img_550579104553660416" w="1125" h="1500" alt="&#39;Kỳ thú&#39;: Nhiếp ảnh gia Việt mê săn ảnh dưới đại dương - Ảnh 11." title="&#39;Kỳ thú&#39;: Nhiếp ảnh gia Việt mê săn ảnh dưới đại dương - Ảnh 11." rel="lightbox" photoid="550579104553660416" data-original="https://images2.thanhnien.vn/528068263637045248/2023/2/22/base64-1677025836392440968747.png" type="photo" width="" height=""/></p><figcaption><p data-placeholder="Nhập chú thích ảnh">Bức ảnh mẫu nữ Bùi Trúc Quỳnh cùng rùa biển ở vùng biển Perhentian, Malaysia, được chụp vào tháng 9.2022. Bức ảnh thắng giải hạng mục quốc gia Việt Nam (National Award Winner) của cuộc thi ảnh quy mô, uy tín hàng đầu thế giới Sony World Photography Awards 2023, có tên &#34;Turtle Dream&#34; (Giấc mơ rùa biển)</p></figcaption><p data-placeholder="Nhập tác giả">NGUYỄN NGỌC THIỆN</p></figure><figure data-uid="axJqmhvIh" type="Photo"><p><img src="https://images2.thanhnien.vn/528068263637045248/2023/2/22/base64-1677025836594682633031.png" id="img_550579424025661440" w="1500" h="1001" alt="&#39;Kỳ thú&#39;: Nhiếp ảnh gia Việt mê săn ảnh dưới đại dương - Ảnh 12." title="&#39;Kỳ thú&#39;: Nhiếp ảnh gia Việt mê săn ảnh dưới đại dương - Ảnh 12." rel="lightbox" photoid="550579424025661440" data-original="https://images2.thanhnien.vn/528068263637045248/2023/2/22/base64-1677025836594682633031.png" type="photo" width="" height=""/></p><figcaption><p data-placeholder="Nhập chú thích ảnh">Đàn cá bơi cùng &#34;nàng tiên cá&#34;, được chụp tại vùng biển Bali, Indonesia</p></figcaption><p data-placeholder="Nhập tác giả">NGUYỄN NGỌC THIỆN</p></figure><figure data-uid="LR4pnEn46" type="Photo"><p><img src="https://images2.thanhnien.vn/528068263637045248/2023/2/22/base64-16770258368252037896211.png" id="img_550580049208713216" w="2000" h="1333" alt="&#39;Kỳ thú&#39;: Nhiếp ảnh gia Việt mê săn ảnh dưới đại dương - Ảnh 13." title="&#39;Kỳ thú&#39;: Nhiếp ảnh gia Việt mê săn ảnh dưới đại dương - Ảnh 13." rel="lightbox" photoid="550580049208713216" data-original="https://images2.thanhnien.vn/528068263637045248/2023/2/22/base64-16770258368252037896211.png" type="photo" width="" height=""/></p><figcaption><p data-placeholder="Nhập chú thích ảnh">Nhiếp ảnh gia Nguyễn Ngọc Thiện bơi cùng cá nóc tại vùng biển Crystal Bay (vịnh Pha Lê), một điểm lặn biển có làn nước trong vắt, nổi tiếng ở Nusa Penida, Indonesia. &#34;Trong các hành trình lặn biển sắp tới, nếu sắp xếp được thời gian, tôi sẽ đến những điểm lặn nổi tiếng ở Palawan, Philippines; Raja Ampat, Indonesia, hay vùng biển Borneo để tìm hiểu về bộ tộc người cá Sea Gypsies; và đặc biệt là đảo quốc Tonga ở Nam Thái Bình Dương để ghi hình mùa di cư của đàn cá voi lưng gù&#34;, tác giả bộ ảnh chia sẻ.</p></figcaption><p data-placeholder="Nhập tác giả">NGUYỄN NGỌC THIỆN</p></figure><!--Wed Feb 22 2023 08:48:04 GMT+0700 (Giờ Đông Dương) --  -- Wed Feb 22 2023 08:48:04 GMT+0700 (Giờ Đông Dương)-->
