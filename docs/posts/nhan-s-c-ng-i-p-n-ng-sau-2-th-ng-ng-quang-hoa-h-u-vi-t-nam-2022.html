    <h1>Nhan sắc người đẹp Đà Nẵng sau 2 tháng đăng quang Hoa hậu Việt Nam 2022</h1>

                            <h2 data-role="sapo">
                                Trở về thăm Trường đại học Ngoại ngữ - Đại học Đà Nẵng, Hoa hậu Việt Nam 2022 Thanh Thủy diện áo dài màu hồng nhạt, đội vương miện khoe vẻ đẹp trong trẻo và khả ái.
                            </h2>
                            <div>
                                <div data-role="content" itemprop="articleBody">
                                                                                                                
                                    <figure type="Photo"><p><img src="https://images2.thanhnien.vn/528068263637045248/2023/1/31/thanh-thuy-10-1675141669667214612496.jpg" id="img_544746486716768256" w="2000" h="1334" alt="Nhan sắc người đẹp Đà Nẵng sau 2 tháng đăng quang Hoa hậu Việt Nam 2022 - Ảnh 1." title="Nhan sắc người đẹp Đà Nẵng sau 2 tháng đăng quang Hoa hậu Việt Nam 2022 - Ảnh 1." rel="lightbox" photoid="544746486716768256" data-original="https://images2.thanhnien.vn/528068263637045248/2023/1/31/thanh-thuy-10-1675141669667214612496.jpg" type="photo" width="" height=""/></p><figcaption><p data-placeholder="Nhập chú thích ảnh">Sau khi giành được ngôi vị cao nhất tại <a href="https://thanhnien.vn/hoa-hau-thanh-thuy-gian-di-di-lam-tu-thien-1851536179.htm" title="Hoa hậu Việt Nam 2022" data-rel="follow">Hoa hậu Việt Nam 2022</a>, bên cạnh góp mặt trong các hoạt động thiện nguyện, Thanh Thủy còn dành thời gian trở về thăm trường đại học của mình ở thành phố Đà Nẵng</p></figcaption><p data-placeholder="Nhập tác giả">NVCC</p></figure><figure type="Photo"><p><img src="https://images2.thanhnien.vn/528068263637045248/2023/1/31/hoa-hau-thanh-thuy-4-16751417420361010111892.jpg" id="img_544746797310226432" w="2000" h="3000" alt="Nhan sắc người đẹp Đà Nẵng sau 2 tháng đăng quang Hoa hậu Việt Nam 2022 - Ảnh 2." title="Nhan sắc người đẹp Đà Nẵng sau 2 tháng đăng quang Hoa hậu Việt Nam 2022 - Ảnh 2." rel="lightbox" photoid="544746797310226432" data-original="https://images2.thanhnien.vn/528068263637045248/2023/1/31/hoa-hau-thanh-thuy-4-16751417420361010111892.jpg" type="photo" width="" height=""/></p><figcaption><p data-placeholder="Nhập chú thích ảnh">Đây là lần đầu tiên người đẹp sinh năm 2003 về trường với danh hiệu Hoa hậu Việt Nam 2022 nên cô cảm thấy rất háo hức: &#34;Sau gần 3 tháng tham gia cuộc thi sắc đẹp cấp quốc gia, đây là lần đầu tiên Thủy trở về trường với một cương vị mới. Ngày hôm nay, được đứng ở đây với một vai trò mới khiến Thủy rất vinh dự vì đã trở thành một trong những niềm tự hào của trường&#34;</p></figcaption><p data-placeholder="Nhập tác giả">NVCC</p></figure><figure type="Photo"><p><img src="https://images2.thanhnien.vn/528068263637045248/2023/1/31/thanh-thuy-2-1675141742141353352150.jpg" id="img_544746801810743296" w="2000" h="1333" alt="Nhan sắc người đẹp Đà Nẵng sau 2 tháng đăng quang Hoa hậu Việt Nam 2022 - Ảnh 3." title="Nhan sắc người đẹp Đà Nẵng sau 2 tháng đăng quang Hoa hậu Việt Nam 2022 - Ảnh 3." rel="lightbox" photoid="544746801810743296" data-original="https://images2.thanhnien.vn/528068263637045248/2023/1/31/thanh-thuy-2-1675141742141353352150.jpg" type="photo" width="" height=""/></p><figcaption><p data-placeholder="Nhập chú thích ảnh">Bên cạnh chia sẻ về hành trình của mình tại Hoa hậu Việt Nam 2022, <a href="https://thanhnien.vn/chan-dung-nha-thiet-ke-dung-sau-vay-da-hoi-cua-hoa-hau-thanh-thuy-1851535332.htm" title="Thanh Thủy " data-rel="follow">Thanh Thủy </a>còn nhận được bằng khen và học bổng từ trường</p></figcaption><p data-placeholder="Nhập tác giả">NVCC</p></figure><figure type="Photo"><p><img src="https://images2.thanhnien.vn/528068263637045248/2023/1/31/thanh-thuy-3-16751417422881791578032.jpg" id="img_544746793126277120" w="2000" h="1333" alt="Nhan sắc người đẹp Đà Nẵng sau 2 tháng đăng quang Hoa hậu Việt Nam 2022 - Ảnh 4." title="Nhan sắc người đẹp Đà Nẵng sau 2 tháng đăng quang Hoa hậu Việt Nam 2022 - Ảnh 4." rel="lightbox" photoid="544746793126277120" data-original="https://images2.thanhnien.vn/528068263637045248/2023/1/31/thanh-thuy-3-16751417422881791578032.jpg" type="photo" width="" height=""/></p><figcaption><p data-placeholder="Nhập chú thích ảnh">Người đẹp gốc Đà Nẵng chia sẻ: &#34;Thủy đã được nhận phần học bổng từ trường sau khi đạt thành tích xuất sắc tại cuộc thi Hoa hậu Việt Nam 2022, bằng khen do khoa và trường trao tặng. Bên cạnh đó, Thủy cũng dành những lời tri ân sâu sắc nhất đến quý thầy cô đã luôn hỗ trợ Thủy trên con đường theo đuổi tri thức&#34;</p></figcaption><p data-placeholder="Nhập tác giả">NVCC</p></figure><figure type="Photo"><p><img src="https://images2.thanhnien.vn/528068263637045248/2023/1/31/thanh-thuy-tang-hoa-tri-an-16751432911712131334153.jpg" id="img_544753297645891584" w="2000" h="1333" alt=" Nhan sắc người đẹp Đà Nẵng sau 2 tháng đăng quang Hoa hậu Việt Nam 2022 - Ảnh 5." title=" Nhan sắc người đẹp Đà Nẵng sau 2 tháng đăng quang Hoa hậu Việt Nam 2022 - Ảnh 5." rel="lightbox" photoid="544753297645891584" data-original="https://images2.thanhnien.vn/528068263637045248/2023/1/31/thanh-thuy-tang-hoa-tri-an-16751432911712131334153.jpg" type="photo" width="" height=""/></p><figcaption><p data-placeholder="Nhập chú thích ảnh">Nàng hậu sinh năm 2003 trao hoa và dành lời tri ân cho các giảng viên trong trường</p></figcaption><p data-placeholder="Nhập tác giả">NVCC</p></figure><figure type="Photo"><p><img src="https://images2.thanhnien.vn/528068263637045248/2023/1/31/thanh-thuy-5-1675141670108697369828.jpg" id="img_544746522097885184" w="2000" h="1333" alt="Nhan sắc người đẹp Đà Nẵng sau 2 tháng đăng quang Hoa hậu Việt Nam 2022 - Ảnh 5." title="Nhan sắc người đẹp Đà Nẵng sau 2 tháng đăng quang Hoa hậu Việt Nam 2022 - Ảnh 5." rel="lightbox" photoid="544746522097885184" data-original="https://images2.thanhnien.vn/528068263637045248/2023/1/31/thanh-thuy-5-1675141670108697369828.jpg" type="photo" width="" height=""/></p><figcaption><p data-placeholder="Nhập chú thích ảnh">Sau phần trò chuyện trên sân khấu,<a href="https://thanhnien.vn/hoa-hau-thanh-thuy-gian-di-di-lam-tu-thien-1851536179.htm" title="Hoa hậu Thanh Thủy" data-rel="follow"> Thanh Thủy</a> ở lại chụp ảnh cùng các bạn sinh viên trường. Đối với cô, sự ủng hộ của khán giả là nguồn năng lượng giúp cô có thêm ý chí, tinh thần lạc quan để hoàn thành sứ mệnh của mình trong 2 năm sắp tới</p></figcaption><p data-placeholder="Nhập tác giả">NVCC</p></figure><figure type="Photo"><p><img src="https://images2.thanhnien.vn/528068263637045248/2023/1/31/thanh-thuy-8-16751419338801014871595.jpg" id="img_544747624957448192" w="2000" h="1333" alt="Nhan sắc người đẹp Đà Nẵng sau 2 tháng đăng quang Hoa hậu Việt Nam 2022 - Ảnh 6." title="Nhan sắc người đẹp Đà Nẵng sau 2 tháng đăng quang Hoa hậu Việt Nam 2022 - Ảnh 6." rel="lightbox" photoid="544747624957448192" data-original="https://images2.thanhnien.vn/528068263637045248/2023/1/31/thanh-thuy-8-16751419338801014871595.jpg" type="photo" width="" height=""/></p><figcaption><p data-placeholder="Nhập chú thích ảnh">&#34;Cảm ơn cả nhà rất nhiều vì những tình cảm ấm áp cũng như những phần quà mọi người đã trao cho Thủy, đây sẽ là động lực lớn giúp Thủy ngày càng cố gắng hoàn thiện bản thân với vai trò là sinh viên cũng như hoàn thành tốt trách nhiệm của mình trong vai trò là Hoa hậu Việt Nam 2022&#34;, Thanh Thủy viết</p></figcaption><p data-placeholder="Nhập tác giả">NVCC</p></figure><figure type="Photo"><p><img src="https://images2.thanhnien.vn/528068263637045248/2023/1/31/hoa-hau-thanh-thuy-2-1675141669820454652220.jpg" id="img_544746508977115136" w="2000" h="3000" alt="Nhan sắc người đẹp Đà Nẵng sau 2 tháng đăng quang Hoa hậu Việt Nam 2022 - Ảnh 8." title="Nhan sắc người đẹp Đà Nẵng sau 2 tháng đăng quang Hoa hậu Việt Nam 2022 - Ảnh 8." rel="lightbox" photoid="544746508977115136" data-original="https://images2.thanhnien.vn/528068263637045248/2023/1/31/hoa-hau-thanh-thuy-2-1675141669820454652220.jpg" type="photo" width="" height=""/></p><figcaption><p data-placeholder="Nhập chú thích ảnh">Hoa hậu Thanh Thủy sinh năm 2003, sở hữu chiều cao 1,75m cùng số đo 80-63-94. Người đẹp hiện đang là sinh viên năm 2 ngành tiếng Anh thương mại chất lượng cao tại Trường đại học Ngoại ngữ - Đại học Đà Nẵng. Tại cuộc thi Hoa hậu Việt Nam 2022, cô được đánh giá là một trong những thí sinh nổi bật khi có mặt trong danh sách Top 5 <a href="https://thanhnien.vn/nguoi-dep-nhan-ai-hoa-hau-viet-nam-bi-to-gian-doi-btc-xac-minh-den-cung-1851535497.htm" title="Người đẹp nhân ái" data-rel="follow">Người đẹp nhân ái</a> và giành chiến thắng giải thưởng phụ Người đẹp thể thao</p></figcaption><p data-placeholder="Nhập tác giả">NVCC</p></figure><figure type="Photo"><p><img src="https://images2.thanhnien.vn/528068263637045248/2023/1/31/hoa-hau-thanh-thuy-7-16751416693561082182362.jpg" id="img_544746518846218240" w="2000" h="3000" alt=" Nhan sắc người đẹp Đà Nẵng sau 2 tháng đăng quang Hoa hậu Việt Nam 2022 - Ảnh 9." title=" Nhan sắc người đẹp Đà Nẵng sau 2 tháng đăng quang Hoa hậu Việt Nam 2022 - Ảnh 9." rel="lightbox" photoid="544746518846218240" data-original="https://images2.thanhnien.vn/528068263637045248/2023/1/31/hoa-hau-thanh-thuy-7-16751416693561082182362.jpg" type="photo" width="" height=""/></p><figcaption><p data-placeholder="Nhập chú thích ảnh">Hậu đăng quang, Thanh Thủy chưa mưu cầu khán giả phải nhớ đến mình ngay lập tức, thay vào đó, cô muốn hoàn thành tốt nhiệm kỳ để bảo vệ danh hiệu mình đạt được như cách đàn chị <a href="https://thanhnien.vn/do-thi-ha-cham-lam-tu-thien-phu-nhan-chuyen-roi-showbiz-sau-khi-het-nhiem-ky-1851540534.htm" title="Đỗ Thị Hà" data-rel="follow">Đỗ Thị Hà</a> từng làm. Hoa hậu Thanh Thủy bộc bạch: &#34;Tôi phải làm sao để tiếp nối và không làm chị Đỗ Thị Hà cảm thấy thất vọng&#34;</p></figcaption><p data-placeholder="Nhập tác giả">NVCC</p></figure><!--Tue Jan 31 2023 13:22:33 GMT+0700 (Giờ Đông Dương) --  -- Tue Jan 31 2023 13:22:33 GMT+0700 (Giờ Đông Dương)-->
