    <h1>Mẹ Huỳnh Như khóc nức nở, ôm chặt con gái ngày đoàn tụ</h1>

                            <h2 data-role="sapo">
                                Tại sân bay Tân Sơn Nhất (TP.HCM) sáng 19.2, gia đình Huỳnh Như đã có khoảnh khắc đoàn tụ đầy xúc động sau nhiều tháng xa cách.
                            </h2>
                            <div>
                                <div data-role="content" itemprop="articleBody" data-io-article-url="https://thanhnien.vn/me-huynh-nhu-khoc-nuc-no-om-chat-con-gai-ngay-doan-tu-185230219102757876.htm">
                                    

                                                                                                                
                                    <figure data-uid="rxXOy9T0G" type="Photo"><p><img src="https://images2.thanhnien.vn/528068263637045248/2023/2/19/z41207681362127f940b423df87b4d972284a93e4088bd-1676776218660822788164.jpg" id="img_551602261588029440" w="1759" h="1198" alt="Mẹ Huỳnh Như khóc nức nở, ôm chặt con gái ngày đoàn tụ - Ảnh 1." title="Mẹ Huỳnh Như khóc nức nở, ôm chặt con gái ngày đoàn tụ - Ảnh 1." rel="lightbox" photoid="551602261588029440" data-original="https://images2.thanhnien.vn/528068263637045248/2023/2/19/z41207681362127f940b423df87b4d972284a93e4088bd-1676776218660822788164.jpg" type="photo" width="" height=""/></p><figcaption><p data-placeholder="Nhập chú thích ảnh">Điều Huỳnh Như làm ngay sau khi ra cửa sân bay là tìm đến bóng dáng quen thuộc của cha mẹ</p></figcaption><p data-placeholder="Nhập tác giả">NGỌC HẠNH</p></figure><figure data-uid="azI9IeyCU" type="Photo"><p><img src="https://images2.thanhnien.vn/528068263637045248/2023/2/19/z4120766645340e9bd2a0a2b032b2e140aac244586b256-16767762186151472507561.jpg" id="img_551602319225335808" w="2000" h="1377" alt="Mẹ Huỳnh Như khóc nức nở, ôm chặt con gái ngày đoàn tụ - Ảnh 2." title="Mẹ Huỳnh Như khóc nức nở, ôm chặt con gái ngày đoàn tụ - Ảnh 2." rel="lightbox" photoid="551602319225335808" data-original="https://images2.thanhnien.vn/528068263637045248/2023/2/19/z4120766645340e9bd2a0a2b032b2e140aac244586b256-16767762186151472507561.jpg" type="photo" width="" height=""/></p><figcaption><p data-placeholder="Nhập chú thích ảnh">Mẹ Huỳnh Như - bà Lê Thị Lài ôm chầm lấy con gái sau nhiều tháng xa cách</p></figcaption><p data-placeholder="Nhập tác giả">NGỌC HẠNH</p></figure><figure data-uid="LrVYHatnh" type="Photo"><p><img src="https://images2.thanhnien.vn/528068263637045248/2023/2/19/z412076986328233946b7d14314544686e50100f950278-16767762187081097576860.jpg" id="img_551602334069202944" w="2000" h="1334" alt="Mẹ Huỳnh Như khóc nức nở, ôm chặt con gái ngày đoàn tụ - Ảnh 3." title="Mẹ Huỳnh Như khóc nức nở, ôm chặt con gái ngày đoàn tụ - Ảnh 3." rel="lightbox" photoid="551602334069202944" data-original="https://images2.thanhnien.vn/528068263637045248/2023/2/19/z412076986328233946b7d14314544686e50100f950278-16767762187081097576860.jpg" type="photo" width="" height=""/></p><figcaption><p data-placeholder="Nhập chú thích ảnh">Sáng 19.2, Huỳnh Như về đến sân bay Tân Sơn Nhất (TP.HCM). Tiền đạo sinh năm 1991 trải qua 2 chặng bay để trở về Việt Nam. Chân sút 31 tuổi xuất phát từ Braga (Bồ Đào Nha) đến sân bay Frankfurt (Đức), sau đó mới tiếp tục nối chặng về Việt Nam</p></figcaption><p data-placeholder="Nhập tác giả">NGỌC HẠNH</p></figure><figure data-uid="mDljJKqCv" type="Photo"><p><img src="https://images2.thanhnien.vn/528068263637045248/2023/2/19/z41207452815534179e841da8163faef7698929fd15441-16767762189091420287684.jpg" id="img_551602309061963776" w="2000" h="1333" alt="Mẹ Huỳnh Như khóc nức nở, ôm chặt con gái ngày đoàn tụ - Ảnh 4." title="Mẹ Huỳnh Như khóc nức nở, ôm chặt con gái ngày đoàn tụ - Ảnh 4." rel="lightbox" photoid="551602309061963776" data-original="https://images2.thanhnien.vn/528068263637045248/2023/2/19/z41207452815534179e841da8163faef7698929fd15441-16767762189091420287684.jpg" type="photo" width="" height=""/></p><figcaption><p data-placeholder="Nhập chú thích ảnh">Huỳnh Như trở về Việt Nam trong sự chào đón của người thân, giới truyền thông và người hâm mộ</p></figcaption><p data-placeholder="Nhập tác giả">NGỌC HẠNH</p></figure><figure data-uid="FRZ2l59Ez" type="Photo"><p><img src="https://images2.thanhnien.vn/528068263637045248/2023/2/19/z412074315881026fd0613107da912895ed9ec94d9ecec-16767762188561752438639.jpg" id="img_551602273199747072" w="1636" h="1091" alt="Mẹ Huỳnh Như khóc nức nở, ôm chặt con gái ngày đoàn tụ - Ảnh 5." title="Mẹ Huỳnh Như khóc nức nở, ôm chặt con gái ngày đoàn tụ - Ảnh 5." rel="lightbox" photoid="551602273199747072" data-original="https://images2.thanhnien.vn/528068263637045248/2023/2/19/z412074315881026fd0613107da912895ed9ec94d9ecec-16767762188561752438639.jpg" type="photo" width="" height=""/></p><figcaption><p data-placeholder="Nhập chú thích ảnh">Huỳnh Như trả lời phỏng vấn báo chí tại sân bay Tân Sơn Nhất. Theo lịch thi đấu, đến ngày 5.3, CLB Lank mới trở lại thi đấu ở giải vô địch quốc gia nữ Bồ Đào Nha. Chính vì vậy, tiền đạo quê Trà Vinh đã tranh thủ về quê để thăm gia đình</p></figcaption><p data-placeholder="Nhập tác giả">NGỌC HẠNH</p></figure><figure data-uid="aD8I48i6Z" type="Photo"><p><img src="https://images2.thanhnien.vn/528068263637045248/2023/2/19/z412076406824084f7f7fe18145feb57759168d4400e90-16767762185121776915964.jpg" id="img_551602286501982208" w="2000" h="1326" alt="Mẹ Huỳnh Như khóc nức nở, ôm chặt con gái ngày đoàn tụ - Ảnh 6." title="Mẹ Huỳnh Như khóc nức nở, ôm chặt con gái ngày đoàn tụ - Ảnh 6." rel="lightbox" photoid="551602286501982208" data-original="https://images2.thanhnien.vn/528068263637045248/2023/2/19/z412076406824084f7f7fe18145feb57759168d4400e90-16767762185121776915964.jpg" type="photo" width="" height=""/></p><figcaption><p data-placeholder="Nhập chú thích ảnh">Huỳnh Như ôm chặt cha của mình - ông Huỳnh Thanh Liêm</p></figcaption><p data-placeholder="Nhập tác giả">NGỌC HẠNH</p></figure><figure data-uid="yla1Jq3mW" type="Photo"><p><img src="https://images2.thanhnien.vn/528068263637045248/2023/2/19/z412074313767461322617a2c21eec808c7374a15b52bc-16767762188071488090065.jpg" id="img_551602289773019136" w="1992" h="1328" alt="Mẹ Huỳnh Như khóc nức nở, ôm chặt con gái ngày đoàn tụ - Ảnh 7." title="Mẹ Huỳnh Như khóc nức nở, ôm chặt con gái ngày đoàn tụ - Ảnh 7." rel="lightbox" photoid="551602289773019136" data-original="https://images2.thanhnien.vn/528068263637045248/2023/2/19/z412074313767461322617a2c21eec808c7374a15b52bc-16767762188071488090065.jpg" type="photo" width="" height=""/></p><figcaption><p data-placeholder="Nhập chú thích ảnh">Huỳnh Như trong vòng tay cha mẹ</p></figcaption><p data-placeholder="Nhập tác giả">NGỌC HẠNH</p></figure><figure data-uid="TKQFtbmNo" type="Photo"><p><img src="https://images2.thanhnien.vn/528068263637045248/2023/2/19/z412074311270986dee07472bcf904ae282de7d312fcee-1676776219012702779162.jpg" id="img_551602323462332416" w="2000" h="1348" alt="Mẹ Huỳnh Như khóc nức nở, ôm chặt con gái ngày đoàn tụ - Ảnh 8." title="Mẹ Huỳnh Như khóc nức nở, ôm chặt con gái ngày đoàn tụ - Ảnh 8." rel="lightbox" photoid="551602323462332416" data-original="https://images2.thanhnien.vn/528068263637045248/2023/2/19/z412074311270986dee07472bcf904ae282de7d312fcee-1676776219012702779162.jpg" type="photo" width="" height=""/></p><figcaption><p data-placeholder="Nhập chú thích ảnh">Huỳnh Như đã xa gia đình để sang Bồ Đào Nha được nửa năm (từ tháng 8.2022). Trở về Việt Nam lần này, Huỳnh Như được mời tham dự Gala trao giải Quả bóng vàng Việt Nam 2022. Cô gái quê Trà Vinh là ứng cử viên sáng giá cho danh hiệu cao nhất</p></figcaption><p data-placeholder="Nhập tác giả">NGỌC HẠNH</p></figure><figure data-uid="zCkuNJBVV" type="Photo"><p><img src="https://images2.thanhnien.vn/528068263637045248/2023/2/19/z4120762965830c5113832dc79b2ca1c1edce324ba9ea7-1676776218464946296134.jpg" id="img_551602305525248000" w="2000" h="1398" alt="Mẹ Huỳnh Như khóc nức nở, ôm chặt con gái ngày đoàn tụ - Ảnh 9." title="Mẹ Huỳnh Như khóc nức nở, ôm chặt con gái ngày đoàn tụ - Ảnh 9." rel="lightbox" photoid="551602305525248000" data-original="https://images2.thanhnien.vn/528068263637045248/2023/2/19/z4120762965830c5113832dc79b2ca1c1edce324ba9ea7-1676776218464946296134.jpg" type="photo" width="" height=""/></p><figcaption><p data-placeholder="Nhập chú thích ảnh">Cho đến lúc này, Huỳnh Như đã đóng góp 6 bàn thắng cho CLB Lank trên tất cả các đấu trường. Bàn thắng gần nhất của Huỳnh Như tại Bồ Đào Nha là siêu phẩm đá phạt vào lưới CLB Torreense vào ngày 5.2</p></figcaption><p data-placeholder="Nhập tác giả">NGỌC HẠNH</p></figure><div type="VideoStream" embed-type="4" data-width="600px" data-height="400px" data-vid="thanhnien.mediacdn.vn/325084952045817856/2023/2/4/huynh-nhu-clb-lank1-1675534409350510843335.mp4" data-info="37955fc8babef2ad9dcbf0a4f118d8fa" data-autoplay="false" data-removedlogo="false" data-location="" data-displaymode="0" data-thumb="https://videothumbs.mediacdn.vn/thanhnien/325084952045817856/2023/2/4/huynh-nhu-clb-lank1-1675534409350510843335.jpg" data-contentid="" data-namespace="thanhnien" data-originalid=""><p data-placeholder="nhập chú thích">Siêu phẩm đá phạt của Huỳnh Như ở Bồ Đào Nha</p></div><!--Sun Feb 19 2023 10:43:47 GMT+0700 (+07) -- Sun Feb 19 2023 10:43:47 GMT+0700 (+07) -- Sun Feb 19 2023 11:03:06 GMT+0700 (+07)-->
