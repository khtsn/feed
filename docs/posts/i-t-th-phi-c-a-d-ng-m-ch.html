    <h1>Đời tư thị phi của Dương Mịch</h1>
    
    <div id="readability-page-1" class="page"><div>
                                <div data-role="content" itemprop="articleBody">
                                                                                                                
                                    <figure type="Photo"><p><img src="https://images2.thanhnien.vn/528068263637045248/2023/2/4/doitutinhcamthiphicuanudienvienduongmich12-16754947536851988460994.png" id="img_546227416761409536" w="1024" h="720" alt="Đời tư tình cảm thị phi của Dương Mịch - Ảnh 1." title="Đời tư tình cảm thị phi của Dương Mịch - Ảnh 1." rel="lightbox" photoid="546227416761409536" data-original="https://images2.thanhnien.vn/528068263637045248/2023/2/4/doitutinhcamthiphicuanudienvienduongmich12-16754947536851988460994.png" type="photo" width="" height=""/></p><figcaption><p data-placeholder="Nhập chú thích ảnh">Đầu tháng 2 năm nay, cộng đồng mạng xôn xao trước tin đồn <a href="https://vnexpress.net/duong-mich-de-lo-tuoi-that-khi-xuat-hien-voi-outfit-toi-mau-hoa-la-trong-phim-1851523804.htm" target="_blank" title="Dương Mịch để lộ &#34;tuổi thật&#34; khi xuất hiện với outfit tối màu, hoa lá trong phim">Dương Mịch</a> hẹn hò với <a href="https://vnexpress.net/dap-tra-tin-don-nhin-thieu-suc-song-vuong-tuan-khai-xuat-hien-nhu-hoang-tu-ao-trang-tren-san-catwalk-1851385675.htm" target="_blank" title="Đáp trả tin đồn nhìn thiếu sức sống, Vương Tuấn Khải xuất hiện như hoàng tử áo trắng trên sàn catwalk">Vương Tuấn Khải</a> (nhóm TFBoys), đàn em kém cô đến 13 tuổi. Tuy nhiên, họ nhanh chóng phủ nhận. Đây cũng không phải lần đầu tiên <a href="https://vnexpress.net/doi-tu-thi-phi-cua-my-nhan-hoa-ngu-co-luc-na-trat-va-truong-thien-ai-1851492345.htm" target="_blank" title="Đời tư thị phi của mỹ nhân Hoa ngữ Cổ Lực Na Trát và Trương Thiên Ái">mỹ nhân Hoa ngữ</a> 8X vướng tin đồn tình cảm với các nam đồng nghiệp</p></figcaption><p data-placeholder="Nhập tác giả">WEIBO NV</p></figure><figure type="Photo"><p><img src="https://images2.thanhnien.vn/528068263637045248/2023/2/4/doitutinhcamthiphicuanudienvienduongmich14-1675494753857849687832.png" id="img_546227429623169024" w="1024" h="720" alt="Đời tư tình cảm thị phi của Dương Mịch - Ảnh 2." title="Đời tư tình cảm thị phi của Dương Mịch - Ảnh 2." rel="lightbox" photoid="546227429623169024" data-original="https://images2.thanhnien.vn/528068263637045248/2023/2/4/doitutinhcamthiphicuanudienvienduongmich14-1675494753857849687832.png" type="photo" width="" height=""/></p><figcaption><p data-placeholder="Nhập chú thích ảnh">Năm 2009 - 2010, Dương Mịch từng có lùm xùm yêu đương với Du Hạo Minh, nam diễn viên phim <i>Cùng ngắm mưa sao băng</i>. Thời điểm đó, cả hai bị &#34;soi&#34; có nhiều tương tác &#34;thân thiết&#34; trên mạng xã hội, dùng điện thoại giống nhau… Tháng 10.2010, Du Hạo Minh gặp tai nạn trên phim trường vì sơ suất của nhân viên. Anh bị bỏng đến 39% trên cơ thể. Một số nguồn tin thân cận khẳng định Dương Mịch đã nhanh chóng đến bệnh viện và khóc nức nở bên giường bệnh của bạn trai tin đồn</p></figcaption><p data-placeholder="Nhập tác giả">WEIBO NV</p></figure><figure type="Photo"><p><img src="https://images2.thanhnien.vn/528068263637045248/2023/2/4/doitutinhcamthiphicuanudienvienduongmich13-16754947530411819238535.png" id="img_546227414001360896" w="1024" h="720" alt="Đời tư tình cảm thị phi của Dương Mịch - Ảnh 3." title="Đời tư tình cảm thị phi của Dương Mịch - Ảnh 3." rel="lightbox" photoid="546227414001360896" data-original="https://images2.thanhnien.vn/528068263637045248/2023/2/4/doitutinhcamthiphicuanudienvienduongmich13-16754947530411819238535.png" type="photo" width="" height=""/></p><figcaption><p data-placeholder="Nhập chú thích ảnh">Truyền thông Trung Quốc liên tục đưa những tin tức không có kiểm chứng xoay quanh Dương Mịch và Du Hạo Minh, ám chỉ <a href="https://vnexpress.net/so-phan-ham-hiu-cua-nu-dien-vien-tre-tuoi-khien-nhieu-nguoi-thuong-xot-18523020308561153.htm" target="_blank" title="Số phận hẩm hiu của nữ diễn viên trẻ tuổi khiến nhiều người thương xót">nữ diễn viên</a> lựa chọn sự nghiệp diễn xuất và quyết định bỏ rơi người yêu sau khi anh bị nạn… Về sau, cả hai bác bỏ nghi vấn hẹn hò, khẳng định chỉ là bạn bè. Dù Du Hạo Minh nhiều lần phủ nhận, song, các cơ quan truyền thông vẫn thường nhắc lại tin đồn này</p></figcaption><p data-placeholder="Nhập tác giả">WEIBO NV</p></figure><figure type="Photo"><p><img src="https://images2.thanhnien.vn/528068263637045248/2023/2/4/doitutinhcamthiphicuanudienvienduongmich16-16754947528751829024194.png" id="img_546227393637134336" w="1024" h="720" alt="Đời tư tình cảm thị phi của Dương Mịch - Ảnh 4." title="Đời tư tình cảm thị phi của Dương Mịch - Ảnh 4." rel="lightbox" photoid="546227393637134336" data-original="https://images2.thanhnien.vn/528068263637045248/2023/2/4/doitutinhcamthiphicuanudienvienduongmich16-16754947528751829024194.png" type="photo" width="" height=""/></p><figcaption><p data-placeholder="Nhập chú thích ảnh">Năm 2012, <a href="https://vnexpress.net/duong-mich-va-luu-khai-uy-ly-hon-185814325.htm" target="_blank" title="Dương Mịch và Lưu Khải Uy ly hôn">Dương Mịch và Lưu Khải Uy</a> bén duyên khi hợp tác chung trong phim truyền hình <i>Như Ý</i>. Sau ba năm tìm hiểu, cả hai tổ chức đám cưới hoành tráng vào đầu năm 2014 ở Bali (Indonesia). Tháng 6 cùng năm, cặp đôi chào đón con gái đầu lòng. Thời kỳ mới cưới và còn mặn nồng, sao phim <a href="https://thanhnien.vn/loat-my-nhan-8x-dinh-dam-dang-mat-dan-vi-the-tai-lang-phim-anh-hoa-ngu-1851456436.htm" title="Cung tỏa tâm ngọc" data-rel="follow"><i>Cung tỏa tâm ngọc</i></a> và ông xã được xem là đôi vợ chồng kiểu mẫu của <a href="https://thanhnien.vn/chuong-tu-di-tre-trung-nang-dong-o-tuoi-44-185230203165347819.htm" title="showbiz Hoa ngữ" data-rel="follow">showbiz Hoa ngữ</a></p></figcaption><p data-placeholder="Nhập tác giả">CHỤP MÀN HÌNH SINA</p></figure><figure type="Photo"><p><img src="https://images2.thanhnien.vn/528068263637045248/2023/2/4/doitutinhcamthiphicuanudienvienduongmich11-16754947525321004478526.png" id="img_546227425175347200" w="1924" h="1368" alt="Đời tư tình cảm thị phi của Dương Mịch - Ảnh 5." title="Đời tư tình cảm thị phi của Dương Mịch - Ảnh 5." rel="lightbox" photoid="546227425175347200" data-original="https://images2.thanhnien.vn/528068263637045248/2023/2/4/doitutinhcamthiphicuanudienvienduongmich11-16754947525321004478526.png" type="photo" width="" height=""/></p><figcaption><p data-placeholder="Nhập chú thích ảnh">Tuy nhiên, 2 - 3 năm sau, cả hai khiến dư luận xôn xao khi dính tin tức &#34;ông ăn chả, bà ăn nem&#34; như Dương Mịch có nhiều hành động gần gũi quá mức với bạn diễn <a href="https://vnexpress.net/ly-dich-phong-lo-dien-sau-khi-bi-bat-vi-mua-dam-1851503693.htm" target="_blank" title="Lý Dịch Phong lộ diện sau khi bị bắt vì mua dâm">Lý Dịch Phong</a>, Hoàng Hiên (ảnh) hay vụ <a href="https://vnexpress.net/luu-khai-uy-hen-ho-my-nhan-kem-18-tuoi-da-co-chong-1851510188.htm" target="_blank" title="Lưu Khải Uy hẹn hò mỹ nhân kém 18 tuổi đã có chồng?">Lưu Khải Uy</a> &#34;duyệt kịch bản&#34; cùng Vương Âu đêm khuya…</p></figcaption><p data-placeholder="Nhập tác giả">POSTER PHIM</p></figure><figure type="Photo"><p><img src="https://images2.thanhnien.vn/528068263637045248/2023/2/4/doitutinhcamthiphicuanudienvienduongmich18-1675494751574785236633.png" id="img_546227387388698624" w="1024" h="720" alt="Đời tư tình cảm thị phi của Dương Mịch - Ảnh 6." title="Đời tư tình cảm thị phi của Dương Mịch - Ảnh 6." rel="lightbox" photoid="546227387388698624" data-original="https://images2.thanhnien.vn/528068263637045248/2023/2/4/doitutinhcamthiphicuanudienvienduongmich18-1675494751574785236633.png" type="photo" width="" height=""/></p><figcaption><p data-placeholder="Nhập chú thích ảnh">Đặc biệt, quãng thời gian 2014 - 2015, Dương Mịch không ngừng dính tin đồn ngoại tình với <a href="https://vnexpress.net/nam-than-ly-dich-phong-tuot-doc-khong-phanh-vi-scandal-mua-dam-1851502028.htm" target="_blank" title="Nam thần Lý Dịch Phong &#39;tuột dốc không phanh&#39; vì scandal mua dâm">Lý Dịch Phong</a>. Họ bị cho là &#34;phim giả tình thật&#34; qua lần hợp tác trong <i><a href="https://vnexpress.net/meo-lua-chon-mon-phai-trong-co-kiem-ky-dam-online-1851149772.htm" target="_blank" title="Mẹo lựa chọn môn phái trong Cổ Kiếm Kỳ Đàm Online">Cổ kiếm kỳ đàm</a></i> và <i>Phanh nhiên tinh động </i>(ảnh phải). Vài dân mạng tung tin Dương Mịch và <a href="https://vnexpress.net/tai-khoan-mang-xa-hoi-cua-ly-dich-phong-bay-mau-hau-be-boi-mua-dam-1851500263.htm" target="_blank" title="Tài khoản mạng xã hội của Lý Dịch Phong &#39;bay màu&#39; hậu bê bối mua dâm">Lý Dịch Phong</a> có nhiều hành động &#34;ám muội&#34; trên phim trường, Lưu Khải Uy chứng kiến cảnh vụng trộm của vợ sau khi bí mật đến trường quay thăm cô… Lúc bấy giờ, đôi Uy - Mịch và cả <a href="https://vnexpress.net/ly-dich-phong-bi-tuoc-giai-thuong-nhan-hang-quay-lung-sau-scandal-mua-dam-1851499127.htm" target="_blank" title="Lý Dịch Phong bị tước giải thưởng, nhãn hàng quay lưng sau scandal mua dâm">Lý Dịch Phong</a> kiên quyết phủ nhận mọi chuyện</p></figcaption><p data-placeholder="Nhập tác giả">WEIBO NV</p></figure><figure type="Photo"><p><img src="https://images2.thanhnien.vn/528068263637045248/2023/2/4/doitutinhcamthiphicuanudienvienduongmich19-1675494752725735635091.jpeg" id="img_546227381848190976" w="1280" h="852" alt="Đời tư tình cảm thị phi của Dương Mịch - Ảnh 7." title="Đời tư tình cảm thị phi của Dương Mịch - Ảnh 7." rel="lightbox" photoid="546227381848190976" data-original="https://images2.thanhnien.vn/528068263637045248/2023/2/4/doitutinhcamthiphicuanudienvienduongmich19-1675494752725735635091.jpeg" type="photo" width="" height=""/></p><figcaption><p data-placeholder="Nhập chú thích ảnh">Cuối năm 2018, Dương Mịch và Lưu Khải Uy bất ngờ chia sẻ tin tức tuyên bố ly hôn trong êm đẹp. Cả hai cùng nhau chăm sóc con gái Tiểu Gạo Nếp, Kể từ khi chia tay chồng cũ, Bạch Thiển của <a href="https://vnexpress.net/duong-mich-hoa-nu-cuong-yeu-ban-dien-tam-sinh-tam-the-trong-phim-moi-1851042747.htm" target="_blank" title="Dương Mịch hóa nữ cường, yêu bạn diễn ‘Tam sinh tam thế’ trong phim mới"><i>Tam sinh tam thế</i></a> ít xuất hiện bên con gái, nên cô thường chịu mắng là bà mẹ vô trách nhiệm, tham công tiếc việc bỏ bê con cái</p></figcaption><p data-placeholder="Nhập tác giả">WEIBO NV</p></figure><figure type="Photo"><p><img src="https://images2.thanhnien.vn/528068263637045248/2023/2/4/doitutinhcamthiphicuanudienvienduongmich17-1675494753373771365368.png" id="img_546227421263372288" w="1024" h="720" alt="Đời tư tình cảm thị phi của Dương Mịch - Ảnh 8." title="Đời tư tình cảm thị phi của Dương Mịch - Ảnh 8." rel="lightbox" photoid="546227421263372288" data-original="https://images2.thanhnien.vn/528068263637045248/2023/2/4/doitutinhcamthiphicuanudienvienduongmich17-1675494753373771365368.png" type="photo" width="" height=""/></p><figcaption><p data-placeholder="Nhập chú thích ảnh">Sau khi quay về cuộc sống độc thân, đời tư của Dương Mịch gắn liền với cái tên Ngụy Đại Huân, sao nam kém cô 3 tuổi. Từ năm 2019 đến 2021, paparazzi nhiều lần &#34;tóm&#34; được cảnh cả hai về chung khách sạn, sánh vai đi dạo, mua sắm, ăn uống… Tuy nhiên, họ chưa bao giờ lên tiếng về nghi vấn yêu đương. Đến giữa năm 2021, bà mẹ một con úp mở đã chia tay Ngụy Đại Huân</p></figcaption><p data-placeholder="Nhập tác giả">WEIBO NV</p></figure><figure type="Photo"><p><img src="https://images2.thanhnien.vn/528068263637045248/2023/2/4/doitutinhcamthiphicuanudienvienduongmich3-1675495075591462789041.png" id="img_546228742142595072" w="1200" h="750" alt="Đời tư tình cảm thị phi của Dương Mịch - Ảnh 9." title="Đời tư tình cảm thị phi của Dương Mịch - Ảnh 9." rel="lightbox" photoid="546228742142595072" data-original="https://images2.thanhnien.vn/528068263637045248/2023/2/4/doitutinhcamthiphicuanudienvienduongmich3-1675495075591462789041.png" type="photo" width="" height=""/></p><figcaption><p data-placeholder="Nhập chú thích ảnh">Kể từ đó đến nay, Dương Mịch đôi khi vướng phải một số lời đồn thổi &#34;phim giả tình thật&#34; với bạn diễn vì đóng cảnh tình cảm quá đạt</p></figcaption><p data-placeholder="Nhập tác giả">WEIBO NV</p></figure><figure type="Photo"><p><img src="https://images2.thanhnien.vn/528068263637045248/2023/2/4/doitutinhcamthiphicuanudienvienduongmich15-16754947531981507963928.png" id="img_546227397112516608" w="1024" h="720" alt="Đời tư tình cảm thị phi của Dương Mịch - Ảnh 10." title="Đời tư tình cảm thị phi của Dương Mịch - Ảnh 10." rel="lightbox" photoid="546227397112516608" data-original="https://images2.thanhnien.vn/528068263637045248/2023/2/4/doitutinhcamthiphicuanudienvienduongmich15-16754947531981507963928.png" type="photo" width="" height=""/></p><figcaption><p data-placeholder="Nhập chú thích ảnh">Gần đây nhất, cô trở thành chủ đề được bàn luận sôi nổi vì dính tin đồn sắp bị &#34;phong sát&#34; vì hẹn hò đàn em Vương Tuấn Khải. Dân mạng nhận định những tin đồn tình cảm của <a href="https://vnexpress.net/trieu-le-dinh-duong-mich-va-cac-my-nhan-hoa-ngu-len-huong-sau-khi-ly-hon-1851487908.htm" target="_blank" title="Triệu Lệ Dĩnh, Dương Mịch và các mỹ nhân Hoa ngữ ‘lên hương’ sau khi ly hôn">Dương Mịch</a> qua mỗi năm ngày càng gây sốc và phong phú hơn</p></figcaption><p data-placeholder="Nhập tác giả">CHỤP MÀN HÌNH SINA</p></figure><figure type="Photo"><p><img src="https://images2.thanhnien.vn/528068263637045248/2023/2/4/doitutinhcamthiphicuanudienvienduongmich110-1675494752351915125196.png" id="img_546227434269577216" w="1200" h="1135" alt="Đời tư tình cảm thị phi của Dương Mịch - Ảnh 11." title="Đời tư tình cảm thị phi của Dương Mịch - Ảnh 11." rel="lightbox" photoid="546227434269577216" data-original="https://images2.thanhnien.vn/528068263637045248/2023/2/4/doitutinhcamthiphicuanudienvienduongmich110-1675494752351915125196.png" type="photo" width="" height=""/></p><figcaption><p data-placeholder="Nhập chú thích ảnh">Bất chấp thị phi tình cảm, Dương Mịch vẫn đang được mong ngóng trở lại màn ảnh nhỏ với bộ phim truyền hình cổ trang <i>Hồ yêu tiểu hồng nương</i>, đóng cặp với Cung Tuấn</p></figcaption><p data-placeholder="Nhập tác giả">POSTER PHIM</p></figure><!--Sat Feb 04 2023 15:24:56 GMT+0700 (Giờ Đông Dương) -- Sat Feb 04 2023 15:24:56 GMT+0700 (Giờ Đông Dương) -- Sat Feb 04 2023 15:25:01 GMT+0700 (Giờ Đông Dương)-->
