    <h1>Mỹ nam Hàn cao gần 1,9m trong phim ‘Khóa học yêu cấp tốc’</h1>

                                <div data-role="content" itemprop="articleBody" data-io-article-url="https://thanhnien.vn/my-nam-han-cao-gan-19m-trong-phim-khoa-hoc-yeu-cap-toc-18523021215204132.htm">
                                                                                                                
                                    <figure type="Photo"><p><img src="https://images2.thanhnien.vn/528068263637045248/2023/2/12/mynam10xcao19mphimkhoahocyeucaptoc2-16761889901401728796159.jpg" id="img_549139271999954944" w="1500" h="1000" alt="Mỹ nam Hàn cao gần 1,9m gây sốt trong phim ‘Khóa học yêu cấp tốc’ - Ảnh 1." title="Mỹ nam Hàn cao gần 1,9m gây sốt trong phim ‘Khóa học yêu cấp tốc’ - Ảnh 1." rel="lightbox" photoid="549139271999954944" data-original="https://images2.thanhnien.vn/528068263637045248/2023/2/12/mynam10xcao19mphimkhoahocyeucaptoc2-16761889901401728796159.jpg" type="photo" width="" height=""/></p><figcaption><p data-placeholder="Nhập chú thích ảnh">Tối 11.2, tập 9 <i><a href="https://thanhnien.vn/my-nhan-10x-khoa-hoc-yeu-cap-toc-gay-sot-voi-loat-anh-xinh-dep-185230209151058304.htm" target="_blank" title="Mỹ nhân 10X &#39;Khóa học yêu cấp tốc&#39; gây sốt với loạt ảnh xinh đẹp">Khóa học yêu cấp tốc</a></i> phát sóng với những tình tiết thú vị lẫn ngọt ngào. Rating tập 9 đạt 10,4%, con số lý tưởng và có chiều hướng tăng hơn nữa ở các tập sau  <br/></p></figcaption><p data-placeholder="Nhập tác giả">Poster phim</p></figure><figure type="Photo"><p><img src="https://images2.thanhnien.vn/528068263637045248/2023/2/12/mynam10xcao19mphimkhoahocyeucaptoc17-1676188989418989006760.jpeg" id="img_549139232521584640" w="2000" h="1333" alt="Mỹ nam Hàn cao gần 1,9m gây sốt trong phim ‘Khóa học yêu cấp tốc’ - Ảnh 2." title="Mỹ nam Hàn cao gần 1,9m gây sốt trong phim ‘Khóa học yêu cấp tốc’ - Ảnh 2." rel="lightbox" photoid="549139232521584640" data-original="https://images2.thanhnien.vn/528068263637045248/2023/2/12/mynam10xcao19mphimkhoahocyeucaptoc17-1676188989418989006760.jpeg" type="photo" width="" height=""/></p><figcaption><p data-placeholder="Nhập chú thích ảnh">Đặc biệt, tập phim <i><a href="https://thanhnien.vn/canh-phim-gay-xuc-dong-trong-khoa-hoc-yeu-cap-toc-185230201140159001.htm" target="_blank" title="Cảnh phim gây xúc động trong ‘Khóa học yêu cấp tốc’">Khóa học yêu cấp tốc</a></i> lần này không chỉ khai thác câu chuyện tình cảm của những nhân vật trưởng thành, mà còn khắc họa khéo léo các chuyển biến tâm lý của lứa tuổi học sinh<br/></p></figcaption><p data-placeholder="Nhập tác giả">Poster phim</p></figure><figure type="Photo"><p><img src="https://images2.thanhnien.vn/528068263637045248/2023/2/12/mynam10xcao19mphimkhoahocyeucaptoc19-1676188989268942274070.png" id="img_549139261098455040" w="1576" h="900" alt="Mỹ nam Hàn cao gần 1,9m gây sốt trong phim ‘Khóa học yêu cấp tốc’ - Ảnh 3." title="Mỹ nam Hàn cao gần 1,9m gây sốt trong phim ‘Khóa học yêu cấp tốc’ - Ảnh 3." rel="lightbox" photoid="549139261098455040" data-original="https://images2.thanhnien.vn/528068263637045248/2023/2/12/mynam10xcao19mphimkhoahocyeucaptoc19-1676188989268942274070.png" type="photo" width="" height=""/></p><figcaption><p data-placeholder="Nhập chú thích ảnh">Điển hình như mối quan hệ thù địch giữa hai nam sinh Lee Seon Jae (Lee Chae Min đóng) (giữa) và Seo Geon Hu (Lee Min Jae) (trái) bất ngờ được cải thiện, sau khi cả hai cùng tham gia vào vụ đánh nhau để bảo vệ cô bạn thân Nam Hae Eh (<a href="https://thanhnien.vn/my-nhan-10x-khoa-hoc-yeu-cap-toc-gay-sot-voi-loat-anh-xinh-dep-185230209151058304.htm" title="Roh Yoon Seo" data-rel="follow">Roh Yoon Seo</a>) (phải)</p></figcaption><p data-placeholder="Nhập tác giả">Poster phim</p></figure><figure type="Photo"><p><img src="https://images2.thanhnien.vn/528068263637045248/2023/2/12/mynam10xcao19mphimkhoahocyeucaptoc16-1676188990736974676663.jpeg" id="img_549139256311427072" w="2000" h="1333" alt="Mỹ nam Hàn cao gần 1,9m gây sốt trong phim ‘Khóa học yêu cấp tốc’ - Ảnh 4." title="Mỹ nam Hàn cao gần 1,9m gây sốt trong phim ‘Khóa học yêu cấp tốc’ - Ảnh 4." rel="lightbox" photoid="549139256311427072" data-original="https://images2.thanhnien.vn/528068263637045248/2023/2/12/mynam10xcao19mphimkhoahocyeucaptoc16-1676188990736974676663.jpeg" type="photo" width="" height=""/></p><figcaption><p data-placeholder="Nhập chú thích ảnh">Khoảnh khắc Lee Seon Jae chủ động chép phạt cho &#34;cậu bạn chung lớp khó ưa&#34; Seo Geon Hu khiến khán giả thích thú. Thậm chí, không ít người xem còn ngóng chờ tương tác tiếp theo của bộ đôi trái ngược Lee Seon Jae - Seo Geon Hu hơn ở các tập sau <i><a href="https://thanhnien.vn/canh-phim-gay-xuc-dong-trong-khoa-hoc-yeu-cap-toc-185230201140159001.htm" target="_blank" title="Cảnh phim gây xúc động trong ‘Khóa học yêu cấp tốc’">Khóa học yêu cấp tốc</a></i></p></figcaption><p data-placeholder="Nhập tác giả">Poster phim</p></figure><figure type="Photo"><p><img src="https://images2.thanhnien.vn/528068263637045248/2023/2/12/mynam10xcao19mphimkhoahocyeucaptoc111-16761889889421271303536.png" id="img_549139243102031872" w="1200" h="700" alt="Mỹ nam Hàn cao gần 1,9m gây sốt trong phim ‘Khóa học yêu cấp tốc’ - Ảnh 5." title="Mỹ nam Hàn cao gần 1,9m gây sốt trong phim ‘Khóa học yêu cấp tốc’ - Ảnh 5." rel="lightbox" photoid="549139243102031872" data-original="https://images2.thanhnien.vn/528068263637045248/2023/2/12/mynam10xcao19mphimkhoahocyeucaptoc111-16761889889421271303536.png" type="photo" width="" height=""/></p><figcaption><p data-placeholder="Nhập chú thích ảnh">Đây không phải là lần đầu tiên nhân vật Lee Seon Jae của Lee Chae Min gây chú ý. Kể từ khi <i><a href="https://thanhnien.vn/rating-phim-han-khoa-hoc-yeu-cap-toc-tang-gap-3-lan-185230130162648799.htm" target="_blank" title="Rating phim Hàn ‘Khóa học yêu cấp tốc’ tăng gấp 3 lần">Khóa học yêu cấp tốc</a></i> phát sóng đến nay, nam diễn viên họ Lee cùng vai diễn của mình liên tục trở thành chủ đề được bàn luận sôi nổi bởi ngoại hình cao ráo nổi bật</p></figcaption><p data-placeholder="Nhập tác giả">Poster phim</p></figure><figure type="Photo"><p><img src="https://images2.thanhnien.vn/528068263637045248/2023/2/12/mynam10xcao19mphimkhoahocyeucaptoc11-16761889887951254458459.jpg" id="img_549139217775271936" w="1080" h="1620" alt="Mỹ nam Hàn cao gần 1,9m gây sốt trong phim ‘Khóa học yêu cấp tốc’ - Ảnh 6." title="Mỹ nam Hàn cao gần 1,9m gây sốt trong phim ‘Khóa học yêu cấp tốc’ - Ảnh 6." rel="lightbox" photoid="549139217775271936" data-original="https://images2.thanhnien.vn/528068263637045248/2023/2/12/mynam10xcao19mphimkhoahocyeucaptoc11-16761889887951254458459.jpg" type="photo" width="" height=""/></p><figcaption><p data-placeholder="Nhập chú thích ảnh"><a href="https://thanhnien.vn/duoi-bong-trung-dien-lap-ky-luc-rating-my-nam-10x-duoc-san-lung-1851518820.htm" target="_blank" title="‘Dưới bóng trung điện’ lập kỷ lục rating, mỹ nam 10X được ‘săn lùng’">Mỹ nam 10X</a> cao 1,89m, sở hữu gương mặt điển trai, thư sinh cùng nụ cười ấm áp. Lee Chae Min diễn xuất tự nhiên, đem đến một Lee Seon Jae học giỏi, gương mẫu có bề ngoài hoàn hảo nhưng bên trong thâm tâm chất chứa nhiều nỗi niềm vì gia đình rạn nứt</p></figcaption><p data-placeholder="Nhập tác giả">Poster phim</p></figure><figure type="Photo"><p><img src="https://images2.thanhnien.vn/528068263637045248/2023/2/12/mynam10xcao19mphimkhoahocyeucaptoc12-16761889903092144535118.jpg" id="img_549139223490998272" w="1500" h="1000" alt="Mỹ nam Hàn cao gần 1,9m gây sốt trong phim ‘Khóa học yêu cấp tốc’ - Ảnh 7." title="Mỹ nam Hàn cao gần 1,9m gây sốt trong phim ‘Khóa học yêu cấp tốc’ - Ảnh 7." rel="lightbox" photoid="549139223490998272" data-original="https://images2.thanhnien.vn/528068263637045248/2023/2/12/mynam10xcao19mphimkhoahocyeucaptoc12-16761889903092144535118.jpg" type="photo" width="" height=""/></p><figcaption><p data-placeholder="Nhập chú thích ảnh">Theo nhiều dân mạng, <a href="https://thanhnien.vn/kim-soo-hyun-va-loat-nam-dien-vien-truyen-hinh-giau-nhat-han-quoc-185230204184254241.htm" target="_blank" title="Kim Soo Hyun và loạt nam diễn viên truyền hình giàu nhất Hàn Quốc">nam diễn viên</a> sinh năm 2000 khắc họa thành công hình tượng nam sinh gương mẫu của Lee Seon Jae dù đất diễn trong phim không nhiều</p></figcaption><p data-placeholder="Nhập tác giả">Poster phim</p></figure><figure type="Photo"><p><img src="https://images2.thanhnien.vn/528068263637045248/2023/2/12/mynam10xcao19mphimkhoahocyeucaptoc14-16761889908831942164740.jpg" id="img_549139248058765312" w="1500" h="1000" alt="Mỹ nam Hàn cao gần 1,9m gây sốt trong phim ‘Khóa học yêu cấp tốc’ - Ảnh 8." title="Mỹ nam Hàn cao gần 1,9m gây sốt trong phim ‘Khóa học yêu cấp tốc’ - Ảnh 8." rel="lightbox" photoid="549139248058765312" data-original="https://images2.thanhnien.vn/528068263637045248/2023/2/12/mynam10xcao19mphimkhoahocyeucaptoc14-16761889908831942164740.jpg" type="photo" width="" height=""/></p><figcaption><p data-placeholder="Nhập chú thích ảnh">Bên cạnh đó, &#34;phản ứng hóa học&#34; đáng yêu của Lee Chae Min và Roh Yoon Seo tạo cơn sốt trên mạng xã hội. Những hình ảnh, video của cả hai ở ngoài đời cũng được khán giả chia sẻ rầm rộ</p></figcaption><p data-placeholder="Nhập tác giả">Poster phim</p></figure><figure type="Photo"><p><img src="https://images2.thanhnien.vn/528068263637045248/2023/2/12/mynam10xcao19mphimkhoahocyeucaptoc115-16761889891111789307023.png" id="img_549139227384061952" w="1200" h="900" alt="Mỹ nam Hàn cao gần 1,9m gây sốt trong phim ‘Khóa học yêu cấp tốc’ - Ảnh 9." title="Mỹ nam Hàn cao gần 1,9m gây sốt trong phim ‘Khóa học yêu cấp tốc’ - Ảnh 9." rel="lightbox" photoid="549139227384061952" data-original="https://images2.thanhnien.vn/528068263637045248/2023/2/12/mynam10xcao19mphimkhoahocyeucaptoc115-16761889891111789307023.png" type="photo" width="" height=""/></p><figcaption><p data-placeholder="Nhập chú thích ảnh">Có thể nói, <i>Khóa học yêu cấp tốc</i> được xem là tác phẩm mang tính bước ngoặt trong sự nghiệp diễn xuất của Lee Chae Min, chàng trai trẻ chỉ mới khởi nghiệp vào năm 2011 với phim truyền hình <i>Đẳng cấp thượng lưu</i></p></figcaption><p data-placeholder="Nhập tác giả">Instagram NV</p></figure><figure type="Photo"><p><img src="https://images2.thanhnien.vn/528068263637045248/2023/2/12/mynam10xcao19mphimkhoahocyeucaptoc6-16761893419231376423211.png" id="img_549140697685106688" w="1200" h="700" alt="Mỹ nam Hàn cao gần 1,9m gây sốt trong phim ‘Khóa học yêu cấp tốc’ - Ảnh 10." title="Mỹ nam Hàn cao gần 1,9m gây sốt trong phim ‘Khóa học yêu cấp tốc’ - Ảnh 10." rel="lightbox" photoid="549140697685106688" data-original="https://images2.thanhnien.vn/528068263637045248/2023/2/12/mynam10xcao19mphimkhoahocyeucaptoc6-16761893419231376423211.png" type="photo" width="" height=""/></p><figcaption><p data-placeholder="Nhập chú thích ảnh">Sau 2 năm vào nghề, ngôi sao Hàn 23 tuổi lần lượt góp mặt trong các tác phẩm màn ảnh nhỏ, như: <i>Chạy đến bên em với vận tốc 493km </i>(ảnh trái), <i><a href="https://thanhnien.vn/cap-sao-hoan-hon-2-tung-loat-anh-tinh-tu-1851534918.htm" target="_blank" title="Cặp sao ‘Hoàn hồn 2’ tung loạt ảnh tình tứ">Hoàn hồn 2</a></i> (phải)<i> </i>và mới nhất là <i>Khóa học yêu cấp tốc</i></p></figcaption><p data-placeholder="Nhập tác giả">Poster phim</p></figure><figure type="Photo"><p><img src="https://images2.thanhnien.vn/528068263637045248/2023/2/12/mynam10xcao19mphimkhoahocyeucaptoc3-1676189077719308840353.png" id="img_549139598920683520" w="1200" h="1497" alt="Mỹ nam Hàn cao gần 1,9m gây sốt trong phim ‘Khóa học yêu cấp tốc’ - Ảnh 11." title="Mỹ nam Hàn cao gần 1,9m gây sốt trong phim ‘Khóa học yêu cấp tốc’ - Ảnh 11." rel="lightbox" photoid="549139598920683520" data-original="https://images2.thanhnien.vn/528068263637045248/2023/2/12/mynam10xcao19mphimkhoahocyeucaptoc3-1676189077719308840353.png" type="photo" width="" height=""/></p><figcaption><p data-placeholder="Nhập chú thích ảnh">Ngoài ra, anh còn đang đảm nhận vị trí MC của show âm nhạc <a href="https://thanhnien.vn/fan-viet-cuong-nhiet-voi-dem-nhac-music-bank-in-hanoi-185458113.htm" target="_blank" title="Fan Việt cuồng nhiệt với đêm nhạc Music Bank in Hanoi"><i>Music Bank</i></a> và được tham dự nhiều sự kiện nghệ thuật. Lee Chae Min được xem là một trong những sao trẻ triển vọng của làng phim ảnh xứ kim chi</p></figcaption><p data-placeholder="Nhập tác giả">Instagram NV</p></figure><figure type="Photo"><p><img src="https://images2.thanhnien.vn/528068263637045248/2023/2/12/mynam10xcao19mphimkhoahocyeucaptoc110-1676188989742725610574.png" id="img_549139252668116992" w="1200" h="1545" alt="Mỹ nam Hàn cao gần 1,9m gây sốt trong phim ‘Khóa học yêu cấp tốc’ - Ảnh 12." title="Mỹ nam Hàn cao gần 1,9m gây sốt trong phim ‘Khóa học yêu cấp tốc’ - Ảnh 12." rel="lightbox" photoid="549139252668116992" data-original="https://images2.thanhnien.vn/528068263637045248/2023/2/12/mynam10xcao19mphimkhoahocyeucaptoc110-1676188989742725610574.png" type="photo" width="" height=""/></p><figcaption><p data-placeholder="Nhập chú thích ảnh">Hiện Lee Chae Min trực thuộc công ty Gold Medalist Entertainment, nơi quản lý dàn <a href="https://thanhnien.vn/song-joong-ki-va-loat-sao-han-lay-vo-ngoai-quoc-185230203225650181.htm" target="_blank" title="Song Joong Ki và loạt sao Hàn lấy vợ ngoại quốc">sao Hàn</a> đình đám như <a href="https://thanhnien.vn/kim-soo-hyun-va-loat-nam-dien-vien-truyen-hinh-giau-nhat-han-quoc-185230204184254241.htm" target="_blank" title="Kim Soo Hyun và loạt nam diễn viên truyền hình giàu nhất Hàn Quốc">Kim Soo Hyun</a>, Seo Ye Ji, Seol In Ah… Mỹ nam <i><a href="https://thanhnien.vn/nu-hoang-canh-nong-jeon-do-yeon-tai-xuat-trong-khoa-hoc-yeu-cap-toc-1851544500.htm" target="_blank" title="‘Nữ hoàng cảnh nóng’ Jeon Do Yeon tái xuất trong ‘Khóa học yêu cấp tốc’">Khóa học yêu cấp tốc</a></i> đang theo học Đại học Nghệ thuật Quốc gia Hàn Quốc, chuyên ngành diễn xuất</p></figcaption><p data-placeholder="Nhập tác giả">Vogue</p></figure><!--Sun Feb 12 2023 19:32:29 GMT+0700 (Giờ Đông Dương) -- Sun Feb 12 2023 19:32:29 GMT+0700 (Giờ Đông Dương) -- Sun Feb 12 2023 19:32:36 GMT+0700 (Giờ Đông Dương)-->
