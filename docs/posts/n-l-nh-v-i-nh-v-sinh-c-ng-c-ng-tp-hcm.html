    <h1>&#39;Ớn lạnh&#39; với nhà vệ sinh công cộng ở TP.HCM</h1>

                            <h2 data-role="sapo">
                                Nhà vệ sinh công cộng tại TP.HCM đã hiếm lại còn dơ bẩn, đứng ở cửa phải &#34;nổi da gà&#34;, &#34;ớn lạnh&#34;; nhiều nơi xuống cấp, bỏ hoang; có chỗ lại cửa đóng then cài...
                            </h2>
                            <div>
                                <div data-role="content" itemprop="articleBody">
                                                                                                                
                                    <figure type="Photo"><p><img src="https://images2.thanhnien.vn/528068263637045248/2023/2/3/hinh-nvs-2-16754359137491681475925.jpg" id="img_545980698934845440" w="2000" h="1323" alt="Nhà vệ sinh công cộng tại TP.HCM: vừa hiếm, vừa bẩn - Ảnh 2." title="Nhà vệ sinh công cộng tại TP.HCM: vừa hiếm, vừa bẩn - Ảnh 2." rel="lightbox" photoid="545980698934845440" data-original="https://images2.thanhnien.vn/528068263637045248/2023/2/3/hinh-nvs-2-16754359137491681475925.jpg" type="photo" width="" height=""/></p><figcaption><p data-placeholder="Nhập chú thích ảnh">Ghi nhận tại một số nhà vệ sinh công cộng trên đường Tú Xương (Q.3), đường Hùng Vương (Q.5)... cho thấy, các nhà vệ sinh này không có người dọn dẹp, vệ sinh thường xuyên và bị bỏ hoang nên vô cùng dơ bẩn</p></figcaption><p data-placeholder="Nhập tác giả">NHẬT THỊNH</p></figure><figure type="Photo"><p><img src="https://images2.thanhnien.vn/528068263637045248/2023/2/3/hinh-3-nvs-16754359346601900623448.jpg" id="img_545980790731382784" w="2000" h="1334" alt="Nhà vệ sinh công cộng tại TP.HCM: vừa hiếm, vừa bẩn - Ảnh 3." title="Nhà vệ sinh công cộng tại TP.HCM: vừa hiếm, vừa bẩn - Ảnh 3." rel="lightbox" photoid="545980790731382784" data-original="https://images2.thanhnien.vn/528068263637045248/2023/2/3/hinh-3-nvs-16754359346601900623448.jpg" type="photo" width="" height=""/></p><figcaption><p data-placeholder="Nhập chú thích ảnh">Thiết bị vệ sinh trở thành nơi chưa rác</p></figcaption><p data-placeholder="Nhập tác giả">NHẬT THỊNH</p></figure><figure type="Photo"><p><img src="https://images2.thanhnien.vn/528068263637045248/2023/2/3/hinh-4-nvs-16754359618401666613187.jpg" id="img_545980896054218752" w="2000" h="1334" alt="Nhà vệ sinh công cộng tại TP.HCM: vừa hiếm, vừa bẩn - Ảnh 4." title="Nhà vệ sinh công cộng tại TP.HCM: vừa hiếm, vừa bẩn - Ảnh 4." rel="lightbox" photoid="545980896054218752" data-original="https://images2.thanhnien.vn/528068263637045248/2023/2/3/hinh-4-nvs-16754359618401666613187.jpg" type="photo" width="" height=""/></p><figcaption><p data-placeholder="Nhập chú thích ảnh">Khu nhà vệ sinh hoang phế từ lâu, không người dọn dẹp</p></figcaption><p data-placeholder="Nhập tác giả">NHẬT THỊNH</p></figure><figure type="Photo"><p><img src="https://images2.thanhnien.vn/528068263637045248/2023/2/3/hinh-5-nvs-1675435982862540973473.jpg" id="img_545980984927657984" w="2000" h="1334" alt="Nhà vệ sinh công cộng tại TP.HCM: vừa hiếm, vừa bẩn - Ảnh 5." title="Nhà vệ sinh công cộng tại TP.HCM: vừa hiếm, vừa bẩn - Ảnh 5." rel="lightbox" photoid="545980984927657984" data-original="https://images2.thanhnien.vn/528068263637045248/2023/2/3/hinh-5-nvs-1675435982862540973473.jpg" type="photo" width="" height=""/></p><figcaption><p data-placeholder="Nhập chú thích ảnh">Cô Lan, người bán đồ gần đó, cho biết nơi này không sử dụng tầm 3 - 4 năm nay. &#34;Lẽ ra phải phá bỏ nếu không dùng đến, để vậy trông quá ghê&#34;, cô nói.</p></figcaption><p data-placeholder="Nhập tác giả">NHẬT THỊNH</p></figure><figure type="Photo"><p><img src="https://images2.thanhnien.vn/528068263637045248/2023/2/3/nvs2-1675438584562606276703.jpg" id="img_545991793764876288" w="2000" h="1323" alt="&#39;Ớn lạnh&#39; với nhà vệ sinh công cộng tại TP.HCM - Ảnh 5." title="&#39;Ớn lạnh&#39; với nhà vệ sinh công cộng tại TP.HCM - Ảnh 5." rel="lightbox" photoid="545991793764876288" data-original="https://images2.thanhnien.vn/528068263637045248/2023/2/3/nvs2-1675438584562606276703.jpg" type="photo" width="" height=""/></p><figcaption><p data-placeholder="Nhập chú thích ảnh">Một nhà vệ sinh công cộng xuống cấp, tạm bợ</p></figcaption><p data-placeholder="Nhập tác giả">NHẬT THỊNH</p></figure><figure type="Photo"><p><img src="https://images2.thanhnien.vn/528068263637045248/2023/2/3/hinh-6-nvs-16754360283681471318828.jpg" id="img_545981177357799424" w="2000" h="1334" alt="Nhà vệ sinh công cộng tại TP.HCM: vừa hiếm, vừa bẩn - Ảnh 6." title="Nhà vệ sinh công cộng tại TP.HCM: vừa hiếm, vừa bẩn - Ảnh 6." rel="lightbox" photoid="545981177357799424" data-original="https://images2.thanhnien.vn/528068263637045248/2023/2/3/hinh-6-nvs-16754360283681471318828.jpg" type="photo" width="" height=""/></p><figcaption><p data-placeholder="Nhập chú thích ảnh">Tại khu vực trạm xe buýt Hàm Nghi (Q.1), nơi hàng ngày có hàng ngàn lượt người gồm sinh viên, người lao động và cả du khách qua lại nhưng chỉ có một điểm nhà vệ sinh. Tuy nhiên, nơi này đang trong tình trạng bốc mùi hôi thối</p></figcaption><p data-placeholder="Nhập tác giả">NHẬT THỊNH</p></figure><figure type="Photo"><p><img src="https://images2.thanhnien.vn/528068263637045248/2023/2/3/nvs-8-16754361523611170395539.jpg" id="img_545981699714777088" w="2000" h="1334" alt="Nhà vệ sinh công cộng tại TP.HCM: vừa hiếm, vừa bẩn - Ảnh 7." title="Nhà vệ sinh công cộng tại TP.HCM: vừa hiếm, vừa bẩn - Ảnh 7." rel="lightbox" photoid="545981699714777088" data-original="https://images2.thanhnien.vn/528068263637045248/2023/2/3/nvs-8-16754361523611170395539.jpg" type="photo" width="" height=""/></p><figcaption><p data-placeholder="Nhập chú thích ảnh">Ngày 3.2 khi chúng tôi có mặt tại đây, địa điểm này cũng đã bị khóa</p></figcaption><p data-placeholder="Nhập tác giả">NHẬT THỊNH</p></figure><figure type="Photo"><p><img src="https://images2.thanhnien.vn/528068263637045248/2023/2/3/nvs-1-16754384141671949213011.jpg" id="img_545991077306605568" w="2000" h="1367" alt="&#39;Ớn lạnh&#39; với nhà vệ sinh công cộng tại TP.HCM - Ảnh 8." title="&#39;Ớn lạnh&#39; với nhà vệ sinh công cộng tại TP.HCM - Ảnh 8." rel="lightbox" photoid="545991077306605568" data-original="https://images2.thanhnien.vn/528068263637045248/2023/2/3/nvs-1-16754384141671949213011.jpg" type="photo" width="" height=""/></p><figcaption><p data-placeholder="Nhập chú thích ảnh">Một điểm nhà vệ sinh công cộng ở góc đường Lê Quý Đôn, Q.3, cũng đang bị đóng của</p></figcaption><p data-placeholder="Nhập tác giả">NHẬT THỊNH</p></figure><figure type="Photo"><p><img src="https://images2.thanhnien.vn/528068263637045248/2023/2/3/nvs-9-16754362082582059242048.jpg" id="img_545981928107556864" w="2000" h="1380" alt="Nhà vệ sinh công cộng tại TP.HCM: vừa hiếm, vừa bẩn - Ảnh 8." title="Nhà vệ sinh công cộng tại TP.HCM: vừa hiếm, vừa bẩn - Ảnh 8." rel="lightbox" photoid="545981928107556864" data-original="https://images2.thanhnien.vn/528068263637045248/2023/2/3/nvs-9-16754362082582059242048.jpg" type="photo" width="" height=""/></p><figcaption><p data-placeholder="Nhập chú thích ảnh">Làm nghề giao hàng, anh Trịnh Thanh Tân (ngụ Q.6) cho biết: &#34;Khi có nhu cầu, tôi thường tìm vào các cửa hàng tiện lợi, cây xăng để đi nhờ. Nhà vệ sinh công cộng ở trung tâm rất ít, nhưng cũng may có một vài cái khá sạch sẽ như chỗ công viên 23.9, công viên Tao Đàn, công viên Lê Văn Tám&#34;, anh Tân chia sẻ. Trong ảnh là nhà vệ sinh khá tươm tất ở công viên 23.9</p></figcaption><p data-placeholder="Nhập tác giả">NHẬT THỊNH</p></figure><figure type="Photo"><p><img src="https://images2.thanhnien.vn/528068263637045248/2023/2/3/nv3-1675438718018579382844.jpg" id="img_545992352247799808" w="2000" h="1334" alt="&#39;Ớn lạnh&#39; với nhà vệ sinh công cộng tại TP.HCM - Ảnh 10." title="&#39;Ớn lạnh&#39; với nhà vệ sinh công cộng tại TP.HCM - Ảnh 10." rel="lightbox" photoid="545992352247799808" data-original="https://images2.thanhnien.vn/528068263637045248/2023/2/3/nv3-1675438718018579382844.jpg" type="photo" width="" height=""/></p><figcaption><p data-placeholder="Nhập chú thích ảnh">Nhà vệ sinh công cộng được xây theo hình thức xã hội hóa hiện đại, sạch sẽ như thế này ở TP.HCM hiện tại quá ít, không đủ cho nhu cầu của người dân thành phố, đừng nói đến du khách.</p></figcaption><p data-placeholder="Nhập tác giả">NHẬT THỊNH</p></figure><!--Sat Feb 04 2023 08:19:00 GMT+0700 (Indochina Time) -- Sat Feb 04 2023 08:19:00 GMT+0700 (Indochina Time) -- Sat Feb 04 2023 09:39:48 GMT+0700 (Indochina Time)-->
