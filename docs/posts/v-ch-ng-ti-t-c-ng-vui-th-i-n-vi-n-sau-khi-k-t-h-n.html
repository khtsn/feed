    <h1>Vợ chồng Tiết Cương vui thú điền viên sau khi kết hôn</h1>

                            <h2 data-role="sapo">
                                Sau khi kết hôn, nghệ sĩ Tiết Cương hiện có cuộc sống viên mãn cùng vợ trẻ. Nam diễn viên dành nhiều thời gian cho gia đình, thỉnh thoảng về quê tận hưởng cuộc sống bình yên bên vườn tược.
                            </h2>
                            <div>
                                <div data-role="content" itemprop="articleBody" data-io-article-url="https://thanhnien.vn/vo-chong-tiet-cuong-vui-thu-dien-vien-sau-khi-ket-hon-185230213113449462.htm">
                                                                                                                
                                    <figure type="Photo"><p><img src="https://images2.thanhnien.vn/thumb_w/640/528068263637045248/2023/2/13/tiet-cuong-ngoc-thuong-3-16762593639451369726703.jpg" id="img_549434407875956736" w="1536" h="2048" alt="Vợ chồng son Tiết Cương vui thú điền viên sau khi kết hôn - Ảnh 1." title="Vợ chồng son Tiết Cương vui thú điền viên sau khi kết hôn - Ảnh 1." rel="lightbox" photoid="549434407875956736" data-original="https://images2.thanhnien.vn/528068263637045248/2023/2/13/tiet-cuong-ngoc-thuong-3-16762593639451369726703.jpg" type="photo" width="" height=""/></p><figcaption><p data-placeholder="Nhập chú thích ảnh">Sau đám cưới, Tiết Cương ngày một cởi mở và thường xuyên chia sẻ cuộc sống đời tư. Dù lên xe hoa khá muộn nhưng nam diễn viên hiện có hôn nhân viên mãn với vợ. Không còn hạn chế xuất hiện như thời điểm mới cưới, giờ đây, cả hai thường xuyên đồng hành trong các video YouTube, chia sẻ những khoảnh khắc bình dị</p></figcaption><p data-placeholder="Nhập tác giả">FBNV</p></figure><figure type="Photo"><p><img src="https://images2.thanhnien.vn/thumb_w/640/528068263637045248/2023/2/13/tiet-cuong-ngoc-thuong-4-1676259363442968910842.jpg" id="img_549434386910883840" w="1280" h="960" alt="Vợ chồng son Tiết Cương vui thú điền viên sau khi kết hôn - Ảnh 2." title="Vợ chồng son Tiết Cương vui thú điền viên sau khi kết hôn - Ảnh 2." rel="lightbox" photoid="549434386910883840" data-original="https://images2.thanhnien.vn/528068263637045248/2023/2/13/tiet-cuong-ngoc-thuong-4-1676259363442968910842.jpg" type="photo" width="" height=""/></p><figcaption><p data-placeholder="Nhập chú thích ảnh">Dù bận rộn với công việc nghệ thuật nhưng Tiết Cương cho thấy anh dành phần lớn thời gian cho gia đình. So với trước đây, sao phim <i>Vật chứng mong manh</i> hoạt động năng nổ hơn khi liên tiếp ra nhiều video trên YouTube. Đặc biệt, nam nghệ sĩ lập hẳn một kênh cá nhân cho hai vợ chồng</p></figcaption><p data-placeholder="Nhập tác giả">FBNV</p></figure><figure type="Photo"><p><img src="https://images2.thanhnien.vn/528068263637045248/2023/2/13/anh-chup-man-hinh-2023-02-13-luc-111124-16762615368161573071744.png" id="img_549443507670392832" w="1336" h="783" alt="Vợ chồng son Tiết Cương vui thú điền viên sau khi kết hôn - Ảnh 3." title="Vợ chồng son Tiết Cương vui thú điền viên sau khi kết hôn - Ảnh 3." rel="lightbox" photoid="549443507670392832" data-original="https://images2.thanhnien.vn/528068263637045248/2023/2/13/anh-chup-man-hinh-2023-02-13-luc-111124-16762615368161573071744.png" type="photo" width="" height=""/></p><figcaption><p data-placeholder="Nhập chú thích ảnh">Ngoài bất động sản tại <a href="https://thanhnien.vn/sao-viet-theo-trao-luu-dung-nhan-sai-cai-ca-khia-boi-toan-me-tin-di-doan-185230207221437356.htm" title="TP.HCM" data-rel="follow">TP.HCM</a>, Tiết Cương còn sở hữu một căn nhà nhỏ ở Long An. Cặp đôi thường xuyên lui về đây nghỉ ngơi, trang hoàng nhà cửa mỗi khi rảnh rỗi</p></figcaption><p data-placeholder="Nhập tác giả">Chụp màn hình</p></figure><figure type="Photo"><p><img src="https://images2.thanhnien.vn/528068263637045248/2023/2/13/tiet-cuong-ngoc-thuong-5-16762593632421693993108.png" id="img_549434403845062656" w="1367" h="801" alt="Vợ chồng son Tiết Cương vui thú điền viên sau khi kết hôn - Ảnh 4." title="Vợ chồng son Tiết Cương vui thú điền viên sau khi kết hôn - Ảnh 4." rel="lightbox" photoid="549434403845062656" data-original="https://images2.thanhnien.vn/528068263637045248/2023/2/13/tiet-cuong-ngoc-thuong-5-16762593632421693993108.png" type="photo" width="" height=""/></p><figcaption><p data-placeholder="Nhập chú thích ảnh">Ở quê, nam diễn viên cùng vợ vui thú điền viên, tận hưởng không gian bình yên. Cả hai tự tay bón phân, tưới nước, trồng hoa</p></figcaption><p data-placeholder="Nhập tác giả">Chụp màn hình</p></figure><figure type="Photo"><p><img src="https://images2.thanhnien.vn/528068263637045248/2023/2/13/tiet-cuong-ngoc-thuong-7-1676259363640346761092.png" id="img_549434396926910464" w="1129" h="721" alt="Vợ chồng son Tiết Cương vui thú điền viên sau khi kết hôn - Ảnh 5." title="Vợ chồng son Tiết Cương vui thú điền viên sau khi kết hôn - Ảnh 5." rel="lightbox" photoid="549434396926910464" data-original="https://images2.thanhnien.vn/528068263637045248/2023/2/13/tiet-cuong-ngoc-thuong-7-1676259363640346761092.png" type="photo" width="" height=""/></p><figcaption><p data-placeholder="Nhập chú thích ảnh">Khác với hình ảnh phản diện trên phim, Tiết Cương ngoài đời vô cùng dí dỏm, tình cảm. Nam diễn viên thường giúp vợ làm việc nhà, livestream bán hàng, thậm chí trổ tài cắt tóc cho cô tại nhà</p></figcaption><p data-placeholder="Nhập tác giả">Chụp màn hình</p></figure><figure type="Photo"><p><img src="https://images2.thanhnien.vn/528068263637045248/2023/2/13/tiet-cuong-ngoc-thuong-1-1676259362181845106120.jpg" id="img_549434382641111040" w="1536" h="2048" alt="Vợ chồng son Tiết Cương vui thú điền viên sau khi kết hôn - Ảnh 6." title="Vợ chồng son Tiết Cương vui thú điền viên sau khi kết hôn - Ảnh 6." rel="lightbox" photoid="549434382641111040" data-original="https://images2.thanhnien.vn/528068263637045248/2023/2/13/tiet-cuong-ngoc-thuong-1-1676259362181845106120.jpg" type="photo" width="" height=""/></p><figcaption><p data-placeholder="Nhập chú thích ảnh">Sau khi kết hôn, <a href="https://thanhnien.vn/tiet-cuong-he-lo-nhan-sac-vo-tre-1851513200.htm" title="Ngọc Thưởng" data-rel="follow">Ngọc Thưởng</a> được chồng tập tành làm YouTube. Cô không chỉ tận dụng mạng xã hội để kinh doanh mà còn trở thành trợ lý đắc lực cho ông xã trong việc quay phim, hỗ trợ anh trong cách chuyến lưu diễn</p></figcaption><p data-placeholder="Nhập tác giả">FBNV</p></figure><figure type="Photo"><p><img src="https://images2.thanhnien.vn/528068263637045248/2023/2/13/tiet-cuong-ngoc-thuong-6-16762593641892143090180.png" id="img_549434412778930176" w="1367" h="801" alt="Vợ chồng son Tiết Cương vui thú điền viên sau khi kết hôn - Ảnh 7." title="Vợ chồng son Tiết Cương vui thú điền viên sau khi kết hôn - Ảnh 7." rel="lightbox" photoid="549434412778930176" data-original="https://images2.thanhnien.vn/528068263637045248/2023/2/13/tiet-cuong-ngoc-thuong-6-16762593641892143090180.png" type="photo" width="" height=""/></p><figcaption><p data-placeholder="Nhập chú thích ảnh">Ngoài tận hưởng cuộc sống yên bình ở quê nhà, cả hai còn thường xuyên du lịch. Bộ đôi thích khám phá các tỉnh thành miền Tây, vui thú sông nước</p></figcaption><p data-placeholder="Nhập tác giả">Chụp màn hình</p></figure><figure type="Photo"><p><img src="https://images2.thanhnien.vn/528068263637045248/2023/2/13/tiet-cuong-ngoc-thuong-2-1676259363817735488248.jpg" id="img_549434392115351552" w="1280" h="961" alt="Vợ chồng son Tiết Cương vui thú điền viên sau khi kết hôn - Ảnh 8." title="Vợ chồng son Tiết Cương vui thú điền viên sau khi kết hôn - Ảnh 8." rel="lightbox" photoid="549434392115351552" data-original="https://images2.thanhnien.vn/528068263637045248/2023/2/13/tiet-cuong-ngoc-thuong-2-1676259363817735488248.jpg" type="photo" width="" height=""/></p><figcaption><p data-placeholder="Nhập chú thích ảnh">Những năm gần đây, <a href="https://thanhnien.vn/tiet-cuong-ke-ky-niem-nho-doi-trong-ngay-cuoi-1851539164.htm" title="Tiết Cương" data-rel="follow">Tiết Cương</a> hoạt động năng nổ trên mạng xã hội. Anh trở thành YouTuber, chuyên giới thiệu các loại xe độc lạ. Nam diễn viên nói đây là công việc tay trái giúp anh kiếm thêm thu nhập bên cạnh nghệ thuật. Bị nói “hết thời mới làm YouTube”, sao phim <i>Hướng nghiệp</i> tâm sự rằng danh tiếng chỉ kéo dài một giai đoạn. “Tôi vào nghề nay đã được 28 năm. Quý vị cũng biết quy luật của nghề này là tre già măng mọc. Khi mình lớn tuổi rồi thì giới trẻ sẽ tiếp bước”, anh chia sẻ</p></figcaption><p data-placeholder="Nhập tác giả">FBNV</p></figure><!--Mon Feb 13 2023 11:50:25 GMT+0700 (Giờ Đông Dương) --  -- Mon Feb 13 2023 11:50:25 GMT+0700 (Giờ Đông Dương)-->
