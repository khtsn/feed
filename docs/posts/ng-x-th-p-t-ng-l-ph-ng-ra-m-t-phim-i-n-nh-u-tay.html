    <h1>Ông xã &#39;tháp tùng&#39; Lê Phương ra mắt phim điện ảnh đầu tay</h1>

                            <h2 data-role="sapo">
                                Trên thảm đỏ buổi ra mắt phim điện ảnh <i>Vong nhi</i>, diễn viên Lê Phương nhận được sự ủng hộ của ông xã cũng như lời chúc mừng từ các đồng nghiệp khi lần đầu chạm ngõ điện ảnh.
                            </h2>
                            <div>
                                <div data-role="content" itemprop="articleBody">
                                                                                                                
                                    <figure type="Photo"><p><img src="https://images2.thanhnien.vn/528068263637045248/2023/2/1/vong-nhi-le-phuong2-1675215056979160752808.jpg" id="img_545054358232571904" w="2000" h="1333" alt="Diễn viên Lê Phương gợi cảm sánh đôi cùng ông xã trên thảm đỏ - Ảnh 1." title="Diễn viên Lê Phương gợi cảm sánh đôi cùng ông xã trên thảm đỏ - Ảnh 1." rel="lightbox" photoid="545054358232571904" data-original="https://images2.thanhnien.vn/528068263637045248/2023/2/1/vong-nhi-le-phuong2-1675215056979160752808.jpg" type="photo" width="" height=""/></p><figcaption><p data-placeholder="Nhập chú thích ảnh">Tối 31.1, bộ phim điện ảnh <a href="https://thanhnien.vn/nsut-hanh-thuy-mang-van-nan-nao-pha-thai-len-phim-kinh-di-1851540891.htm" title="Vong nhi" data-rel="follow"><i>Vong nhi</i></a> của đạo diễn Hoàng Tuấn Cường chính thức ra mắt khán giả. Đây cũng là vai diễn điện ảnh đầu tiên của Lê Phương sau 15 năm tham gia nghệ thuật. Trên thảm đỏ, Lê Phương nhận được lời chúc mừng của các nghệ sĩ nổi tiếng như<a href="https://thanhnien.vn/dan-sao-viet-do-bo-tham-do-phim-cua-nsnd-kim-xuan-dong-chinh-1851524850.htm" title=" NSND Kim Xuân " data-rel="follow"> NSND Kim Xuân</a>, NSƯT Cát Tường...</p></figcaption><p data-placeholder="Nhập tác giả">ĐPCC</p></figure><figure type="Photo"><p><img src="https://images2.thanhnien.vn/528068263637045248/2023/2/1/vong-nhi-le-phuong4-16752150553021700342601.jpg" id="img_545054311814631424" w="1472" h="981" alt="Diễn viên Lê Phương gợi cảm sánh đôi cùng ông xã trên thảm đỏ - Ảnh 2." title="Diễn viên Lê Phương gợi cảm sánh đôi cùng ông xã trên thảm đỏ - Ảnh 2." rel="lightbox" photoid="545054311814631424" data-original="https://images2.thanhnien.vn/528068263637045248/2023/2/1/vong-nhi-le-phuong4-16752150553021700342601.jpg" type="photo" width="" height=""/></p><figcaption><p data-placeholder="Nhập chú thích ảnh">Lê Phương còn được ông xã là ca sĩ Trung Kiên &#34;tháp tùng&#34; đến sự kiện. Cả hai hào hứng chụp ảnh với vợ chồng đạo diễn Hoàng Tuấn Cường</p></figcaption><p data-placeholder="Nhập tác giả">ĐPCC</p></figure><figure type="Photo" data-label="650" data-warning="Ảnh có thể chứa nội dung 16+"><p><img src="https://images2.thanhnien.vn/528068263637045248/2023/2/1/vong-nhi-le-phuong7-1675215057164579311469.jpg" id="img_545054353516863488" w="1365" h="2048" alt="Diễn viên Lê Phương gợi cảm sánh đôi cùng ông xã trên thảm đỏ - Ảnh 3." title="Diễn viên Lê Phương gợi cảm sánh đôi cùng ông xã trên thảm đỏ - Ảnh 3." rel="lightbox" photoid="545054353516863488" data-original="https://images2.thanhnien.vn/528068263637045248/2023/2/1/vong-nhi-le-phuong7-1675215057164579311469.jpg" type="photo" data-label="650" width="" height=""/></p><figcaption><p data-placeholder="Nhập chú thích ảnh">Lê Phương chia sẻ nhân vật trong phim <i>Vong nhi</i> là vai diễn có hoàn cảnh bất hạnh nhất từ trước đến giờ. Có những phân đoạn cô phải chịu áp lực tâm lý nặng nề</p></figcaption><p data-placeholder="Nhập tác giả">ĐPCC</p></figure><figure type="Photo"><p><img src="https://images2.thanhnien.vn/528068263637045248/2023/2/1/vong-nhi-le-phuong6-16752150557892000110659.jpg" id="img_545054317485629440" w="910" h="1365" alt="Diễn viên Lê Phương gợi cảm sánh đôi cùng ông xã trên thảm đỏ - Ảnh 4." title="Diễn viên Lê Phương gợi cảm sánh đôi cùng ông xã trên thảm đỏ - Ảnh 4." rel="lightbox" photoid="545054317485629440" data-original="https://images2.thanhnien.vn/528068263637045248/2023/2/1/vong-nhi-le-phuong6-16752150557892000110659.jpg" type="photo" width="" height=""/></p><figcaption><p data-placeholder="Nhập chú thích ảnh">Bên cạnh đó, Lê Phương còn tiết lộ trong phim có một &#34;cảnh nóng&#34; táo bạo khiến khán giả bất ngờ. Trước đó, nữ diễn viên gốc Trà Vinh chia sẻ khi ghi hình phân cảnh này chồng cô cũng có mặt trên phim trường</p></figcaption><p data-placeholder="Nhập tác giả">ĐPCC</p></figure><figure type="Photo"><p><img src="https://images2.thanhnien.vn/528068263637045248/2023/2/1/vong-nhi-le-phuong8-16752150560191710378798.jpg" id="img_545054343698051072" w="910" h="1365" alt="Diễn viên Lê Phương gợi cảm sánh đôi cùng ông xã trên thảm đỏ - Ảnh 5." title="Diễn viên Lê Phương gợi cảm sánh đôi cùng ông xã trên thảm đỏ - Ảnh 5." rel="lightbox" photoid="545054343698051072" data-original="https://images2.thanhnien.vn/528068263637045248/2023/2/1/vong-nhi-le-phuong8-16752150560191710378798.jpg" type="photo" width="" height=""/></p><figcaption><p data-placeholder="Nhập chú thích ảnh"><a href="https://thanhnien.vn/nsut-hanh-thuy-tet-xua-hay-tet-nay-deu-vui-mien-dung-tung-thieu-1851544085.htm" title="NSƯT Hạnh Thúy" data-rel="follow">NSƯT Hạnh Thúy</a> là biên kịch cho phim điện ảnh này, kịch bản được cô ấp ủ suốt 7 năm. Tác phẩm dựa trên nhiều câu chuyện mà nữ nghệ sĩ đã bắt gặp trong cuộc sống cũng như quá trình làm nghề. Thông qua bộ phim, Hạnh Thúy hy vọng khán giả hiểu hơn về vấn nạn và hệ quả của chuyện phá thai</p></figcaption><p data-placeholder="Nhập tác giả">ĐPCC</p></figure><figure type="Photo"><p><img src="https://images2.thanhnien.vn/528068263637045248/2023/2/1/vong-nhi-le-phuong12-16752150567901584017518.jpg" id="img_545054325175988224" w="910" h="1365" alt="Diễn viên Lê Phương gợi cảm sánh đôi cùng ông xã trên thảm đỏ - Ảnh 6." title="Diễn viên Lê Phương gợi cảm sánh đôi cùng ông xã trên thảm đỏ - Ảnh 6." rel="lightbox" photoid="545054325175988224" data-original="https://images2.thanhnien.vn/528068263637045248/2023/2/1/vong-nhi-le-phuong12-16752150567901584017518.jpg" type="photo" width="" height=""/></p><figcaption><p data-placeholder="Nhập chú thích ảnh">Vợ chồng n<a href="https://thanhnien.vn/viet-huong-xong-dat-cho-rong-den-14000-m-tai-binh-dinh-trong-toi-yeu-cho-viet-1851544781.htm" title="Nghệ sĩ Việt Hương" data-rel="follow">ghệ sĩ Việt Hương</a> góp mặt chúc mừng đoàn phim ra mắt tác phẩm</p></figcaption><p data-placeholder="Nhập tác giả">ĐPCC</p></figure><figure type="Photo"><p><img src="https://images2.thanhnien.vn/528068263637045248/2023/2/1/vong-nhi-le-phuong10-1675215056552186515293.jpg" id="img_545054348859310080" w="910" h="1365" alt="Diễn viên Lê Phương gợi cảm sánh đôi cùng ông xã trên thảm đỏ - Ảnh 7." title="Diễn viên Lê Phương gợi cảm sánh đôi cùng ông xã trên thảm đỏ - Ảnh 7." rel="lightbox" photoid="545054348859310080" data-original="https://images2.thanhnien.vn/528068263637045248/2023/2/1/vong-nhi-le-phuong10-1675215056552186515293.jpg" type="photo" width="" height=""/></p><figcaption><p data-placeholder="Nhập chú thích ảnh">Quốc Huy là nam chính trong bộ phim điện ảnh <i>Vong Nhi</i>. Anh vui mừng khi nhận được lời chúc mừng từ đồng nghiệp Diệp Bảo Ngọc</p></figcaption><p data-placeholder="Nhập tác giả">ĐPCC</p></figure><figure type="Photo"><p><img src="https://images2.thanhnien.vn/528068263637045248/2023/2/1/vong-nhi-le-phuong8-2-1675215056268397435762.jpg" id="img_545054340491087872" w="788" h="1181" alt="Diễn viên Lê Phương gợi cảm sánh đôi cùng ông xã trên thảm đỏ - Ảnh 8." title="Diễn viên Lê Phương gợi cảm sánh đôi cùng ông xã trên thảm đỏ - Ảnh 8." rel="lightbox" photoid="545054340491087872" data-original="https://images2.thanhnien.vn/528068263637045248/2023/2/1/vong-nhi-le-phuong8-2-1675215056268397435762.jpg" type="photo" width="" height=""/></p><figcaption><p data-placeholder="Nhập chú thích ảnh">Nghệ sĩ Công Ninh diện trang phục đơn giản xuất hiện trên thảm đỏ. Thời gian gần đây, ông thường xuyên góp mặt trong các tác phẩm điện ảnh <i>Nhà bà Nữ, Chị chị em em 2, Hạnh phúc máu...</i></p></figcaption><p data-placeholder="Nhập tác giả">ĐPCC</p></figure><figure type="Photo"><p><img src="https://images2.thanhnien.vn/528068263637045248/2023/2/1/vong-nhi-le-phuong1-16752150548481935213868.jpg" id="img_545054334570459136" w="1188" h="1782" alt="Diễn viên Lê Phương gợi cảm sánh đôi cùng ông xã trên thảm đỏ - Ảnh 9." title="Diễn viên Lê Phương gợi cảm sánh đôi cùng ông xã trên thảm đỏ - Ảnh 9." rel="lightbox" photoid="545054334570459136" data-original="https://images2.thanhnien.vn/528068263637045248/2023/2/1/vong-nhi-le-phuong1-16752150548481935213868.jpg" type="photo" width="" height=""/></p><figcaption><p data-placeholder="Nhập chú thích ảnh">Ngoài ra, buổi công chiếu còn chào đón sự góp mặt của nghệ sĩ Mỹ Uyên và Kiều Trinh (trái)</p></figcaption><p data-placeholder="Nhập tác giả">ĐPCC</p></figure><figure type="Photo"><p><img src="https://images2.thanhnien.vn/528068263637045248/2023/2/1/vong-nhi-le-phuong5-1675215055530868375645.jpg" id="img_545054305036296192" w="910" h="1365" alt="Diễn viên Lê Phương gợi cảm sánh đôi cùng ông xã trên thảm đỏ - Ảnh 10." title="Diễn viên Lê Phương gợi cảm sánh đôi cùng ông xã trên thảm đỏ - Ảnh 10." rel="lightbox" photoid="545054305036296192" data-original="https://images2.thanhnien.vn/528068263637045248/2023/2/1/vong-nhi-le-phuong5-1675215055530868375645.jpg" type="photo" width="" height=""/></p><figcaption><p data-placeholder="Nhập chú thích ảnh">Bạch Công Khanh  là người hát nhạc phim cho tác phẩm điện ảnh này</p></figcaption><p data-placeholder="Nhập tác giả">ĐPCC</p></figure><figure type="Photo"><p><img src="https://images2.thanhnien.vn/528068263637045248/2023/2/1/vong-nhi-le-phuong-1675215054673382385946.jpg" id="img_545054298884771840" w="775" h="1163" alt="Diễn viên Lê Phương gợi cảm sánh đôi cùng ông xã trên thảm đỏ - Ảnh 11." title="Diễn viên Lê Phương gợi cảm sánh đôi cùng ông xã trên thảm đỏ - Ảnh 11." rel="lightbox" photoid="545054298884771840" data-original="https://images2.thanhnien.vn/528068263637045248/2023/2/1/vong-nhi-le-phuong-1675215054673382385946.jpg" type="photo" width="" height=""/></p><figcaption><p data-placeholder="Nhập chú thích ảnh">Diễn viên Bá Thắng đến chung vui với đồng nghiệp Lê Phương, Quốc Huy, Hạnh Thúy... Theo nhà sản xuất, bộ phim<i> Vong nhi</i> chính thức khởi chiếu vào ngày 3.2 tại các rạp trên toàn quốc</p></figcaption><p data-placeholder="Nhập tác giả">ĐPCC</p></figure><!--Wed Feb 01 2023 10:10:00 GMT+0700 (Giờ Đông Dương) -- Wed Feb 01 2023 10:10:00 GMT+0700 (Giờ Đông Dương) --
