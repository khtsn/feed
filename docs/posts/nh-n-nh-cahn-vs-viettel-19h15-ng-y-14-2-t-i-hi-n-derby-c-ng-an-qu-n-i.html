    <h1>Nhận định CAHN vs Viettel, 19h15 ngày 14/2: Tái hiện derby Công an - Quân đội</h1>
    
    <div id="readability-page-1" class="page"><div>
                                <div data-role="content" itemprop="articleBody" data-io-article-url="https://thanhnien.vn/ngoc-lan-len-tieng-ve-khoanh-khac-tinh-tu-voi-nguyen-van-chung-dip-le-tinh-nhan-185230213222113465.htm">
                                                                                                                
                                    <figure type="Photo"><p><img src="https://images2.thanhnien.vn/528068263637045248/2023/2/13/ngoc-lan-nguyen-van-chung-1-1676300253092736682454.png" id="img_549605901112582144" w="587" h="892" alt="Ngọc Lan lên tiếng về khoảnh khắc tình tứ với Nguyễn Văn Chung dịp Lễ tình nhân - Ảnh 1." title="Ngọc Lan lên tiếng về khoảnh khắc tình tứ với Nguyễn Văn Chung dịp Lễ tình nhân - Ảnh 1." rel="lightbox" photoid="549605901112582144" data-original="https://images2.thanhnien.vn/528068263637045248/2023/2/13/ngoc-lan-nguyen-van-chung-1-1676300253092736682454.png" type="photo" width="" height=""/></p><figcaption><p data-placeholder="Nhập chú thích ảnh">Trong loạt ảnh mới, Ngọc Lan khoe khoảnh khắc rạng rỡ bên nhạc sĩ <a href="https://thanhnien.vn/nguyen-van-chung-toi-kho-xu-khi-cao-thai-son-moi-du-ra-mat-mv-moi-1851534354.htm" title="Nguyễn Văn Chung" data-rel="follow">Nguyễn Văn Chung</a>. Cả hai biến hóa với nhiều phong cách thời trang, từ trẻ trung đến thanh lịch. Đặc biệt, bộ đôi khiến khán giả tò mò khi thể hiện nhiều cử chỉ thân mật</p></figcaption><p data-placeholder="Nhập tác giả">NVCC</p></figure><figure type="Photo"><p><img src="https://images2.thanhnien.vn/thumb_w/640/528068263637045248/2023/2/13/ngoc-lan-nguyen-van-chung-4-16763001374071609440579.jpg" id="img_549605437931106304" w="2000" h="1334" alt="Ngọc Lan lên tiếng về khoảnh khắc tình tứ với Nguyễn Văn Chung dịp Lễ tình nhân - Ảnh 2." title="Ngọc Lan lên tiếng về khoảnh khắc tình tứ với Nguyễn Văn Chung dịp Lễ tình nhân - Ảnh 2." rel="lightbox" photoid="549605437931106304" data-original="https://images2.thanhnien.vn/528068263637045248/2023/2/13/ngoc-lan-nguyen-van-chung-4-16763001374071609440579.jpg" type="photo" width="" height=""/></p><figcaption><p data-placeholder="Nhập chú thích ảnh">Chia sẻ về lý do thực hiện bộ ảnh, Ngọc Lan bộc bạch: “Hai anh em chúng tôi chơi rất thân. Lâu rồi chúng tôi chưa chụp hình chung nên nhân dịp này chụp ảnh để tặng fan. Thứ hai, tôi vừa mời anh Chung làm đại diện cho sản phẩm của công ty tôi. Vì thế, tôi cũng tranh thủ chụp ảnh quảng bá để tiện cho việc kinh doanh”</p></figcaption><p data-placeholder="Nhập tác giả">NVCC</p></figure><figure type="Photo"><p><img src="https://images2.thanhnien.vn/thumb_w/640/528068263637045248/2023/2/13/ngoc-lan-nguyen-van-chung-7-16763001349001553101551.jpg" id="img_549605409186058240" w="2000" h="1333" alt="Ngọc Lan lên tiếng về khoảnh khắc tình tứ với Nguyễn Văn Chung dịp Lễ tình nhân - Ảnh 3." title="Ngọc Lan lên tiếng về khoảnh khắc tình tứ với Nguyễn Văn Chung dịp Lễ tình nhân - Ảnh 3." rel="lightbox" photoid="549605409186058240" data-original="https://images2.thanhnien.vn/528068263637045248/2023/2/13/ngoc-lan-nguyen-van-chung-7-16763001349001553101551.jpg" type="photo" width="" height=""/></p><figcaption><p data-placeholder="Nhập chú thích ảnh">Trước sự tò mò của dư luận về mối quan hệ của cả hai, Ngọc Lan nói chỉ xem Nguyễn Văn Chung là một người anh. Khi được hỏi có sợ bị đồn “ảnh giả tình thật” vì cả hai hiện trong tình trạng “trai thôi vợ, gái thôi chồng”, sao phim <i>Nữ chủ</i> thẳng thắn chia sẻ với <i>Thanh Niên</i>: “Khán giả của cả hai thừa biết về tính cách và mối quan hệ của hai anh em ở giới hạn nào. Vì thế, tôi không sợ bị đồn gì cả”</p></figcaption><p data-placeholder="Nhập tác giả">NVCC</p></figure><figure type="Photo"><p><img src="https://images2.thanhnien.vn/thumb_w/640/528068263637045248/2023/2/13/ngoc-lan-nguyen-van-chung-3-1676300134493594412251.jpg" id="img_549605429245657088" w="2000" h="1333" alt="Ngọc Lan lên tiếng về khoảnh khắc tình tứ với Nguyễn Văn Chung dịp Lễ tình nhân - Ảnh 4." title="Ngọc Lan lên tiếng về khoảnh khắc tình tứ với Nguyễn Văn Chung dịp Lễ tình nhân - Ảnh 4." rel="lightbox" photoid="549605429245657088" data-original="https://images2.thanhnien.vn/528068263637045248/2023/2/13/ngoc-lan-nguyen-van-chung-3-1676300134493594412251.jpg" type="photo" width="" height=""/></p><figcaption><p data-placeholder="Nhập chú thích ảnh">Tâm sự về cuộc sống sau biến cố hôn nhân, Ngọc Lan cho biết cô hiện trong trạng thái “hạnh phúc tự thân”. Nữ diễn viên dành toàn tâm toàn ý cho sự nghiệp và chăm sóc con cái. “Hiện tại, tôi thấy mình mới thực sự tận hưởng cuộc sống. Tôi thấy thoải mái, tự do, không bị vướng bận gì cả. Về tài chính và mọi thứ, tôi đều thấy thoải mái”, cô bày tỏ</p></figcaption><p data-placeholder="Nhập tác giả">NVCC</p></figure><figure type="Photo"><p><img src="https://images2.thanhnien.vn/528068263637045248/2023/2/13/ngoc-lan-nguyen-van-chung-2-1676300252738381122519.png" id="img_549605895663099904" w="587" h="892" alt="Ngọc Lan lên tiếng về khoảnh khắc tình tứ với Nguyễn Văn Chung dịp Lễ tình nhân - Ảnh 5." title="Ngọc Lan lên tiếng về khoảnh khắc tình tứ với Nguyễn Văn Chung dịp Lễ tình nhân - Ảnh 5." rel="lightbox" photoid="549605895663099904" data-original="https://images2.thanhnien.vn/528068263637045248/2023/2/13/ngoc-lan-nguyen-van-chung-2-1676300252738381122519.png" type="photo" width="" height=""/></p><figcaption><p data-placeholder="Nhập chú thích ảnh">Ngọc Lan cũng thẳng thắn cho biết bản thân không chạnh lòng khi vẫn lẻ bóng trước những ngày đặc biệt, như lễ Tình nhân 14.2. Cô cảm thấy hài lòng với cuộc sống hiện tại và không mong ước gì thêm. Diễn viên phim <i>Mẹ rơm</i> nói: “Tôi không hề thấy chạnh lòng những ngày này. Trái lại, tôi hạnh phúc lây khi thấy các cặp đôi khoe khoảnh khắc hạnh phúc, thời gian họ đã gắn bó với nhau”</p></figcaption><p data-placeholder="Nhập tác giả">NVCC</p></figure><figure type="Photo"><p><img src="https://images2.thanhnien.vn/thumb_w/640/528068263637045248/2023/2/13/ngoc-lan-nguyen-van-chung-6-16763001354811100287837.jpg" id="img_549605420360376320" w="2000" h="3000" alt="Ngọc Lan lên tiếng về khoảnh khắc tình tứ với Nguyễn Văn Chung dịp Lễ tình nhân - Ảnh 6." title="Ngọc Lan lên tiếng về khoảnh khắc tình tứ với Nguyễn Văn Chung dịp Lễ tình nhân - Ảnh 6." rel="lightbox" photoid="549605420360376320" data-original="https://images2.thanhnien.vn/528068263637045248/2023/2/13/ngoc-lan-nguyen-van-chung-6-16763001354811100287837.jpg" type="photo" width="" height=""/></p><figcaption><p data-placeholder="Nhập chú thích ảnh">Được biết, con trai <a href="https://thanhnien.vn/my-bus-your-show-tap-30-ngoc-lan-tu-tinh-duyen-lan-dan-toi-ba-lon-khet-tieng-trong-nu-chu-185230213153904919.htm" title="Ngọc Lan" data-rel="follow">Ngọc Lan</a> là bé Louis, năm nay đã lên 6 tuổi. Nữ diễn viên tâm sự rằng con trai là nguồn động lực to lớn để cô phấn đấu trong cuộc sống. Người đẹp bày tỏ hạnh phúc khi cậu bé là điểm tựa tinh thần vững chắc cho mẹ sau những ngày làm việc mệt mỏi</p></figcaption><p data-placeholder="Nhập tác giả">NVCC</p></figure><figure type="Photo"><p><img src="https://images2.thanhnien.vn/thumb_w/640/528068263637045248/2023/2/13/ngoc-lan-nguyen-van-chung-8-1676300138076656542738.jpg" id="img_549605425017032704" w="2000" h="1333" alt="Ngọc Lan lên tiếng về khoảnh khắc tình tứ với Nguyễn Văn Chung dịp Lễ tình nhân - Ảnh 7." title="Ngọc Lan lên tiếng về khoảnh khắc tình tứ với Nguyễn Văn Chung dịp Lễ tình nhân - Ảnh 7." rel="lightbox" photoid="549605425017032704" data-original="https://images2.thanhnien.vn/528068263637045248/2023/2/13/ngoc-lan-nguyen-van-chung-8-1676300138076656542738.jpg" type="photo" width="" height=""/></p><figcaption><p data-placeholder="Nhập chú thích ảnh">Để con cảm thấy trọn vẹn, cô cũng thường hội ngộ với chồng cũ để bé có thời gian gần gũi bên cha ruột. “Đứa con là mối quan hệ mà các cặp đôi ly hôn cần giữ, nên việc cả hai thường gặp mặt là chuyện bình thường và cần phải có”, cô nói</p></figcaption><p data-placeholder="Nhập tác giả">NVCC</p></figure><figure type="Photo"><p><img src="https://images2.thanhnien.vn/thumb_w/640/528068263637045248/2023/2/13/ngoc-lan-nguyen-van-chung-5-16763001353302093212317.jpg" id="img_549605433561853952" w="2000" h="1333" alt="Ngọc Lan lên tiếng về khoảnh khắc tình tứ với Nguyễn Văn Chung dịp Lễ tình nhân - Ảnh 8." title="Ngọc Lan lên tiếng về khoảnh khắc tình tứ với Nguyễn Văn Chung dịp Lễ tình nhân - Ảnh 8." rel="lightbox" photoid="549605433561853952" data-original="https://images2.thanhnien.vn/528068263637045248/2023/2/13/ngoc-lan-nguyen-van-chung-5-16763001353302093212317.jpg" type="photo" width="" height=""/></p><figcaption><p data-placeholder="Nhập chú thích ảnh">Ngoài làm diễn viên, Ngọc Lan còn gây ấn tượng khi dẫn dắt show <i>Bạn muốn hẹn hò</i> cùng <a href="https://thanhnien.vn/quyen-linh-buon-ba-khi-nguoi-dan-ong-ga-trong-nuoi-con-bi-tu-choi-hen-ho-185230212144301274.htm" title="Quyền Linh" data-rel="follow">Quyền Linh</a>. Tuy nhiên, cô không có ý định mượn chương trình để tìm một nửa. Diễn viên sinh năm 1985 bộc bạch: “Tôi có tật là thấy chàng trai nào tốt mà đàng gái không bấm nút thì tôi tiếc lắm. Tôi hay đùa là không bấm nút thì tôi nhào vô bấm ráng chịu. Tuy nhiên, tôi không có ý định lên show hẹn hò tìm kiếm người yêu. Công việc là công việc, chuyện cá nhân là chuyện cá nhân. Tôi biết nhiệm vụ của mình là gì, tôi chưa từng nghĩ sẽ nhân cơ hội này để tìm người yêu. Nói chung, hiện tại tôi chưa nghĩ đến chuyện tình cảm, cứ làm việc và nuôi con là vui rồi”</p></figcaption><p data-placeholder="Nhập tác giả">NVCC</p></figure><!--Tue Feb 14 2023 08:43:16 GMT+0700 (Giờ Đông Dương) -- Tue Feb 14 2023 08:43:16 GMT+0700 (Giờ Đông Dương) -- Tue Feb 14 2023 08:43:22 GMT+0700 (Giờ Đông Dương)-->
