    <h1>Gi A Nguyễn nói về nhận xét được chọn đóng phim vì ngoại hình</h1>

                            <h2 data-role="sapo">
                                Tái xuất trong dự án web-drama <i>Siêu trợ lý</i>, hot boy võ thuật Gi A Nguyễn trải lòng về hành trình nghệ thuật thăng trầm khi liên tiếp tham gia nhiều bộ phim &#39;số nhọ&#39;.
                            </h2>
                            <div>
                                <div data-role="content" itemprop="articleBody" data-io-article-url="https://thanhnien.vn/gi-a-nguyen-noi-ve-nhan-xet-duoc-chon-dong-phim-vi-ngoai-hinh-18523021510082054.htm">
                                                                                                                
                                    <figure type="Photo"><p><img src="https://images2.thanhnien.vn/thumb_w/640/528068263637045248/2023/2/15/gi-a-nguyen-1-16764281711821737309533.jpg" id="img_550142437154115584" w="2000" h="1333" alt="Gi A Nguyễn: Tôi buồn khi được khen đẹp trai hơn là diễn giỏi - Ảnh 1." title="Gi A Nguyễn: Tôi buồn khi được khen đẹp trai hơn là diễn giỏi - Ảnh 1." rel="lightbox" photoid="550142437154115584" data-original="https://images2.thanhnien.vn/528068263637045248/2023/2/15/gi-a-nguyen-1-16764281711821737309533.jpg" type="photo" width="" height=""/></p><figcaption><p data-placeholder="Nhập chú thích ảnh">Hôm 14.2, Gi A Nguyễn gây ấn tượng khi xuất hiện trong tập 1 của web-drama <i>Siêu trợ lý</i> do <a href="https://thanhnien.vn/truong-quynh-anh-he-lo-canh-khoa-moi-ban-dien-kem-9-tuoi-185230214204411303.htm" title="Trương Quỳnh Anh" data-rel="follow">Trương Quỳnh Anh</a> sản xuất. Anh thủ vai một chàng trai bí ẩn, có chuyện tình tay ba với Thụy Khuê (Trương Quỳnh Anh) và ngôi sao điện ảnh Vĩnh Hy (<a href="https://thanhnien.vn/truong-quynh-anh-he-lo-canh-khoa-moi-ban-dien-kem-9-tuoi-185230214204411303.htm" title="Khương Lê" data-rel="follow">Khương Lê</a>). Từ đây, cả ba vướng vào nhiều rắc rối kéo theo những tình huống “dở khóc dở cười”</p></figcaption><p data-placeholder="Nhập tác giả">ĐPCC</p></figure><figure type="Photo"><p><img src="https://images2.thanhnien.vn/thumb_w/640/528068263637045248/2023/2/15/gi-a-nguyen-7-1676428172249424169175.jpg" id="img_550142468573966336" w="2000" h="3000" alt="Gi A Nguyễn: Tôi buồn khi được khen đẹp trai hơn là diễn giỏi - Ảnh 2." title="Gi A Nguyễn: Tôi buồn khi được khen đẹp trai hơn là diễn giỏi - Ảnh 2." rel="lightbox" photoid="550142468573966336" data-original="https://images2.thanhnien.vn/528068263637045248/2023/2/15/gi-a-nguyen-7-1676428172249424169175.jpg" type="photo" width="" height=""/></p><figcaption><p data-placeholder="Nhập chú thích ảnh">Vốn quen mặt với khán giả qua các vai diễn võ thuật, <a href="https://thanhnien.vn/lo-dien-bo-tu-phan-dien-trong-thanh-soi-1851530440.htm" title="Gi A Nguyễn" data-rel="follow">Gi A Nguyễn</a> nói anh không khỏi bỡ ngỡ khi đóng phim tình cảm. Dù vậy, nam diễn viên hoàn thành trọn vẹn vai diễn nhờ sự hướng dẫn của Trương Quỳnh Anh và ê kíp</p></figcaption><p data-placeholder="Nhập tác giả">ĐPCC</p></figure><figure type="Photo"><p><img src="https://images2.thanhnien.vn/thumb_w/640/528068263637045248/2023/2/15/gi-a-nguyen-2-16764281718301674018052.jpg" id="img_550142459808448512" w="2000" h="3000" alt="Gi A Nguyễn: Tôi buồn khi được khen đẹp trai hơn là diễn giỏi - Ảnh 3." title="Gi A Nguyễn: Tôi buồn khi được khen đẹp trai hơn là diễn giỏi - Ảnh 3." rel="lightbox" photoid="550142459808448512" data-original="https://images2.thanhnien.vn/528068263637045248/2023/2/15/gi-a-nguyen-2-16764281718301674018052.jpg" type="photo" width="" height=""/></p><figcaption><p data-placeholder="Nhập chú thích ảnh">Mang 3 dòng máu Việt Nam - Ý - Iraq, Gi A Nguyễn là một trong những diễn viên được nhiều người đánh giá là tiềm năng của làng phim Việt. Dù vậy, nam diễn viên nói anh buồn khi bị nhận xét có thế mạnh ngoại hình hơn diễn xuất. &#34;Tôi buồn nhất khi bị nói được chọn đóng phim vì có ngoại hình. Một diễn viên cứ được khen là đẹp thì đâu phải là diễn viên, chỉ là người mẫu thôi. Tôi đang phấn đấu được mọi người công nhận khả năng diễn xuất, chứ không phải một người chỉ có mỗi cái đẹp&#34;, anh chia sẻ</p></figcaption><p data-placeholder="Nhập tác giả">ĐPCC</p></figure><figure type="Photo"><p><img src="https://images2.thanhnien.vn/thumb_w/640/528068263637045248/2023/2/15/gi-a-nguyen-5-1676428172767828070561.jpg" id="img_550142453798436864" w="2000" h="3000" alt="Gi A Nguyễn: Tôi buồn khi được khen đẹp trai hơn là diễn giỏi - Ảnh 4." title="Gi A Nguyễn: Tôi buồn khi được khen đẹp trai hơn là diễn giỏi - Ảnh 4." rel="lightbox" photoid="550142453798436864" data-original="https://images2.thanhnien.vn/528068263637045248/2023/2/15/gi-a-nguyen-5-1676428172767828070561.jpg" type="photo" width="" height=""/></p><figcaption><p data-placeholder="Nhập chú thích ảnh">Từng góp mặt trong nhiều dự án điện ảnh nổi bật nhưng sự nghiệp của Gi A Nguyễn khá trúc trắc. Từ <i>Võ sinh đại chiến</i> đến <i>Thanh Sói, </i>dù được đầu tư “khủng” nhưng các phim này lại gặp nhiều trục trặc, thậm chí ngã ngựa phòng vé. Tâm sự về điều này, nam diễn viên chia sẻ: “Nếu nói không buồn là tự lừa dối bản thân mình. Nhưng một bộ phim thắng ngoài rạp cần rất nhiều yếu tố. Còn nếu phim thua thì cũng là chuyện bình thường. Ở Việt Nam, một bộ phim trở nên hút khách thì không có quá nhiều. Có thể là tôi chưa tới thời”</p></figcaption><p data-placeholder="Nhập tác giả">ĐPCC</p></figure><figure type="Photo"><p><img src="https://images2.thanhnien.vn/thumb_w/640/528068263637045248/2023/2/15/gi-a-nguyen-3-1676428172011397060609.jpg" id="img_550142464132423680" w="2000" h="3000" alt="Gi A Nguyễn: Tôi buồn khi được khen đẹp trai hơn là diễn giỏi - Ảnh 5." title="Gi A Nguyễn: Tôi buồn khi được khen đẹp trai hơn là diễn giỏi - Ảnh 5." rel="lightbox" photoid="550142464132423680" data-original="https://images2.thanhnien.vn/528068263637045248/2023/2/15/gi-a-nguyen-3-1676428172011397060609.jpg" type="photo" width="" height=""/></p><figcaption><p data-placeholder="Nhập chú thích ảnh">Được biết đến với danh xưng &#34;hot boy võ thuật&#34;, Gi A Nguyễn thường xuyên đảm nhận những vai hành động. Anh cho biết không sợ bị đóng khung bởi bản thân chưa thực sự trở thành diễn viên &#34;chuyên trị&#34; loại vai này</p></figcaption></figure><figure type="Photo"><p><img src="https://images2.thanhnien.vn/thumb_w/640/528068263637045248/2023/2/15/gi-a-nguyen-4-1676428171653131299439.jpg" id="img_550142447353524224" w="2000" h="3001" alt="Gi A Nguyễn: Tôi buồn khi được khen đẹp trai hơn là diễn giỏi - Ảnh 6." title="Gi A Nguyễn: Tôi buồn khi được khen đẹp trai hơn là diễn giỏi - Ảnh 6." rel="lightbox" photoid="550142447353524224" data-original="https://images2.thanhnien.vn/528068263637045248/2023/2/15/gi-a-nguyen-4-1676428171653131299439.jpg" type="photo" width="" height=""/></p><figcaption><p data-placeholder="Nhập chú thích ảnh">&#34;Các vai võ thuật vốn là màu sắc riêng của tôi rồi. Tôi nghĩ mình sẽ tiếp tục làm tốt nhất trong một mảng. Khi đã tốt rồi, lên được đỉnh cao ở mảng đó rồi thì tôi sẽ chuyển sang cái mới. Mọi thứ là cái duyên thôi, tôi sẽ tiếp tục đi theo con đường của mình&#34;, Gi A Nguyễn chia sẻ với <i>Thanh Niên</i></p></figcaption><p data-placeholder="Nhập tác giả">ĐPCC</p></figure><figure type="Photo"><p><img src="https://images2.thanhnien.vn/thumb_w/640/528068263637045248/2023/2/15/gi-a-nguyen-6-16764281715221923415599.jpg" id="img_550142443856269312" w="2000" h="3000" alt="Gi A Nguyễn: Tôi buồn khi được khen đẹp trai hơn là diễn giỏi - Ảnh 7." title="Gi A Nguyễn: Tôi buồn khi được khen đẹp trai hơn là diễn giỏi - Ảnh 7." rel="lightbox" photoid="550142443856269312" data-original="https://images2.thanhnien.vn/528068263637045248/2023/2/15/gi-a-nguyen-6-16764281715221923415599.jpg" type="photo" width="" height=""/></p><figcaption><p data-placeholder="Nhập chú thích ảnh">Chia sẻ về dự án sắp tới, Gi A Nguyễn nói anh sẽ góp mặt trong phim điện ảnh <i>Móng vuốt </i>của đạo diễn Lê Thanh Sơn. &#34;Đây là vai diễn hoàn toàn mới, khác xa với hình ảnh mọi người hay thấy tôi trên màn ảnh&#34;, anh chia sẻ. Dự kiến, phim sẽ trình làng cuối năm 2023</p></figcaption><p data-placeholder="Nhập tác giả">ĐPCC</p></figure><!--Wed Feb 15 2023 15:05:14 GMT+0700 (Indochina Time) -- Wed Feb 15 2023 15:05:14 GMT+0700 (Indochina Time) -- Wed Feb 15 2023 15:05:20 GMT+0700 (Indochina Time)-->
