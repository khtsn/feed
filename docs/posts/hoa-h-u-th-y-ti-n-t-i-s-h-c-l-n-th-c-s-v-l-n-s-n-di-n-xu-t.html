    <h1>Hoa hậu Thùy Tiên: Tôi sẽ học lên thạc sĩ và lấn sân diễn xuất</h1>

                                <h2 data-role="sapo">
                                    Nhận dịp đầu năm mới, Hoa hậu Hòa bình Quốc tế 2021 Thùy Tiên khoe nhan sắc ngọt ngào bên người đẹp Thiên Ân. Đồng thời, cô hé lộ kế hoạch đặc biệt trong năm 2023.
                                </h2>
                                <zone id="k911czvz"></zone>
    

                                <div>
                                    <div data-role="content" itemprop="articleBody">
                                                                                <figure type="Photo"><p><img src="https://images2.thanhnien.vn/thumb_w/640/528068263637045248/2023/1/30/thuy-tien--thien-an-1-16750482243721425422436.jpg" id="img_544355091482775552" w="800" h="533" alt="Hoa hậu Thùy Tiên: Tôi sẽ học lên thạc sĩ và lấn sân diễn xuất   - Ảnh 1." title="Hoa hậu Thùy Tiên: Tôi sẽ học lên thạc sĩ và lấn sân diễn xuất   - Ảnh 1." rel="lightbox" photoid="544355091482775552" data-original="https://images2.thanhnien.vn/528068263637045248/2023/1/30/thuy-tien--thien-an-1-16750482243721425422436.jpg" type="photo" width="" height=""/></p><figcaption><p data-placeholder="Nhập chú thích ảnh">Mở đầu năm mới 2023, Thùy Tiên khiến fan thích thú khi trình làng bộ ảnh bên Hoa hậu Hòa bình Việt Nam 2022 Thiên Ân. Hai người đẹp khoe sắc vóc rạng rỡ trong bối cảnh tràn ngập sắc hoa. Trong khi Hoa hậu Hòa bình Quốc tế 2021 gây ấn tượng với gương mặt khả ái, mỹ nhân Long An thu hút ánh nhìn với thần thái gợi cảm</p></figcaption></figure><figure type="Photo"><p><img src="https://images2.thanhnien.vn/thumb_w/640/528068263637045248/2023/1/30/thuy-tien--thien-an-2-16750482243801606134326.jpg" id="img_544355132901105664" w="800" h="1000" alt="Hoa hậu Thùy Tiên: Tôi sẽ học lên thạc sĩ và lấn sân diễn xuất   - Ảnh 2." title="Hoa hậu Thùy Tiên: Tôi sẽ học lên thạc sĩ và lấn sân diễn xuất   - Ảnh 2." rel="lightbox" photoid="544355132901105664" data-original="https://images2.thanhnien.vn/528068263637045248/2023/1/30/thuy-tien--thien-an-2-16750482243801606134326.jpg" type="photo" width="" height=""/></p><figcaption><p data-placeholder="Nhập chú thích ảnh">Cả hai xuất hiện rạng rỡ trong trang phục thanh lịch cùng lối trang điểm nhẹ nhàng, trong trẻo. Thường xuyên xuất hiện với hình ảnh năng động, gợi cảm, hai người đẹp vẫn gây bất ngờ với phong cách ngọt ngào</p></figcaption><p data-placeholder="Nhập tác giả">NVCC</p></figure><figure type="Photo"><p><img src="https://images2.thanhnien.vn/thumb_w/640/528068263637045248/2023/1/30/thuy-tien--thien-an-3-167504822438999926415.jpg" id="img_544355116455239680" w="800" h="1000" alt="Hoa hậu Thùy Tiên: Tôi sẽ học lên thạc sĩ và lấn sân diễn xuất   - Ảnh 3." title="Hoa hậu Thùy Tiên: Tôi sẽ học lên thạc sĩ và lấn sân diễn xuất   - Ảnh 3." rel="lightbox" photoid="544355116455239680" data-original="https://images2.thanhnien.vn/528068263637045248/2023/1/30/thuy-tien--thien-an-3-167504822438999926415.jpg" type="photo" width="" height=""/></p><figcaption><p data-placeholder="Nhập chú thích ảnh">Thùy Tiên và Thiên Ân là những nàng hậu hoạt động năng nổ trên mạng xã hội. Cả hai thường xuyên chia sẻ những bức ảnh thời trang cũng như hé lộ phong cách sống. Đồng thời, hai người đẹp luôn cập nhật cách xu hướng mới và biến hóa với hình ảnh đa dạng</p></figcaption><p data-placeholder="Nhập tác giả">NVCC</p></figure><figure type="Photo"><p><img src="https://images2.thanhnien.vn/thumb_w/640/528068263637045248/2023/1/30/thuy-tien--thien-an-4-1675048224453998447163.jpg" id="img_544355139581321216" w="800" h="1000" alt="Hoa hậu Thùy Tiên: Tôi sẽ học lên thạc sĩ và lấn sân diễn xuất   - Ảnh 4." title="Hoa hậu Thùy Tiên: Tôi sẽ học lên thạc sĩ và lấn sân diễn xuất   - Ảnh 4." rel="lightbox" photoid="544355139581321216" data-original="https://images2.thanhnien.vn/528068263637045248/2023/1/30/thuy-tien--thien-an-4-1675048224453998447163.jpg" type="photo" width="" height=""/></p><figcaption><p data-placeholder="Nhập chú thích ảnh">Thông qua bộ ảnh, Hoa hậu Thùy Tiên nói cô muốn khán giả thấy mình là người đa dạng, luôn thay đổi theo hướng tích cực. Người đẹp không đóng khung bản thân, luôn làm mới mình với nhiều phong cách</p></figcaption><p data-placeholder="Nhập tác giả">NVCC</p></figure><figure type="Photo"><p><img src="https://images2.thanhnien.vn/thumb_w/640/528068263637045248/2023/1/30/thuy-tien--thien-an-5-16750482244621098395428.jpg" id="img_544355109965209600" w="800" h="1000" alt="Hoa hậu Thùy Tiên: Tôi sẽ học lên thạc sĩ và lấn sân diễn xuất   - Ảnh 5." title="Hoa hậu Thùy Tiên: Tôi sẽ học lên thạc sĩ và lấn sân diễn xuất   - Ảnh 5." rel="lightbox" photoid="544355109965209600" data-original="https://images2.thanhnien.vn/528068263637045248/2023/1/30/thuy-tien--thien-an-5-16750482244621098395428.jpg" type="photo" width="" height=""/></p><figcaption><p data-placeholder="Nhập chú thích ảnh">Chia sẻ về dự định trong năm mới, Thùy Tiên cho biết cô sẽ duy trì việc học thạc sĩ, tập trung kinh doanh và thử sức ở nhiều lĩnh vực nghệ thuật. Trước mắt, cô sẽ tham gia diễn xuất trong một số dự án vào năm 2023</p></figcaption><p data-placeholder="Nhập tác giả">NVCC</p></figure><figure type="Photo"><p><img src="https://images2.thanhnien.vn/thumb_w/640/528068263637045248/2023/1/30/thuy-tien--thien-an-6-16750482244691101866770.jpg" id="img_544355098711289856" w="800" h="1000" alt="Hoa hậu Thùy Tiên: Tôi sẽ học lên thạc sĩ và lấn sân diễn xuất   - Ảnh 6." title="Hoa hậu Thùy Tiên: Tôi sẽ học lên thạc sĩ và lấn sân diễn xuất   - Ảnh 6." rel="lightbox" photoid="544355098711289856" data-original="https://images2.thanhnien.vn/528068263637045248/2023/1/30/thuy-tien--thien-an-6-16750482244691101866770.jpg" type="photo" width="" height=""/></p><figcaption><p data-placeholder="Nhập chú thích ảnh">“Hy vọng rằng khán giả sẽ tiếp tục theo dõi và dành tình cảm cho Nguyễn Thúc Thùy Tiên bởi cô ấy không chỉ là hoa hậu mà còn có thể xuất hiện trong nhiều vai trò hơn nữa”, người đẹp chia sẻ</p></figcaption><p data-placeholder="Nhập tác giả">NVCC</p></figure><figure type="Photo"><p><img src="https://images2.thanhnien.vn/thumb_w/640/528068263637045248/2023/1/30/thuy-tien--thien-an-7-1675048224478495084473.jpg" id="img_544355105124380672" w="800" h="1000" alt="Hoa hậu Thùy Tiên: Tôi sẽ học lên thạc sĩ và lấn sân diễn xuất   - Ảnh 7." title="Hoa hậu Thùy Tiên: Tôi sẽ học lên thạc sĩ và lấn sân diễn xuất   - Ảnh 7." rel="lightbox" photoid="544355105124380672" data-original="https://images2.thanhnien.vn/528068263637045248/2023/1/30/thuy-tien--thien-an-7-1675048224478495084473.jpg" type="photo" width="" height=""/></p><figcaption><p data-placeholder="Nhập chú thích ảnh">Sau khi kết thúc nhiệm kỳ, Hoa hậu Thùy Tiên tích cực làm từ thiện và tham gia các hoạt động xã hội. Người đẹp còn trở thành diễn giả của một số chương trình cộng đồng nhằm truyền cảm hứng đến giới trẻ. Song song đó, cô cũng tích cực tạo ra nhiều chương trình trực tuyến để lan tỏa năng lượng tích cực đến với công chúng</p></figcaption><p data-placeholder="Nhập tác giả">NVCC</p></figure><!--Mon Jan 30 2023 11:12:42 GMT+0700 (Giờ Đông Dương) -- Mon Jan 30 2023 11:12:42 GMT+0700 (Giờ Đông Dương) -- Mon Jan 30 2023 11:12:53 GMT+0700 (Giờ Đông Dương)-->
