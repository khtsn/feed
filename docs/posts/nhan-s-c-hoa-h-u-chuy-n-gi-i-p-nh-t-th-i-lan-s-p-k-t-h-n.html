    <h1>Nhan sắc hoa hậu chuyển giới đẹp nhất Thái Lan sắp kết hôn</h1>
    
    <div id="readability-page-1" class="page"><div>
                                <div data-role="content" itemprop="articleBody">
                                                                                                                
                                    <figure type="Photo"><p><img src="https://images2.thanhnien.vn/528068263637045248/2023/2/4/14-16755096010251103976356.jpeg" id="img_546289719678803968" w="1366" h="2048" alt="Nhan sắc hoa hậu chuyển giới đẹp nhất Thái Lan - Ảnh 1." title="Nhan sắc hoa hậu chuyển giới đẹp nhất Thái Lan - Ảnh 1." rel="lightbox" photoid="546289719678803968" data-original="https://images2.thanhnien.vn/528068263637045248/2023/2/4/14-16755096010251103976356.jpeg" type="photo" width="" height=""/></p><figcaption><p data-placeholder="Nhập chú thích ảnh">Mới đây, truyền thông Thái Lan rầm rộ đưa tin <a href="https://thanhnien.vn/huong-giang-cung-nong-poy-lam-giam-khao-hoa-hau-chuyen-gioi-quoc-te-185931188.htm" target="_blank" title="Hương Giang cùng Nong Poy làm giám khảo Hoa hậu Chuyển giới Quốc tế">Nong Poy</a> vừa đính hôn với <a href="https://thanhnien.vn/hoa-hau-chuyen-gioi-dep-nhat-thai-lan-ket-hon-185230203120859369.htm" title="Oak Phakwa Hongyok" data-rel="follow">Oak Phakwa Hongyok</a> (người thừa kế của Ar Jor - doanh nghiệp sở hữu chuỗi bảo tàng, nhà hàng, quán cà phê nổi tiếng ở Phuket) và chuẩn bị tổ chức đám cưới vào ngày 1.3 tới. Mỹ nhân 37 tuổi khiến nhiều người ngưỡng mộ khi gặt hái được nhiều thành công trong sự nghiệp và có tình yêu đẹp bên bạn trai giàu có</p></figcaption><p data-placeholder="Nhập tác giả">FBNV</p></figure><figure type="Photo"><p><img src="https://images2.thanhnien.vn/528068263637045248/2023/2/4/18-1675509874146175234433.jpeg" id="img_546290823910883328" w="1535" h="1920" alt="Nhan sắc hoa hậu chuyển giới đẹp nhất Thái Lan - Ảnh 2." title="Nhan sắc hoa hậu chuyển giới đẹp nhất Thái Lan - Ảnh 2." rel="lightbox" photoid="546290823910883328" data-original="https://images2.thanhnien.vn/528068263637045248/2023/2/4/18-1675509874146175234433.jpeg" type="photo" width="" height=""/></p><figcaption><p data-placeholder="Nhập chú thích ảnh">Nong Poy (tên thật: Treechada Petcharat) sinh năm 1986 trong hình hài một bé trai. Ngay từ nhỏ, người đẹp đã chán ghét cơ thể nam giới và khao khát trở thành con gái lớn dần theo hành trình trưởng thành của mình. Nong Poy từng ghét bỏ bản thân, phải tỏ ra là một đứa con trai trước mặt bố mẹ. Những năm tháng bí bách, khổ sở và khao khát tìm lại chính mình đã thôi thúc cậu bé 17 tuổi quyết định thực hiện phẫu thuật chuyển giới</p></figcaption><p data-placeholder="Nhập tác giả">FBNV</p></figure><figure type="Photo"><p><img src="https://images2.thanhnien.vn/528068263637045248/2023/2/4/9-167550960072949933062.jpg" id="img_546289694916890624" w="1080" h="1080" alt="Nhan sắc hoa hậu chuyển giới đẹp nhất Thái Lan - Ảnh 3." title="Nhan sắc hoa hậu chuyển giới đẹp nhất Thái Lan - Ảnh 3." rel="lightbox" photoid="546289694916890624" data-original="https://images2.thanhnien.vn/528068263637045248/2023/2/4/9-167550960072949933062.jpg" type="photo" width="" height=""/></p><figcaption><p data-placeholder="Nhập chú thích ảnh">Cuộc phẫu thuật chuyển đổi từ nam sang nữ khiến Nong Poy chống chọi với những cơn đau kinh hoàng về mặt thể xác song cô thừa nhận mình thấy được giải phóng trong tâm hồn và cảm giác như mình được tái sinh. Bất chấp sự kỳ thị, những lời đàm tiếu, người đẹp vẫn luôn tự hào về bản thân. &#34;Tôi chuyển giới không phải chạy theo trào lưu mà tôi làm thế vì tin vào khao khát, tiếng nói của cơ thể. Người thân, bạn bè cũng thấu hiểu rằng tôi muốn được là chính mình&#34;, nữ thần chuyển giới từng chia sẻ</p></figcaption><p data-placeholder="Nhập tác giả">FBNV</p></figure><figure type="Photo"><p><img src="https://images2.thanhnien.vn/528068263637045248/2023/2/4/4-16755096005612143708441.jpg" id="img_546289751200256000" w="1619" h="1920" alt="Nhan sắc hoa hậu chuyển giới đẹp nhất Thái Lan - Ảnh 4." title="Nhan sắc hoa hậu chuyển giới đẹp nhất Thái Lan - Ảnh 4." rel="lightbox" photoid="546289751200256000" data-original="https://images2.thanhnien.vn/528068263637045248/2023/2/4/4-16755096005612143708441.jpg" type="photo" width="" height=""/></p><figcaption><p data-placeholder="Nhập chú thích ảnh">Năm 2004, Nong Poy trở nên nổi tiếng khi đăng quang Miss Tiffany (cuộc thi dành cho người chuyển giới tại Thái Lan). Cùng năm, cô tham gia Miss International Queen (Hoa hậu Chuyển giới Quốc tế) và xuất sắc giành vương miện. Gương mặt xinh đẹp với những đường nét thanh thoát, mềm mại cùng vóc dáng mảnh mai khiến nàng hậu 8X nhận được vô vàn lời khen từ khán giả, truyền thông</p></figcaption><p data-placeholder="Nhập tác giả">FBNV</p></figure><figure type="Photo"><p><img src="https://images2.thanhnien.vn/528068263637045248/2023/2/4/10-1675509600822591474266.jpeg" id="img_546289670409625600" w="1413" h="1536" alt="Nhan sắc hoa hậu chuyển giới đẹp nhất Thái Lan - Ảnh 5." title="Nhan sắc hoa hậu chuyển giới đẹp nhất Thái Lan - Ảnh 5." rel="lightbox" photoid="546289670409625600" data-original="https://images2.thanhnien.vn/528068263637045248/2023/2/4/10-1675509600822591474266.jpeg" type="photo" width="" height=""/></p><figcaption><p data-placeholder="Nhập chú thích ảnh">Nhiều năm qua, cô được công chúng lẫn truyền thông trong nước, quốc tế gọi là hoa hậu chuyển giới đẹp nhất Thái Lan. Mỹ nhân xứ chùa Vàng cũng xuất hiện trong nhiều xếp hạng nhan sắc, trong đó có danh sách 100 gương mặt đẹp nhất thế giới 2015 do <i>TC Candler</i> bình chọn</p></figcaption><p data-placeholder="Nhập tác giả">FBNV</p></figure><figure type="Photo"><p><img src="https://images2.thanhnien.vn/528068263637045248/2023/2/4/8-16755096007192053245861.jpeg" id="img_546289727756713984" w="1920" h="1183" alt="Nhan sắc hoa hậu chuyển giới đẹp nhất Thái Lan - Ảnh 6." title="Nhan sắc hoa hậu chuyển giới đẹp nhất Thái Lan - Ảnh 6." rel="lightbox" photoid="546289727756713984" data-original="https://images2.thanhnien.vn/528068263637045248/2023/2/4/8-16755096007192053245861.jpeg" type="photo" width="" height=""/></p><figcaption><p data-placeholder="Nhập chú thích ảnh">Danh hiệu hoa hậu chuyển giới cũng mở đường cho Nong Poy tiến vào làng giải trí với vai trò người mẫu, diễn viên. Người đẹp từng tham gia nhiều bộ phim Hoa ngữ: <i>Cuộc chiến á phiện, Đổ thành phong vân 2, Thiên duyên tiền định, Bác sĩ phù thủy</i>… xuất hiện bên cạnh dàn sao đình đám: <a href="https://thanhnien.vn/ly-do-co-thien-lac-cat-luc-lam-viec-o-tuoi-ngu-tuan-1851471359.htm" target="_blank" title="Lý do Cổ Thiên Lạc cật lực làm việc ở tuổi ngũ tuần">Cổ Thiên Lạc</a>, <a href="https://thanhnien.vn/truong-gia-huy-phai-xem-phim-khieu-dam-vi-hon-sao-chuyen-gioi-185640842.htm" target="_blank" title="Trương Gia Huy phải xem phim khiêu dâm vì hôn sao chuyển giới">Trương Gia Huy</a>, <a href="https://thanhnien.vn/chau-nhuan-phat-phong-do-o-tuoi-67-1851460252.htm" target="_blank" title="Châu Nhuận Phát phong độ ở tuổi 67">Châu Nhuận Phát</a>…</p></figcaption><p data-placeholder="Nhập tác giả">Chụp màn hình</p></figure><figure type="Photo"><p><img src="https://images2.thanhnien.vn/528068263637045248/2023/2/4/7-1675509600677206830582.jpeg" id="img_546289664014954496" w="1333" h="2000" alt="Nhan sắc hoa hậu chuyển giới đẹp nhất Thái Lan - Ảnh 7." title="Nhan sắc hoa hậu chuyển giới đẹp nhất Thái Lan - Ảnh 7." rel="lightbox" photoid="546289664014954496" data-original="https://images2.thanhnien.vn/528068263637045248/2023/2/4/7-1675509600677206830582.jpeg" type="photo" width="" height=""/></p><figcaption><p data-placeholder="Nhập chú thích ảnh">Hiện tại, Nong Poy không còn tích cực đóng phim mà chuyển hướng sang kinh doanh. Theo <i>Forbes</i> (Thái Lan), cô vừa theo học chương trình thạc sĩ vừa điều hành công ty dược phẩm. Dù vậy, cô vẫn giữ được sức hút trong làng giải trí, trở thành gương mặt quảng cáo cho các thương hiệu thời trang, mỹ phẩm, chụp ảnh tạp chí, dự sự kiện…</p></figcaption><p data-placeholder="Nhập tác giả">FBNV</p></figure><figure type="Photo"><p><img src="https://images2.thanhnien.vn/528068263637045248/2023/2/4/2-1675509600371148889262.jpeg" id="img_546289732877037568" w="1536" h="1920" alt="Nhan sắc hoa hậu chuyển giới đẹp nhất Thái Lan - Ảnh 8." title="Nhan sắc hoa hậu chuyển giới đẹp nhất Thái Lan - Ảnh 8." rel="lightbox" photoid="546289732877037568" data-original="https://images2.thanhnien.vn/528068263637045248/2023/2/4/2-1675509600371148889262.jpeg" type="photo" width="" height=""/></p><figcaption><p data-placeholder="Nhập chú thích ảnh">Trong cuộc phỏng vấn với <i>Forbes</i> (Thái Lan), người đẹp chia sẻ dịch bệnh khiến cô không thể ra nước ngoài đóng phim như trước nên đã rẽ hướng. Nàng hậu bộc bạch rằng cô yêu thích cuộc sống đơn giản, muốn dành nhiều thời gian cho bản thân và cống hiến cho cộng đồng thay vì cố gắng sống dưới hào quang của một ngôi sao</p></figcaption><p data-placeholder="Nhập tác giả">FBNV</p></figure><figure type="Photo"><p><img src="https://images2.thanhnien.vn/528068263637045248/2023/2/4/5-1675509600645968671052.jpg" id="img_546289701508718592" w="1280" h="985" alt="Nhan sắc hoa hậu chuyển giới đẹp nhất Thái Lan - Ảnh 9." title="Nhan sắc hoa hậu chuyển giới đẹp nhất Thái Lan - Ảnh 9." rel="lightbox" photoid="546289701508718592" data-original="https://images2.thanhnien.vn/528068263637045248/2023/2/4/5-1675509600645968671052.jpg" type="photo" width="" height=""/></p><figcaption><p data-placeholder="Nhập chú thích ảnh">Ở tuổi U.40, Nong Poy vẫn giữ được nhan sắc xinh đẹp, tươi trẻ với làn da không tì vết. Cô cũng được yêu mến bởi lối sống tránh xa thị phi</p></figcaption><p data-placeholder="Nhập tác giả">FBNV</p></figure><figure type="Photo"><p><img src="https://images2.thanhnien.vn/528068263637045248/2023/2/4/13-1675509600870469551111.jpeg" id="img_546289764008407040" w="1553" h="1920" alt="Nhan sắc hoa hậu chuyển giới đẹp nhất Thái Lan - Ảnh 10." title="Nhan sắc hoa hậu chuyển giới đẹp nhất Thái Lan - Ảnh 10." rel="lightbox" photoid="546289764008407040" data-original="https://images2.thanhnien.vn/528068263637045248/2023/2/4/13-1675509600870469551111.jpeg" type="photo" width="" height=""/></p><figcaption><p data-placeholder="Nhập chú thích ảnh">Khác với hình tượng nóng bỏng thời mới nổi tiếng, người đẹp hiện theo đuổi phong cách thanh lịch, tối giản và hiện đại. Cô thường chọn những trang phục có màu sắc nhẹ nhàng, trang nhã, kiểu dáng đơn giản</p></figcaption><p data-placeholder="Nhập tác giả">FBNV</p></figure><figure type="Photo"><p><img src="https://images2.thanhnien.vn/528068263637045248/2023/2/4/20-1675511281796996406786.jpeg" id="img_546296725273780224" w="1024" h="1280" alt="Nhan sắc hoa hậu chuyển giới đẹp nhất Thái Lan - Ảnh 11." title="Nhan sắc hoa hậu chuyển giới đẹp nhất Thái Lan - Ảnh 11." rel="lightbox" photoid="546296725273780224" data-original="https://images2.thanhnien.vn/528068263637045248/2023/2/4/20-1675511281796996406786.jpeg" type="photo" width="" height=""/></p><figcaption><p data-placeholder="Nhập chú thích ảnh">Trong những bức ảnh đời thường, người đẹp ăn mặc giản dị, để mặt mộc tự nhiên</p></figcaption><p data-placeholder="Nhập tác giả">Instagram NV</p></figure><figure type="Photo"><p><img src="https://images2.thanhnien.vn/528068263637045248/2023/2/4/12-1675509600861575292967.jpeg" id="img_546289745542193152" w="1920" h="1893" alt="Nhan sắc hoa hậu chuyển giới đẹp nhất Thái Lan - Ảnh 12." title="Nhan sắc hoa hậu chuyển giới đẹp nhất Thái Lan - Ảnh 12." rel="lightbox" photoid="546289745542193152" data-original="https://images2.thanhnien.vn/528068263637045248/2023/2/4/12-1675509600861575292967.jpeg" type="photo" width="" height=""/></p><figcaption><p data-placeholder="Nhập chú thích ảnh">Nong Poy duy trì vóc dáng mảnh mai bằng cách chăm tập pilates, đạp xe đường dài, chơi tennis</p></figcaption><p data-placeholder="Nhập tác giả">FBNV</p></figure><figure type="Photo"><p><img src="https://images2.thanhnien.vn/528068263637045248/2023/2/4/16-1675509601075706537757.jpg" id="img_546289714076524544" w="2000" h="1254" alt="Nhan sắc hoa hậu chuyển giới đẹp nhất Thái Lan - Ảnh 13." title="Nhan sắc hoa hậu chuyển giới đẹp nhất Thái Lan - Ảnh 13." rel="lightbox" photoid="546289714076524544" data-original="https://images2.thanhnien.vn/528068263637045248/2023/2/4/16-1675509601075706537757.jpg" type="photo" width="" height=""/></p><figcaption><p data-placeholder="Nhập chú thích ảnh">Mới đây, hoa hậu chuyển giới vừa trở thành gương mặt trang bìa của tạp chí <i>Harper&#39;s Bazaar </i>(Thái Lan) số tháng 2.2022. Mỹ nhân 37 tuổi đeo loạt trang sức của Cartier, khoe vẻ đẹp nhẹ nhàng, cuốn hút trước ống kính</p></figcaption><p data-placeholder="Nhập tác giả">Harper&#39;s Bazaar</p></figure><figure type="Photo"><p><img src="https://images2.thanhnien.vn/528068263637045248/2023/2/4/17-1675509601091535741963.jpeg" id="img_546289740774912000" w="1536" h="2048" alt="Nhan sắc hoa hậu chuyển giới đẹp nhất Thái Lan - Ảnh 14." title="Nhan sắc hoa hậu chuyển giới đẹp nhất Thái Lan - Ảnh 14." rel="lightbox" photoid="546289740774912000" data-original="https://images2.thanhnien.vn/528068263637045248/2023/2/4/17-1675509601091535741963.jpeg" type="photo" width="" height=""/></p><figcaption><p data-placeholder="Nhập chú thích ảnh">Hiện Nong Poy đang tất bật chuẩn bị hôn lễ với bạn trai Oak Phakwa Hongyok. Chuyện tình của họ được gia đình chồng sắp cưới ủng hộ và vun vén. Trải qua nhiều sóng gió trong tình yêu, Nong Poy được người hâm mộ, đồng nghiệp chúc phúc</p></figcaption><p data-placeholder="Nhập tác giả">FBNV</p></figure><!--Sun Feb 05 2023 06:24:00 GMT+0700 (Giờ Đông Dương) -- Sun Feb 05 2023 06:24:00 GMT+0700 (Giờ Đông Dương) -- Sat Feb 04 2023 23:26:19 GMT+0700 (Giờ Đông Dương)-->
