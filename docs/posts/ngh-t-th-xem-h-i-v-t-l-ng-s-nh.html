    <h1>‘Nghẹt thở’ xem hội vật làng Sình</h1>
    
    <div id="readability-page-1" class="page"><div>
                                <div data-role="content" itemprop="articleBody">
                                                                                                                
                                    <p>Sáng 31.1 (mùng 10 tháng giêng), <a href="https://thanhnien.vn/vi-sao-nem-cong-cha-phung-khong-the-thieu-trong-mam-co-tet-nhieu-gia-dinh-hue-1851534474.htm" title="hàng ngàn người dân" data-rel="follow">hàng ngàn người dân</a> và du khách đã đổ về làng Sình (xã Phú Mậu, TP.Huế, Thừa Thiên – Huế) xem hội vật đầu năm.</p><figure type="Photo"><p><img src="https://images2.thanhnien.vn/528068263637045248/2023/1/31/dji0318-1675144640400464586062.jpg" id="img_544758996288692224" w="2000" h="1333" alt="Sau tiếng trống hội từ đánh liên hồi, cũng là lúc các đô vật biểu diễn những thế vật đẹp, lần lượt lên võ đài là các đô vật lứa tuổi thiếu niên, thanh niên tham gia tranh tài." title="Sau tiếng trống hội từ đánh liên hồi, cũng là lúc các đô vật biểu diễn những thế vật đẹp, lần lượt lên võ đài là các đô vật lứa tuổi thiếu niên, thanh niên tham gia tranh tài." rel="lightbox" photoid="544758996288692224" data-original="https://images2.thanhnien.vn/528068263637045248/2023/1/31/dji0318-1675144640400464586062.jpg" type="photo" width="" height=""/></p><figcaption><p data-placeholder="Nhập chú thích ảnh">Sau tiếng trống hội từ đánh liên hồi, cũng là lúc các đô vật biểu diễn những thế vật đẹp, lần lượt lên võ đài tranh tài. Trong đó có các đô vật lứa tuổi thiếu niên, thanh niên</p></figcaption></figure><figure type="Photo"><p><img src="https://images2.thanhnien.vn/528068263637045248/2023/1/31/img5030-167514464082647094922.jpg" id="img_544758964129439744" w="2000" h="1333" alt="‘Nghẹt thở’ xem hội vật Làng Sình - Ảnh 2." title="‘Nghẹt thở’ xem hội vật Làng Sình - Ảnh 2." rel="lightbox" photoid="544758964129439744" data-original="https://images2.thanhnien.vn/528068263637045248/2023/1/31/img5030-167514464082647094922.jpg" type="photo" width="" height=""/></p><figcaption><p data-placeholder="Nhập chú thích ảnh">Ngày hội này đặc biệt ở chỗ: không đề cao việc thắng thua, chỉ đơn thuần để duy trì nét văn hóa ngày tết, cầu mong một năm mới  mạnh khỏe, an khang</p></figcaption><p data-placeholder="Nhập tác giả">LÊ HOÀI NHÂN</p></figure><figure type="Photo"><p><img src="https://images2.thanhnien.vn/528068263637045248/2023/1/31/img4909-16751446407072084768263.jpg" id="img_544758903126331392" w="2000" h="1333" alt="‘Nghẹt thở’ xem hội vật Làng Sình - Ảnh 3." title="‘Nghẹt thở’ xem hội vật Làng Sình - Ảnh 3." rel="lightbox" photoid="544758903126331392" data-original="https://images2.thanhnien.vn/528068263637045248/2023/1/31/img4909-16751446407072084768263.jpg" type="photo" width="" height=""/></p><figcaption><p data-placeholder="Nhập chú thích ảnh">Hồi hộp dõi theo từng thế vật</p></figcaption><p data-placeholder="Nhập tác giả">LÊ HOÀI NHÂN</p></figure><figure type="Photo"><p><img src="https://images2.thanhnien.vn/528068263637045248/2023/1/31/img5229-16751446408961195059633.jpg" id="img_544758984851464192" w="2000" h="1333" alt="‘Nghẹt thở’ xem hội vật Làng Sình - Ảnh 4." title="‘Nghẹt thở’ xem hội vật Làng Sình - Ảnh 4." rel="lightbox" photoid="544758984851464192" data-original="https://images2.thanhnien.vn/528068263637045248/2023/1/31/img5229-16751446408961195059633.jpg" type="photo" width="" height=""/></p><figcaption><p data-placeholder="Nhập chú thích ảnh">Đô vật đánh bại đối thủ với đòn đánh làm cho đối phương &#34;lấm lưng, trắng bụng&#34;, giữ trong 3 giây là thắng</p></figcaption><p data-placeholder="Nhập tác giả">LÊ HOÀI NHÂN</p></figure><figure type="Photo"><p><img src="https://images2.thanhnien.vn/528068263637045248/2023/1/31/img4987-16751446407721597557688.jpg" id="img_544758938518417408" w="2000" h="1333" alt="‘Nghẹt thở’ xem hội vật Làng Sình - Ảnh 5." title="‘Nghẹt thở’ xem hội vật Làng Sình - Ảnh 5." rel="lightbox" photoid="544758938518417408" data-original="https://images2.thanhnien.vn/528068263637045248/2023/1/31/img4987-16751446407721597557688.jpg" type="photo" width="" height=""/></p><figcaption><p data-placeholder="Nhập chú thích ảnh">Với tinh thần thượng võ, tuyệt nhiên đô vật không được ra các đòn đánh nguy hiểm đến tính mạng như bẻ, vặn, khóa trái khớp, tấn công bằng đầu, bấm các huyệt, nắm tóc, tấn công vào hạ bộ, yết hầu, mắt....</p></figcaption><p data-placeholder="Nhập tác giả">LÊ HOÀI NHÂN</p></figure><figure type="Photo"><p><img src="https://images2.thanhnien.vn/528068263637045248/2023/1/31/img5338-16751446409621261053953.jpg" id="img_544758978935332864" w="2000" h="1333" alt="‘Nghẹt thở’ xem hội vật Làng Sình - Ảnh 6." title="‘Nghẹt thở’ xem hội vật Làng Sình - Ảnh 6." rel="lightbox" photoid="544758978935332864" data-original="https://images2.thanhnien.vn/528068263637045248/2023/1/31/img5338-16751446409621261053953.jpg" type="photo" width="" height=""/></p><figcaption><p data-placeholder="Nhập chú thích ảnh">Nếu vượt qua vòng đấu loại, các đô vật sẽ bước vào vòng bán kết. Ở vòng bán kết, các đô vật phải vượt qua 1 đối thủ nữa mới lọt được vào vòng chung kết</p></figcaption><p data-placeholder="Nhập tác giả">LÊ HOÀI NHÂN</p></figure><figure type="Photo"><p><img src="https://images2.thanhnien.vn/528068263637045248/2023/1/31/img5251-1675144640905850768543.jpg" id="img_544758914843697152" w="2000" h="1333" alt="‘Nghẹt thở’ xem hội vật Làng Sình - Ảnh 7." title="‘Nghẹt thở’ xem hội vật Làng Sình - Ảnh 7." rel="lightbox" photoid="544758914843697152" data-original="https://images2.thanhnien.vn/528068263637045248/2023/1/31/img5251-1675144640905850768543.jpg" type="photo" width="" height=""/></p><figcaption><p data-placeholder="Nhập chú thích ảnh">Nét độc đáo trong Hội vật làng Sình còn là tính đoàn kết của làng xóm. Ví dụ một đô vật của làng nào bị thua sẽ có đô vật khác lên tiếp sức. Thế nên, để mang lại niềm tự hào cho làng, lớp trai tráng quanh năm rèn luyện sức khỏe, chờ đầu xuân để lên sới đấu</p></figcaption><p data-placeholder="Nhập tác giả">LÊ HOÀI NHÂN</p></figure><figure type="Photo"><p><img src="https://images2.thanhnien.vn/528068263637045248/2023/1/31/img4968-1675144640734767922318.jpg" id="img_544758927683981312" w="2000" h="1333" alt="‘Nghẹt thở’ xem hội vật Làng Sình - Ảnh 8." title="‘Nghẹt thở’ xem hội vật Làng Sình - Ảnh 8." rel="lightbox" photoid="544758927683981312" data-original="https://images2.thanhnien.vn/528068263637045248/2023/1/31/img4968-1675144640734767922318.jpg" type="photo" width="" height=""/></p><figcaption><p data-placeholder="Nhập chú thích ảnh">Ghi lại những hình ảnh hấp dẫn trên sới vật</p></figcaption><p data-placeholder="Nhập tác giả">LÊ HOÀI NHÂN</p></figure><figure type="Photo"><p><img src="https://images2.thanhnien.vn/528068263637045248/2023/1/31/img5303-16751446409131077935119.jpg" id="img_544758919019831296" w="2000" h="1333" alt="‘Nghẹt thở’ xem hội vật Làng Sình - Ảnh 9." title="‘Nghẹt thở’ xem hội vật Làng Sình - Ảnh 9." rel="lightbox" photoid="544758919019831296" data-original="https://images2.thanhnien.vn/528068263637045248/2023/1/31/img5303-16751446409131077935119.jpg" type="photo" width="" height=""/></p><figcaption><p data-placeholder="Nhập chú thích ảnh">Hội vật làng Sình ngoài yếu tố tâm linh như mong cho dân khỏe, làng yên, mùa màng tươi tốt, hạnh phúc đến với muôn người còn là một hoạt động vui, khỏe đầy tinh thần thượng võ đầu xuân</p></figcaption><p data-placeholder="Nhập tác giả">LÊ HOÀI NHÂN</p></figure><figure type="Photo"><p><img src="https://images2.thanhnien.vn/528068263637045248/2023/1/31/img5040-16751446408471939754541.jpg" id="img_544758910348328960" w="2000" h="1333" alt="‘Nghẹt thở’ xem hội vật Làng Sình - Ảnh 10." title="‘Nghẹt thở’ xem hội vật Làng Sình - Ảnh 10." rel="lightbox" photoid="544758910348328960" data-original="https://images2.thanhnien.vn/528068263637045248/2023/1/31/img5040-16751446408471939754541.jpg" type="photo" width="" height=""/></p><figcaption><p data-placeholder="Nhập chú thích ảnh">Cặp đô vật nữ lên sới</p></figcaption><p data-placeholder="Nhập tác giả">LÊ HOÀI NHÂN</p></figure><figure type="Photo"><p><img src="https://images2.thanhnien.vn/528068263637045248/2023/1/31/img5447-16751446410031905637181.jpg" id="img_544758973889769472" w="2000" h="1333" alt="Suốt từ sáng đến trưa, tiếng trống hội vẫn vang vọng thúc giục đoàn người kéo nhau về xem vật." title="Suốt từ sáng đến trưa, tiếng trống hội vẫn vang vọng thúc giục đoàn người kéo nhau về xem vật." rel="lightbox" photoid="544758973889769472" data-original="https://images2.thanhnien.vn/528068263637045248/2023/1/31/img5447-16751446410031905637181.jpg" type="photo" width="" height=""/></p><figcaption><p data-placeholder="Nhập chú thích ảnh">Suốt từ sáng đến trưa, tiếng trống hội vẫn vang vọng thúc giục đoàn người kéo nhau về xem vật</p></figcaption><p data-placeholder="Nhập tác giả">LÊ HOÀI NHÂN</p></figure><figure type="Photo"><p><img src="https://images2.thanhnien.vn/528068263637045248/2023/1/31/img5371-16751446409891102780882.jpg" id="img_544758934100385792" w="2000" h="1333" alt="‘Nghẹt thở’ xem hội vật Làng Sình - Ảnh 12." title="‘Nghẹt thở’ xem hội vật Làng Sình - Ảnh 12." rel="lightbox" photoid="544758934100385792" data-original="https://images2.thanhnien.vn/528068263637045248/2023/1/31/img5371-16751446409891102780882.jpg" type="photo" width="" height=""/></p><figcaption><p data-placeholder="Nhập chú thích ảnh">Ông Nguyễn Văn Trai, Chủ tịch UBND xã Phú Mậu, cho biết sau 3 năm chịu ảnh hưởng dịch bệnh Covid-19, năm nay hội vật làng Sình mới được tổ chức trở lại và thu hút lượng người xem rất đông, dự kiến hơn 10.000 người</p></figcaption><p data-placeholder="Nhập tác giả">LÊ HOÀI NHÂN</p></figure><figure type="Photo"><p><img src="https://images2.thanhnien.vn/528068263637045248/2023/1/31/img5375-1675144640996305346768.jpg" id="img_544758960288632832" w="2000" h="1333" alt="‘Nghẹt thở’ xem hội vật Làng Sình - Ảnh 13." title="‘Nghẹt thở’ xem hội vật Làng Sình - Ảnh 13." rel="lightbox" photoid="544758960288632832" data-original="https://images2.thanhnien.vn/528068263637045248/2023/1/31/img5375-1675144640996305346768.jpg" type="photo" width="" height=""/></p><figcaption><p data-placeholder="Nhập chú thích ảnh">“Năm nay trở lại, tôi cảm thấy người dân phấn khởi hơn, họ háo hức đi xem và cổ vũ các đô vật. Trong năm mới, hy vọng bà con phát triển hơn về kinh tế xã hội, để góp phần triển kinh tế địa phương, đồng thời mong bà con tiếp tục phát huy được giá trị văn hóa làng xã”, ông Nguyễn Văn Trai, Chủ tịch UBND xã Phú Mậu, nói<br/></p></figcaption><p data-placeholder="Nhập tác giả">LÊ HOÀI NHÂN</p></figure><!--Tue Jan 31 2023 13:22:00 GMT+0700 (Giờ Đông Dương) -- Tue Jan 31 2023 13:22:00 GMT+0700 (Giờ Đông Dương) -- Tue Jan 31 2023 14:49:37 GMT+0700 (Giờ Đông Dương)-->
