                            <h2 data-role="sapo">
                                Lý Hải hé lộ ba gương mặt mới sẽ góp mặt trong tác phẩm <i>Lật mặt: Tấm vé định mệnh</i> gồm: Tú Tri, Quỳnh Như bolero và Tạ Lâm.
                            </h2>
                            <div>
                                <div data-role="content" itemprop="articleBody" data-io-article-url="https://thanhnien.vn/nang-tho-moi-cua-ly-hai-18523021611414474.htm">
                                                                                                                
                                    <figure data-uid="lJAkVDUCb" type="Photo"><p><img src="https://images2.thanhnien.vn/thumb_w/640/528068263637045248/2023/2/16/tu-tri-5-16765205649351853277732.jpg" id="img_550529976227110912" w="2000" h="3000" alt="Tú Tri trở thành &#39;nàng thơ&#39; mới của Lý Hải trong &#39;Lật mặt: Tấm vé định mệnh&#39; - Ảnh 1." title="Tú Tri trở thành &#39;nàng thơ&#39; mới của Lý Hải trong &#39;Lật mặt: Tấm vé định mệnh&#39; - Ảnh 1." rel="lightbox" photoid="550529976227110912" data-original="https://images2.thanhnien.vn/528068263637045248/2023/2/16/tu-tri-5-16765205649351853277732.jpg" type="photo" width="" height=""/></p><figcaption><p data-placeholder="Nhập chú thích ảnh">Tú Tri vốn được biết đến với giọng ca bolero ngọt ngào. Á quân Solo cùng bolero 2018 thường xuyên xuất hiện với hình ảnh dịu dàng, đằm thắm trong các ca khúc trữ tình<br/></p></figcaption><p data-placeholder="Nhập tác giả">ĐPCC</p></figure><figure data-uid="1t5X2raAL" type="Photo"><p><img src="https://images2.thanhnien.vn/thumb_w/640/528068263637045248/2023/2/16/anh-chup-man-hinh-2023-02-16-luc-110952-1676520641701281350786.png" id="img_550530273696260096" w="657" h="883" alt="Tú Tri trở thành &#39;nàng thơ&#39; mới của Lý Hải trong &#39;Lật mặt: Tấm vé định mệnh&#39; - Ảnh 2." title="Tú Tri trở thành &#39;nàng thơ&#39; mới của Lý Hải trong &#39;Lật mặt: Tấm vé định mệnh&#39; - Ảnh 2." rel="lightbox" photoid="550530273696260096" data-original="https://images2.thanhnien.vn/528068263637045248/2023/2/16/anh-chup-man-hinh-2023-02-16-luc-110952-1676520641701281350786.png" type="photo" width="" height=""/></p><figcaption><p data-placeholder="Nhập chú thích ảnh">Một trong những yếu tố khiến Tú Tri lọt vào mắt xanh Lý Hải là khả năng võ thuật. Nữ ca sĩ từng nhận huy chương vàng Taekwondo và Vovinam ở các giải thi đấu trẻ. Đến hiện tại, cô gái sinh năm 1999 đã có gia tài hàng chục giải thưởng từ ca hát, diễn xuất đến võ thuật</p></figcaption><p data-placeholder="Nhập tác giả">ĐPCC</p></figure><figure data-uid="GpeHzj8dK" type="Photo"><p><img src="https://images2.thanhnien.vn/thumb_w/640/528068263637045248/2023/2/16/tu-tri-4-1676520564367286922516.jpg" id="img_550529980470030336" w="2000" h="2999" alt="Tú Tri trở thành &#39;nàng thơ&#39; mới của Lý Hải trong &#39;Lật mặt: Tấm vé định mệnh&#39; - Ảnh 3." title="Tú Tri trở thành &#39;nàng thơ&#39; mới của Lý Hải trong &#39;Lật mặt: Tấm vé định mệnh&#39; - Ảnh 3." rel="lightbox" photoid="550529980470030336" data-original="https://images2.thanhnien.vn/528068263637045248/2023/2/16/tu-tri-4-1676520564367286922516.jpg" type="photo" width="" height=""/></p><figcaption><p data-placeholder="Nhập chú thích ảnh">Với thành tích ấn tượng,<a href="https://www.24h.com.vn/tu-tri-tiet-lo-cuoc-song-sau-3-nam-ket-hon-dong-gioi-voi-yun-bin-1851533502.htm" title=" Tú Tri " data-rel="follow"> Tú Tri </a>đã được Lý Hải “đặt cọc” casting cho phim sau khi cô giành quán quân Gương mặt điện ảnh năm<i> </i>2022. Tuy nhiên, do quá run nên nữ ca sĩ đã trượt phần diễn tâm lý ở vòng casting. Nhưng sau đó, cô đã mạnh dạn xin thử vai ở vòng dự bị và chinh phục đạo diễn cùng nhà sản xuất</p></figcaption><p data-placeholder="Nhập tác giả">ĐPCC</p></figure><figure data-uid="YmIiQ864C" type="Photo"><p><img src="https://images2.thanhnien.vn/thumb_w/640/528068263637045248/2023/2/16/ta-lam-6-1676520563524673631973.jpg" id="img_550529953127768064" w="1363" h="2048" alt="Tú Tri trở thành &#39;nàng thơ&#39; mới của Lý Hải trong &#39;Lật mặt: Tấm vé định mệnh&#39; - Ảnh 4." title="Tú Tri trở thành &#39;nàng thơ&#39; mới của Lý Hải trong &#39;Lật mặt: Tấm vé định mệnh&#39; - Ảnh 4." rel="lightbox" photoid="550529953127768064" data-original="https://images2.thanhnien.vn/528068263637045248/2023/2/16/ta-lam-6-1676520563524673631973.jpg" type="photo" width="" height=""/></p><figcaption><p data-placeholder="Nhập chú thích ảnh">Nàng thơ thứ hai là Tạ Lâm, được chọn vào vai có tính cách hung dữ, ác khẩu trong<i> <a href="https://www.24h.com.vn/lo-dien-dan-dien-vien-tham-gia-lat-mat-6-cua-ly-hai-1851504880.htm" title="Lật mặt: Tấm vé định mệnh" data-rel="follow">Lật mặt: Tấm vé định mệnh</a></i>. Tuy nhiên, cô nhiều lần khiến đoàn phim đắn đo vì vẻ ngoài hiền lành. Để chứng minh khả năng, Tạ Lâm tự hóa trang và quay clip diễn xuất khiến nhà sản xuất bất ngờ vì y như hình dung của họ về vai diễn của cô trong phim</p></figcaption><p data-placeholder="Nhập tác giả">ĐPCC</p></figure><figure data-uid="EO2h01aTB" type="Photo"><p><img src="https://images2.thanhnien.vn/thumb_w/640/528068263637045248/2023/2/16/ta-lam-1-16765205642221612583069.jpg" id="img_550529971487928320" w="1706" h="2560" alt="Tú Tri trở thành &#39;nàng thơ&#39; mới của Lý Hải trong &#39;Lật mặt: Tấm vé định mệnh&#39; - Ảnh 5." title="Tú Tri trở thành &#39;nàng thơ&#39; mới của Lý Hải trong &#39;Lật mặt: Tấm vé định mệnh&#39; - Ảnh 5." rel="lightbox" photoid="550529971487928320" data-original="https://images2.thanhnien.vn/528068263637045248/2023/2/16/ta-lam-1-16765205642221612583069.jpg" type="photo" width="" height=""/></p><figcaption><p data-placeholder="Nhập chú thích ảnh">Về kinh nghiệm diễn xuất, Tạ Lâm từng vào top 6 Gương mặt điện ảnh<i> </i>năm 2022. Ngoài ra, cô còn có nhiều tài lẻ như múa, hát bolero…</p></figcaption><p data-placeholder="Nhập tác giả">ĐPCC</p></figure><figure data-uid="NvVvmHTqk" type="Photo"><p><img src="https://images2.thanhnien.vn/thumb_w/640/528068263637045248/2023/2/16/ta-lam-3-16765205651891550795037.jpg" id="img_550529962502037504" w="1784" h="2410" alt="Tú Tri trở thành &#39;nàng thơ&#39; mới của Lý Hải trong &#39;Lật mặt: Tấm vé định mệnh&#39; - Ảnh 6." title="Tú Tri trở thành &#39;nàng thơ&#39; mới của Lý Hải trong &#39;Lật mặt: Tấm vé định mệnh&#39; - Ảnh 6." rel="lightbox" photoid="550529962502037504" data-original="https://images2.thanhnien.vn/528068263637045248/2023/2/16/ta-lam-3-16765205651891550795037.jpg" type="photo" width="" height=""/></p><figcaption><p data-placeholder="Nhập chú thích ảnh">Một trong những vai diễn của Tạ Lâm được đánh giá cao là vai nữ phù thủy độc ác Bellatrix Lestrange trong vở <i>Một lần được sống</i> lấy cảm hứng từ <a href="https://www.24h.com.vn/tai-tu-harry-potter-va-dan-sao-nam-tai-xuat-an-tuong-trong-knock-at-the-carbin-185230201234932213.htm" title="Harry Potter" data-rel="follow">Harry Potter</a>. Cô hóa thân thành một kẻ điên loạn bị giam trong lồng kính với nhiều cảm xúc hỗn độn</p></figcaption><p data-placeholder="Nhập tác giả">ĐPCC</p></figure><figure data-uid="2z2Sk9JHx" type="Photo"><p><img src="https://images2.thanhnien.vn/thumb_w/640/528068263637045248/2023/2/16/quynh-nhu-7-1676520563918170955689.jpg" id="img_550529957902790656" w="1632" h="2448" alt="Tú Tri trở thành &#39;nàng thơ&#39; mới của Lý Hải trong &#39;Lật mặt: Tấm vé định mệnh&#39; - Ảnh 7." title="Tú Tri trở thành &#39;nàng thơ&#39; mới của Lý Hải trong &#39;Lật mặt: Tấm vé định mệnh&#39; - Ảnh 7." rel="lightbox" photoid="550529957902790656" data-original="https://images2.thanhnien.vn/528068263637045248/2023/2/16/quynh-nhu-7-1676520563918170955689.jpg" type="photo" width="" height=""/></p><figcaption><p data-placeholder="Nhập chú thích ảnh">Nàng thơ thứ ba là <a href="https://www.24h.com.vn/khieu-vu-toi-trap-trung-cung-nang-tho-doan-quynh-nhu-1851485229.htm" title="Quỳnh Như" data-rel="follow">Quỳnh Như</a>, được công chúng biết đến khi đoạt giành quán quân Đánh thức đam mê 2021. Ngoài sở trường hát bolero, nữ ca sĩ còn cho thấy sự đa tài khi thử sức ở nhiều dòng nhạc khác nhau. Cô còn có khả năng diễn, múa và phối bè</p></figcaption><p data-placeholder="Nhập tác giả">ĐPCC</p></figure><figure data-uid="ucd38WswX" type="Photo"><p><img src="https://images2.thanhnien.vn/thumb_w/640/528068263637045248/2023/2/16/quynh-nhu-2-167652056406255841951.jpg" id="img_550529947814350848" w="1632" h="2448" alt="Tú Tri trở thành &#39;nàng thơ&#39; mới của Lý Hải trong &#39;Lật mặt: Tấm vé định mệnh&#39; - Ảnh 8." title="Tú Tri trở thành &#39;nàng thơ&#39; mới của Lý Hải trong &#39;Lật mặt: Tấm vé định mệnh&#39; - Ảnh 8." rel="lightbox" photoid="550529947814350848" data-original="https://images2.thanhnien.vn/528068263637045248/2023/2/16/quynh-nhu-2-167652056406255841951.jpg" type="photo" width="" height=""/></p><figcaption><p data-placeholder="Nhập chú thích ảnh">Nữ ca sĩ đến từ Bình Dương còn có gia tài giải thưởng đồ sộ khi tham gia nhiều sân chơi ở lĩnh vực nghệ thuật từ thơ ấu đến trưởng thành. Lúc 5 tuổi, cô giành giải nhất cuộc thi ca hát dành cho thiếu nhi ở huyện Bến Cát (Bình Dương). Sau đó, cô có 5 năm liền đều giành giải nhất cuộc thi <i>Hoa Phượng Đỏ</i> của tỉnh, giải nhất <i>Tiếng hát chim sơn ca</i> ở lứa tuổi trung học cơ sở do Nhà thiếu nhi tỉnh tổ chức. Đặc biệt, cô trở thành quán quân của<i> </i>Solo cùng bolero<i> </i>năm 2016 khi chỉ mới 14 tuổi</p></figcaption><p data-placeholder="Nhập tác giả">ĐPCC</p></figure><figure data-uid="nfYg1ipsH" type="Photo"><p><img src="https://images2.thanhnien.vn/thumb_w/640/528068263637045248/2023/2/16/quynh-nhu-2-16765205645091542059805.jpg" id="img_550529967150497792" w="1365" h="2048" alt="Tú Tri trở thành &#39;nàng thơ&#39; mới của Lý Hải trong &#39;Lật mặt: Tấm vé định mệnh&#39; - Ảnh 9." title="Tú Tri trở thành &#39;nàng thơ&#39; mới của Lý Hải trong &#39;Lật mặt: Tấm vé định mệnh&#39; - Ảnh 9." rel="lightbox" photoid="550529967150497792" data-original="https://images2.thanhnien.vn/528068263637045248/2023/2/16/quynh-nhu-2-16765205645091542059805.jpg" type="photo" width="" height=""/></p><figcaption><p data-placeholder="Nhập chú thích ảnh">Dù từng tham gia nhiều cuộc thi nhưng Quỳnh Như cũng hồi hộp không kém Tú Tri khi lần đầu casting phim điện ảnh của <a href="https://www.24h.com.vn/co-gai-hat-nhac-pham-duy-khien-ly-hai-noi-da-ga-185230206004731664.htm" title="Lý Hải" data-rel="follow">Lý Hải</a>. Nữ ca sĩ được chọn đóng phim vì thể hiện tốt khả năng biến hóa với đa dạng cảm xúc</p></figcaption><p data-placeholder="Nhập tác giả">ĐPCC</p></figure><!--Thu Feb 16 2023 14:10:25 GMT+0700 (Giờ Đông Dương) -- Thu Feb 16 2023 14:10:25 GMT+0700 (Giờ Đông Dương) -- Thu Feb 16 2023 14:10:59 GMT+0700 (Giờ Đông Dương)-->
