    <h1>How do you answer this interview question as a dev? </h1>
    
    “Name a time where you had a technical issue and what you did to resolve it.”  You either debug it until you find the issue, ask a senior for help, or go to Stack Overflow. What else would you do? Seems like a dumb question to ask.
