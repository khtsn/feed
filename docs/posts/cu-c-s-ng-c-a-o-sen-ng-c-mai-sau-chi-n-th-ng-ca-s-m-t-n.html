    <h1>Cuộc sống của &#39;O Sen&#39; Ngọc Mai sau chiến thắng &#39;Ca sĩ mặt nạ&#39;</h1>
    
    <div id="readability-page-1" class="page"><div>
                                <div data-role="content" itemprop="articleBody" data-io-article-url="https://thanhnien.vn/cuoc-song-cua-o-sen-ngoc-mai-sau-chien-thang-ca-si-mat-na-18523020811401458.htm">
                                                                                                                
                                    <figure type="Photo"><p><img src="https://images2.thanhnien.vn/528068263637045248/2023/2/8/ngoc-mai-6-16758232780392041530579.jpg" id="img_547605378582175744" w="2000" h="1162" alt="Cuộc sống &#39;O Sen&#39; Ngọc Mai thay đổi ra sao sau chiến thắng Ca sĩ mặt nạ? - Ảnh 1." title="Cuộc sống &#39;O Sen&#39; Ngọc Mai thay đổi ra sao sau chiến thắng Ca sĩ mặt nạ? - Ảnh 1." rel="lightbox" photoid="547605378582175744" data-original="https://images2.thanhnien.vn/528068263637045248/2023/2/8/ngoc-mai-6-16758232780392041530579.jpg" type="photo" width="" height=""/></p><figcaption><p data-placeholder="Nhập chú thích ảnh">&#34;O Sen&#34; Ngọc Mai có tên đầy đủ là Lê Như Ngọc Mai, sinh năm 1987, quê ở Quảng Trị. Cô là nữ ca sĩ được đào tạo thanh nhạc chuyên nghiệp và có thâm niên 10 năm giảng dạy tại Nhạc viện TP.HCM. Cô còn có bằng thạc sĩ ngành Biểu diễn Thanh nhạc tại <a href="https://vnexpress.net/nsnd-ta-minh-tam-tung-du-dam-cuoi-ca-si-ngoc-mai-185230208102524898.htm" title="Nhạc viện TP.HCM" data-rel="follow">Nhạc viện TP.HCM</a>, từng đi lưu diễn ở nhiều nước Pháp, Đức, Áo, Phần Lan, Thụy Điển, Mỹ, Canada, Nhật Bản...</p></figcaption><p data-placeholder="Nhập tác giả">FBNV</p></figure><figure type="Photo"><p><img src="https://images2.thanhnien.vn/528068263637045248/2023/2/8/ngoc-mai-quoc-nghiep-16758232788851579433489.jpg" id="img_547605456852033536" w="2000" h="1332" alt="Cuộc sống &#39;O Sen&#39; Ngọc Mai thay đổi ra sao sau chiến thắng Ca sĩ mặt nạ? - Ảnh 2." title="Cuộc sống &#39;O Sen&#39; Ngọc Mai thay đổi ra sao sau chiến thắng Ca sĩ mặt nạ? - Ảnh 2." rel="lightbox" photoid="547605456852033536" data-original="https://images2.thanhnien.vn/528068263637045248/2023/2/8/ngoc-mai-quoc-nghiep-16758232788851579433489.jpg" type="photo" width="" height=""/></p><figcaption><p data-placeholder="Nhập chú thích ảnh">Trước khi nổi đình đám trong<i> Ca sĩ mặt nạ 2022</i>, Ngọc Mai được khán giả biết đến với vai trò là vợ của nghệ sĩ xiếc Quốc Nghiệp. Bên cạnh công việc giảng dạy và xây dựng tổ ấm, Ngọc Mai thỉnh thoảng tham gia những gameshow truyền hình về gia đình. Cả hai được khán giả ngưỡng mộ bởi chuyện tình lãng mạn cùng mái ấm hạnh phúc với một bé trai và một bé gái</p></figcaption><p data-placeholder="Nhập tác giả">FBNV</p></figure><figure type="Photo"><p><img src="https://images2.thanhnien.vn/528068263637045248/2023/2/8/viechannel-photos-the-masked-singer-vn-eps-12-3-6089-1675823277332128908160.jpg" id="img_547605332598861824" w="1099" h="694" alt="Cuộc sống &#39;O Sen&#39; Ngọc Mai thay đổi ra sao sau chiến thắng Ca sĩ mặt nạ? - Ảnh 3." title="Cuộc sống &#39;O Sen&#39; Ngọc Mai thay đổi ra sao sau chiến thắng Ca sĩ mặt nạ? - Ảnh 3." rel="lightbox" photoid="547605332598861824" data-original="https://images2.thanhnien.vn/528068263637045248/2023/2/8/viechannel-photos-the-masked-singer-vn-eps-12-3-6089-1675823277332128908160.jpg" type="photo" width="" height=""/></p><figcaption><p data-placeholder="Nhập chú thích ảnh">Tuy vậy, giọng hát của Ngọc Mai không được công chúng chú ý nhiều cho đến khi cô xuất hiện với mascot O Sen trong <i>Ca sĩ mặt nạ 2022</i>. Chất giọng biến hóa linh hoạt theo từng ca khúc cộng với kỹ thuật thanh nhạc tốt khiến cô trở thành một ẩn số thú vị của chương trình</p></figcaption><p data-placeholder="Nhập tác giả">V.C</p></figure><figure type="Photo"><p><img src="https://images2.thanhnien.vn/528068263637045248/2023/2/8/viechannel-photos-mascot-o-sen-3-1-1930-1675823277492155092784.jpg" id="img_547605325864128512" w="1351" h="825" alt="Cuộc sống &#39;O Sen&#39; Ngọc Mai thay đổi ra sao sau chiến thắng Ca sĩ mặt nạ? - Ảnh 4." title="Cuộc sống &#39;O Sen&#39; Ngọc Mai thay đổi ra sao sau chiến thắng Ca sĩ mặt nạ? - Ảnh 4." rel="lightbox" photoid="547605325864128512" data-original="https://images2.thanhnien.vn/528068263637045248/2023/2/8/viechannel-photos-mascot-o-sen-3-1-1930-1675823277492155092784.jpg" type="photo" width="" height=""/></p><figcaption><p data-placeholder="Nhập chú thích ảnh">Những bài hát như <i>Chân ái, Cho em gần anh thêm chút nữa, Túy âm, Carmen - Habanera... </i>đều nhận được sự ủng hộ của khán giả. Thậm chí, đến những vòng cuối cùng, nếu các nhân vật khác đều dần lộ diện thì O Sen vẫn khiến khán giả hoang mang về danh tính của mình</p></figcaption><p data-placeholder="Nhập tác giả">V.C</p></figure><figure type="Photo"><p><img src="https://images2.thanhnien.vn/528068263637045248/2023/2/8/ngoc-mai-tmsn-167582327785675102527.jpg" id="img_547605427210526720" w="2000" h="1500" alt="Cuộc sống &#39;O Sen&#39; Ngọc Mai thay đổi ra sao sau chiến thắng Ca sĩ mặt nạ? - Ảnh 5." title="Cuộc sống &#39;O Sen&#39; Ngọc Mai thay đổi ra sao sau chiến thắng Ca sĩ mặt nạ? - Ảnh 5." rel="lightbox" photoid="547605427210526720" data-original="https://images2.thanhnien.vn/528068263637045248/2023/2/8/ngoc-mai-tmsn-167582327785675102527.jpg" type="photo" width="" height=""/></p><figcaption><p data-placeholder="Nhập chú thích ảnh">Trong đêm Concert <i>Ca sĩ mặt nạ 2022</i>, Ngọc Mai bật khóc khi chia sẻ cảm xúc được đứng trên sân khấu và nhận được sự cổ vũ của đông đảo khán giả. Vợ của nghệ sĩ xiếc<a href="https://vnexpress.net/quoc-co-quoc-nghiep-xac-lap-thanh-cong-ky-luc-guinness-moi-185230203200837839.htm" title=" Quốc Nghiệp" data-rel="follow"> Quốc Nghiệp</a> cũng cho biết trong suốt khoảng thời gian qua cô chọn lui về hậu trường để chăm sóc gia đình và tạm gác lại sự nghiệp nghệ thuật. Tuy nhiên, sau khi giành quán quân, cô chính thức trở lại với con đường ca hát</p></figcaption><p data-placeholder="Nhập tác giả">V.C</p></figure><figure type="Photo"><p><img src="https://images2.thanhnien.vn/528068263637045248/2023/2/8/ngoc-mai-3-1675823279596849174005.jpg" id="img_547605432332349440" w="1365" h="2048" alt="Cuộc sống &#39;O Sen&#39; Ngọc Mai thay đổi ra sao sau chiến thắng Ca sĩ mặt nạ? - Ảnh 6." title="Cuộc sống &#39;O Sen&#39; Ngọc Mai thay đổi ra sao sau chiến thắng Ca sĩ mặt nạ? - Ảnh 6." rel="lightbox" photoid="547605432332349440" data-original="https://images2.thanhnien.vn/528068263637045248/2023/2/8/ngoc-mai-3-1675823279596849174005.jpg" type="photo" width="" height=""/></p><figcaption><p data-placeholder="Nhập chú thích ảnh">Nhờ hiệu ứng của hình tượng &#34;O Sen&#34;, ca sĩ Ngọc Mai bắt đầu được truyền thông săn đón cũng như ngày càng đắt show ở những phòng trà và sân khấu lớn. Giọng ca <i>Muôn vàn khuôn mặt</i> liên tục xuất hiện trong những sự kiện lớn như <i>Làn sóng xanh 2022, Lễ hội Quốc tế Hozo 2022, TikTok Awards Vietnam 2022,</i> được đề cử giải Mai vàng ở hạng mục Nữ ca sĩ được yêu thích nhất</p></figcaption><p data-placeholder="Nhập tác giả">FBNV</p></figure><figure type="Photo"><p><img src="https://images2.thanhnien.vn/528068263637045248/2023/2/8/ngoc-mai-ha-ho-16758232791341192513709.jpg" id="img_547605479087616000" w="2000" h="1368" alt="Cuộc sống &#39;O Sen&#39; Ngọc Mai thay đổi ra sao sau chiến thắng Ca sĩ mặt nạ? - Ảnh 7." title="Cuộc sống &#39;O Sen&#39; Ngọc Mai thay đổi ra sao sau chiến thắng Ca sĩ mặt nạ? - Ảnh 7." rel="lightbox" photoid="547605479087616000" data-original="https://images2.thanhnien.vn/528068263637045248/2023/2/8/ngoc-mai-ha-ho-16758232791341192513709.jpg" type="photo" width="" height=""/></p><figcaption><p data-placeholder="Nhập chú thích ảnh">Bên cạnh sự nghiệp thăng hoa, câu chuyện đời tư của Ngọc Mai cũng được khán giả quan tâm. Trong đó có thể kể đến việc nữ ca sĩ tiết lộ từng bị một đồng nghiệp xem thường. Ngọc Mai kể năm 2005, cô được mẹ dẫn đi tham gia cuộc thi <i>Sao mai</i>. Dù chỉ mới mười mấy tuổi song nữ ca sĩ đã giành giải nhất khu vực miền Trung - Tây nguyên (thể loại nhạc thính phòng) và giành cơ hội ra Hà Nội tranh tài. &#34;Vô tình, tôi gặp một người rất có uy tín trong nghề. Họ nói là: Có nhất ở đâu thì ra đây chỉ là con gián&#34;, Ngọc Mai nhớ lại</p></figcaption><p data-placeholder="Nhập tác giả">FBNV</p></figure><figure type="Photo"><p><img src="https://images2.thanhnien.vn/528068263637045248/2023/2/8/3234418416002994185762377361992470011682857n-16758298818361288995647.jpg" id="img_547633030430470144" w="1365" h="2048" alt="Cuộc sống của Ngọc Mai thay đổi thế nào sau khi chiến thắng Ca sĩ mặt nạ? - Ảnh 8." title="Cuộc sống của Ngọc Mai thay đổi thế nào sau khi chiến thắng Ca sĩ mặt nạ? - Ảnh 8." rel="lightbox" photoid="547633030430470144" data-original="https://images2.thanhnien.vn/528068263637045248/2023/2/8/3234418416002994185762377361992470011682857n-16758298818361288995647.jpg" type="photo" width="" height=""/></p><figcaption><p data-placeholder="Nhập chú thích ảnh">Mặt khác, mối quan hệ của Ngọc Mai với gia đình chồng, đặc biệt là tin đồn xích mích với MC Hồng Phượng cũng khiến dư luận xôn xao khi nữ ca sĩ sinh năm 1987 trải lòng về cuộc sống khó khăn khi cô vừa kết hôn. Tuy ngầm phủ nhận chuyện mâu thuẫn với nhà chồng nhưng tin đồn trên vẫn ảnh hưởng đến tên tuổi của &#34;O Sen&#34;</p></figcaption><p data-placeholder="Nhập tác giả">FBNV</p></figure><figure type="Photo"><p><img src="https://images2.thanhnien.vn/528068263637045248/2023/2/8/ngoc-mai-1675823280280470275927.jpg" id="img_547605486116311040" w="641" h="960" alt="Cuộc sống &#39;O Sen&#39; Ngọc Mai thay đổi ra sao sau chiến thắng Ca sĩ mặt nạ? - Ảnh 9." title="Cuộc sống &#39;O Sen&#39; Ngọc Mai thay đổi ra sao sau chiến thắng Ca sĩ mặt nạ? - Ảnh 9." rel="lightbox" photoid="547605486116311040" data-original="https://images2.thanhnien.vn/528068263637045248/2023/2/8/ngoc-mai-1675823280280470275927.jpg" type="photo" width="" height=""/></p><figcaption><p data-placeholder="Nhập chú thích ảnh">Ngoài ra, việc Ngọc Mai &#34;lời qua tiếng lại&#34; với tác giả ca khúc <i>Túy âm</i> trên mạng xã hội cũng khiến một bộ phận khán giả không hài lòng. Giọng điệu và cách chia sẻ của vợ nghệ sĩ Quốc Nghiệp phần nào khiến khán giả mất đi thiện cảm vốn có trước đó dành cho &#34;O Sen&#34;</p></figcaption><p data-placeholder="Nhập tác giả">FBNV</p></figure><figure type="Photo"><p><img src="https://images2.thanhnien.vn/528068263637045248/2023/2/8/ngoc-mai-5-1675823278296928403712.jpg" id="img_547605367538524160" w="1365" h="2048" alt="Cuộc sống của Ngọc Mai thay đổi thế nào sau khi chiến thắng Ca sĩ mặt nạ? - Ảnh 10." title="Cuộc sống của Ngọc Mai thay đổi thế nào sau khi chiến thắng Ca sĩ mặt nạ? - Ảnh 10." rel="lightbox" photoid="547605367538524160" data-original="https://images2.thanhnien.vn/528068263637045248/2023/2/8/ngoc-mai-5-1675823278296928403712.jpg" type="photo" width="" height=""/></p><figcaption><p data-placeholder="Nhập chú thích ảnh">Trong thời gian gần đây, giọng ca quê gốc Quảng Trị còn bị nhận xét &#34;sân si, trịch thượng&#34;. Trong bài viết, họa sĩ Hồng Hải đưa ra những lý do khiến Ngọc Mai không thể trở thành một ngôi sao như hát thiếu cảm xúc, không có bản hit riêng, âm sắc không đặc biệt “như Mỹ Linh từng nhận xét giọng thế này trong nhạc viện rất nhiều&#34;, thiếu cá tính âm nhạc… Thậm chí, người này còn nhận xét sau cuộc thi Ngọc Mai thể hiện một con người &#34;đầy hằn học, hận thù và mong muốn trả đũa&#34;</p></figcaption><p data-placeholder="Nhập tác giả">FBNV</p></figure><figure type="Photo"><p><img src="https://images2.thanhnien.vn/528068263637045248/2023/2/8/ngoc-mai-quoc-nghiep-1-1675823278538161100231.jpg" id="img_547605413366108160" w="2000" h="1334" alt="Cuộc sống của Ngọc Mai thay đổi thế nào sau khi chiến thắng Ca sĩ mặt nạ? - Ảnh 11." title="Cuộc sống của Ngọc Mai thay đổi thế nào sau khi chiến thắng Ca sĩ mặt nạ? - Ảnh 11." rel="lightbox" photoid="547605413366108160" data-original="https://images2.thanhnien.vn/528068263637045248/2023/2/8/ngoc-mai-quoc-nghiep-1-1675823278538161100231.jpg" type="photo" width="" height=""/></p><figcaption><p data-placeholder="Nhập chú thích ảnh">Vụ việc trên chưa kịp lắng xuống thì những hình ảnh Ngọc Mai từng kết hôn với một người đàn ông khác trước khi &#34;về chung một nhà&#34; với Quốc Nghiệp lại khiến cộng đồng mạng lần nữa &#34;dậy sóng&#34;. Trong tiệc cưới, có sự xuất hiện của <a href="https://vnexpress.net/nsnd-ta-minh-tam-tung-du-dam-cuoi-ca-si-ngoc-mai-185230208102524898.htm" title="NSND Tạ Minh Tâm" data-rel="follow">NSND Tạ Minh Tâm</a>, diễn viên Thanh Thủy... Chia sẻ về câu chuyện này, nghệ sĩ Tạ Minh Tâm cho biết: &#34;Chuyện đó đã hơn 10 năm trước rồi mà không hiểu sao bây giờ lại bị khơi lên. Tôi không hiểu mọi người khơi lên để chi. Việc cô ấy từng kết hôn đâu có là vấn đề&#34;. Sự việc khiến từ khóa mang tên cô được tìm kiếm nhiều trên mạng</p></figcaption><p data-placeholder="Nhập tác giả">FBNV</p></figure><!--Wed Feb 08 2023 13:59:58 GMT+0700 (Giờ Đông Dương) -- Wed Feb 08 2023 13:59:58 GMT+0700 (Giờ Đông Dương) -- Wed Feb 08 2023 14:00:05 GMT+0700 (Giờ Đông Dương)-->
