                            <h2 data-role="sapo">
                                Đàm Vĩnh Hưng nói Vũ Hà là một trong những tri kỷ hiếm hoi của anh. Dù cuộc sống gặp nhiều thăng trầm nhưng nam ca sĩ &#34;chưa từng thấy buồn&#34; khi ở bên bạn thân.
                            </h2>
                            <div>
                                <div data-role="content" itemprop="articleBody" data-io-article-url="https://thanhnien.vn/dam-vinh-hung-vu-ha-khon-va-soi-doi-hon-toi-nhieu-185230221104325438.htm">
                                    

                                                                                                                
                                    <figure data-uid="D655QYgZN" type="Photo"><p><img src="https://images2.thanhnien.vn/thumb_w/640/528068263637045248/2023/2/21/dam-vinh-hung-vu-ha-6-1676951105208575225700.jpg" id="img_552335833330655232" w="1982" h="1486" alt="Đàm Vĩnh Hưng: Vũ Hà khôn và sỏi đời hơn tôi nhiều - Ảnh 1." title="Đàm Vĩnh Hưng: Vũ Hà khôn và sỏi đời hơn tôi nhiều - Ảnh 1." rel="lightbox" photoid="552335833330655232" data-original="https://images2.thanhnien.vn/528068263637045248/2023/2/21/dam-vinh-hung-vu-ha-6-1676951105208575225700.jpg" type="photo" width="" height=""/></p><figcaption><p data-placeholder="Nhập chú thích ảnh">Nhân dịp sinh nhật Vũ Hà, Đàm Vĩnh Hưng trải lòng về tình bạn kéo dài hơn 20 năm với bạn thân. Giọng ca <i>Xin lỗi tình yêu</i> tiết lộ gặp đồng nghiệp tại một buổi casting cho một trung tâm ca nhạc ở <a href="https://blogtienao.com/nghe-si-thien-kim-qua-doi-185230220124927571.htm" title="TP.HCM" data-rel="follow">TP.HCM</a> năm 1998. Từ đó, cả hai làm quen và dần dần trở nên thân thiết<br/></p></figcaption><p data-placeholder="Nhập tác giả">FBNV</p></figure><figure data-uid="NujxA8TEr" type="Photo"><p><img src="https://images2.thanhnien.vn/thumb_w/640/528068263637045248/2023/2/21/dam-vinh-hung-vu-ha-7-1676951105361213857751.jpg" id="img_552335811890544640" w="1366" h="2048" alt="Đàm Vĩnh Hưng: Vũ Hà khôn và sỏi đời hơn tôi nhiều - Ảnh 2." title="Đàm Vĩnh Hưng: Vũ Hà khôn và sỏi đời hơn tôi nhiều - Ảnh 2." rel="lightbox" photoid="552335811890544640" data-original="https://images2.thanhnien.vn/528068263637045248/2023/2/21/dam-vinh-hung-vu-ha-7-1676951105361213857751.jpg" type="photo" width="" height=""/></p><figcaption><p data-placeholder="Nhập chú thích ảnh">Trong showbiz, Đàm Vĩnh Hưng và Vũ Hà được xem là một cặp bài trùng khi thường xuyên xuất hiện trên thảm đỏ và các dự án <a href="https://blogtienao.com/hoa-si-nu-viet-tham-gia-trien-lam-nghe-thuat-quoc-te-nu-2023-journey-of-friendships-185230219191649454.htm" title="nghệ thuật" data-rel="follow">nghệ thuật</a>. Cả hai cùng trải qua thuở hàn vi với nhiều vinh nhục nên có sự đồng cảm và gắn bó đến hiện tại</p></figcaption><p data-placeholder="Nhập tác giả">FBNV</p></figure><figure data-uid="lYIvfV7Je" type="Photo"><p><img src="https://images2.thanhnien.vn/thumb_w/640/528068263637045248/2023/2/21/dam-vinh-hung-vu-ha-3-16769511051772094538000.jpg" id="img_552335799127941120" w="720" h="960" alt="Đàm Vĩnh Hưng: Vũ Hà khôn và sỏi đời hơn tôi nhiều - Ảnh 3." title="Đàm Vĩnh Hưng: Vũ Hà khôn và sỏi đời hơn tôi nhiều - Ảnh 3." rel="lightbox" photoid="552335799127941120" data-original="https://images2.thanhnien.vn/528068263637045248/2023/2/21/dam-vinh-hung-vu-ha-3-16769511051772094538000.jpg" type="photo" width="" height=""/></p><figcaption><p data-placeholder="Nhập chú thích ảnh">Mr.Đàm thừa nhận bản thân học hỏi được nhiều thứ từ Vũ Hà. Anh dí dỏm bộc bạch: “Xác nhận Vũ Hà khôn hơn tôi, cáo hơn tôi, lõi đời hơn tôi, tiền mặt nhiều hơn tôi (vì chả thấy xài gì bao giờ) và giống má tôi hơn cả tôi, nhất là khoản nấu ăn ngon”.</p></figcaption><p data-placeholder="Nhập tác giả">FBNV</p></figure><figure data-uid="YrsJOdIyF" type="Photo"><p><img src="https://images2.thanhnien.vn/thumb_w/640/528068263637045248/2023/2/21/dam-vinh-hung-vu-ha-4-16769511051861938760490.jpg" id="img_552335805337870336" w="1366" h="2048" alt="Đàm Vĩnh Hưng: Vũ Hà khôn và sỏi đời hơn tôi nhiều - Ảnh 4." title="Đàm Vĩnh Hưng: Vũ Hà khôn và sỏi đời hơn tôi nhiều - Ảnh 4." rel="lightbox" photoid="552335805337870336" data-original="https://images2.thanhnien.vn/528068263637045248/2023/2/21/dam-vinh-hung-vu-ha-4-16769511051861938760490.jpg" type="photo" width="" height=""/></p><figcaption><p data-placeholder="Nhập chú thích ảnh">Từng chia sẻ với <i>Thanh Niên</i>, Vũ Hà cho biết anh cảm thấy biết ơn khi có một người bạn như Đàm Vĩnh Hưng. Năm nào, nam ca sĩ cũng được bạn thân âm thầm tổ chức tiệc sinh nhật ấm cúng với sự hiện diện của gia đình, bạn bè. Dù hay “cãi cọ” khi xuất hiện trước công chúng nhưng cả hai ngoài đời lại rất tình cảm, quan tâm lẫn nhau</p></figcaption><p data-placeholder="Nhập tác giả">FBNV</p></figure><figure data-uid="Mnp6D7Gbo" type="Photo"><p><img src="https://images2.thanhnien.vn/528068263637045248/2023/2/21/dam-vinh-hung-vu-ha-1-1676951104823102006480.jpg" id="img_552335789111115776" w="600" h="830" alt="Đàm Vĩnh Hưng: Vũ Hà khôn và sỏi đời hơn tôi nhiều - Ảnh 5." title="Đàm Vĩnh Hưng: Vũ Hà khôn và sỏi đời hơn tôi nhiều - Ảnh 5." rel="lightbox" photoid="552335789111115776" data-original="https://images2.thanhnien.vn/528068263637045248/2023/2/21/dam-vinh-hung-vu-ha-1-1676951104823102006480.jpg" type="photo" width="" height=""/></p><figcaption><p data-placeholder="Nhập chú thích ảnh">Vũ Hà dí dỏm cho biết xem nhà Đàm Vĩnh Hưng như kho quần áo của mình vì cả hai ăn mặc cùng size, cùng phong cách. Nam ca sĩ từng bị giọng ca <i>Vì anh là soái ca &#34;</i>bốc phốt&#34; khi thường sang nhà xin đồ đi diễn. Vũ Hà cho biết món quà đắt tiền nhất Đàm Vĩnh Hưng tặng mình là 4 chiếc túi hiệu Louis Vuitton</p></figcaption><p data-placeholder="Nhập tác giả">FBNV</p></figure><figure data-uid="F9vWfuSqq" type="Photo"><p><img src="https://images2.thanhnien.vn/thumb_w/640/528068263637045248/2023/2/21/dam-vinh-hung-vu-ha-5-1676951105200352347417.jpg" id="img_552335794946416640" w="719" h="960" alt="Đàm Vĩnh Hưng: Vũ Hà khôn và sỏi đời hơn tôi nhiều - Ảnh 6." title="Đàm Vĩnh Hưng: Vũ Hà khôn và sỏi đời hơn tôi nhiều - Ảnh 6." rel="lightbox" photoid="552335794946416640" data-original="https://images2.thanhnien.vn/528068263637045248/2023/2/21/dam-vinh-hung-vu-ha-5-1676951105200352347417.jpg" type="photo" width="" height=""/></p><figcaption><p data-placeholder="Nhập chú thích ảnh">Với sự gắn bó và đồng điệu từ thời trang đến phong cách sống, Đàm Vĩnh Hưng - Vũ Hà từng vướng nhiều đồn đoán về tình cảm. Đáp trả, Vũ Hà dí dỏm nói: &#34;Hai đứa thần kinh mà yêu nhau thì chắc thiên hạ chết hết. Tại vì chúng tôi thân quá nên mới như vậy đó”</p></figcaption><p data-placeholder="Nhập tác giả">FBNV</p></figure><figure data-uid="gKU20xXtM" type="Photo"><p><img src="https://images2.thanhnien.vn/thumb_w/640/528068263637045248/2023/2/21/dam-vinh-hung-vu-ha-2-16769511051471064710703.jpg" id="img_552335845268066304" w="1536" h="2048" alt="Đàm Vĩnh Hưng: Vũ Hà khôn và sỏi đời hơn tôi nhiều - Ảnh 7." title="Đàm Vĩnh Hưng: Vũ Hà khôn và sỏi đời hơn tôi nhiều - Ảnh 7." rel="lightbox" photoid="552335845268066304" data-original="https://images2.thanhnien.vn/528068263637045248/2023/2/21/dam-vinh-hung-vu-ha-2-16769511051471064710703.jpg" type="photo" width="" height=""/></p><figcaption><p data-placeholder="Nhập chú thích ảnh">Thân thiết là vậy nhưng cũng có lúc bộ đôi Đàm Vĩnh Hưng - Vũ Hà từng có thời gian “nghỉ chơi”. Vũ Hà kể: “Dù chơi thân với nhau nhưng vì cuộc sống, vì nghề nghiệp mỗi đứa một nơi nên cả hai ít khi gặp mặt. Chỉ có khi đặc biệt nhất, hai đứa mới “hạp&#34; vô với nhau thôi. Khi mà chúng tôi ngồi lại thì cũng đã hai mươi mấy năm chơi với nhau rồi, lúc đó mới phát hiện ra rằng: “Trời đất ơi, tại sao mình lại có một tình bạn tốt như thế, một người bạn thân như thế mà không gần nhau hơn để chia sẻ nỗi buồn&#34;. Khi đó mới nhận ra rằng có những lúc cô đơn, muốn nói chuyện với nhau thì lại không nói được”<br/></p></figcaption><p data-placeholder="Nhập tác giả">FBNV</p></figure><figure data-uid="mYkFA1Yl1" type="Photo"><p><img src="https://images2.thanhnien.vn/thumb_w/640/528068263637045248/2023/2/21/dam-vinh-hung-vu-ha-8-16769511053931818955076.jpg" id="img_552335824637894656" w="2000" h="1500" alt="Đàm Vĩnh Hưng: Vũ Hà khôn và sỏi đời hơn tôi nhiều - Ảnh 8." title="Đàm Vĩnh Hưng: Vũ Hà khôn và sỏi đời hơn tôi nhiều - Ảnh 8." rel="lightbox" photoid="552335824637894656" data-original="https://images2.thanhnien.vn/528068263637045248/2023/2/21/dam-vinh-hung-vu-ha-8-16769511053931818955076.jpg" type="photo" width="" height=""/></p><figcaption><p data-placeholder="Nhập chú thích ảnh">Gần như cùng xuất phát điểm trong nghệ thuật nhưng sự nghiệp của <a href="https://blogtienao.com/dam-vinh-hung-toi-moi-la-thanh-khoc-chu-khong-phai-tran-thanh-1851541562.htm" title="Đàm Vĩnh Hưng" data-rel="follow">Đàm Vĩnh Hưng</a> và Vũ Hà hoàn toàn khác nhau. Dù vậy, Vũ Hà nói anh chưa từng ganh tị với bạn thân vì mỗi người có định hướng và con đường riêng. &#34;Hai đứa thân nhau mấy chục năm là do không có sự đố kỵ. Hưng có vị trí ngày hôm nay hoàn toàn do nỗ lực của Hưng. Còn tôi cứ cà rỡn, được như hôm nay là mừng rồi&#34;, anh tâm sự</p></figcaption><p data-placeholder="Nhập tác giả">FBNV</p></figure><!--Tue Feb 21 2023 12:48:35 GMT+0700 (Giờ Đông Dương) -- Tue Feb 21 2023 12:48:35 GMT+0700 (Giờ Đông Dương) -- Tue Feb 21 2023 12:48:37 GMT+0700 (Giờ Đông Dương)-->
